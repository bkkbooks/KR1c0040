body:
  text: 重訂詩經疑問詩類提要臣等謹案詩經疑問十二卷明姚舜牧撰舜牧有易經疑問已著録是篇釋詩兼用毛傳朱傳及嚴粲詩緝時亦自出新論如辨成王未嘗賜周公天子禮樂其説頗為有見又論三經三緯之説謂賦比興乃通融取義非截然謂此為賦此為比此為興也惟截然分而為三於是求之不得其説則將為賦而興又比也賦而比又興也而寖失其義其説亦足解轇轕之談舜牧於諸經皆有疑問惟此編説詩為差善自序稱所疑凡經數十年重加訂問前此誤解亟為辨正葢其用力較深也惟不信古人字少假借通用之説於龍光伴奐之類皆徑以本字解之强生論辨是則隆萬以後儒者少見古書之故亦足見詁訓不明而欲義理之不謬無是事矣乾隆四十五年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀重訂詩經疑問原序嘗讀三經三緯之説竊有疑焉三經風雅頌是已而三緯曰賦曰比曰興盖通融取義謂所賦之有比有興耳非截然謂此為賦此為比此為興也唯截然分而為三于是求之不得其説則將謂賦而興又比也賦而比又興也而寖失其義矣此三緯之説之可疑者而猶其小者也若稽實待虛斷章取義凡詩皆可通用是而作者之志則有一定不易者在説詩而不得其志則將謂葛之覃兮為后妃既成絺綌而賦其事矣將謂采采卷耳為后妃思念文王而作矣將謂螽斯羽之為羽虫矣將謂簡兮之為輕世肆志矣將謂河水洋洋為齊地廣饒士女之佼好矣將謂魯道有蕩為適齊之大路矣將謂似續妣祖為君子之居矣將謂中原有菽為兄弟之教其子矣將謂荏苒柔木為得所植矣將謂習習谷風為生長和調矣將謂有饛簋飱有捄棘匕之漫無取義矣將謂鴛鴦于飛畢之羅之之為興矣將謂履帝武敏歆為足大指歆歆然如有人道之感矣將謂永錫祚𦙍之可分而為二矣將謂乃造其曹之為牧所矣將謂伴奐優游之為泮渙優游矣將謂彼疏斯稗之為分别君子與小人矣而其他則若鞅掌之為失容也權輿之為托始也龍光之為寵光也舉柴之為積禽也無射之為無斁也僣始之為譛始也譛始之為僣始也遐之通為河也侯之訓為維也紛紛莫紀總之則不得詩人之志而姑為講解云爾倘以意逆詩人之志於千載之上則一字各函一義而其中雋永之味真有足啓萬世之咀嚼者奈之何詩義之湮而莫識也又奈之何陳説汨没於所習而即有能探其㫖者付之勿問也今予所疑凡經數十年且重加訂問矣若前所誤解者亟與辨正即有碍於制義亦所弗恤焉盖心獨苦矣而安得髙明君子虛心一為之裁訂哉則所謂藏之名山而俟知於千載之下者也昔萬厯歳在辛亥季冬烏程後學姚舜牧書於清髙啓後軒
