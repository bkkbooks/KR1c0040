body:
  text: 重訂詩經疑問卷七明姚舜牧撰小雅楚楚者茨言抽其棘自昔何為我蓺黍稷我黍與與我稷翼翼我倉既盈我庾維億以為酒食以饗以祀以妥以侑以介景福濟濟蹌蹌絜爾牛羊以往烝嘗或剥或亨或肆或將祝祭于祊祀事孔明先祖是皇神保是饗孝孫有慶報以介福萬夀無疆執㸑踖踖為俎孔碩或燔或炙君婦莫莫為豆孔庶為賔為客獻酬交錯禮儀卒度笑語卒獲神保是格報以介福萬夀攸酢我孔熯矣式禮莫愆工祝致告徂賚孝孫苾芬孝祀神嗜飲食卜爾百福如幾如式既齊既稷既匡既敕永錫爾極時萬時億禮儀既備鐘鼓既戒孝孫徂位工祝致告神具醉止皇尸載起鼓鐘送尸神保聿歸諸宰君婦廢徹不遲諸父兄弟備言燕私樂具入奏以綏後禄爾殽既將莫怨具慶既醉既飽小大稽首神嗜飲食使君夀考孔惠孔時維其盡之子子孫孫勿替引之按楚茨信南山大田甫田四篇詩序皆謂刺幽王也皆傷今思古之詞故全述古事形容其田野修治年報豐穰祭祀禮樂之備燕飲威儀之美言之反覆而不厭者葢詩人遐想太平之盛田家之樂惆悵羡慕恨不生乎其時所以傷今而思古也此詩述公卿力於田事以脩祭祀之事故首章叙黍稷豐盈為酒食以致祭有酒食必備犧牲故次章叙將奉牛羊以承祭然承祭不可以不敬故三章叙主祭與祭執事之有恪以備舉祭祀之禮其各章下係以福夀之詞者樂章一升奏為一闋故云爾其實通章重在致祭上不重在受福上四章工祝致告下然後叙神歆其祭錫之以福禄五章則叙其祭畢而舉燕六章則叙其所為燕者而併載與燕者之慶詞見神之所饗在明德之馨然非黍稷之馨無由以將所以公卿必力田以供祭祀之禮讀此詩者必融㑹此大㫖始得若徒拘泥于文字間便支離破碎不足以言詩矣饗維酒食酒食維黍稷故章首本蓻植之初說到黍稷之豐倉庾之盈酒食之具用之以饗祀妥侑以舉時祭之禮倉不足貯而益之庾曰既盈而維億皆甚言其所穫之多耳饗祀是大槩說妥侑又饗祀中事以介景福即下二章報以介福意不重濟濟蹌蹌是趨事之容在絜爾牛羊以下見得春夏物生未成禮從其薄秋冬黍稷既登而可伸備物之敬故用烝嘗是皇者皇皇然臨之在上也不應作大也君也解神保非尸也尸皇尸何等尊稱又必着神保二字以為美號耶且以巫降神之稱大是荒謬胡引以解經愚謂先祖是始祖始祖而下為神保中庸云宗廟饗之子孫保之生為子孫可保其基業沒為神可保其享祀是為神保耳觀是饗是格語則可見矣若以尸言始祭時尸即在位何於是饗後始云是格耶後章鼓鐘送尸下又何云神保聿歸曰尸曰神保若是其稱之重復耶神保是饗及下神保是格云葢言必如是而後可致神之來饗來格也兩章意通重在此下孝孫有慶報以介福云云俱不重執㸑是賤者君婦是貴者賔客是助祭者備舉云云見在祭者之無不恪也上止言牛羊未及爼豆上但言濟濟蹌蹌未及賔客此章云為爼為豆為賔為客字字有義莫輕㸔過爼盛牲體而又有宜燔灸者故為爼孔碩下着或燔或灸句賔客各有威儀故云為賔為客獻酬時固有少長以共事然所重在賔客獻酬上交錯即其中之往來交錯也以獻酬屬賔客交錯屬少長非是祭時何以及賔客曰祭以得賢助祭為榮得賢賔客以助祭即祖考亦有獻酬之意故獻尸之後有獻賔客之禮信南山云以為酒食畀我尸賔亦此意禮儀笑語即獻酬交錯之禮儀笑語也中則曰卒度合宜曰卒獲此雖有和意然總只是敬以將事攸酢者若有獻則有酢必然之詞也三章萬夀云云總是永永克享若下文所云永錫爾極時萬時億之謂我孔熯矣式禮莫愆見自行禮時至此一將之誠敬而無惰慢之形此所以能格于祖考而致福禄之綏也彼跛倚以臨祭者其何足以語此工祝致告二句是祝致神意於主人之謂苾芬而下八句則嘏主人之詞也苾芬而下八句一串下若曰維爾主人苾芬以致孝祀神嗜爾飲食而居歆已卜爾有百福之受如幾之先見也如式之有常也既齊而整一既稷而堅實既匡而中正既敕而肅將永永錫爾以皇極將時萬時億而無窮焉此正申前章報以介福萬夀無疆萬夀攸酢之意勿分飲食禮容為二事易曰幾者動之微吉之先見者也曷以期字解稷訓疾無謂愚謂宜作堅實解齊稷匡敕四字非善其承祭之容也齊莊中正本皆君子之德工祝致告若謂自今以後俾爾既齊既稷既匡既敕常如承大祭者然故𦂳承永錫爾極句既盡也齊稷匡勅之盡善也永錫爾極極字即書皇建其有極極字是致福之本也工祝不但祝君之福而直祝以致福之本上二章云報以介福萬夀無疆萬夀攸酢此云卜爾百福永錫爾極時萬時億正申言上意若分報以福禄報爾以衆善之極作二項便不是禮儀既備鐘鼓既戒是禮無不舉樂無不奏而祭將畢也異姓賔客己有獻酬之禮故祭畢止歸其爼而諸父兄弟備言燕私中庸旅酬下為上是獻酬交錯事燕毛是備言燕私事鐘鼓既戒是奏之於廟者樂具入奏是奏之於寢者寢在廟之後故云樂入後祿對先人言上云報以介福萬夀無疆卜爾百福時萬時億先人既畀我以祿矣燕私之飲正所以綏是祿也綏安也受而安之之謂再按詩序云刺幽王也政煩賦重田菜多荒饑饉降喪民卒流亡祭祀不饗故君子思古焉則此詩分明是王者之事觀孝孫有慶萬夀無疆報以介福萬夀攸酢水錫爾極時萬時億等語則可見矣古大夫嘏辭雖亦有多福無疆眉夀萬年語然未有若前之嘏辭直曰萬夀無疆永錫爾極時萬時億之致祝者若此為大夫嘏辭不識天子嘏辭又將何以加焉申公詩說亦謂是篇農事既成乃祭宗廟燕及王族之詩然不謂刺與序小異吕氏通篇註極明具慶是矣何以上着莫怨字曰同姓一體也一體宜一心有乖戾則怨心生矣莫怨云者懽忻無間之謂也懽忻無間而咸集是為具慶角弓云民之無良相怨一方中庸云親親則諸父昆弟不怨正是此意孔惠孔時四句不必着祭祀上說理無不順曰孔惠行無不得曰孔時維其盡之即天保俾爾戬糓罄無不宜之謂子子孫孫勿替引之言其後又䋲䋲引之而不替也此之謂綏後祿此皆大小稽首致慶之詞葢前章神嗜飲食以下六句此工祝所以致神之賚者此章神嗜飲食以下五句是燕私所以伸已之祝者皆就其以德受福者言俱不必粘着祭祀上說首章首四句據註即為古人除去荆棘以為蓻黍稷事抽字作除字解然楚楚者茨句似無着落詩緝抽字作發字解言楚楚者茨言抽其棘矣自昔何為者哉我蓻黍稷者也與與翼翼登之倉庾以共享祀昔日豐穰之樂何如者而今為茨棘之場是可傷而思也通篇俱作天子之事㸔是大有理信彼南山維禹甸之畇畇原隰曾孫田之我疆我理南東其畆上天同雲雨雪雰雰益之以霡霂既優既渥既霑既足生我百糓疆埸翼翼黍稷彧彧曾孫之穡以為酒食畀我尸賔夀考萬年中田有廬疆埸有𤓰是剥是菹獻之皇祖曾孫夀考受天之祐祭以清酒從以騂牡享于祖考執其鸞刀以啓其毛取其血膋是蒸是享苾苾芬芬祀事孔明先祖是皇報以介福萬夀無疆詩序刺幽王也不能修成王之業疆理天下以奉禹功故君子思古焉觀首章六句可見畇畇不作墾闢解言墾闢而畇畇如也原高平隰下濕各整然可耕曰畇畇疆是田之大界限理是中間細分别處南東正其分限之縱横也註順地勢水勢之所宜句極妙雨雪而霡霂於天時最善而宜稼嘗聞北人云冬時宜雪不宜雨春時宜雨不宜驟葢凡雨易流洩而雨之驟者尤洩之速也勢有髙下洩則其澤不深入而髙者病受洩者雖蒙其澤而一時所衝䧟其土實而不發而卑者亦病唯是雪之所布上下均而融化緩交春時更益以霡霂漸漬深入土膏自然其融發此雪為豐年之兆而詩人所先咏也雖然不翕聚則不能發散氣寒而雪氣洩而雨則冬之雪又甚有宜于稼非北人之所知也優有加多意渥有濡潤意霑有淪洽意足有充盈意疆埸節承上二章說有如此之地利又有如此之天時則稼穡豐登可為酒食以昭民力之普存矣所以承說畀我尸賔夀考萬年畀我尸者三獻於祀事之時也畀我賔者獻酬於三獻之後也然重在尸上有尸而後有賔也酒食是正禮𤓰亦可獻者一物不忘其先人也不宜與黍稷對畀我尸賔獻之皇祖葢將以此畀之獻之也皆是未然事祭以清酒三句言祭祖考時以清酒騂牡享之示備物也執其鸞刀三句即就此騂牡啓毛以告純焉取血以告殺焉取膋以升臭焉纔用之以致祭故承説是烝是享云云註求神於隂陽之說不必泥書曰黍稷非馨明德維馨然明德之馨由黍稷以將故云祭以清酒從以騂牡言主在黍稷而犧牲從之也末章苾苾芬芬正黍稷之馨之謂此詩章法句法極有次第倬彼甫田歳取十千我取其陳食我農人自古有年今適南畆或耘或耔黍稷薿薿攸介攸止烝我髦士以我齊明與我犧羊以社以方我田既臧農夫之慶琴瑟擊鼓以御田祖以祈甘雨以介我稷黍以糓我士女曾孫來止以其婦子饁彼南畆田畯至喜攘其左右嘗其㫖否禾易長畆終善且有曾孫不怒農夫克敏曽孫之稼如茨如梁曾孫之庾如坻如京乃求千斯倉乃求萬斯箱黍稷稻粱農夫之慶報以介福萬夀無疆詩序甫田刺幽王也君子傷今而思古焉大田刺幽王也言矜寡不能自存焉是矣然細玩二篇之詞一似有田祿者祈年利成以致慶于農一似務稼穡者力田祈神以歸慶於君葢上下祈祝以共享太平之福似非所謂刺也朱子謂楚茨以下四篇皆豳雅與七月載芟良耜相類似為得之再按詩傳南山楚茨甫田所以勸農也大田農夫所以報上也其得詩人之意哉宜從之倬何以訓明倬从亻从卓葢卓立以仰視之謂也故仰視于上曰倬彼雲漢仰視于前曰倬彼甫田若訓作明則彼字無着落細味此二章饁彼後章瞻彼文法則自得之矣此甫田與下大田雖皆一成之田從井田而開方者然歳取十千係世禄之家所取給者故特稱甫耳十千取什一之法古者祿食之入專供本色故上食有餘得陳以食農上下無不足之患後世折色之法興則其歛時農有餘粟而不售其勢必至於减價而病農及其耕時室巳懸罄矣即上之人欲行其補助而廪無餘粟此食農之惠不復見而農之所以愈病也讀我取其陳食我農人二語不能不為之三嘆記曰三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色嗟乎堯湯能免水旱哉而國無捐瘠之民者謂備之素也謂有陳粟也陳陳相因即無年皆有年是為自古有年耳註謂自古有年是以陳陳相因倒矣誤矣介字不宜作大字解視其黍稷嶷嶷之處即介也攸介攸止即其介而止之耳古者士出於農髦士其秀者進而勞之必相傳示競勸勉是王者諭農之要領此齊明即中庸齊明盛服之齊明也此時黍稷未成故但齊明以潔其志犧牲以備其物耳改齊為粢而倒此二字合曲禮之明粢甚無謂社方田祖不應分報成祈年二項㸔葢此皆一時之祭也故上着齊明犧牲句下着琴瑟擊鼓句言潔此志備此物以社以方而祝之曰我田既臧農夫之慶葢望神之黙佑使我農夫得盡人力以致此福也隨又承說琴瑟擊鼓以御田祖用祈甘雨之降介我黍稷以糓我士女此皆所謂祈而行之一時者若下篇來方禋祀云云方是報成之祭耳如因下截一祈字分上截為報成則亦將謂報成用齊明犧羊而祈年止用琴瑟擊鼓耶此不通之論也我田既臧二句不必認此田為我之田賴農夫之福葢此田雖别公私初無爾我故上之祝曰我田既臧農夫之慶視私田即我田無二也下之祝曰雨我公田遂及我私視公田即我田無二也此上下一體之情藹然于祈祝之間而迄今猶可想見也如必分此為我之田賴農夫之福則下介我黍稷糓我士女亦止我之黍稷我之士女而已耶此拘儒小見最有戾於詩義者不可以不辯以我齊明章統是祈神之事曾孫來止章是率農以承神祐之事曾孫來止句極妙葢曾孫有祭祀之責宜親耕以為農夫先故此與下篇皆着此句東萊解攘字曰喜之甚而取之疾以見其相親無間也甚妙且攘左右嘗㫖否不但是上下相親亦有甘苦同之之意禾易長畆終善且有是力田者所致曾孫不怒農夫克敏則又加力之謂也稼是所未穫者庾是己穫而露積者乃求云者昔之所備者不足貯而又求益也此極狀其豐盈之意觀曾孫之稼如此則農夫之穫可知故云黍稷稻粱農夫之慶前云我田既臧農夫之慶以祈甘雨以介我黍稷以糓我士女此云黍稷稻粱農夫之慶報以介福萬夀無疆正其相照應處葢此詩原美公卿祈年以致慶於農故必黍稷稻粱之豐盈然後為農夫之慶而士女之克綏也報以云者上為農祈此慶而神以是報之耳或者不察乃謂此黍稷稻粱皆賴農夫以致之是宜報以大福使之萬夀無疆則直認公田是我田而賴農夫以多穫而欲厚報之不知其報之者將又以何物也介黍稷糓士女常享有年之慶便是萬夀無疆非祝其年歳之多也大田多稼既種既戒既備乃事以我覃耜俶載南畆播厥百糓既庭且碩曾孫是若既方既皁既堅既好不稂不莠去其螟螣及其蟊賊無害我田穉田祖有神秉畀炎火有渰萋萋興雨祁祁雨我公田遂及我私彼有不穫穉此有不歛穧彼有遺秉此有滯穗伊寡婦之利曾孫來止以其婦子饁彼南畆田畯至喜來方禋祀以其騂黒與其黍稷以享以祀以介景福大田亦通公私之田而言觀下雨公及私語可見種是種子戒是戒期然其間事體猶多皆須先為之備故云既種既戒既備乃事曾孫是若云者言必如是而曾孫是若也有謂曾孫於是時止力役以順民使得盡力於田亦通方皁堅好不是一時事葢厯數之耳不稂不莠不使稂莠得雜其中也螟螣蟊賊嘉禾之蠧也農夫豈不欲去之而要非人力之所及故祈田祖畀之炎火君子無如人害曰投畀有昊農夫無如苖害曰秉畀炎火除稂莠去四賊苖可以長矣而時雨之化不可少也故又注所於雲雨註雲欲盛盛則雨多雨欲徐徐則入土四句極佳觀雨我公田遂及我私則知其播其穫皆先公而後私矣此之謂王民之情彼有不穫穉四句總是豐盈收穫之多又有此遺利以惠窮民耳要知輕重註所云云大欠脱洒穧何以訓束禾成時遭風雖實而無用江南人呼為白穧是所不歛者故曰不歛穧與不穫穉相對若訓作束則與把何以異寡婦亦非無夫之老婦也書梓材曰無胥戕無胥虐至于敬寡至于屬婦合由以容寡訓人之寡弱婦訓婦之窮獨是二項若止老而無夫之寡婦則曰鰥曰孤曰獨者將不可取為利耶詩在尚書之後故本此二字來杜甫哀哀寡婦誅求盡痛哭郊原何處村又本此詩來也要識得前篇曾孫來止視其耕也此曾孫來止視其穫也古先王之重農事如此前篇是祈年之祭故云以其齊明與其犧羊葢黍稷猶未成不用以薦也此是報成之祭故云以其騂黒與其黍稷葢黍稷既成用以特薦也詩人一字不苟用如此以享以祀以介景福言曾孫以此報成而受福之甚大也前篇一曰農夫之慶一曰糓我士女其為農祈年亦已至矣故報以介福萬夀無疆以若曽孫之心此篇一曰田祖有神一曰雨我公田其為君祈神亦已至矣故以享以祀以介景福以慰農人之願盛時上下相祝之情葢如此瞻彼洛矣維水泱泱君子至止福祿如茨韎韐有奭以作六師瞻彼洛矣維水泱泱君子至止鞞琫有珌君子萬年保其家室瞻彼洛矣維水泱泱君子至止福祿既同君子萬年保其家邦詩序云刺幽王也思古明王能爵命諸侯賞善罰惡焉若此㸔來豈謂泱泱之水猶昔也而盛事不復可見哉詩傳云諸侯報天子也賦瞻洛較勝之克詰戎兵張皇六師古大臣每進戒於無虞之日言武備不可少弛也周天子㑹諸侯於東都以講武事其知此道乎故諸侯頌美之福禄如茨言其藉安承慶宻比而無踈虞也乃御戎服以作六師是不玩於恬熙而時作其震叠其萬年永固之道哉作字下得極好太平無事之日將士皆不知兵天子一大閲而丕振其皇靈飭新其武備威不期奮而自奮是作之之道也韎韐鞞琫皆戎餙天子以天下為家故室曰家室邦曰家邦福祿既同言福祿無不㑹聚也於斯時而韎韐鞞琫振飭威靈神氣不常奮而永享其太平哉故曰君子萬年保其家邦秦併天下銷兵為金人十二晋平吳之後口不言兵葢未聞瞻洛之詩也裳裳者華其葉湑兮我覯之子我心冩兮我心冩兮是以有譽處兮裳裳者華芸其黄矣我覯之子維其有章矣維其有章矣是以有慶矣裳裳者華或黄或白我覯之子乘其四駱乘其四駱六轡沃若左之左之君子宜之右之右之君子有之維其有之是以似之詩序刺幽王也古之仕者世禄小人在位則讒謟並進棄賢者之類絶功臣之世焉詩傳天子燕諸侯也較勝之此詩荅瞻洛當是東都講武之時得見此諸侯也諸侯因講武而美天子萬年之固天子因祝頌而美諸侯左右之宜一時明良之歌盛矣哉譽處者有令譽而可自處也此虗語下文維其有章而有慶見之於車馬威儀之間且左右無不宜而本之中心之固有此譽處之實也此四章宜逓逓相承說我心冩兮全是懐其德而傾冩故曰我心冩兮是以有譽處兮之子有可以動人者故我心冩我心冩是以有譽處語意極曲折而含藴維其有章云者因前語之含藴而明指之也然其有章處却見之車馬威儀之間而本之中心之固有故下章又反覆申言之有慶本有章來乘其四駱六轡沃若若非德與之稱不能有此儀也此正其有章而有慶處左右泛泛說宜之有之總言其無不宜也維其有之是以似之總言其足于内而宜於外也君子有之若取諸其所固有者維其有之是道其原固有於其中也二有字無二様君子實有于内而章顯于外寧不致令譽而可常處乎㸔到此然後見有譽處而我心冩交交桑扈有鶯其羽君子樂胥受天之祜交交桑扈有鶯其領君子樂胥萬邦之屏之屏之翰不辟為憲不戢不難受福不那兕觥其觩㫖酒思柔彼交匪敖萬福來求詩序刺幽王也君臣上下動無禮文焉詩傳天子燕諸侯也較勝之諸侯來朝於京師是下交於上故以交交桑扈興君子樂胥受天之祜泛泛說所以受祜處全在屏翰上故次云萬邦之屏三章因就屏翰之可為憲處頌其受福之不那四章又本其交之匪敖者頌其福不求而自至總之則所謂受天之祐也君子樂胥受天之祜是始辭彼交匪敖萬福來求是終辭翰字與幹字别翰羽翰也屏可為藩蔽者翰可為捍禦者方伯連帥當一靣之寄有藩蔽捍禦之任故詩人以之屏之翰言訓翰為幹謂所以當墻兩邊障土者吾不信也之屏之翰實盡屏翰之職也故百辟為憲且收歛而慎重則其所自居者又越人一等矣故受福不那兕觥節即自其燕時言之言兕觥其觩㫖酒思柔其時可謂欵且洽矣彼之上交猶然秉持恭敬而匪敖則其德誠有不可及者是萬福之來求也所謂樂胥受天之祜者葢如此敖是凶德書曰無若丹朱傲記敖不可長當燕時而上交匪敖則無所不敬可知矣敬德之聚也德福之基也所以曰萬福來求何以曰㫖酒思柔㫖酒非柔而當飲㫖酒時燕笑語兮賔主之情以柔欵勝故㫖酒亦云然鴛鴦于飛畢之羅之君子萬年福祿宜之鴛鴦在梁戢其左翼君子萬年宜其遐福乘馬在廐摧之秣之君子萬年福祿艾之乘馬在廐秣之摧之君子萬年福祿綏之詩序刺幽王也詩傳諸侯報天子也較勝之畢之羅之非人畢羅此鴛鴦也當是鴛鴦恐畢羅之及耳觀下章戢其左翼句自見摧字何以作莝字解摧頓挫也前二章以鴛鴦喻于飛恐畢羅之及是臨事而懼在梁唯左翼之戢是未然而防後二章以乘馬喻先摧而後秣是無逸乃逸既秣而復摧是雖休勿休是皆君子萬年之道也故福祿宜之遐福艾之綏之不一而足以致其與也乘馬者上乘之馬也其在廐也誰不思休息而芻牧之然其稅駕也常馭之而不使風逸也常懸之而不使蹲坐也是謂摧之秣之休息良乆而飼之以蒭豆也飲之以水漿也又常恐其惰懸之而不令其風逸而蹲坐是謂秣之摧之此馬之筋力既得休養精神又嘗抖擻所以能任重而道逺也由于飛而在梁由在梁而在廐是文章之妙處君子萬年是永永乆長之道也有頍者弁實維伊何爾酒既㫖爾殽既嘉豈伊異人兄弟匪他蔦與女蘿施于松栢未見君子憂心奕奕既見君子庶幾說懌有頍者弁實維何期爾酒既㫖爾殽既時豈伊異人兄弟具來蔦與女蘿施于松上未見君子憂心怲怲既見君子庶幾有臧有頍者弁實維在首爾酒既㫖爾殽既阜豈伊異人兄弟甥舅如彼雨雪先集維霰死喪無日無幾相見樂酒今夕君子維宴詩傳宴親戚也凡燕飲洽彼此之情况兄弟親戚其情尤不可解者故此燕先問其所與燕者始叙其所為燕者曰此我之兄弟也甥舅也然後道逹其情必其悦懌而有臧樂酒而維宴此其情意極欵洽而傾倒當與伐木常棣二篇相參㸔實維伊何是問何人斯故下應兄弟匪他實維何期是問何期約故下應兄弟具來蔦蘿施於松栢喻同氣連枝相依附之意松上則言自根徹頂相附而無間也單兄弟則以蔦蘿松栢喻而期常見之親兼甥舅則以死生骨肉喻而圗相見之樂詩人一字不苟下孟子曰仁人之於弟也親之欲其貴也愛之欲其富也欲常常而見之故源源而來此詩未見之憂既見之樂固仁人君子之用心也說到死喪無日無幾相見及今暢飲有不能盡其情者矣故繼云樂酒今夕祈君子之維宴也詩本皆是賦中間有興有比成矢口之章朱子必分作三體於此篇云賦而興又比也支離甚矣愚亦照傳註為解耳若詩序云頍弁諸公刺幽王也暴戾無親不能宴樂同姓親睦九族孤危將亡故作是詩實大有理葢當是時驪山之禍將作人情凛凛不保朝夕而王方且飲酒無度故族人諸公因王不宴樂同姓藉以為辭而告之禍敗之戒讀者不覺真以為刺不宴樂同姓而已此詩之所謂可以怨者也詩緝之解甚有理不能具載間闗車之舝兮思孌季女逝兮匪饑匪渴德音來括雖無好友式燕且喜依彼平林有集維鷮辰彼碩女令德來教式燕且譽好爾無射雖無㫖酒式飲庶幾雖無嘉殽式食庶幾雖無德與女式歌且舞陟彼髙岡析其柞薪析其柞薪其葉湑兮鮮我覯爾我心冩兮高山仰止景行行止四牡騑騑六轡如琴覯爾新昬以慰我心詩傳樂新昏也男女之配所重在德此詩首云德音來括次云令德來教又次云雖無德與女又次云高山仰止景行行止葢深喜令德之配可承宗祧而開後𦙍也禮重親迎大明云親迎于渭韓奕云韓侯迎止葢重此禮也車舝云云其知禮之重乎凡來嫁之女曰季女此德音非德之聲譽乃有德之語言也觀下章令德來教句自見雖無好友作雖無他人解非是室家豈可以他人與哉禮夫妻相敬如賔友此所云葢自謙之辭耳味下章雖無㫖酒語意自見得德音來括是未至而祈望之辭令德來教是已至而親承之辭故上云式燕且喜喜其德之美也此云式燕且譽譽其德之美也雖無㫖酒節重雖無德與女句正應前雖無好友句前所云是自謂之辭此所云是相謂之辭庶幾云者若曰式燕式食庶乎少見予之意云爾自慚雖無德而獲令德之教不覺樂意之形故曰式歌且舞非真歌且舞也觀式歌且舞又不止喜且譽而已也陟彼高岡節形已獲良覯而冩我心髙山仰止節形已得景仰而慰我心總見令德希覯而我幸得此為配也鮮字不宜作少字解鮮新也鮮我覯爾是倒字文法下文新字正應此鮮字或同蓼莪篇鮮民之生鮮字作鮮德之人解亦通髙山仰止景行行止此二語所該甚廣此所云葢謂有德乃吾所景仰兹幸令德之配四牡騑騑六轡如琴以來教我則吾親迎之初心可大慰矣故接云覯爾新昏以慰我心恐非若註所云云也凡有德之動履可徴於車馬之間何彼穠矣云曷不肅雝王姬之車此云四牡騑騑六轡如琴正相類再按蓼蕭美諸侯曰鞗革冲冲和鸞雝雝亦於車馬之儀節徵其德之盛也首章冀德音之來括次章幸令德之來教三章喜其德而歌舞四章五章則形容其所為喜者幸其德可景仰不負親迎之初心也按詩序大夫刺幽王也褒姒嫉妬無道並進讒巧敗國德澤不加于民國人思得賢女以配君子故作是詩非也后妃雖無道可復娶以為配哉若以為刺亦謂后妃宜有德音宜有令德而褒姒獨異於是失昏配之宜焉耳營營青蠅止于樊豈弟君子無信讒言營營青蠅止于棘讒人㒺極交亂四國營營青蠅止于榛讒人㒺極構我二人詩序大夫刺幽王也詩傳厲王從讒大夫傷之賦青蠅營營於飲沫之餘而其矢能變白黒者青蠅也營營於利祿之㣲而其言能亂是非者小人也故詩以為比而戒君子之無聽讒且謂其讒之罔極交亂四國之可惡焉搆我二人之可畏焉此三章皆有比興意必以飛聲讒言之相似謂首章之為比則固矣又以所止罔極之相反謂後二章之為興則迂矣此愚謂說詩之不必分為三緯也營營狀其往來於念慮間非謂飛聲之營營也世鄙蠅營狗苟者正謂此北方藩圍多用草木插成樊中有棘與榛青蠅止于樊止于棘與榛若不必惡之也然其營營往來將必入宫室汚几席驅之復來其穢惡有不可言者故以喻讒言始戒君子無信既推其㒺極而交亂交搆之最可惡也首章戒王之無信讒是大槩說次章著讒之交亂四國謂其禍之必至此也三章著讒之搆我二人謂其情之必至此也此所謂讒之罔極也變亂是非往來交搆使君臣之不相能是謂搆我二人搆二人又交亂四國之本賔之初筵左右秩秩籩豆有楚殽核維旅酒既和㫖飲酒孔偕鐘皷既設舉醻逸逸大侯既抗弓矢斯張射夫既同獻爾發功發彼有的以祈爾爵籥舞笙鼓樂既和奏烝衎烈祖以洽百禮百禮既至有壬有林錫爾純嘏子孫其湛其湛曰樂各奏爾能賔載手仇室人入又酌彼康爵以奏爾時賔之初筵温温其恭其未醉止威儀反反曰既醉止威儀幡幡舍其坐遷屢舞僊僊其未醉止威儀抑抑曰既醉止威儀怭怭是曰既醉不知其秩賔既醉止載號載呶亂我籩豆屢舞僛僛是曰既醉不知其郵側弁之俄屢舞傞傞既醉而出並受其福醉而不出是謂伐德飲酒孔嘉維其令儀凡此飲酒或醉或否既立之監或佐之史彼醉不臧不醉反耻式勿從謂無俾大怠匪言勿言匪由勿語由醉之言俾出童羖三爵不識矧敢多又詩序衞武公刺時也唯時幽王荒廢媟近小人飲酒無度天下化之君臣上下沉湎淫泆故武公追酒誥而作賔筵朱註則謂武公飲酒悔過而作是詩亦通然詩序必有所據也大抵酒之為禍嘗在于賔筵故詩首說賔之初筵舉為射而設者其禮儀卒度而無亂次及祭畢而飲者其儀度一歸於禮而無亂方提燕飲之賔筵始乎治卒乎亂者再三以深致其戒云左右秩秩肆筵之有序也飲酒孔偕未便是飲言赴飲者齊一而偕至也舉醻逸逸先舉所醻之爵置之几上逸逸而閑裕也以祈爾爵後纔取觶立飲則其所飲之有節可知籥舞節總是為祭而祭畢有獻酬之禮凡祭必備禮樂之盛以祈祖考之歆故先之樂奏以洽百禮廟中禮度有百其多舉其儀制之大者曰有壬盡其節目之詳者曰有林各奏爾能是各伸其敬意耳各奏爾能然後主人獻賔賔酢主人主人復酬賔此時賔載手仇室人入又若為加爵之飲然維酌彼康爵以奏爾時亦有節而不亂也手仇仇字不必讀曰㪺仇對也敵也賔之敵主也賔載手仇室人入又疑即是獻醻事言初時主人手獻賔賔載取此爵手酢主主之佐食入取酒而又酌以酬總之則酌彼康爵以奏爾時也時不是時祭當此時宜有此事即謂之時此節雖有子孫獻尸尸酢而卒爵事然意只重在獻酬之禮上見其飲之有節温温其恭四字最妙凡人以恭敬為主而恭勝者反有拘迫之狀便覺露有圭角其反是者又入於慆慢而無節維是温温其恭文之以禮樂此方是人之美節反反與幡幡對反反者收歛而入於内也幡幡者翻蕩而逸於外也抑抑與怭怭對抑抑者退讓以明其禮也怭怭者縱放以踰其防也怭从忄从必當是必行放縱意訓媟慢未當僊僊訓軒舉極妙賔既醉止節曰載號載呶曰屢舞僛僛曰側弁之俄屢舞傞傞狀其醉時醜態殆盡僛从亻从欺是傍若無人狀傞从亻从差是不知人事狀註訓僛僛曰傾側則疑於側弁之俄訓傞傞曰不止於字義亦未為明當郵即郵傳之郵郵最有程限不知其郵者不知其程限也既醉而出四句重下二句若曰此飲也宜並受其福而至於伐德何為哉凡飲酒之所以可嘉者謂其有令儀耳此二句是甚傷伐德者之辭伐德伐字極妙德人之所以自立者使亂其威儀而喪德是自伐也通詩專重此一德字儀與德正相照凡有令德者必有令儀喪失其儀即為伐德抑詩云抑抑威儀維德之隅與此詩相發明宜叅㸔小宛大夫以壹醉日富為戒而歸之敬爾儀此以是謂伐德為戒而歸之維令儀儀之闗於酒德也如是夫監是監其有禮與否正則正其過而捄之也監為主正為輔故曰立之監佐之史式勿從謂解作安得從而告之未妥式法也慎也勿從二字聨宜略讀謂是提醒之辭詩意若曰此人之沉湎于酒若此慎勿從之而必相告語焉無俾之大怠焉可也未知是否敢問髙明匪由由醉二由字訓從字未當由醉二句解作醉而妄言則將罰女使出童羖為設言以恐之甚非夫此人業已醉矣即與正言猶懼不醒若設言使出必無之物可令此人之知恐乎不能使之恐而為此言是我亦醉人矣據愚見當解由字作行字葢謂之曰凡言必其所可言匪可言者勿言可也凡語必其所可行匪可行者勿語可也若就汝今之醉時語欲見之行是俾人之出童羖也而有是理乎此二句是申上勿言勿語意非設言以恐醉者之謂也請問髙明禮用三爵此云三爵不識非令减於三爵之内也甚言三爵己不能識不可益於三爵之外耳禮曰君子之飲酒也受一爵而已洒如也二爵而言言斯禮也三爵而油油已退此三爵之出處三爵不識二句正與首二章相照應首章曰發彼有的以祈爾爵言禮射而飲未有過於三爵者次章云酌彼康爵以奏爾時言祭畢而飲亦未有過於三爵者兹燕飲者屢舞而不知號呶而無節伐德喪儀莫此為甚則觥觩交錯之所使也故立之監史以警戒之而終之曰三爵不識矧敢多又葢教之但如射飲獻酬之合禮而不可加爵以至於大怠也酒誥曰德將無醉與此詩正相發當叅㸔按鄉飲酒禮賔主終日百拜而無酒禍葢先王豫憂之而立斯防也彼浮白長夜以終於沉湎之禍者其真病狂䘮心者哉魚在在藻有頒其首王在在鎬豈樂飲酒魚在在藻有莘其尾王在在鎬飲酒樂豈魚在在藻依于其蒲王在在鎬有那其居詩傳諸侯報天子也王者先天下之憂而憂此云豈樂飲酒者何葢憂勤惕厲固王者之本心而時方清明事已耆定有不可多事為者直須安樂以享之耳易曰雲上于天需君子以飲食宴樂正此之謂也豈樂飲酒飲酒豈樂雖反覆以成章然觀有那其居似取依於其蒲意則頒首莘尾或亦未必無意者豈豈樂飲酒是始其樂飲酒豈樂是終其樂有那其居則安焉以享此樂之無己乎此但據傳註為解耳按序刺幽王也極是葢民物以得所為安不得其所而窮蹙窘迫若魚在淺水中首尾俱見甚又依近岸之蒲其能存活乎而王方在飲酒為樂安然其居不知危亡之將至可乎重玩三章數在在字面則本㫖得矣補傳云水淺涸然後魚在藻間蒲生於岸魚依此以匿其形則水又淺矣又曰首大而尾長是魚之瘠者采菽采菽筐之筥之君子來朝何錫予之雖無予之路車乘馬又何予之𤣥衮及黼觱沸檻泉言采其芹君子來朝言觀其旂其旂淠淠鸞聲嘒嘒載驂載駟君子所屇赤芾在股邪幅在下彼交匪紓天子所予樂只君子天子命之樂只君子福祿申之維柞之枝其葉蓬蓬樂只君子殿天子之邦樂只君子萬福攸同平平左右亦是率從汎汎楊舟紼纚維之樂只君子天子葵之樂只君子福祿膍之優哉游哉亦是戾矣詩傳天子燕諸侯也采菽必盛之筐筥也來朝而可無錫予乎此詩人之興意路車乘馬𤣥衮及黼各有制錫予當照其爵列此特槩舉之耳雖無予之四句口氣最難體詩意若曰吾於君子之來朝也錫賚之心豈有窮乎然而車馬服物有定數雖無予之路車乘馬可將也又何予之𤣥衮及黼可畀也自此以外有不可以濫與者其能惬也乎哉此總見物不能盡志意今人說餽送雖沒甚麽與他也有這件這件然但有這件這件却不能盡我的意思正是此意首章泛說君子來朝之可與次章就車旂上見其來朝之儀度三章就服餙上見其上交之謹恪所以為可予四章美其功足以受福而從行之可觀五章則道其所為傾心而欲畱之者總之則深嘉樂予而致其無已之情也其旂淠淠鸞聲嘒嘒即蓼蕭篇鞗革冲冲和鸞雝雝意朝服之大者曰冕曰裳此何取赤芾邪幅而言之曰觀其小者之無不謹則其大者可知也美周公安重之度曰赤舄几几亦此意夫彼交匪紓一句最重凡人臣之上交敬而已敬則𦂳嚴整肅莫敢一事之少紓紓則怠緩而不恭未有不取譴于天子者桑扈云彼交匪敖萬福來求此言彼交匪紓福祿申之信知上交須敬而紓敖之不可萌也天子所予正應首章三予字為天子之心所樂予然後錫予之命加焉故下文𦂳接樂只君子天子命之云云殿天子之邦是與之之詞葢即其來朝匪紓者信其能鎮定天子邦家而為萬福之所同所以平平之左右亦是率從而至此也註樂只君子則宜殿天子之邦則宜二字欠妥有上交匪紓之諸侯則有平平率從之左右倡從之機然也葵心向日日亦下傾于葵天子葵之葢嘉其向日之誠而深予之也不應作揆字解葵之則福祿膍之矣且不獨是也深嘉其忠敬欲令優游於王畿而未遽去焉葢錫予之不足而眷留之無已也此戾字宜作止字解若作至字解謂又嘆其優游而至此則前此君子攸届亦已至矣且其旂淠淠鸞聲嘒嘒形容其來朝之度亦已盡矣而又何復以優游狀之且即其交之匪紓决知其來非優游以至此者葢天子嘉與之無已欲令且朝夕焉故曰優哉游哉亦是戾矣云爾細詳上下文意謂似如此㸔汎汎楊舟紼纚維之便知其有挽留之意亦是率從謂此平平之臣且於是而率從是幸其來亦是戾矣謂此匪紓之諸侯亦且於是而戾止是惜其去此亦據傳註為解耳按序刺幽王也侮慢諸侯諸侯來朝不能錫命以禮數徵㑹之而無信義君子見微而思古焉則此詩總是思古以嘆今之不然也王饗諸侯以太牢其鉶􅃵必以菽其菹醯必以芹故首二章並取以起興柞有枝有葉枝葉相承而根本堅固喻諸侯及其臣上下相承以衞天子而國家乂安也四章故以起興汎汎楊舟無所定而紼纚維之喻諸侯離合不常天子以恩禮維持之也五章故以取興要見詩各有取義而無一字苟下者騂騂角弓翩其反矣兄弟昏姻無胥逺矣爾之逺矣民胥然矣爾之教矣民胥傚矣此令兄弟綽綽有裕不令兄弟交相為瘉民之無良相怨一方受爵不讓至于己斯亡老馬反為駒不顧其後如食宜饇如酌孔取母教猱升木如塗塗附君子有徽猷小人與屬雨雪瀌瀌見晛曰消莫肯下遺式居婁驕雨雪浮浮見晛曰流如蠻如髦我是用憂角弓有張弛而親親之情不可有向背故以弓之翩反者形君子之不宜逺兄弟昏姻不止九族所謂親戚也爾之教矣二句申上二句若曰民胡以胥然哉爾之教也爾教之則民胥傚之矣此教字不是言教是身教書曰無教逸欲有邦即是此個教字下章母教猱升木正應此教字通章重在此一字宜重㸔此令兄弟章宜泛說若曰此令兄弟所重者天親而非外物所能奪交相退遜綽綽其有餘裕焉不令兄弟則所重者有在而相忌之深相持之急交相為瘉有不可勝言者况可教之使相傚乎綽裕狀相與之和交瘉狀相煎之急民之無良章亦泛說為佳四海兄弟何等胷襟何等品格而非所望于無良者無良者但見一方能無相怨乎相怨則必至于相瘉而至于斯亡矣况可身教乎怨起于讓不讓而存亡係之可畏哉至于已斯亡猶云不至於亡不已也是倒用文法觀受爵不讓至於己斯亡則知讓是人之美德讓則交相退遜綽綽有餘未有不享其安富尊榮者此讓字正與後章婁驕二字相照應老馬章凡三喻謂世有此等人不加量度不自斟酌而但知有己者此全在上之人自有主張一聽信而薄於骨肉是教之偷也故𦂳承毋教猱升木一章毋教猱章教字正應前教字說註小人骨肉之情最薄王又好讒以來之一叚說得極快雨雪二節深罪王之聽讒而不察接引讒惡之人安處於敖惰養成薄惡之俗大類於遐荒此皆王之身教所使也故終之曰我是用憂瀌瀌雪盛貌積之髙則浮浮矣如蠻如髦言其殘賊親戚也讒佞之人貶之則少退引之則日長必宜下遺之為是莫肯下遺讒佞者則必自處於髙亢敖惰矣此居字即居之不疑之居婁驕二字正反照前一讓字正胥逺親族之惡根也此當叅常棣伐木頍弁行葦諸篇㸔有菀者柳不尚息焉上帝甚蹈無自暱焉俾予靖之後予極焉有菀者柳不尚愒焉上帝甚蹈無自瘵焉俾予靖之後予邁焉有鳥髙飛亦傅于天彼人之心于何其臻曷予靖之居以凶矜詩傳厲王不禮于諸傅相戒以避是蹈字不宜作神字解蹈行也甚蹈者甚肆其所行也下文予極予邁意暗藏于此無自䁥無自瘵統是戒辭言無自親䁥自取疾病也觀俾予靖之一語見當時諸侯朝事天子猶假以靖安為令者但實則深求之以遂其欲故言後予極焉後予邁焉末章又云曷予靖之居以凶矜謂天子方以凶暴驕矜自居此予極予邁而萬無自䁥以自取其瘵也此小序所謂王者不可朝事也此諸侯敢以彼人目天子也嗟乎此可識當日上下之情亦可以觀世變哉朝覲㑹同禮也嘗聞一不朝則貶其爵二不朝則絀其地三不朝則六師移之未聞來朝而反極其欲以求之且求之過其分如菀柳之所刺者後世有望神京而悲泣者其此意也夫春秋書天王求車等亦此詩之指彼都人士狐裘黄黄其容不改出言有章行歸于周萬民所望彼都人士臺笠緇撮彼君子女綢直如髮我不見兮我心不說彼都人士充耳琇實彼君子女謂之尹吉我不見兮我心苑結彼都人士垂帶而厲彼君子女卷髮如蠆我不見兮言從之邁匪伊垂之帶則有餘匪伊卷之髮則有旟我不見兮云何盱矣于周二字作周京解甚無謂曰都人士則其人已在周京矣安往而復行歸耶語意若謂斯人之服斯服也其容之不改可觀也其言之有章可法也且所行悉歸於禮度周旋無虧焉是萬民之所望也我安得見斯人哉得見斯人而我願愜矣此是詩人極想都人士容言禮度之美如此非行歸周京之說也敢問髙明萬民之望言都人士原係是個人望而今不可見想望為尤切也首章專稱都人士後三章併其女人言之綢直二字相聨讀細分之綢有柔順意直有脩整意如髮云者謂其體度之柔順脩整如髮之潤且美也若言其髮之美此如字何以解尹吉是周之著姓大家凡國俗之趨向大抵都效大家之所為故詩人稱之說到垂帶卷髮凡都人士女一服餙一體態之微無不想像而懐慕之矣東漢思見漢官威儀正是此意據註亂離之後人不復見昔日都邑之盛人物儀容之美而作按序周人刺衣服無常也古者長民衣服不貳從容有常以齊其民則民德歸一傷今不復見古人也較為得之然愚猶有說焉首章何以但稱都人士後章何以併及君子女也首章何獨云行歸于周萬民所望後章何再三云我不見兮我心不說我心苑結言從之邁云何盱兮之綣綣也愚謂家邦之觀望在容儀而容儀之矜式在人士若首章之衣餙容言至行歸于周處豈非是萬民之望自是而後臺笠緇撮充耳琇實垂帶而厲都人士何異於昔而君子女之綢直如髮謂之尹吉卷髮如蠆髮則有旟則何為者哉是都人士則同而所為都人士者或亦有少别耶不則稱都人士何必併及其女而併稱士女何無嫌别並說至不見不說不見苑結不見言從之邁不見云何盱兮若是其歆慕之無已耶即以復見漢官威儀者想像光景當不至復見漢官婦女之威儀足以快我心也愚說詩何敢妄立臆見但莊誦行歸于周萬民所望二語又再三我不見兮我心不說等語語意似大有别耳敢存之以正于有道終朝采綠不盈一匊予髮曲局薄言歸沐終朝采藍不盈一襜五日為期六日不詹之子于狩言韔其弓之子于釣言綸之繩其釣維何維魴及鱮維魴及鱮薄言觀者詩序刺怨曠也幽王之時多怨曠者也婦人所仰望者君子也伯兮云豈無膏沐誰適為容此云予髮曲局薄言歸沐皆就所仰望者言得性情之正韔弓綸繩非婦人事而况觀其所為釣者乎此所云云葢甚言思之之極耳若曰如其至也我願為之役與之俱周旋不舍也首章是及期而思次章是過期而思三四章是思其至而同事芃芃黍苖隂雨膏之悠悠南行召伯勞之我任我輦我車我牛我行既集葢云歸哉我徒我御我師我旅我行既集葢云歸處肅肅謝功召伯營之烈烈征師召伯成之原隰既平泉流既清召伯有成王心則寧凡興大衆建大役未有不取民之怨者况築城邑之大者乎當時申伯苟無功於周室宣王必不封召公必不營而衆必怨且詛矣孰肯任其勞而必其成功哉觀皇父作都於向居者曰黽勉從事不敢告勞則行役者又可知矣此予於是知宣王之能任賢也觀崧髙篇云維申及甫維周之翰四國于蕃四方于宣又云申伯之德柔惠且直揉此萬邦聞于四國則申伯之功德可見矣此王命召伯營申伯之宅民爭勸而樂成之也說召伯勞南行之役先之以隂雨之膏黍苖真易之所謂說以先民者細玩我任我輦二章數我字似召伯之所以勞之者此民之樂為役也㸔悠悠南行句若初出役之時乃二章三章曰我行既集葢云歸哉何也葢當時營謝已非一日其功將亦訖成矣而召伯之所慰勞者有加無已故其衆自初役時懐思之曰召伯有成王心則寧苟有一之未訖即我行既集有不敢遽歸焉者是可占當時之民情又可占當時之役政凡建城邑必有個制度規模整然端肅期其有成者故云肅肅謝功召伯營之營者營其成也征師役衆也人衆而役大非威信以號召鼓舞有不能作其勇烈者故曰烈烈征師召伯成之成者成其所營也營與成二字正相照建城邑必先察其髙下之宜水泉之利既相定之矣則從其髙下而原隰之使之底於平從其泉流而濬導之使之至於清既平且清然後為功之成原隰既平不是平夷原隰而無髙下只隨髙下而建置使歸于平耳書曰地平天成正是此平字說到召伯既成王心則寧見召伯之營必期王心之寧而後止而當時民情又必召伯足以寧王之心而後止也此方是人臣任事之忠民人往役之義詩傳城申也詩序刺幽王也不能膏澤天下卿士不能行召伯之職焉俱是乃詩緝見師旅征師等字云當宣王有營謝平淮二役皆南行之事戍役勞矣而召穆公能推宣王之德意勞藉其民故洊逺役而民不怨幽王君臣不恤其民故作此詩思古而傷今亦大有理若止營謝安事師旅征師哉當並存之隰桑有阿其葉有難既見君子其樂如何隰桑有阿其葉有沃既見君子云何不樂隰桑有阿其葉有幽既見君子德音孔膠心乎愛矣遐不謂矣中心藏之何日忘之詩傳燕賢也是隰桑有阿二句雖是興然有企仰君子之德輝意在德音孔膠就君子說正見所以樂之之深重㸔心乎二字愛出於根心即從而謂之亦深逺而不能盡者但藏之中心有不容終忘者耳中心藏正與上心乎愛相照應語意一直下遐不謂矣口氣即大學不啻若自其口出意若曰即謂之不亦遐逺乎葢詩人倒用文法如此也若遐作何字解曰遐何通用即此詩前章其樂如何云何不樂可通用曰其樂如遐云遐不樂耶又即此章遐不謂矣何日忘之可通用曰何不謂矣遐日忘之耶遐自是遐字何自是何字通用不得後篇遐不作人本周王夀考來遐不黄耉黄耉即是遐統是倒用文法與何字通用不得其樂如何樂之深也云何不樂正申其樂如何意德音孔膠又申云何不樂意然樂生于愛也心乎愛而不能言中心藏而不能忘其愛有若此者此樂之所以極其深也白華菅兮白茅束兮之子之逺俾我獨兮英英白雲露彼菅茅天步艱難之子不猶滮池北流浸彼稻田嘯歌傷懐念彼碩人樵彼桑薪卬烘于煁維彼碩人實勞我心鼓鐘于宫聲聞于外念子懆懆視我邁邁有鶖在梁有鶴在林維彼碩人實勞我心鴛鴦在梁戢其左翼之子無良二三其德有扁斯石履之卑兮之子之逺俾我疷兮白華白茅皆物之潔者故取喻夫婦之倡隨易曰近而不相得則凶或害之悔且吝夫逺嫡而親庶使之獨處焉可謂善道乎白華傷夫婦耳何及於天步之艱難曰閨門風化之原王教之首也夫不夫而逺其嫡至廢嫡而立庶亂從此始矣天步艱難孰大於是此詩人深望之子之亟圖也滮水名故云池池水北流則止能浸彼在北之稻田耳喻幽王之澤有所偏也碩人篇亦有河水洋洋北流活活句寵妾而棄嫡哀痛孰過之而曰嘯歌傷懐者所謂長歌之哀甚於慟哭也鼓鐘二句言未有鳴而不動人之聽者獨怪念之懆懆而視之邁邁也鴛鴦二句是道其匹耦之相偎曰戢其左翼則舉雄者以為言一字不苟下二三其德與衞風氓之篇意同但彼則其婦之自取此則其夫之不良也註如妾之賤則寵之者亦賤二句說得極好凡人之重正嫡重宗廟也重冡嗣也是自重也不自重而寵妾以自賤君國之謂何程子謂娶孀為自失節正寵之亦賤意首章傷夫婦之不相親故云之子之逺俾我獨兮英英章傷君意之無逺圖故云天步艱難之子不猶滮池章傷君澤之不及嫡故云嘯歌傷懐念彼碩人樵彼章傷正嫡之不見禮故云維彼碩人實勞我心鼓鐘章傷哀鳴之不見聽故云念子懆懆視我邁邁有鶖章傷嫡妾之相倒置故又云維彼碩人實勞我心鴛鴦章傷耦處之失其常故云之子無良二三其德有扁章傷寵妾之為自卑故云之子之逺俾我疷兮總之則鳴其近不相得之至情也故始終皆悼之子之逺稱碩人是尊之之辭稱之子是親之之詞綿蠻黄鳥止于丘阿道之云逺我勞如何飲之食之教之誨之命彼後車謂之載之綿蠻黄鳥止于丘隅豈敢憚行畏不能趍飲之食之教之誨之命彼後車謂之載之綿蠻黄鳥止于丘側豈敢憚行畏不能極飲之食之教之誨之命彼後車謂之載之詩序微臣刺亂也大臣不用仁心遺忘微賤不肯飲食教載之故作是詩也亦是微臣士也古者大夫出行則士為末介黄鳥尚有止息之處而我勞于逺莫有肯相恤者故取以起興凡家力之富厚者必不思寄托於其外微賤不能以自存至思托於外而又不禁其勞苦則悲哀之情狀可想見矣曰道之云逺我勞如何度其勢之不能也曰飲之食之教之誨之命彼後車謂之載之冀其人之或我憐也而時安得此也哉葢亦徒抱此想覬之私而已矣維愛我而憐其饑渴者始畀之飲食維愛我而哀其昏懵者始予之教誨維愛我而恤其勞苦者始命之後車之載保息之政衰也乆矣誰復愛憐而矜振之我行其野依婚姻而不見收綿蠻黄鳥思附托而不可得其事類其情迫其言皆痛切而有餘悲幡幡瓠葉采之亨之君子有酒酌言嘗之有兎斯首炮之燔之君子有酒酌言獻之有兎斯首燔之灸之君子有酒酌言酢之有兎斯首燔之炮之君子有酒酌言醻之詩序刺幽王詩傳燕大臣意古以是禮燕大臣唯事儉節而幽王之過於燕飲失其節耶凡燕飲以情勝情勝者無藉於多儀瓠葉之采亨兎首之燔灸可謂薄矣而情由此逹禮由此行君子不以為簡也傳曰苟有明信澗溪沼沚之毛可羞于王公易曰二簋可用享此之謂也嘗即品嘗之嘗嘗之而後可行獻酢醻之禮也物薄而禮備於此詩見焉漸漸之石維其髙矣山川悠逺維其勞矣武人東征不遑朝矣漸漸之石維其卒矣山川悠逺曷其沒矣武人東征不遑出矣有豕白蹢烝涉波矣月離于畢俾滂沱矣武人東征不遑他矣詩序下國刺幽王也戎狄叛之荆舒不至乃命將率東征役乆病于外故作是詩讀六月采薇之詩見當時未嘗無非時之師也乆役之勞也雨雪載塗之苦也其人未嘗有怨心焉何也上以不得已之心役其下而勞苦悲傷之情又若以其身當之有餘恤焉此甚勞而不怨也驅之鋒鏑厯之險逺而若秦越人之視其孰能任之故知漸漸之石與祈父之詩同一悲悼之詞而為人上者不可不深加之存恤也易曰見豕負塗又曰羸豕孚蹢躅大抵豕隂類喜雨而涉波書洪範曰星有好風亦有好雨好雨者畢星也詩與易書其言相表裏苕之華芸其黄矣心之憂矣維其傷矣苕之華其葉青青知我如此不如無生牂羊墳首三星在罶人可以食鮮可以飽詩序大夫閔時也幽王之時東西擾攘交侵中國師旅並起因之以饑饉君子閔周室之將亡傷己逢之故作是詩國以民為命民賴君以立命饑饉洊臻百物凋耗至民不堪命曰心之憂矣維其傷矣知我如此不如無生其能國乎哉讀此詩可澘然雪涕矣維其傷矣傷已之不能生也不如無生謂生之甚苦也人可以食鮮可以飽則其所不欲生而憂且傷者何草不黄何日不行何人不將經營四方何草不𤣥何人不矜哀我征夫獨為匪民匪兕匪虎率彼曠野哀我征夫朝夕不暇有芃者狐率彼幽草有棧之車行彼周道詩序下國刺幽王也四夷交侵中國背叛用兵不息視民如禽獸君子憂之故作是詩何日不行無日無征行之役也何人不將無人無將奉之勞也經營四方𦂳頂上何人不矜無人不役而可矜也矜不宜改鰥字范氏曰吾於采薇見先王以人道使人至後世則牛羊而已矣正此詩之謂也重訂詩經疑問卷七
