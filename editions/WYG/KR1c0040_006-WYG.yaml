body:
  text: 重訂詩經疑問卷六明姚舜牧撰小雅旻天疾威敷于下土謀猶回遹何日斯沮謀臧不從不臧覆用我視謀猶亦孔之卭潝潝訿訿亦孔之哀謀之其臧則具是違謀之不臧則具是依我視謀猶伊于胡底我龜既厭不我告猶謀夫孔多是用不集發言盈庭誰敢執其咎如匪行邁謀是用不得于道哀哉為猶匪先民是程匪大猶是經維邇言是聽維邇言是爭如彼築室于道謀是用不潰于成國雖靡止或聖或否民雖靡膴或哲或謀或肅或艾如彼流泉無淪胥以敗不敢暴虎不敢馮河人知其一莫知其他戰戰兢兢如臨深淵如履薄氷詩序大夫刺幽王也旻天疾威亦無所歸咎而歸之天也議論曰謀由是見之施為曰猶故二字並舉而專重於謀此猶字不宜亦解作謀字察善惡之分致從違之决是人君第一事否則未有不惑于邪謀者詩柄下一惑字一斷字極妙亦孔之卭病在國也即下章所謂淪胥以敗也回遹遹字不應訓辟字味文王有聲篇遹駿有聲遹求厥寧遹觀厥成數遹字當是飛疾之意大抵謀猶邪僻而無法度曰回飛疾而不安詳曰遹潝潝而靣相和訿訿而背相詆極狀得小人之情態上章謀臧不從二句是罪其君之不斷此章謀之其臧四句是罪其臣之苟同苟同而無定斷此謀猶之所以回遹也洪範曰謀及卿士謀及庶人謀及卜筮易曰人謀鬼謀故詩及龜與謀夫書曰朕志先定詢謀僉同鬼神其依龜筮恊從凡謀未有不先於定其志者志不先定而謀之鬼龜厭而不我告矣謀之人盈庭而莫執其咎矣謀之回遹端在此故首章詩柄下斷之一字不我告猶者不告我以所當為也酌議必參之衆論主張在决之一人任徳亦我任怨亦我而國是定矣此之謂定謀若謀夫孔多而無主便各出議論互相推諉未有能善其謀者唐史曰凡此蔡功惟斷乃成盖識此㫖矣古今以謀敗者多矣而宋為甚議論多而成功少最發得此詩之㫖如匪行邁謀二句譬得極好凡謀固欲其行之也必與行人謀始得所行之路坐謀所適而道安可得乎之燕而適越無怪其謀之莫定也哀哉為猶節𦂳承上説來盖上章謀夫孔多云云只説得個謀之莫定尚未及其所以為謀者故此着哀哉二字傷其所為謀者匪先民大猶之法而唯邇言之從是正首章所為謀臧不從不臧覆用者故復以築室道謀譬而决其猶之莫成猶即謀之見於政事者先民即出大猶之人對舉言者甚言其猶之不歸於法則耳聽是聽信而不疑爭是爭用而莫奪如彼築室二句譬極當盖凡所謀者欲見之行以為居也謀築而與行人謀可必其成乎此成字要㸔得好成國成也國成一定而不變非國之成即有所為皆非其可居者焉得成潰决也言决不能成也不應作遂字解行道宜與行者謀築室宜與居者謀反是而欲得於道潰於成未之有也此將二謀字比上之失謀者極切當我龜二節通説謀而兩㸃一猶字是作文之法國雖靡止節言未嘗無善謀者特上不能用以至於敗耳聖哲謀肅乂五字總謂世有善謀者然細分之聖通明也通明者善謀善斷可以主國謀定國是故於國雖靡止下着或聖或否句哲者知幾可逺謀謀者熟處可定謀肅者慎惕可以無敗謀乂者剛决可以成全謀是皆民之俊乂也故於民雖靡膴下着或哲或謀或肅或乂句或曰聖哲謀肅乂雖並舉而謀居其中謂此詩之㫖在謀也語意亦巧聖哲謀肅乂是世之善謀者善謀不從將日向下流而危亡可立待矣故云如彼流泉無淪胥以敗淪胥以敗在如彼流泉下此淪字應作沉淪之淪解言無沉淪相胥以至於敗也抑篇云肆皇天弗尚如彼流泉無淪胥以亡此云如彼泉流無淪胥以敗不敬天不擇人未有不淪胥以至於敗亡者末章正照前謀字説語意若曰彼妄謀者如暴虎如馮河豈可妄用哉然謀不可廢也要在主是謀者存戰兢惕厲之心如臨深如履薄唯臧者之是用耳但知斥妄謀而不知慎用其善謀此詩之所謂人知其一不知其他者也孔子曰暴虎馮河死而無悔者吾不與也必也臨事而懼好謀而成者也其深合此詩之㫖乎大註云云愚未敢以為然敢正髙明首章言謀猶回遹病其君之不善用次章狀小人之所為謀猶者各以其意而不臧三章承説各為謀者之不得其道四章承説不得其道者之難底於成五章表世有善謀者之當用六章教人之用謀者在持之以兢惕之心宛彼鳴鳩翰飛戾天我心憂傷念昔先人明發不寐有懷二人人之齊聖飲酒温克彼昏不知壹醉日富各敬爾儀天命不又中原有菽庶民采之螟蛉有子蜾蠃負之教誨爾子式糓似之題彼脊令載飛載鳴我日斯邁而月斯征夙興夜寐無忝爾所生交交桑扈率場啄粟哀我填寡宜岸宜獄握粟出卜自何能糓温温恭人如集于木惴惴小心如臨于谷戰戰兢兢如履薄氷此兄弟遭亂相戒以免禍之詩然須㸔有懷二人是其大主意其所努力處在各敬爾儀念昔先人求所為自善之道中原有菽節不是其身去教子盖念親之所以教我者如此必夙興夜寐如集木臨谷履氷若昔先人之所為庶可永承天命而無忝其所生耳以敬身教子對言者恐非此詩之㫖敢問髙明以鳴鳩戾天興取努力向上昔先人是昔時之為善者齊聖温克其人也我心憂傷念昔先人有努力求進不如其人不已意凡人不思其親則必不自敬其身思及其親之所以生我教我若中原有菽一節則必以齊聖温克為師而不敢同流於彼昏壹醉之習矣此明發不寐有懷二人其人先見得極分明自説得極透快齊聖温克而不困於酒是昔先人敬其身以承天命者壹醉日富則今時習於酒之昏昏者也各敬爾儀天命不又兄弟勸各努力敬身效齊聖温克者之所為則立意甚佳而其向進亦甚烈矣壹專一也富加益也四字狀盡滛湎於酒凡整肅通明的人即當歡懌欵洽時亦知謹飭自謙和而可愛抑詩云抑抑威儀維徳之隅春秋傳曰威儀所以定命也匪敬爾儀其何以脩徳而承命讀此詩可以知此人吾身與天命相對越無時無處可萌一懈心纔一懈惰天命即從此違矣是天命不又之説也要㸔得細教誨爾子式糓似之正道二人之所以教我意凡父母之教子未有不道之以善使與齊聖温克者而同歸也中原節原是説父母之教我故下章𦂳説到夙興夜寐無忝爾所生若作我又教其子則上下牽合而文勢甚寛緩矣凡於此等處要體得真認得切仰視曰題􅆃令飛鳴不已起下征邁意我日斯邁二句似不如此解詩人盖謂我與而一日有一日事一月有一月事不可放過當斯邁斯征早夜以從事云爾故下𦂳承夙興夜寐無忝爾所生句日月安可分而我説無忝所生正應前有懷二人句前云明發不寐有懷二人此云夙興夜寐無忝爾所生凡思做好人為父母好兒子斷然朝夕不可以自懈桑扈本不食粟也今交交率場而食粟似有横剝民脂意若是而民不堪求必罹於刑獄矣故接哀我填寡宜岸宜獄宜豈宜也若曰民豈宜罹此哉故不自能糓而握粟以卜也交交桑扈節是於時事難處中求所以自善之計然其道不在乎他在敬爾儀念昔先人而已故又説温温恭人一節兄與弟各努力小心以自勵自何能糓正應前式糓似之一糓字言父母教我以善若斯之殷勤我何自能糓而不負父母之厚望也語語相照應温温恭人節正照前齊聖温克説見昔先人以此自善其身以承天之命我亦當若其所為承天命以無忝其所生也正收拾明發不寐有懷二人意然昔人温克我軰當效其所為而彼昏不知壹醉日富亦可自省矣此詩人言外之意足以風世也温温恭人是成語如集于木而恐墜矣且惴惴小心如臨于谷而恐隕焉又戰戰兢兢如履薄氷而恐䧟焉慎而又慎盖若斯之至也總之只是一敬字此正實用力以敬爾儀處雨無正責羣臣之離居教之各敬爾身此戒人子之式糓教之各敬爾儀敬之一字真臣子持身之大本也弁彼鸒斯歸飛提提民莫不糓我獨于罹何辜于天我罪伊何心之憂矣云如之何踧踧周道鞠為茂草我心憂傷惄焉如𢷬假寐永嘆維憂用老心之憂矣疢如疾首維桑與梓必恭敬止靡瞻匪父靡依匪母不屬于毛不離于裏天之生我我辰安在菀彼栁斯鳴蜩嘒嘒有漼者淵萑葦淠淠譬彼舟流不知所届心之憂矣不遑假寐鹿斯之奔維足伎伎雉之朝雊尚求其雌譬彼懷木疾用無枝心之憂矣寧莫之知相彼投兎尚或先之行有死人尚或墐之君子秉心維其忍之心之憂矣涕既隕之君子信讒如或醻之君子不惠不舒究之伐木掎矣析薪扡矣舍彼有罪予之佗矣莫髙匪山莫浚匪泉君子無易由言耳屬于垣無逝我梁無發我笱我躬不閲遑恤我後詩序刺幽王也太子之傅作焉提提上着一歸字言小鳥亦知所歸也子非父母之歸而誰歸哉宜臼獨被廢斥如窮人無所歸故興語特着此一字乃知聖賢經傳一字必一義不苟下也罹羅網也于罹正與歸飛對憂在下何辜於天我罪伊何通是自反之辭父母之不我愛於我何哉正是此意此篇以憂字為主人子承懽於父母却是何等喜見棄於父母却是何等憂孟子云唯順於父母可以觧憂則知小弁之憂終身不能觧矣踧踧周道二句不是興宜臼感傷時事知其將必至是也故下𦂳承我心憂傷惄焉如𢷬云云晉人云㑹見銅駝在荆棘中正是此意此章憂字凡三見如𢷬憂之至於痛也用老憂之至於哀也疾首憂之至於病也砧搥物曰𢷬人有闗心事自然痛心夢寐中亦發嗟嘆聲甚者雖少而易老疾莫甚於疾首凡憂之甚者首必見病故詩人歴歴道其苦廹之情桑梓里居也不必説父母所植説到不屬于毛不離于裏父母有不動心者乎我辰安在語意若曰天生一人必有一辰在故各有所歸我之生辰獨安在而罹此不幸窮無所歸乎菀彼栁斯六句若謂菀彼栁斯鳴蜩嘒嘒然有漼者淵萑葦淠淠然一動植之物各有所藉以自若也我獨若彼舟流而不知所届乎此心之憂而不遑假寐也註憂之之深昔猶假寐而今不暇也極善箋云栁木茂盛則多蟬淵深而旁生萑葦言大者之旁無所不容也甚善詩緝解鹿斯一章是憂王之孤立也甚善鹿見人則奔宜速矣而伎伎然舒緩者顧其羣也雉朝作而鳴者求其匹也今王黜后而放子兀然如傷疾之木内有蠧病而外無附枝也我心之憂如此而王寧莫之知乎冀其感悟也寧莫之知有作不如無知㸔者若曰此心之憂寧莫之知可耳苟一知之而能無痛心切骨者乎此亦有理幽王之病只是一個忍字忍則不妻其妻不子其子矣此詩人自其所不忍者形其秉心之忍而不覺涕泗之交流也舒究二字極妙晉驪姫譛太子久矣乃令其祭母而進胙越六日置毒其中令公試之犬死試之小臣死因泣訴太子毒公而公竟不加察賜之以死借其舒究必知六日之毒非出於太子借其加惠必潜察驪姫之奸不使其讒之得行也不舒究之上着君子不惠四字又探本之論通章心之憂矣凡五見初曰云如之何其詞緩次曰疢如疾首其痛深三曰不遑假寐則無刻可置之懷四曰寧莫之知則有生不如其死五曰涕既隕之則所謂泣盡而繼之以血者也自菀彼栁斯至此無物不方比而無物之比不足以動君父之思此方是臣子罕譬納約之義君子信讒四句一直説下詩緝據釋文掎從後牽也之文又據錢氏曰扡以手離之之義因解伐木掎矣二句是讒人離間之情盖木附着於本根伐木者既以斤斧伐之又以繩索從其後牽拽之以倒使絶離其本根析薪者既斧之又以手扡而離之使木析而為二皆喻幽王父子天性本附着聨屬為一體而無柰讒人之横離絶之也甚善又按佗即他字王舍彼横離絶者之有罪反黜逐太子云舍彼有罪予之佗矣更妙莫髙匪山二句如註所鮮亦善自愚論之山曰莫髙泉曰莫浚即喻人心之險耳古詞太行之山能摧車巫峽之水能覆舟意正如此無逝我梁云云不必作宜臼語此四句原出於衛風盖棄婦之詞也今申后宜臼母子遭逐與此正相類故宜臼引此四句以為煞尾詞極咏嘆而意極深長今人作詩儘有述古詞以結句者盖本諸此若作出宜臼口吻便失本意矣莫髙匪山一節是兩截前説人心之險髙於山浚於泉君子無易由言使耳屬于垣者得觀望左右以生讒此咎其已前事皆言語以為之階也今事已至此矣我雖思欲善其後而非吾力之所能也我亦如之何哉故復引古語以深嘆之總是叙哀痛廹切之至情總是道其憂之莫觧意由言由字不苟下由行也欲行之言也賓筵云匪言勿言匪由勿語正是此由字凡人喜一人輕説個如何擡舉怒一人輕説個如何擺佈在我初沒𦂳要言之未必實欲見之行也乃彼之有心者窺見此端日濳於其中逢迎左右以隂助之隂以行已之私喜怒則此易其言之所召也易曰亂之生也則言語以為階君不宻則失臣臣不宻則失身幾事不宻則害成正此之謂也再按詩傳缺伯竒缺後缺隣大夫閔之賦小弁續説子貢劉向趙岐皆以此為尹伯竒事是也小序乃曰刺幽王也太子之傅作焉夫君雖不君臣不可以不臣父雖不父子不可以不子太子臣且子也其傅何人顧可刺王且宜臼弑逆之賊又安有親親之仁而孟子稱之孔子作春秋以誅亂賊託始平王其㫖深矣豈肯録其怨父之辭而不之削乎唯鄰大夫比肩事王則于吉甫有友道焉朋友責善固其責也申公詩説亦云尹伯竒為後母所譛而出其隣大夫作此詩以諷其父吉甫悠悠昊天曰父母且無罪無辜亂如此憮昊天已威予慎無罪昊天泰憮予慎無辜亂之初生僣始既涵亂之又生君子信讒君子如怒亂庶遄沮君子如祉亂庶遄已君子屢盟亂是用長君子信盗亂是用暴盗言孔甘亂是用餤匪其止共惟王之卭奕奕寢廟君子作之秩秩大猷聖人莫之他人有心予忖度之躍躍毚兎遇犬獲之荏染柔木君子樹之往來行言心焉數之蛇蛇碩言出自口矣巧言如簧顔之厚矣彼何人斯居河之麋無拳無勇職為亂階既㣲且尰爾勇伊何為猶將多爾居徒幾何詩序刺厲王也大夫傷於讒故作是詩焉呼昊天為父母而自鳴其無罪亦無所控告之詞也罪與辜意同然二字同出相對似亦少應别按罪从网从非辜从古从辛豈罪以無故罹其非解辜以有故受其辛解耶敢問明者按註憮訓大然憮與膴别膴從月从無謂無如其月者宜訓大若憮从忄从無其義似謂大無其心者宜以無情觧為是若訓憮為大下泰憮又太大矣似欠妥凡亂生於讒讒生於君心之不斷故先下僣始既涵句方及君子信讒句小人初進㣲言以嘗試其君正是僣之始不必改僣為譛易曰臣弑其君子弑其父非一朝一夕之故其所由來者漸矣由辨之不早辨也正謂僣始之不可涵也蘓氏小人為讒於其君一叚極説得透君子如怒四句謂君能一辨忠邪慎行其喜怒則讒無由入而亂可無生矣而惜乎其不能也此是深罪其君之不明不斷處君與小人曷嘗有盟哉但就小人之大奸似忠大佞似信處日逐獻欵於其君君亦日逐與相要結若盟誓者然是之謂屢盟然小人之所為忠信實奸佞之所以禍國者而君不之知也而且日加親任焉故謂之信盗然其情則盗而其言則藹然忠君愛國之嘉謀也孰甘于是而孰不傾信之故又謂之盗言孔甘若君知其盗則不甘之矣小人要結其君之固人君信任小人之深此章極説得明透盟則日固而漸肆故承説用長信則恃愛而為奸故承説用暴甘則莫逆而加甚故承説用餤匪其止共正説出小人心事來止共不但是共其職事内矢於念慮外慎於猷為莫非一敬之肅將此方可當此若就職事説小人之曲謹殆過於君子矣但不是止於共耳此二字當細體註較粗淺奕奕寢廟二節不是興詩意若曰奕奕寢廟君子作之而不可任之匪人也秩秩大猷聖人莫之而不可謀之匪人也凡所以賛廟謨定國是者皆在其人之一心他人有心予應忖度之而不可以輕信也倘如讒佞者一立於朝即宜加擯斥如犬遇毚兎者然則得之矣乃今於柔佞小人不勝廟廊之大任者則培植而作用之於緝緝翩翩徃來之行言不足以賛大猷而反禍國者則中心焉親信而數近之曽不思蛇蛇碩言取辦於其口其於國何如也巧言如簧無所用其耻其於國又何如也此之謂屢盟而亂用長信盗而亂用暴孔甘而亂用餤終為維王之卭也愚謂如此體㑹庶得詩人之意若註所謂興又比不敢以為是也寢廟即宗廟廟中有寝制度奕然故云奕奕寢廟作造也大猷即小旻章先民是程之大猷秩秩有經綸次第也莫謀定也人藏其心不可測度然就其所為以窺其意向又就意向而察其所安則予可忖度而知者小人小有才而跳踉以躍躍毚兎喻極當國家植材以大用必樹剛直之正人綿力小才如荏染柔木者樹之何益凡正人君子其建言於朝著必正大光明凡往來君側如十月篇所云噂㳫背憎巷伯篇所云緝緝翩翩可謂之君子乎行言上加往來二字極状得小人進言之態出心焉數之之數即禮記祭不欲䟽亦不欲數之數字義與䟽正相反心焉數之者謂中心焉親任之也錢氏曰數記也謂記憶而不忘也此觧亦先得我心矣荏染者樹之則正直者必逺矣往來行言心焉數之則端方辟言必心焉䟽之矣玩心焉數之四字則君心之眷注小人真有戀戀不觧者易曰君子維有觧吉有孚于小人真萬古之龜鑑也碩言本碩大之言而發之蛇蛇便有委曲轉摺之状真實由中語决不如是故云出自口矣正月篇云好言自口莠言自口雨無正篇云哀哉不能言匪舌是出則知出自口者讒佞之言也匪舌是出者忠直之言也註謂蛇蛇碩言為善言之出於口吾不信也蛇口花舌而吞吐不可測故此用蛇蛇字居河之麋必指其所居之處非謂居下濕之地也為亂者多生於拳勇而彼之生亂專在讒佞之言故云無拳無勇職為亂階既㣲且尰二句承上説盖極鄙其人之侏儒狀之卑𤨏爾非謂其骭痬腫足之疾也為猶將多二句詩人意若曰小人之為謀也祕其為猶也將滋多矣乃其居御徒衆能有幾何哉特其不揣涯分而僣始者直究其終是以終為王之卭耳此二句總見小人之詭祕其為身家利者無幾乃為國家害者則甚大所以君子當其僣始時辨之宜早而遏之宜嚴斷不可涵容之而使之至於若是烈耳此篇自奕奕寢廟下註俱似未妥愚故歴歴辯之髙明君子幸虚心一裁訂焉得詩人之心於千古之上彼何人斯其心孔艱胡逝我梁不入我門伊誰云從維暴之云二人從行誰為此禍胡逝我梁不入唁我始者不如今云不我可彼何人斯胡逝我陳我聞其聲不見其身不愧于人不畏于天彼何人斯其為飄風胡不自北胡不自南胡逝我梁祗攪我心爾之安行亦不遑舍爾之亟行遑脂爾車壹者之來云何其盱爾還而入我心易也還而不入否難知也壹者之來俾我祗也伯氏吹壎仲氏吹箎及爾如貫諒不我知出此三物以詛爾斯為鬼為蜮則不可得有靦面目視人罔極作此好歌以極反側詩序蘓公刺暴公也暴公為卿士而譛蘓公焉蘓公作是詩以絶之此詩要見讒人者無面目以見人如鬼蜮之不可測被譛者始作此詩以絶之中間逝梁逝陳之説不過狀其蹤跡之詭祕而實非有此事也再言壹者之來若謂爾先自絶於我耳我猶欲與爾詛無相疑也而何爾之罔極若是也好歌以極反側真可謂盡小人反側之狀使無自立於天地之間首提彼何人斯便是直指其人後却放寛而原復歸到彼人身上是縱操責人之法亦縱操作文之法孔艱二字説盡小人心事凡人正大光明其心必簡易平直若艱深險阻如飄風之不可測鬼蜮之不可得則必為小人無疑者首二句是正責之辭胡逝我梁二句本狀其行止之詭祕然此却就作實説且不直斥其人而訊其從行者曰維暴之云則其辭婉而其指則甚直矣二人從行𦂳承上説誰為云者姑為疑詞以寛之而曰不入唁我則必其主謀無疑者是縱之而實擒之也始者不如今云云若曰爾始者之遇我不如今日之踈逺也意者爾云不我可故不入唁我乎不然而胡其若是恝也如此體來覺得詩人委曲之㫖註二句一直説下似太促復提彼何人斯胡逝我陳見彼不但逝我梁又入我陳矣但無面目見我故聞其聲而不見其人耳爾獨不愧于人乎不畏于天乎此數語發小人良心亦不容昧但意在譛人以自利即所可愧可畏者亦冺滅無存耳不愧二句平説亦可相承説亦可小人面與人相和背實相詆然欲自掩蔽若非已譛之者然未嘗不欲至其庭也而良心終不容昧欲行又且自止焉真有逝梁而不入逝陳而不見一叚光景此詩形容殆盡又提彼何人斯其為飄風著其人心情靡定蹤跡無常不南不北而又不實來唁我祗以攪我之心此深疾而痛恨之詞也爾之安行節言其徃時不一顧我爾還而入節言其還時不一顧我總承上胡逝我梁説來以見所以攪我心者壹者之來不獨説一來見我壹者一人之稱也前云二人從行以縱之此兩云壹者之來以擒之使其莫可逃遁云何其盱望之不至而深致其疑也我心易也易字作平字㸔説爾一入我門我心即放平無復疑也否難知也否字莫放過否不然也即前章云不我可之謂爾行不來爾還不入必有不然於胷中我難以識其故也註我不得而知止發得難知意不㑹發得否字出反壹者之來俾我祗也㸔則其不來為我之怨望也深矣較上云何其盱為尤甚前六章通就讒人往來蹤跡之可疑上説以見其情之可惡伯氏節始以正義責之言已與爾同官于朝有伯仲之親如壎箎之相應和如䋲之貫物相聨屬尚有不相知者乎諒不我知則願出三物以詛爾斯矣相知無待於今日相信何待於詛盟若此云者正責其面和而背詆非同寅恊恭和𠂻之君子也故𦂳承為鬼為蜮則不我得云云諒不我知三句是説我心事可對天日爾不我知我可出三物以詛爾斯非欲其詛以見諒也伯仲壎箎是一喻及爾同貫又一喻此罔極二字與青蝇篇讒人罔極義同曰視人云者承上有靦面目來若曰為鬼為蜮則不可得耳靦然亦有面目視人宜明白正大可若是之罔極乎罔極者言其情之奸惡無底極也故下承説作此好歌以極反側此二極字正相應言反側之情本無底極我就爾情之無底極處作此詩以究極之也萋兮斐兮成是貝錦彼譛人者亦已大甚哆兮侈兮成是南箕彼譛人者誰適與謀緝緝翩翩謀欲譛人慎爾言也謂爾不信㨗㨗幡幡謀欲譛言豈不爾受既其女遷驕人好好勞人草草蒼天蒼天視彼驕人矜此勞人彼譛人者誰適與謀取彼譛人投畀豺虎豺虎不食投畀有北有北不受投畀有昊楊園之道猗于畆丘寺人孟子作為此詩凡百君子敬而聽之詩序刺幽王也寺人傷於讒故作是詩註因萋菲之形而文致之以成貝錦説得是但就下章哆侈二字㸔來此萋與菲亦無形者詩人謂譛人者必説成一片錦然後可聳動得人乃其所云然者皆是無形影之詞如萋兮菲兮以成之者又做成一個箕然後可簸揚得人乃其所為爾者皆是自造作之辭如哆兮侈兮以成之者故下云彼譛人者亦已大甚誰適與謀若説因萋菲之形文致以成貝錦将亦説因哆侈之形張大以成此箕耶大東篇云維南有箕不可以簸揚又云維南有箕載翕其舌則知必哆張然後成箕成箕乃可以簸揚也哆者㣲張之貌侈則大張之謂也凡譛出於一人其為謀也淺有所以主之者則彼此造作其為譛也深矣故詩究誰適與謀而下文又重言之緝緝二章𦂳承上謀字説緝緝者嚴宻以入其罪也翩翩者往來以行其奸也前篇云往來行言正翩翩之意謀欲譛人者謀欲譛言之入也謀欲譛人必尋覔他人罪往來以行奸故上着緝緝翩翩字面謀欲譛言之人必便利於應對之辭反覆為浸潤之計故上着㨗㨗幡幡字面慎爾言也謂爾不信豈不爾受既其女遷皆就後日所必至者而忠告之盖凡為無情之辭以譛人者終必有時破綻禍反及之所以要慎之於初而勿為慎爾言也謂爾不信是将後日致人之疑者勸其不為譛非教人慎為譛也要認得明再按陶其情云慎爾言也謂爾不信豈不爾受既其女遷通是戒被譛者之詞言人方謀譛爾言可以不慎乎且謂爾言不信矣亦豈不爾言之是受乎既其聞譛言而女遷耳故繼以驕人好好即指譛者言勞人草草即指被譛者言於是仰告蒼天何不視察彼驕人之虚妄而矜念此勞人哉亦㸔得甚好驕人好好節是無柰彼何要天開眼的話再提彼譛人者誰適與謀隨欲將此人投畀豺虎有北昊天盖痛恨其謀之禍害天下而欲其死亡之速也所以説惡惡如巷伯書分北三苖北字正投畀有北北字上呼蒼天蒼天要天開隻眼此云投畀有昊要天加之威楊園之道倚於畆丘即喻下與上相鄰近之意見得今日譛及於㣲賤他日即及於大臣凡百君子當敬聽而遏絶之也不是興賤者之言有補於君子註譛始於㣲賤二句最妙習習谷風維風及雨將恐將懼維予與女將安將樂女轉棄予習習谷風維風及頽將恐將懼寘予于懷將安將樂棄予如遺習習谷風維山崔嵬無草不死無木不萎忘我大徳思我小怨詩序刺幽王也天下俗薄朋友道絶焉詩緝云舊説谷風為生長習習為和調今考二章言維風及頽頽暴風也非和調之類三章言草木萎死無生長之意其説難通矣是風出自大谷盛怒之風也又習習然連續不斷繼之以雨行道之人誰堪之及頽從上而下為焚輪又甚於雨矣維山崔嵬如推山倒海之勢至草木之萎死又甚於頽矣此統喻當時變之衝有極難處者唯是朋友共處患難將恐將懼以相與是為大徳而不可棄遺且忘者故三章厯言之以見交情之薄惡彼一時也將恐將懼此一時也將安將樂人情乎人情急則相依緩則相棄甚有置之若遺者故于女轉棄予下着棄予如遺句又甚有修小怨而忘大徳者故於棄予如遺下又着忘我大徳思我小怨句交情之偷薄盖從古已然矣蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞蓼蓼者莪匪莪伊蔚哀哀父母生我勞瘁缾之罄矣維罍之耻鮮民之生不如死之久矣無父何怙無母何恃出則御恤入則靡至父兮生我母兮鞠我拊我畜我長我育我顧我復我出入腹我欲報之徳昊天罔極南山烈烈飄風發發民莫不糓我獨何害南山律律飄風弗弗民莫不糓我獨不卒按詩序刺幽王也民人勞苦孝子不得終養爾申公詩説王室昏亂讒邪肆行其大夫士有沒而不得其所者孝子痛傷而作是詩今按末章烈烈發發律律弗弗語昏亂肆行誠有然者此王裒痛恤其父之死三復流涕而廢卷也若止不得終養豈即至此哉劬勞者勤劬勞苦也勞瘁者劬勞而至於瘁也怙怙冐也恃頼恃也御恤御念而不忘也靡至如歸而靡至也受氣曰生成形曰鞠拊拊循也撫摩抑搔之謂畜畜飬也衣食調燮之謂長成長也日夕滋益以望其成育愛育也煦姁翼庇以致其愛顧即顧視之顧言無時而不顧也復即往復之復言無往而不復也出入腹我言一出一入常置之懷抱中非止三年懷抱而已者此生鞠拊畜數字不過就可舉者數之耳愚所釋亦不過就此詩數字義稍分别之耳若論父母之恩勤即就中一字細求之説不盡更着數十字形容之亦説不盡欲報之徳欲以徳報其親也南山烈烈二章非興也南山烈烈似在上之威嚴而律律尤甚飄風發發似致令之迅疾而弗弗尤甚是大有不順乎人情者故孝子卒勞苦而不得終飬耳觀四月篇冬日烈烈一章則知此二章决非觸物以起興之辭矣為人子者常存匪莪伊蒿之心則自不敢為匪才以辱其親矣常存昊天罔極之念則自不敢少偷惰以終其身矣有饛簋飱有捄棘七周道如砥其直如矢君子所履小人所視睠言顧之澘焉出涕小東大東杼柚其空紏紏葛屨可以履霜佻佻公子行彼周行既往既來使我心疚有冽氿泉無浸穫薪契契寤歎哀我憚人薪是穫薪尚可載也哀我憚人亦可息也東人之子職勞不來西人之子粲粲衣服舟人之子熊羆是裘私人之子百僚是試或以其酒不以其漿鞙鞙佩璲不以其長維天有漢監亦有光跂彼織女終日七襄雖則七襄不成報章睆彼牽牛不以服箱東有啓明西有長庚有捄天畢載施之行維南有箕不可以簸揚維北有斗不可以挹酒漿維南有箕載翕其舌維北有斗西柄之掲詩序刺亂也東國困於役而傷於財譚大夫作是詩以告病焉首二句曰興吾不信也興者觸物而起興也簋飱棘七何見而興周道也註云有饛簋飱則有捄棘七周道如砥則其直如矢二則字甚無謂愚謂首二句盖有深意存焉簋飱而曰饛富厚者之所享也棘七而曰捄流離者之所持也詩人若曰四海之内皆赤子也王政平直彼此各得分願何至有大相懸絶者稍有不平則必有不得其所者矣故開首即致嘆曰民一也有饛簋飱者則必有捄棘匕者盖勢之所必至也周之道世之所倚以為平不如砥乎平施以惠民其直不宜如矢乎是君子之所履而小人所視以為生者獨柰何不平不直一至此乎所以睠焉顧之而不覺澘然其出涕也註乃謂棘匕者以棘為匕所以載鼎肉而升之于爼似無所據且謂周道如砥則其直如矢意義亦不相䝉愚不敢以為是敢問髙明捄何以訓觩作曲捄捄取也捄取以應急也流離道塗的人討得碗殘羮剰飯拗取荆棘為七以應急是所謂有捄棘七耳有饛簋飱有捄棘匕二句正猶今俗語厨中有冷飯路上有饑人之謂睠言顧之澘焉出涕正睠顧此一叚光景所以出涕之不可遏也凡民之財不過耕與織而已誅求之盡而至於杼柚其空紏紏葛屨可以履霜佻佻公子行彼周行且既往而既來無時休息如砥如矢安在哉所履所視安在哉此使我心疚而不止澘然其出涕者有冽氿泉二句即曹風冽彼下泉浸彼苞稂之意大抵民望隂雨之膏澤不堪冽泉之朘削蘓氏薪已穫矣一叚註極佳契契取交合之義不堪之念交合於胷中要唯寐耳寤則契契然發之長歎矣民依於君如赤子之戀慈母也乃不勝其求而稱曰憚人可哀也哉亦可息也正照前既往既來㸔不獨曰東人西人舟人私人而並下之子二字極有深意盖當日視東人之供億若以為固然而延及其嗣彼西人及舟人私人之子自然衣食之豐饒而且有漸試於僚采者矣觀今日事可識也東人輸載以徂西必假舟人故説舟人之子熊羆是裘其所輸納必假私人故説私人之子百僚是試粲粲衣服熊羆是裘視杼柚其空葛屨履霜者何如百僚是試鞙鞙佩璲視佻佻公子行彼周行者何如或以其酒四句𦂳承上泛泛説盖曰西人進益多受用大將物事不當物事㸔或以其酒不以其漿固其所必爾也且輿皂之屬皆得列于冠裳鞙鞙佩璲不以其長亦其所必至也觀今日之事又可見矣詩緝將或以其酒四句綴百僚是試下為一章維天有漢四句綴雖則七襄上為一章極有理維天有漢以下通是詩人無可控訴之詞意若曰我東人此情誰能監之要是天能鍳察耳維天有漢監亦有光矣光獨不能監我乎跂彼織女終日七襄矣雖則七襄不成報章曾何助我之空於機杼也睆彼牽牛矣不以報箱曾何助我之疲於輸載也東有啓明啓日之明謂何西有長庚續日之長謂何載瞻天畢謂能好雨以潤枯槁也而載施之行有捄謂何箕則能簸揚矣維南有箕不可以簸揚誰為我去此弊政也斗則能挹取矣維北有斗不可以挹酒漿誰為我觧此饑渇也毋望簸揚而載翕其舌反若有所吞噬毋望挹酒漿而西掲之柄反若有所挹取於東其將若之何哉無可控訴而訴之於天無可歸咎而歴指東西南北以咎天之垂象者是所謂深於怨也人疾痛則呼天呼父母是所謂告病之辭有捄天畢捄字亦取應急之義月離于畢俾滂沱矣東人職勞不來如枯旱之望雨天畢載施之行安望其潤澤而捄取哉此詩人字有取義而句有深意不可草草誤解者四月維夏六月徂暑先祖匪人胡寧忍予秋日凄凄百卉具腓亂離瘼矣奚其適歸冬日烈烈飄風發發民莫不糓我獨何害山有嘉卉侯栗侯梅廢為殘賊莫知其尤相彼泉水載清載濁我日構禍曷云能糓滔滔江漢南國之紀盡瘁以仕寧莫我有匪鶉匪鳶翰飛戾天匪鱣匪鮪潜逃于淵山有蕨薇隰有杞桋君子作歌維以告哀詩序大夫刺幽王也在位貪殘下國搆禍怨亂並興焉四月維夏六月徂暑是自然定序詩意盖况王政之日酷一日不能存活也云爾先祖匪人胡寧忍予是疾痛則呼父母之意其腓腓字不應作病字解腓足肚也言秋風凄其百卉之枝葉盡凋敝而唯具存此足幹耳亂離莫矣云云盖當此凋殘零落時不能止居而無所適歸耳此亦根王政來民莫不糓二句止説已之不勝其害耳若想當時光景恐無有能自善者正月篇云哿矣富人哀此惸獨凡詩之作盖皆就惸獨者言也四月維夏六月徂暑不勝其酷炎秋日凄凄百卉具腓不勝其凋悴冬日烈烈飄風發發不勝其凛冽章章句句有意易曰大哉乾元萬物資始乃統天一元之氣常流行於四時君人者應天而時行不驕不伏四時皆春矣乃或驕陽伏隂如酷暑如凄風如烈寒令民不能自生息體元之謂何此詩但舉夏秋冬之時而不及春意深哉意深哉大註夏則暑秋則病冬則烈禍亂日進無時而息亦極有見山有嘉卉節𦂳承上説凡民之所以不勝其酷烈者由殘賊之臣用於上也山有嘉卉必稱栗與梅矣乃彼楨幹之臣自廢而為殘賊是誰之尤哉而㑹莫之知哉味莫知其尤語似大學彼為善之意盖咎其君之任此人也廢為殘賊一廢字甚可玩凡仕人國者孰不可為忠良盡瘁之臣哉然非人之所能與也其人之自立也一變而為殘為賊又誰從而使之其人之自廢也吾願世之仕者為忠良毋為殘賊為自立毋自廢泉水猶時有清濁搆禍乃無止息之期其能自存活哉此糓字與前榖字愚謂應作生息之意解日搆禍云者正照首三章説非遭其酷暴即逢其凄烈欲解脱而不能也江漢猶為南國之紀王不能察盡瘁之臣國紀竟安在哉此民之所以卒受其酷烈之害也盡瘁二句要㸔得好此不就盡瘁之臣説就其民望留此盡瘁之臣説若曰盡瘁以仕之人是調元賛化於廟堂之上而登斯民於春臺者我民之所庇也為國之紀者㑹不為我眷存此一人乎盖盡瘁以仕之人去則廢為殘賊之臣用此民之所為惓惓也寧不我有云者寧不為我憗留此等臣也云爾廢為殘賊莫知其尤咎其君之用此人也盡瘁以仕寧莫我有咎其君之不任此人也此二節正相照應要深體自得王者任盡瘁之臣去殘賊之害政行如春而登斯世於熈熈皥皥之域其民將鳶飛魚躍不知天淵之上下也任用匪人酷如暑凄如風烈如冬至使民欲奮飛潜逃而不可得斯世何世哉斯政何政哉斯君何君哉讀其詩想其時可為掩卷而流涕末章註三則字無謂詩人意若曰凡物各産其地皆有生意存焉山有蕨薇地有杞桋無有不遂其生者獨柰何民之不得其所哉此君子作歌而維以告哀也漢文帝詔曰方春時和羣生之物皆有以自樂吾民獨阽于危亡而莫之省憂盖深逹斯㫖也曰維以告哀其情何如其可憐也陟彼北山言采其杞偕偕士子朝夕從事王事靡盬憂我父母溥天之下莫非王土率土之濱莫非王臣大夫不均我從事獨賢四牡彭彭王事傍傍嘉我未老鮮我方將旅力方剛經營四方或燕燕居息或盡瘁事國或息偃在狀或不已于行或不知呌號或慘慘劬勞或栖遲偃仰或王事鞅掌或湛樂飲酒或慘慘畏咎或出入風議或靡事不為偕偕不必作强壯解即所偕行之人也雖曰從事獨賢然必有同事偕行者故曰偕偕士子朝夕從事詩本大夫所作乃不刺王而曰大夫自稱為從事是臣下之禮也云獨賢者非自稱其賢也維賢任事謂君或以我為獨賢耳四牡傍傍正言其所為勞者為王事之靡盬也傍傍即旁午之謂嘉我未老云云正謂我為獨賢處鮮少也將奉也鮮我方將謂如我將奉得王事者絶少也故獨任我耳旅力方剛經營四方正是方將事燕燕居息對盡瘁事國言佚勞之不均也息偃在床對不已於行言行止之不均也不知呌號是付之罔聞者慘慘劬勞是靡所控訴者栖遲偃仰是惟意所適者王事鞅掌是莫可解脱者躭樂飲酒何等逸豫慘慘畏咎猶恐其或及之出入風議何等從容靡所不為維日其猶不給北各相為對言而總之則所謂役使之不均也鞅掌何以作失容解按説文鞅馬頸組也此必控馬而執在手者一釋手則馬奔而車裂矣總攬國事者亦然故曰王事鞅掌耳如解作失容將謂王事失容乎駟鐡篇云六轡在手是鞅掌之一證無將大車祗自塵兮無思百憂祗自疧兮無將大車維塵㝠㝠無思百憂不出于無將大車維塵雝兮無思百憂祗自重兮將大車有任重意凡人一身百責萃焉百憂聚焉行役者身勞王事將百責委之於家全在上之人體恤其情使無内顧之憂耳上不加恤而俾一思之至於疧不出於至於重柰何使彼無怨心哉無思云者正言其思之不能置也易曰説以先民民忘其勞忘則何事於思而至於疧且重哉是以君子讀無將之詩而知上之人不能以人道使人也上照註為解耳若詩序則云無將大車大夫悔將小人也將有推挽意君子推挽小人小人既進則潜害於君子此亦理之所有者且自塵自疧自重字面俱有自咎推挽之意宜從之明明上天照臨下土我征徂西至于艽野二月初吉載離寒暑心之憂矣其毒大苦念彼共人涕零如雨豈不懷歸畏此罪罟昔我往矣日月方除曷云其還嵗聿云暮念我獨兮我事孔庶心之憂矣憚我不暇念彼共人睠睠懷顧豈不懷歸畏此譴怒昔我往矣日月方奥曷云其還政事愈蹙嵗聿云莫采蕭穫菽心之憂矣自詒伊戚念彼共人興言出宿豈不懷歸畏此反覆嗟爾君子無恒安處靖共爾位正直是與神之聽之式糓以女嗟爾君子無恒安息靖共爾位好是正直神之聽之介爾景福詩序小明大夫悔仕於亂世也仕於亂世則必有勞役而不息者矣則必有安處而不勞者矣故前三章三言念彼共人後二章再言靖共爾位兹可以得其情矣共是人臣之盛節此曰念彼共人矣後又望其靖共爾位要見其原未能共也世謂如此者為共人故詩人亦若此稱耳㸔下畏此罪罟畏此譴怒畏此反覆便可見其為人之實念彼共人涕零如雨非思念此人而若此其用情也此人之心不可測一念及之不覺其零涕焉盖畏之甚也故下𦂳承云豈不懷歸畏此罪罟懷歸是人子至情畏罪罟是其不得申情處罪罟是泛言譴怒是明入之於罪罟也反覆是暗中之於罪罟也小人情狀之可畏盖如此出車云豈不懷歸畏此簡書是臣子肅將之辭讀之令人生共心此云豈不懷歸畏此罪罟是臣子憚戒之辭讀之令人生懼心涕零如雨不言而自傷也睠睠懷顧回視而恐反也興言出宿欲寢而靡寜也兹可以見傷讒畏譏之情狀矣若説念彼共人云云是念此僚友而懷歸則睠睠懷顧下又説豈不懷歸將何以解念我獨兮便見非衆之所與回邪者交親正直者孤立盖自古傷之矣憚我不暇憚字即大東篇哀我憚人之憚采蕭穫菽是用以奉祭飬老者故嵗莫深思及之上既念且畏之矣至是始嗟嘆而厚望之盖當時偷安在内者維恐正直之來形己之短百般設計以逺役之令不得一日立於朝如伯嚭宻啓吴王遣伍員使齊之類故告之無恒安處無恒安息若曰國家之可慮者甚多安處安息非所宜也維正直是與而又出於中心之好乃為靖恭爾位見祐於鬼神耳不然而惟譴怒之加反覆之譛䧟正直於罪罟怡怡然偷處息之安神寧無奪之鑒益其疾乎盖勸其從好一邊可用以獲福則所謂戒且懲者自在其中所謂言之者無罪聞之者足以戒此善言也即此可以見詩人用意之忠厚矣居處而不遷曰安處息念而不為曰安息靖共爾位二句一直下重下句凡人臣事君要自靖克共以居其位而非一人之能勝也視人之正直若已有之而維此之是與則以人事君之義也式糓以女以字不作與字解以左右之也言神貽之以糓有若或相之者上言正直是與此云好是正直好較與為深所云好者即大學傳其心好之不啻若是其口出也因世所謂共人者不共爾位而惟正直之妬故兩言靖共爾位要其維正直之與又進之以真好也單一介字訓大可也曰介以景福便有畀予之意註將介與景並訓作大是謂大爾大福矣可乎哉伐木篇論朋友説到神之聽之終和且平此論僚友亦説到神之聽之式糓以女盖凡人相與以心此心之神不可欺即神之所在也人可欺也神之聽可欺乎故惟正直之與此心可質乎神明雨無正云胡不相畏不畏於天何人斯云不愧于人不畏于天皆神之聽之之意鼓鐘將將淮水湯湯憂心且傷淑人君子懷允不忘鼓鐘喈喈淮水湝湝憂心且悲淑人君子其徳不回鼓鐘伐鼛淮有三洲憂心且妯淑人君子其徳不猶鼓鐘欽欽鼓瑟鼓琴笙磬同音以雅以南以籥不僣按詩序鼓鐘刺幽王也鼓鐘鼓字是虚字即鼓瑟鼓琴之謂淑人君子是古先王之勤政子民者懷允不忘懐思信允而不忘愛民之心也愛民則樂而有節矣註憂傷而思古之君子不能忘非是將將聲之剽而疾也喈喈聲之混而雜也湯湯水盛而汪洋湝湝水流而滛佚傷傷悼也悲痛悲也各稍别妯从女从由女子由中生者固結不觧又不但傷悲而已也訓動字似未妥其徳不回其徳不猶何徳也君徳只是一個愛民存愛民之心自然不回邪不夷猶為流連荒亡之樂詩中用猶字甚多其義各别如小星之實命不猶宜作相似觧采芑之克壯其猶宜作威略解小旻之謀猶回遹宜作作為觧斯干之無相猶矣宜作狠惡觧此之其徳不猶宜作夷猶觧盖猶本獸名其形相似其力甚威其能有為其性甚狠喜則夷夷故稱夷猶疑則豫豫故稱猶豫讀者當隨其文義求之一槩解作似也圗也便不是末章不應與上三章同㸔上云淑人君子懷允不忘其徳不回其徳不猶便見有不僣之意僣妄用也鼓鐘欽欽而比之以琴瑟諧之以笙磬奏必以雅南而舞必以籥清廟明堂之音用之清廟明堂之上是之謂不僣若用之淮上為流連之樂是僣也可謂人則是而樂則非乎敢問髙明重訂詩經疑問卷六
