body:
  text: 重訂詩經疑問卷十明姚舜牧撰大雅抑抑威儀維徳之隅人亦有言靡哲不愚庶人之愚亦職維疾哲人之愚亦維斯戾無競維人四方其訓之有覺徳行四國順之訏謨定命逺猶辰告敬慎威儀維民之則其在于今興迷亂于政顛覆厥徳荒湛于酒女雖湛樂從弗念厥紹罔敷求先王克共明刑肆皇天弗尚如彼流泉無淪胥以亡夙興夜寐洒埽廷内維民之章脩爾車馬弓矢戎兵用戒戎作用逷蠻方質爾人民謹爾侯度用戒不虞慎爾出話敬爾威儀無不柔嘉白圭之玷尚可磨也斯言之玷不可為也無易由言無曰苟矣莫捫朕舌言不可逝矣無言不讐無徳不報惠于朋友庶民小子子孫繩繩萬民靡不承視爾友君子輯柔爾顔不遐有愆相在爾室尚不愧于屋漏無曰不顯莫予云覯神之格思不可度思矧可射思辟爾為徳俾臧俾嘉淑慎爾止不愆于儀不僣不賊鮮不為則投我以桃報之以李彼童而角實虹小子荏染柔木言緡之絲温温恭人維徳之基其維哲人告之話言順徳之行其維愚人覆謂我僣民各有心於乎小子未知臧否匪手㩗之言示之事匪靣命之言提其耳借曰未知亦既抱子民之靡盈誰夙知而莫成昊天孔昭我生靡樂視爾夢夢我心慘慘誨爾諄諄聽我藐藐匪用為教覆用為虐借曰未知亦聿既耄於乎小子告爾舊止聽用我謀庶無大悔天方艱難曰喪厥國取譬不逺昊天不忒囘遹其徳俾民大棘詩序衛武公刺厲王亦以自警也愚謂衛武公自警亦以諷王也通詩所規在謹威儀以脩徳故首發抑抑威儀維徳之隅二句凡人之威儀皆由中出充養完粹的人不求其儀之謙抑自然樽節退讓而不放肆鄭氏所云如宫室之制内有繩直則外有亷隅也語極明透凡生物萌芽初出其首必反抑而未伸此下抑抑二字極妙詩詞稱抑抑威儀為徳之隅詩意實欲人敬慎威儀為徳之基玩下文自見得無哲不愚句虛説下方着威儀上若曰天下極乖覺的人嘗到極呆蠢處無有哲而不愚者夫此庶人不知所謂徳也安能致謹於威儀是其愚是本等之疾也若哲人明知徳之當脩威儀之當慎乃迷亂荒湛如下文所云則其愚也是自反其常而非其疾也故曰庶人之愚亦職維疾哲人之愚亦維斯戾是所謂無哲而不愚者自此章至實虹小子反覆言威儀之當慎以脩其徳荏染柔木至末甚言人言之當信不可不慎威儀以脩徳自蹈於愚人之轍也一詩之大意首章已畧具矣無有强於已者曰無競維人言自强在人非他人所能與也覺明覺也天命我以明徳有覺其在我而以徳為行若下文無忝於先王無愧於皇天則四國之同是徳者自然感悟興起而無不順之矣故曰有覺徳行四國順之人能自强而無與為競四方皆化而自强是為訓人能覺悟而以徳為行四國皆化而敏徳是為順無競二句與有覺二句雖平而實重在下二句葢所謂無競者謂自强其徳行也然必有覺徳行始稱無競維人易曰神而明之存乎其人黙而成之不言而信存乎徳行亦歸重在下三句與此正相發訏謨定命四句雖有謀猶命告威儀之分然要之謀猶命告皆威儀之所繫也而此特其重者故别言之耳觀下文淑慎爾止不愆于儀不僣不賊鮮不為則則可知其皆統于威儀矣知其分而又知其合是為善説詩訏謨定命四句細分之是四者究言之則二者而又究言之則一事也訏大其謀謨定立其命令經逺其猶為辰播其告戒是所謂細分之則四者也然訏其謀正以定其命逺其猶貴乎時其告所謂究言之則二者也然謀與猶豈二物哉命與告豈二事哉維訏謨以定命斯逺猶而辰告是所謂又究言之則一而非二也讀詩者於此等細討論方為有得威儀上着一慎字又上着一敬字維敬而威儀自無不慎也下文云慎爾出話敬爾威儀亦歸重到一敬字然敬却如何相在爾室尚不愧于屋漏無曰不顯莫予云覯云耳訏謨定命逺猶辰告敬慎威儀此之謂有覺徳行此之謂無競維人觀下文慎徳之行句可見維訏謨定命三句總歸于徳行故下文興迷亂于政曰顛覆厥徳看其在於今句見上章云云皆古人之可為法則者故下云敷求哲王克共明刑末復云告爾舊止舊止即先王之可為法則者也謀猶不成個謀猶命告不成個命告威儀不成個威儀總于政體上昏迷而謬亂而厥徳無復存焉者矣故曰興迷亂于政顛覆厥徳興自興也荒湛于酒正其自興迷亂處弗念厥紹一語極提醒人凡人一思念其所紹則必求先王之明刑以自飭勵矣寧至於迷亂顛覆若是乎敷求先王克共明刑是為克念厥紹葢先王一言一動皆可為天下萬世之法則是明刑也上文訏謨定命逺猶辰告敬慎威儀正其明刑之所在人之所尊尚者天也肆皇天弗尚則其謀猶命告與威儀悉非天則矣是淪胥以亡之道也故曰如彼流泉無淪胥以亡恐非天所不尚之説夙興夜寐洒埽庭内到用戒戎作用逷蠻方則無一時一事而不加敬慎矣是敬天命法先王之實事故章首曰肆皇天弗尚且承罔敷求先王克共明刑來要細細體味維民之章句囘顧維民之則句是點綴文法質爾人民三句𦂳承上章説來葢夙興夜寐洒埽庭内維民之章是人民所瞻視以定性命者脩爾車馬弓矢戎兵用戒戎作用逷蠻方是侯度所宜謹以戒不虞者然惟口出好興戎於威儀為尤𦂳故𦂳接慎爾出話敬爾威儀以致儆上文敬慎威儀上着訏謨逺猶句此敬爾威儀上着慎爾出話句下又申言不可玷不可易而併極其效驗言之見此於威儀中尤宜加謹而不可忽也柔嘉二字下得極妙凡人之言動莫不善於暴戾莫善於柔嘉論語曰動容貌斯逺暴慢矣出辭氣斯逺鄙悖矣正是此意下文曰惠于曰輯柔曰臧嘉曰淑慎曰温恭皆應此柔嘉二字凡斯言之玷皆由易心始故承説無易由言賔筵篇亦云匪言勿言匪由勿語惠于朋友庶民小子豈有他哉慎話言敬威儀無不柔嘉而已曰惠于朋友足矣復曰庶民小子者無衆寡無小大皆不可不以柔嘉處也想到子孫繩繩萬民靡不承則彼之肆言妄動者葢真禍及其後民莫我顧者矣可不慎歟遐永也不遐有愆言可以永無愆也相在爾室一叚總是一敬字前云敬慎威儀敬爾威儀已露此意矣此則喫𦂳言之示人欲善其言動須於不言不動時常存敬慎而後可也中庸引相在爾室二句云故君子不動而敬不言而信最得此詩之㫖無曰不顯二句即思齊篇不顯亦臨無射亦保之意此衛武分獨契聖學之傳稱叡聖武公射不必作斁字解射即矢之射也有傷觸之意此詩意若曰神之格思有不可測度其至與否者况可或一觸犯之乎是下此一射字其義為特妙辟爾辟字宜少讀臧善也嘉美也淑慎爾止不愆于儀𦂳𦂳接上説前章云敬慎威儀維民之則此章云淑慎爾止不愆于儀不僣不賊鮮不為則正其語相照應處淑慎爾止之止是君道之所宜止者先王之明刑是也末章舊止止字正照此看不僣是言動無差失不賊是言動無暴戾投桃報李正無不柔嘉惠于朋友庶民小子之實事也與童而角正相反易曰童蒙吉又曰姤其角吝童柔順角剛强剛强最害事童而角則與柔嘉淑慎大相反矣此小子之倐敗而無成者故曰實虹小子虹亘于天倐見而即滅故以取喻云荏染柔木以上皆反覆警人之脩徳無蹈于昏愚此以下則警人之脩徳者唯善言之是聽不可外棄乎人言卒蹈于昏愚之轍也此申發首章之意抑抑威儀由中出而周旋中禮者故曰維徳之隅温温恭人由外入而不愆于儀者故曰維徳之基易陳九卦開首曰履徳之基也正與此合温温恭人維徳之基所以出話貴慎威儀貴敬而維柔嘉之是尚也前後語正相應前云無哲不愚矣此云其維哲人是哲之哲者也其維愚人是哲之無不愚者也民各有心言人心相去之逺有若此者是歎辭此篇小子字四出而不同庶民小子是言其人之㓜少者實虹小子是鄙其事之童稚者於乎小子則呼而告之之辭也凡人之教誨不過手㩗之事示之面命之耳提之而已故歴舉以見其諄諄此靡盈二字最妙心貴常虚不盈有覺徳行胥自虛處入興迷亂于政顛覆厥徳胥自盈處壊易曰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙書曰謙受益滿招損胥病此盈之一字為喪徳也曰抑抑曰敬慎曰柔嘉曰輯柔曰淑慎曰温温總是教人崇謙虛戒盈滿故至此始提醒云民之靡盈誰夙知而莫成凡人忽於脩徳者其病只在樂之一字不知此生非可樂也日鑒在兹凛然有不可以朝夕懈者故曰昊天孔昭我生靡樂以警惕之曰於乎小子未知臧否曰借曰未知亦既抱子曰借曰未知亦聿既耄語極𦂳而警極深舊止止字即淑慎爾止之止先王之明刑是也十章云敬慎爾止此復云告爾舊止前後照應語極妙取譬不逺以下口氣若曰吾之取譬不須逺得但看天之禍福不忒自有凛然不可怠者乃今不脩徳而囘遹俾民至于大棘豈享國之道哉所以當聽人之話言存敬畏謹威儀母自蹈于昏愚之覆轍也此詩大㫖重一徳字而威儀維徳之符未有有徳而不敬慎其威儀者亦未有舎敬慎威儀而可以入徳者故首云抑抑威儀維徳之隅次云有覺徳行四國順之敬慎威儀維民之則又次云興迷亂於政顛覆厥徳又次云慎爾出話敬爾威儀又次云辟爾為徳俾臧俾嘉淑慎爾止不愆於儀又次云温温恭人維徳之基其維哲人順徳之行末復致警云囘遹其徳俾民大棘乃究其要領則在慎之幽獨之中而不敢忽慢於言動之際七章云相在爾室尚不愧於屋漏無曰不顯莫予云覯神之格思不可度思矧可射思則本本原原之論也中庸一書總教人齊明盛服非禮勿動以脩其身而大要只在戒慎乎其所不睹恐懼乎其所不聞聖賢經傳之相表􅂻葢如此菀彼桑柔其下侯旬捋采其劉瘼此下民不殄心憂倉兄填兮倬彼昊天寧不我矜四牡騤騤旟旐有翩亂生不夷靡國不泯民靡有黎具禍以燼於乎有哀國步斯頻國歩蔑資天不我將靡所止疑云徂何徃君子實維秉心無競誰生厲階至今為梗憂心慇慇念我土宇我生不辰逢天僤怒自西徂東靡所定處多我覯痻孔棘我圉為謀為毖亂况斯削告爾憂恤誨爾序爵誰能執熱逝不以濯其何能淑載胥及溺如彼遡風亦孔之僾民有肅心茾云不逮好是稼穡力民代食稼穡維寶代食維好天降喪亂滅我立王降此蟊賊稼穡卒痒哀恫中國具贅卒荒靡有旅力以念穹蒼維此惠君民人所瞻秉心宣猶考慎其相維彼不順自獨俾臧自有肺膓俾民卒狂瞻彼中林甡甡其鹿朋友已譖不胥以穀人亦有言進退維谷維此聖人瞻言百里維彼愚人覆狂以喜匪言不能胡斯畏忌維此良人弗求弗迪維彼忍心是顧是復民之貪亂寧為荼毒大風有隧有空大谷維此良人作為式穀維彼不順征以中垢大風有隧貪人敗類聽言則對誦言如醉匪用其良覆俾我悖嗟爾朋友予豈不知而作如彼飛蟲時亦弋獲既之隂女反予來赫民之罔極職凉善背為民不利如云不克民之囘遹職競用力民之未戾職盗為宼凉曰不可覆背善詈雖曰匪予既作爾歌詩序芮伯刺厲王也厲王任榮夷公專利又使衛巫監謗故此詩特究其所為貪亂荼毒者言之而秉心宣猶考慎其相其所望于惠君者極深且切也桑柔原供蠶事捋采所不免也唯至于其劉則戕此桑而所以病民者為不小矣故曰瘼此下民觀下章四牡騤騤以下則知其劉之瘼我民矣書盤庚云重我民無盡劉是切証填填塞也倉怳填塞於胷中正所謂不殄心憂者四牡騤騤旟旐有翩在當時為上者謂為常事而不知征役之繁苦民實有不堪其命者所以上之人只一個休養可以造生民之福當時豈無黎民哉憂苦勞瘁之不勝即黔首猶然頒白耳若爾而所存有幾故曰民靡有黎具禍以燼斯所謂捋采其劉瘼此下民者民恃君為命國恃民為命民具禍以燼而國步有不頻危者乎書曰民惟邦本本固邦寧易曰君子以厚下安宅皆謂國脈之在民而不可自取其削亡也蔑非滅也資非咨也國所倚賴者賢人君子也匪用其良而維忍人之親任是蔑其所資也國步斯頻可若是乎此天之不惠斯民耳亦無所歸咎之辭也正月云寧或滅之蔑與滅異蕩云文王曰咨資與咨異不可通用天生賢才本將為世用也止無所疑徂無所徃豈天生賢才意乎所以説天不我將君子實維二句指在位者言若曰在位君子實國家之綱維也則心所秉持當在休養斯民而不可與天下為競一有競心則所為荼毒為囘遹將無所不至矣下文云職凉善背職競用力職盗為冦皆此一競字所使也故此二句下𦂳接誰生厲階至今為梗句為相的當體君以愛民故云君子實維秉心無競為君的當為民以擇臣故云秉心宣猷考慎其相此二秉心字正相應在位君子宜秉心無競而顧生此厲階使賢者無所止無所徂是所謂國歩蔑資天不我將者生厲階而為梗土宇將不可保矣故承説憂心慇慇念我土宇自西徂東靡所定處二句正應前亂生不夷靡國不冺靡所止疑云徂何徃意作此詩君子必是不容於朝著而使之征行於下國者故云多我覯痻孔棘我圉為謀為毖亂况斯削二句是好話詩意葢謂今天下豈無深於謀而毖後患者乎倘能棄采劉之人用善良之士為謀以善其終為毖以防其患則亂况將由此斯削矣然此維心存於民生國計而序用賢良者得之故𦂳承説云告爾憂恤誨爾序爵二句易曰君子以作事謀始頌曰予其懲而毖後患為國者大抵病在不謀而不毖未有謀且毖反長亂以自削者亂况是亂之一叚情景斯削者即削也序爵所以官有徳也不求迪其有徳者而維忍心之顧復可謂序爵乎此二字是一詩之大㫖與下考慎其相正相照􅀢云字恐不宜作使字解按此字从卝以拜或恐是並字意民有肅心是欲進而與國家為謀為毖者云不逮衆皆謂時之不可而止之不行也所以甘稼穡以食其力好是稼穡云云意謂姑就稼以食力耳而稼又卒痒靡旅力以念穹蒼且柰之何哉葢此統是設言以見其憂之莫可解也要善體㑹維此惠君一節纔説出本意來民人所瞻言天下所仰以立其命者惠君秉持一心只在宣布其謀猷為生民立命為萬世開太平知非一人之心力所能為也又非忍心不良者之所可任也所以必考慎其相考慎總是不輕任孟子曰國君進賢如不得已左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之此方是考慎意宣猷是宣布其謀猷正上文所謂為謀為毖也看惠君秉心宣猷考慎其相則為謀為毖者誠不可不先於序爵矣自獨自有二自字宜重讀自獨俾臧者獨任其所謂臧者而不參諸人也自有肺膓者自逞其胸臆之見而不詢于衆也正反照上考慎二字若是其任使民有不肆為狂悖者乎民之貪亂寧為荼毒正由此召來俾民卒狂安知善之當為故承説朋友已譖不胥以穀維此聖人章汎汎説見世皆狂愚忠言反見妬害即欲言而不能也聖人心存于天下國家其智慮甚明晰而其識見甚超卓苟有禍福皆炳于幾先愚人昏蔽無知即禍已及而反狂以喜矣此瞻言言字即薄言受言言字莫重看胡斯畏忌言胡當若斯之可畏忌也弗求弗迪却何等逺踈是顧是復却何等親密民亦有良心寧肯貪亂而荼毒維上所顧復者在此一輩人彼圖富貴功名者不得不曲從之葢非是不可以得利也故下個貪字寧字此民字與下章民之罔極民之囘遹民之未戾諸民字同皆就當日在位者説大風是不好的惡風其發於隧道中必由有空大谷中出喻為君者播大惡於衆必起於一小人之開導也維此良人作為式穀却何等様好維彼不順征以中垢吹毛求疵於君子深求其中之垢惡使其不得用於朝柰何哉貪人即上忍心之人貪忍的人維求已之寵利專一推䧟排擠賢良使不容於朝凡君所喜聽的語言則一一對荅若可稱誦的法言則如醉而不知以導其君播惡於天下此正所謂大風之隧也乃為君者於此作為式穀者擯棄而不用維於此貪人是顧是復焉寧不反使我之至於悖哉葢是非顛倒於其上將使下民莫知所適從也再言大風有隧便見此小道之風皆從大谷中出最能敗壊禾稼者故即承貪人敗類句盖未有貪人在朝而能容留此君子者聽言誦言是二項皆承貪人説雨無正云聽言則對譛言則退此二言亦作二項解嗟爾朋友即上章朋友已譛不胥以穀所謂忍所謂貪專一善背用力為盗冦卒䧟其君播惡於天下者也隂字赫字下得極妙凡君子議論小人處皆教使改行以從善却多少隂庇而小人反肆狂悖以嚇我若莊子所謂以梁國嚇我可笑也此章數民字須分别瘼此下民民靡有黎力民代食民人所瞻為民不利此五民字就民説民有肅心一民字就賢者説俾民卒狂民之貪亂民之罔極民之囘遹民之未戾此五民字俱就在位小人説罔極者言其政之采劉於下者之無止極也故下曰職凉善背為民不利如云不克囘遹者言其情術之狡偽專與其民相爭逐也故下云職競用力未戾者言其掊克之心方興而未止也故下云職盗為冦此並應貪亂而寧為荼毒語二凉字傳訓為薄詩緝作刻薄解職凉善背言此人專主刻薄而善為覆背故為民不利如云不克也此正所謂罔極處職競用力言此人專與天下為競而用力以為朘削者君子實維秉心無競可競而用力之若是乎此二競字正相應民之未戾職盗為冦言此人之未有止心者其意專在盗竊而為冦於天下也乃其自裝門面亦説此事為不可實則覆背其所謂不可者且畏忌君子善為毁詈俾必不見用於朝此其情之極狡極詭處嘗以欺人而不肯自承認者故詩人逆揣其不認之意説爾雖曰匪予之所為然既作爾歌而其情已得其事已著有不可得而終掩覆者猶大學所謂如見其肺肝然則何益矣之説也此是詩人之極透骨深刺語善背善詈二善字即漢書岸善崩之善字前但云善背後又云覆背善詈葢不但能自覆背而已也職凉善背猶若假門面而為之到職競用力則實用其力而為之不止善背而已也及到職盗為冦則冦盗之事已悉著即粧飾門面有不能掩其覆背善詈之情者小人之情狀無所不至葢如此詩人形容其情事亦可謂至矣要知此詩一節深一節凉曰不可覆背善詈所謂口然而心實不然者詩未有十六章者此詩何獨長言至此葢當時為君者不知考慎其相而用事者務為荼毒其民感時憤事者有槩于胷中不覺其言之亹亹耳讀此詩要識其情辭之不能自已處倬彼雲漢昭囘于天王曰於乎何辜今之人天降喪亂饑饉薦臻靡神不舉靡愛斯牲圭璧既卒寧莫我聽旱既大甚藴隆蟲蟲不殄禋祀自郊徂宫上下奠瘞靡神不宗后稷不克上帝不臨耗斁下土寧丁我躬旱既大甚則不可推兢兢業業如霆如雷周餘黎民靡有孑遺昊天上帝則不我遺胡不相畏先祖于摧旱既大甚則不可沮赫赫炎炎云我無所大命近止靡瞻靡顧羣公先正則不我助父母先祖胡寧忍予旱既大甚滌滌山川旱魃為虐如惔如焚我心憚暑憂心如熏羣公先正則不我聞昊天上帝寧俾我遯旱既大甚黽勉畏去胡寧瘨我以旱㦧不知其故祈年孔夙方社不莫昊天上帝則不我虞敬恭明神宜無悔怒旱既大甚散無友紀鞫哉庶正疚哉冢宰趣馬師氏膳夫左右靡人不周無不能止瞻卬昊天云如何里瞻卬昊天有嘒其星大夫君子昭假無贏大命近止無棄爾成何求為我以戾庶正瞻卬昊天曷惠其寧讀此詩全要識宣王引咎自責惻然為民之意觀開口便説王曰於乎何辜今之人自見得倬彼雲漢昭囘于天是無雨之徵也故詩人首揭而述王罪已之詞周禮荒政之一在索鬼神而祭必用牲用圭璧故云靡神不舉靡愛斯牲圭璧既卒寧莫我聽非咎神之不聽也咎已若之何而神莫我之聽也此寧字有號呼瞻戀之意故下文曰寧丁我躬胡寧忍予寧俾我遯連下數寧字連下旱既大甚句見宣王無時而不念及于民無刻而不在旱之一事也藴隆蟲蟲極狀陽氣之蓄積驕亢為病于民也下文旱魃為虐亦此意旱時無所求求神以活斯民耳故云不殄禋祀自郊徂宫上下奠瘞靡神不宗上下奠瘞𦂳承自郊徂宫説葢曰自上及下無不奠瘞之耳非又於郊宫中復抽出天地言之也靡神不舉是備舉其禮然更有脩其廢而祀之者靡神不宗則就其所嘗祀者極致其尊享之誠也后稷不克二句正照上郊宫説郊祀上帝而以后稷配宫則以后稷為始祖也不克謂不勝此救旱之事不臨謂不享此祈旱之祭故耗斁下土而丁及我躬也此通是罪已之不能格神非罪神之不我格也要識得則不可推則不可沮言無計之可以推沮也天之威莫甚於雷霆兢業如雷霆言畏懼之極其至也曰民無孑遺而又曰則不我遺而又曰先祖于摧此正其兢兢業業如雷如霆處大命近止照前則不我遺説靡瞻靡顧言無可為瞻顧之地者即下之羣公先正父母先祖也然辭雖並舉意實歸重在父母先祖上不我聞若付之罔聞又甚於不我助人疾痛則呼父母寃抑則呼天父母先祖胡寧忍予昊天上帝寧俾我遁是呼天呼父母之辭也寧俾我遯遯字作窮字看言胡寧俾我之至此極而無所遁也非謂使我得逃遯而去也黽勉畏去言畏之已極即黽勉求去而不可得也註出無所之也是􅉃是動心貌􅉃不知其故正起下文言我如此而祈年如此而方社而昊天上帝則不我虞我誠不知其何故也此與我竭力耕田供為子職而已矣父母之不我愛於我何哉同意是反已而自責非怨天而尤神不莫不落莫也前自郊徂宫上下奠瘞是方旱時祈禱之祭此祈年孔夙方社不莫是平日祈報之祭宜無二字有意味友紀友字不訛凡朝廷之綱紀總所以聫上下之交也故下此友字散無友紀言上下之綱紀由此旱而不能主張也是甚言之辭㸔下文鞫哉庶正疚哉冢宰云云則友紀原在里地也是虛字云如何里即如何是好之意瞻卬昊天有嘒其星囘應首章倬彼雲漢昭囘于天句再曰大命近止若無可為生矣而猶曰無棄爾成言雖至於死定要昭格皇天以求雨澤惠我生民無棄爾前之成功也此總是為民而非為已意故𦂳承説何求為我以戾庶正戾庶正正所以戾斯民也斯民不定庶正其曷以自戾乎語終曰瞻卬昊天曷惠其寧葢深注祈於上帝即惠然沛大甘霖以寧我生民也此是宣王之懇懇拳拳祈天以惠民處意極痛切而詞極𦂳嚴曷惠其寧言何不即惠以寧我也非問果何時惠我以安寧也崧高維嶽駿極于天維嶽降神生甫及申維申及甫維周之翰四國于蕃四方于宣亹亹申伯王纉之事于邑于謝南國是式王命召伯定申伯之宅登是南邦世執其功王命申伯式是南邦因是謝人以作爾庸王命召伯徹申伯土田王命傅御遷其私人申伯之功召伯是營有俶其城寢廟既成既成藐藐王錫申伯四牡蹻蹻鉤膺濯濯王遣申伯路車乗馬我圖爾居莫如南土錫爾介圭以作爾寶徃近王舅南土是保申伯信邁王餞于郿申伯還南謝于誠歸王命召伯徹申伯土疆以峙其粻式遄其行申伯番番既入于謝徒御嘽嘽周邦咸喜戎有良翰不顯申伯王之元舅文武是憲申伯之徳柔惠且直揉此萬邦聞于四國吉甫作誦其詩孔碩其風肆好以贈申伯詩序尹吉甫美宣王也天下復平能建國親諸侯褒賞申伯焉此要玩王纉王命王錫王遣王餞字面見天子眷注殷勤之意又要玩數稱申伯以見詩人叮嚀鄭重之詞總之則申伯之徳足以承天子寵命之隆故在錫之者非濫予承之者非濫受其作詩以送之者非溢美也説崧高維嶽駿極于天便見維嶽降神生甫及申是天意之所屬甫仲山甫也當時山甫為相申伯亞於山甫此詩為美申伯而以山甫並言葢謂申伯山甫相伯仲借山甫以大申伯也翰羽也鳥之捍衛全在翰而國家之捍衛全在賢故稱二臣為周之翰蕃有屏蔽維持意宣有傳道流布意總之則所謂維翰也亹亹就蕃宣之勤勩言纉事云者其先世嘗有此事而復令纉之也于邑于謝南國是式是王加地於申伯之意定申伯之宅登是南邦世執其功是王命召伯營謝以厚申伯之事式是南邦因是謝人以作爾庸是王命申伯邑謝之詞禮王制凡諸侯有功則加地進律申伯先封于申而入為卿士有功于朝廷故復邑之謝曰于邑于謝就是邦而營居曰定營是宅而成邑曰登世執其功使申伯子孫世執蕃宣之功也以作爾庸之庸非城也亦非功也申其故封邑而謝則所謂加地進律者也是申之附庸也㸔因是謝人句説下來自見得凡建國必錫之山川土田故王命召伯定其賦税以為禄食之需徹周法也凡令侯之國其家丁私屬悉與從行制也而王命傅御遷之則體悉周念之至特典也傅御是王之傅御凡諸侯之家屬傅御籍之故命使遷之也今各王府侯伯家屬籍之宗人府禮兵二部正此意申伯之功功字與上世執其功功字不同此營謝之功也黍苗云肅肅謝功召伯營之正謂此也謝故無城而今創立之曰有俶營室先立寢廟既成而藐藐則其規制之深嚴可想見已四牡鉤膺即下之路車乘馬也豫備以送其行曰王錫及行而贈送之曰王遣我圖爾居六句是王遣申伯之國之詞實王命申伯之謝之意徃近近字莫輕㸔近者親之之謂也居之南土而又錫之介圭將意與俱徃而如在左右南土由此其永保矣故曰徃近王舅南土是保王遣申伯節叙遣贈之禮如是耳未便遣之行也及其信邁則躬逺餞以申其欵至其誠歸則豫峙粻以遄其行真可謂待之曲盡其禮者矣申伯信邁四句詩緝謂郿在鎬京之西申在鎬京之東自鎬適申塗不經郿時王至豐冊命申伯於文王之廟故行餞送之禮于郿申伯北就王命于岐周乃旋反而南行其于謝邑誠然歸之矣言信邁誠歸者葢申伯志存王室宣王恩隆王舅人疑其未必徃謝而今始知其果行也上徹土田是定井田什一之法以立永世之規此徹土疆是取井田什一之賦以供委積之用番番不應作武勇解申伯入為卿士乆矣今邑之謝必其老而告去也故特加地進律且致其殷勤眷顧之意耳書秦誓番番良士蔡氏訓作老貌此亦應訓作老以見申伯不特為國之元舅且國之元老也徒御嘽嘽叙其隨行之有此儀耳周邦咸喜戎有良翰是中朝共慶相謂之詞不顯申伯三句則吉甫推咸喜之意而嘉美之辭也王之元舅二句言親則王之元舅而賢則文武之士之法則也語並美而實重下一句大臣輔理承化全在柔順惠和而正直之節亦不可少柔惠而且直便是臣徳之極善處易鼎之上九曰鼎玉鉉大吉无不利夫子象之曰玉鉉在上剛柔節也正此柔惠且直之謂也揉有調劑燮理之意全本柔惠且直來四國于蕃四方于宣是叙功著于旂常以見其當封也揉此萬邦聞于四國是叙徳加于民社以見其可頌也長言為詩工歌為誦而聲足以動人為風其實一也孔碩肆好云者所言王室依賴諸侯表式皆天下安危之大計也是其詩之孔碩也而悉本申伯之徳美其功以勉之是其風之肆好也天生烝民有物有則民之秉彛好是懿徳天監有周昭假于下保兹天子生仲山甫仲山甫之徳柔嘉維則令儀令色小心翼翼古訓是式威儀是力天子是若明命使賦王命仲山甫式是百辟纉戎祖考王躬是保出納王命王之喉舌賦政于外四方爰發肅肅王命仲山甫將之邦國若否仲山甫明之既明且哲以保其身夙夜匪解以事一人人亦有言柔則茹之剛則吐之維仲山甫柔亦不茹剛亦不吐不侮矜寡不畏彊禦人亦有言徳輶如毛民鮮克舉之我儀圖之維仲山甫舉之愛莫助之衮職有闕維仲山甫補之仲山甫出祖四牡業業征夫捷捷毎懐靡及四牡彭彭八鸞鏘鏘王命仲山甫城彼東方四牡騤騤八鸞喈喈仲山甫徂齊式遄其歸吉甫作誦穆如清風仲山甫永懐以慰其心詩序尹吉甫美宣王也任賢使能周室中興焉有物有則只就人説君有君之則臣有臣之則有一定而不可踰越者所以君臣各有所止自天所賦畀曰物則自民所承受曰懿徳如父子有親君臣有義物則也而人有能親且義者是止於其則者也懿徳也民其有不公好之者乎此四句只泛論以起仲山甫之生獨鍾秀氣以全其美徳也昭假二字相聯讀謂天心昭假於其下也凡上天生一賢佐其意便欲保佑天子安我生民有不偶然者仲山甫之徳徳字即應上懿徳徳字柔嘉維則則字即應上有則則字葢柔嘉原是臣之則山甫之柔嘉維其則而不過所以其徳為可稱也下令儀令色云云正其柔嘉維則處書稱文王之徳曰徽柔懿恭易亦稱文王内文明而外柔順又曰孚于嘉吉柔嘉原是臣之則令儀令色是柔嘉之象小心翼翼是柔嘉之本世未有其心稍放而能自善其儀色者古訓原是先王之則威儀原是吾身之則式古訓力威儀總本小心翼翼來所以稱柔嘉維則威儀何以下個力字抑抑威儀維徳之隅是自然而然無待勉强者苟非自然必假勉强而行是學以至於聖人事正人之所當用力者凡所以式古訓力威儀者總是順天子以承賦故𦂳接天子是若明命使賦明命者天子之命使賦者命使賦政于外也此詩專美仲山甫築城于齊故此章下明命使賦句下章下賦政于外句柔嘉維則句是總令儀令色小心翼翼是指其所為柔嘉處古訓是式威儀是力是本其所為柔嘉處天子是若明命使賦則柔嘉以順承天子事也式是百辟以下似王命之詞故下章承説肅肅王命仲山甫將之吕東萊分内外出入四叚語極冠冕可佳但命詞口氣是一串下歸重在賦政于外四方爰發恐不宜作四叚㸔首章云保兹天子此云王躬是保葢天生此人以保天子天子命之以保其躬也出納王命是政本之所係故命之賦政于外將王命在賦政于外故承邦國若否仲山甫明之既明且哲二句承上仲山甫明之來宜即就賦政爰發處説夙夜匪解二句亦即就其時經營而言方為明切上云保天子保王躬此云保其身未有其身不保而可以保其君者柔則茹之剛則吐之一節何以解凡築城立邑其勢必遷毁民居中間有强有弱其人稍無主張便曲從强者之情而獨貽弱者之害矣故下此一節見仲山甫今兹之行必有主持于胷中不吐不茹有非人所可及者矜寡與鰥寡不同矜可矜之人也寡無依之人也曰不侮矜寡則盡鰥寡孤獨而兼收若訓矜作鰥則止及鰥寡反遺孤獨矣况哀哉矜人寧不我矜詩亦屢出此矜字可亦曰哀哉鰥人乎寧不我鰥乎此雖一字之訛而有不可不辯者徳輶如毛節𦂳承上説來凡侮矜寡畏强禦之人必不能舉徳而安望其補衮維仲山甫之不茹不吐可以舉徳而補衮職之闕此當世所倚賴而愛莫能助者也補衮闕正是保王躬阿諛曲從以順其君之欲未有能保其君立於無過之地者仲山甫出祖節正其賦政于外事每懐靡及是使臣之心皇華篇亦有此句仲山甫徂齊式遄其歸二句是一篇極𦂳要語葢山甫之徳原可以保王躬補衮闕其城齊亦不得已之役耳山甫永懐維吉甫知之而望其遄歸故終曰吉甫作誦穆如清風山甫永懐以慰其心漢汲黯願出入禁闥正山甫永懐之意抑申伯之徳柔惠且直吉甫知之山甫之徳柔嘉維則吉甫知之一則作誦曰其風肆好一則作誦曰穆如清風葢不獨美此二臣以見贈慰之意實以風天下後世之為人臣者噫吉甫亦賢矣哉原缺有水患大禹甸治之矣今宣王中興其道昭然在山之下故云有倬以致美然詩人之意則實借此以形容周道之復興也韓侯受命一句宜重㸔葢諸侯繼世以士禮見於天子天子錫之命制也周衰君權不振侯度不脩宣王中興韓侯遵制來朝受命有足嘉者故詩重美之曰受命以表其克謹即曰親命以昭其特貺以見中興之復王制云纉戎以下七句皆王命之詞葢王者錫命諸侯必從其先世説起要其恪恭侯度以副至意故纉戎祖考下即儆之曰無廢朕命又勅夙夜匪懈䖍共爾位申之曰朕命不易而榦不庭方以佐戎辟則纉戎䖍共之職事也末章王錫韓侯其追其貊奄受北國故先説榦不庭方王既親命必有錫也詩人將叙錫予之隆故追叙韓侯始來之儀度及入覲合信之禮言之諸侯未受王命以士禮見而執之以為信必以介圭故曰以其介圭入覲于王此叙其未受命來朝事非已受命而更入覲也淑旂綏章是諸侯之旂常𤣥衮赤舄是諸侯之服色簟笰錯衡鉤膺鏤錫鞹鞃淺幭鞗革金厄是諸侯車馬之儀餙總之則天子錫命之寵光也故歴歴言之顯父餞之有謂出于王命者前後叙殽簌籩豆而中及路車乘馬之贈見天子之優渥光於祖餞之間非他餞之可比者侯氏不指韓侯謂當日凡在京師未去之諸侯皆與斯燕故云籩豆有且侯氏燕胥耳胥相也方叙韓侯受命天子錫命之事而更端於取妻一節何也凡臣子日用之所享何莫而非君父之所綏而况乎婚娶之禮之大行於承君錫命之後且所娶者汾王之孫蹶父之子恩光寵賁有出於尋常萬萬者所以詩人併叙之以見受命寵光之一至於此也不顯其光言徃迎之賁采也爛其盈門言入室之輝耀也蹶父為王卿士承王命出使諸國而隨便為其女擇嫁所焉故曰靡國不到為韓姞相攸川澤訏訏是總魴鱮以下則川澤之所産也曰川澤必有原隰末章原歸到韓侯受命上而以溥彼韓城接孔樂韓土畧無痕迹説燕師所完見韓初受封時承王寵錫之重欲説王錫韓侯其追其貊奄受北國却先從燕師所完以先祖受命因時百蠻説起見今日之所錫一循先朝之故典也蠻外域通稱此百蠻即追與貊也韓近追貊使時節其貢獻故上云以先祖受命因時百蠻下云因以其伯實墉實壑云云葢貔皮羆豹正百蠻之所為獻者韓侯實總領其事也首章榦不庭方以佐戎辟正在於此結局前後相照應極有法韓侯受命王錫命之是通詩綱領語王錫韓侯淑旂綏章其贈維何乘馬路車王錫韓侯其追其貊是中間血脈語江漢浮浮武夫滔滔匪安匪遊淮夷來求既出我車既設我旟匪安匪舒淮夷來鋪江漢湯湯武夫洸洸經營四方告成于王四方既平王國庶定時靡有爭王心載寧江漢之滸王命召虎式辟四方徹我疆土匪疚匪棘王國來極于疆于理至于南海王命召虎來旬來宣文武受命召公維翰無曰予小子召公是似肇敏戎公用錫爾祉釐爾圭瓉秬鬯一卣告于文人錫山土田于周受命自召祖命虎拜稽首天子萬年虎拜稽首對揚王休作召公考天子萬壽明明天子令聞不已矢其文徳洽此四國詩序尹吉甫美宣王也能興衰撥亂命召公平淮夷首章只重匪安匪遊淮夷來求二語既出而下則就車旂之盛更一敷張耳來求云者所求止此夷而無他及也淮夷一隅耳一隅有警四方皆爭擾而不平故曰經營四方告成于王四方既平四句詞雖似平而意實串下葢四方之不平在其民之有爭而王心之不寧由王國之不定也平則定而不爭而王心寧矣淮夷為梗四方因而僣據焉以亂其疆界故宣王一平淮夷即有疆理四方之命命召公辟四方徹疆土在平淮之日故首着江漢之滸句式辟四方四句是王命召虎之詞于疆于理二句是召虎承命之事纔平淮夷即為疆理之事似乎急迫而病民不知此疆土徹法是王國之所以安養斯民者此法一日不整理即一日受汙暴者肆取之虐故首及王命辟四方徹疆土而曉其意於民曰匪疚匪棘王國來極來極云者四方胥此以取中而莫敢多取也于疆于理至于南海是張美之詞第四章是追述其初命之詞來旬來宣舉其職也文武受命四句是本其世功而使知傚也肇敏戎公二句是示其爵賞而使知勸也總之則責成其經營疆理之事以起下章賞賜之恩典耳維翰是羽翰之翰非榦也戎公是公事之公非功也釐爾圭瓉六句是成功後䇿命之詞于周受命謂此䇿命必於岐周文王廟䇿之若禀命于乃祖也自召祖命令其受命必於召康公廟受之如受教於乃祖也此皆特申其典以示異使益加勸勉云上虎拜稽首二句是方承䇿命而謝祝之辭下虎拜稽首四句是歸受䇿命而勒祝之辭臣子受君寵賜無可報荅維是稱祝萬壽而已古者人臣有大功於國書之旂常載之盟府以識不忘而人臣受大君之寵命亦勒之彛鼎蘄之萬壽以申永祝兹召虎之對揚作考天子萬壽亦申永祝之意也令聞不已不必説美君之令聞而進之以不已凡君之聲聞自實徳中流出者未有不垂於永乆維是襲取之虚名則偶聞于一時耳曰令聞不已則進之之意自在矣明明天子是稱説之詞莫重㸔内脩外攘以建中興之烈令聞必垂於無窮然大君所貴者内順治耳内順治自然外威嚴有不假於征討之威者故末復致祝云矢其文徳洽此四國洽有自然淪洽意矢文徳以洽四國則四方常平王國常定時常靡爭而王心常寧矣何待武事之經營式辟之勞苦哉此召穆之頌禱為愛君之特至也于周受命自召祖命宣王之寵異同文武之命康公令聞不已矢其文徳穆公之頌祝同康公之報文武真一時君臣之盛也赫赫明明王命卿士南仲大祖大師皇父整我六師以脩我戎既敬既戒惠此南國王謂尹氏命程伯休父左右陳行戒我師旅率彼淮浦省此徐土不留不處三事就緒赫赫業業有嚴天子王舒保作匪紹匪遊徐方繹騷震驚徐方如雷如霆徐方震驚王奮厥武如震如怒進厥虎臣闞如虓虎鋪敦淮濆仍執醜虜截彼淮浦王師之所王旅嘽嘽如飛如翰如江如漢如山之苞如川之流緜緜翼翼不測不克濯征徐國王猶允塞徐方既來徐方既同天子之功四方既平徐方來庭徐方不囘王曰還歸詩序召穆公美宣王也有常徳以立武事因以為戒故稱常武云夷厲以來威靈不振號令不章幾於冺冺滅滅矣而宣王奮然中興親征淮徐之上如雷霆之驟發而日月之光昭也故詩人首下赫赫明明四字皇父是王朝之卿士南仲其大祖大師其兼官也詩欲張大宣王之親征故備述皇父之世家官爵見治軍士之鄭重云整六師是總舉之詞而詰戎兵除戎器皆脩戎之事所不可少者用兵以敬戒為主恃戎事之備而不加警勅焉未有不至於取敗者孔子論行三軍曰必也臨事而懼徐方倡亂南國不寧乆矣兹師之出端為惠此南國其主意先正了所以聿觀其成功纔説整我六師以脩我戎即承説既敬既戒惠此南國王者之意可識矣一怒安民萬全取勝所以稱王者之師王親命三公治軍事使内史命司馬以六卿副最得簡任之大體左右陳行下着戒我師旅五句何等約束葢此師專省徐方秋毫無犯是所謂既敬既戒惠此南國者應照上章一氣㸔省此徐土一省字下得極妙四方之生靈皆吾之赤子也此徐獨倡亂而禍我生民吾寧恝然不一省視乎漢文帝詔曰民阽於危亡而莫之省憂正是此個省字三事就緒言三農不失業也老子曰兵之所處荆棘生焉一遲留一居處便遺毒於生靈湯師之至曰歸市者不止耕者不變此云不留不處三事就緒王者之師真同一轍赫赫業業節言大師啓行之先聲王奮厥武節言皇靈所嚮之威勢王師嘽嘽節則言王師之無敵而徐方之不足平也赫赫業業二句言威靈氣燄烜赫盛大而天子之威嚴不可犯也徃來相續曰紹逍遙自得曰遊匪紹匪遊言非徃來逍遙以為事也紹訓紏𦂳也未當王舒保作是不疾匪紹匪遊是不徐地方相繼不安靖曰繹騷王師專為徐方繹騷而作故一出而震驚徐方如雷如霆則天威不可犯而繹騷其自解矣故又倒下一語曰徐方震驚玩如震如怒四字見天道原未嘗震也王者原未嘗怒也時震而震時怒而怒而過則無事也鋪敦二句是陳師截彼二句是止旅王師嘽嘽承上節説來如飛如翰以下註極明濯征云者洗滌其汚穢而咸與之維新也王猶猶字即克壯其猶猶字不應作道字解亦不指平日説就今日如是而命令如是而敬戒如是而奮武如是而濯征王者之謀猷真有充塞於兩間者徐方其敢違命乎此既來既同而不敢自外於天子也來對背叛言同對渙異言平對動擾言凡卿士之敬戒左右之陳行皆天子精神之所奮故不曰諸侯之功曰天子之功六師之出征徐也而實為定四方計今四方既平徐方來庭而不囘則王師可以返矣王命卿士是行乎其所不得不行王曰還歸是止乎其所不得不止所以稱王者之師瞻卬昊天則不我惠孔填不寧降此大厲邦靡有定士民其瘵蟊賊蟊疾靡有夷届罪罟不收靡有夷瘳人有土田女反有之人有民人女覆奪之此宜無罪女反收之彼宜有罪女覆説之哲夫成城哲婦傾城懿厥哲婦為梟為鴟婦有長舌維厲之階亂匪降自天生自婦人匪教匪誨時維婦寺鞫人忮忒譖始竟背豈曰不極伊胡為慝如賈三倍君子是識婦無公事休其蠶織天何以刺何神不富舎爾介狄維予胥忌不弔不祥威儀不類人之云亡邦國殄瘁天之降罔維其優矣人之云亡心之憂矣天之降罔維其幾矣人之云亡心之悲矣觱沸檻泉維其深矣心之憂矣寧自今矣不自我先不自我後藐藐昊天無不克鞏無忝皇祖式救爾後詩序凡伯刺幽王大壊也幽王之大壊在維婦寺之聽若設罔罟以待天下而君子逺遁國事終不可為者故首云罪罟不收後云天之降罔則不我惠之我詩人代其民自我也故承孔填不寧句此填字即倉兄填兮之填言悲傷填塞於胸中而不自寧天復降此大厲也召旻篇孔填不寧句亦宜如此㸔瞻卬昊天六句逓逓相承説蟊賊蟊疾纔指其人言之罪罟不收纔指其事言之蟊賊正指婦寺言召旻云蟊賊内訌昏㭬靡共即是此意人有田土四句像應蟊賊蟊疾二句此宜無罪四句像應罪罟不收二句然愚細玩蟊賊蟊疾四句原歸重到罪罟不收二句上則此之有土田奪民人當亦奪其所可憎而有之亦罪罟之意也如此㸔方與下文天之降罔相照應土田民人皆諸侯之所受也彼實未嘗有大過但一不快於蟊賊則毛舉其罪奪而有之是所謂此宜無罪女反收之者也奪其所憎而反收之則必庇其所喜而覆悦之矣所謂罪罟不收靡有夷瘳者葢如此婦人無所事哲一句極好婦人而用其哲未有不喪其家國者葢婦人之哲決是小有才而非君子之大道也若明於大道則必不干與於外之公事矣安得階亂哉懿厥哲婦懿字極下得好哲婦尤物也而加懿之干權與政其誰能禦之此為梟為鴟而必至于傾城也書曰牝鷄之晨維家之索此曰婦有長舌維厲之階皆千古之烱戒維厲之階正應前降此大厲之厲字匪教匪誨時維婦寺言維此二項人匪可以善言教誨之也註反謂其言雖多非有教誨之益曽有正人君子取益於婦寺者乎鞫人之鞫是推勘到底之説凡婦寺小人推鞫人直窮到底總是忮害奸忒之心之所為也故曰鞫人忮忒譛始竟背一句始與竟相對㸔言小人鞫人忮忒其始也譛毁此一人矣其竟也必到覆背善詈處更不容貸此其駕禍也豈曰不極乎而彼猶自餙曰此其所自取耳伊胡為慝乎葢窮鞫其人至于極而終必不自承認也此不極二字即桑柔篇罔極二字此伊胡為慝一語即桑柔篇匪予二字之義恐非若註所云云也朱子於巧言篇之僣始音作譛於此篇之譛始又音作僣吾不知其何説也如賈三倍君子是識正照上人有土田民人奪且有之㸔婦無公事休其蠶織則直指其與政撓權以階厲者言非以上二句起下二句也要認得明易家人曰利女貞六二曰无攸遂在中饋婦人於中饋蠶織外豈有餘事哉乃今休其蠶織而維公事之攸遂寧不階厲而傾城哉天何以刺神何不富二何字極提得警惺介狄即女戎也天之刺神之不富全在王之蠱惑女戎上顧乃舍彼而維賢人君子之胥忌何為哉遇災而不正而又自放其威儀賢人君子之逺去亂將不可救藥矣此詩人所深憂而致嘆也謝疊山曰國有賢才如一身之元氣元氣亡則身喪賢人亡則國危殄如脈絶瘁如身危下篇維昔之富云云正是神之不富處維予胥忌本鞫人忮忒來故承説人之云亡邦國殄瘁又再言天之降罔人之云亡此二章是所謂痛哭流涕而又加之長太息者也無忝皇祖一語有深意太姒之嗣徽文王之刑于寧有如今日之所為者乎吾求其無忝則必反今日之所為而人未必不我輔矣所謂尚可救藥者詩人之所為深注望也旻天疾威天篤降喪瘨我饑饉民卒流亡我居圉卒荒天降罪罟蟊賊内訌昬椓靡共潰潰囘遹實靖夷我邦臯臯訿訿曽不知其玷兢兢業業孔填不寧我位孔貶如彼歲旱草不潰茂如彼棲苴我相此邦無不潰止維昔之富不如時維今之疚不如兹彼疏斯粺胡不自替職兄斯引池之竭矣不云自頻泉之竭矣不云自中溥斯害矣職兄斯𢎞不烖我躬昔先王受命有如召公日辟國百里今也日蹙國百里於乎哀哉維今之人不尚有舊昊天疾威猶可言也旻天垂愍於下民亦若此其疾威乎且降喪而云篤皆詩人之用意下字處首章歸咎旻天汎言饑饉流亡之可憫次章蟊賊内訌昬椓靡共云云則直指其時事言見天降罪罟一至于此不獨饑饉流亡卒荒而已者天降罪罟即前之罪罟不收天之降罔也蟊賊是狀其害昬椓是狀其人囘遹是狀其心術兢兢業業孔填不寧正照臯臯訿訿㸔一何如其囘遹而莫知其玷也一何如其恪共而莫安其位也上篇所云此宜無罪女反收之彼宜有罪女覆悦之正於此章見得潰茂潰字不作遂字解潰亂也潰茂者潰亂而叢生之謂也如彼歲旱二句一直下如彼棲苴一句又形容草之不潰茂也我相此邦無不潰止句正應潰潰囘遹二句語云有治人無治法曽有用亂人而有治法者乎邦之潰止宜矣維昔之富四句註極好彼䟽斯粺一句正説今兹之疚民無稻梁維疏粺之是食也何以作君子小人之分解䟽草􅂼也粺䄺稗也皆非穀實饑饉時不得已而食之者彼斯二字對言即彼此二字皆指當日之民説彼有不穫穉此有不歛穧維昔之富也彼䟽斯粺維今之疚也胡不自替不是小人不自替以避君子職兄斯引亦不是我心專為此故至于愴怳引長愚謂替字正與引字對兄長也維昔之富不如時維今之疚不如兹至于民維䟽粺之是食是何神之不富一至於此哉葢潰潰囘遹者用事之所致也到此光景宜亦知自省矣胡不自替且專為充長日缺而勿替也愚謂此皆是罪在位者之意恐非缺所云云也敢問高明或曰倉兄填兮兄字作况字解此何以泥作缺曰凡讀詩當求其正義必據其本字本字必不可解然後别借他字通之如倉兄之類是也若此替字與引字本相應而兄字含有充長引長意則就本字解未為不通而何必照倉兄兄字一律解耶正如為龍為光我龍受之可作龍字解獨怪拘儒必與受天之龍一律俱作寵字解也或又曰兄作長字解不亦太巧乎恐詩人未必然者曰虞書曰凡官占惟先蔽志昆命於元龜昆始也書何不下始字必用昆字耶古人命辭偶爾亦多有巧處書可以用昆字詩亦可以用兄字而况乎兄字之可解乎而况乎本文之原非况字乎固不必嫌其巧而反就其拙也池之竭矣四句註亦善愚猶有未然者凡王者盡四海之民納之􅉼濡之域若池之􅉼育小鮮也必其頻無朘削中多湧溢而後池與泉兩無竭也今在位之臣則多朘削之政矣池之竭也豈曰不自頻乎且又無因心之施矣泉之竭也豈曰不自中乎而初不任其咎也大溥其害於天下如云弗克專日充長而𢎞大焉寧不烖及于我之躬乎愚謂如此㸔與上胡不自替職兄斯引與下日蹵國百里似相聨屬若謂上四句是喻禍亂之所從起而今不云然猶亦可通若下三句既謂我心專為此故倉怳日益𢎞大又憂之曰是豈不烖及我躬覺多轉摺不直截且十月之交云職競由人巧言云職為亂階桑柔云職凉善背職競用力職盗為寇皆主小人説則此之職兄斯引職兄斯𢎞亦必主小人説無疑者讀甘棠之詩則知召公之溥其澤於民者深矣所以日辟國百里讀召旻之詩則知小人之溥其害於民者𢎞矣所以日蹙國百里書曰撫我則后虐我則讐亶然乎固不可徒咎犬戎之内侵諸侯之外畔也幽王去宣王中興不逺國必有耆舊之人特闕者舎兢兢業業之臣而維臯臯訿訿之任此闕所以莫可救也此篇當參桑柔瞻卬二篇㸔重訂詩經疑問卷十
