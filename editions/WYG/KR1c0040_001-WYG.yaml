body:
  text: 重訂詩經疑問卷一明姚舜牧撰周南闗闗雎鳩在河之洲窈窕淑女君子好逑參差荇菜左右流之窈窕淑女寤寐求之求之不得寤寐思服悠哉悠哉輾轉反側參差荇菜左右采之窈窕淑女琴瑟友之參差荇菜左右芼之窈窕淑女鐘鼓樂之詩序闗雎后妃之徳也風之始也所以風天下而正夫婦故用之鄉人焉用之邦國焉註從之朱子論作詩曰闗闗雎鳩出在何處是則然矣然雎鳩之情摯而有别却闗闗和鳴於河洲之上匹配之正聚處之宜誰其似之是皆今人擬討之所不能及者作詩不本諸此豈非杜撰乎詩緝云凡言興也者皆兼比極有見按疏云淑女所居之宫形狀窈窕故箋言幽閒深宫註幽閒之意本此然只淑之一字已足以盡女徳矣何必假窈窕以形容作居處看似與在河之洲為有情此淑字下得極佳文王之徳盡於一敬字后妃之徳盡於一淑字敬則自强不息純亦不已便是个乾之健淑則幽閒貞靜足以配至尊奉宗廟便是箇坤之順故曰窈窕淑女君子好逑下二章皆本此二句來讀大明篇文王初載天作之合以下見后妃之生誠天黙定文王之配以開周家之祥有不偶然者所以稱窈窕淑女君子好逑荇菜出水中無纎毫塵垢流而采采而芼可以薦神明故取以起興流則無定主而宜求故興寤寐求而備道其憂思之深采則已擇取而將用矣不啻琴瑟之在御也故應以琴瑟友芼則已就烹而用薦矣不啻鐘鼔之在懸也故應以鐘鼔樂參差擬其生出之有倫左右言其取用之致謹輾轉反側非實有此事只形容其思服之悠悠一至于此耳琴瑟友鐘鼓樂亦然闗雎之詩不作於文王而作於宫中之人所以云樂而不淫哀而不傷程子曰有闗雎麟趾之心然後可行周官之法度於此詩何以見得葢凡紀綱法度之施皆本於精神心術之運文王后妃相配合全是以徳為倡和而絶非宴私昵狎之情好所以鍾英毓瑞篤生武王周公順天應人以啓無疆之厯服制禮作樂以開萬世之太平也自古治國平天下有外修身以齊其家者乎而修身齊家實本此心之雝肅來觀思齊篇云雝雝在宫肅肅在廟可以識闗雎麟趾之心得周官法度之本矣匡衡前後註俱當玩誦葛之覃兮施于中谷維葉萋萋黄鳥于飛集于灌木其鳴喈喈葛之覃兮施于中谷維葉莫莫是刈是濩為絺為綌服之無斁言告師氏言告言歸薄汚我私薄澣我衣害澣害否歸寧父母詩序葛覃后妃之本也語未明詩傳太姒將歸寧而賦葛覃是此詩本為歸寧而作乃賦葛覃而追叙於初夏之時爰及於盛夏之際葛已成而服無斁始告師氏以言歸葢必敬必戒無違夫子禮之正也歳一歸寧禮之以情起者也念歸寧而不迫時紡績而不偷而其鳴喈喈雝然有和鳴之意服之無斁帖然有服事之忱言告師氏纎毫無自専輒之念此其徳極幽閒極柔靜宜配君子而可以承神明之統理萬物之宜歟已貴而能勤等語恐非本詩之㫖註既成絺綌而賦其事亦恐未然也敢正髙明初葛時即有歸寧之意矣乃必待成絺綌而言歸所謂人歸落雁後思發在花前也首章是叙葛初生時之光景黄鳥飛鳴亦就其時所見聞者入詠耳然宫闈中一段雝雝和處之意已不覺其溢於詞端矣服之無斁有安焉終焉之意輔氏曰薄汚薄澣不為甚飾之辭害澣害否又見不苟之意言告師氏是已告師氏言告言歸使師氏告于文王此可見禮度之雍容矣周初時為絺為綌服之無斁其衰也婦無公事休其蠶織嗟乎此女徳有闗於化理不小小也采采卷耳不盈頃筐嗟我懷人寘彼周行陟彼崔嵬我馬虺隤我姑酌彼金罍維以不永懷陟彼髙岡我馬𤣥黃我姑酌彼兕觥維以不永傷陟彼砠矣我馬瘏矣我僕痡矣云何吁矣懷人懷字極妙懷者懷諸心而不能舍也故下章曰永懷曰永傷又曰云何吁傷深于懷而吁又深于傷也總本一懷字崔嵬至髙者髙岡次之砠又次之大註思念二字極妙后妃當采卷耳時懷望文王之歸終莫能釋也故托言采卷耳又托言登髙又托言飲酒耳非實有此事也吁字正應前嗟字嗟我懷人而不能釋故自訝其云何而不覺其長嘆息之深也婦人從一而終故其夫在則服之無斁其夫不在則嗟我懷人葢其所服事所懷思唯此人也此之謂貞靜而不動於邪専一而不失其常也若後世如齊同行如莒同往固其夫失刑于之教抑其婦徳之不良哉以上特據註為解耳若謂后妃思念文王而作通是託言則何事託到采卷耳直至陟崔嵬酌金罍永懷永傷若是其已甚耶諺云南人不夢車北人不夢船后妃即念文王跋陟于山水然崔嵬髙岡目所未覩身所未歴豈應以夢想不及語形之咏嘆至此耶若詩序謂此詩后妃之志也又當輔佐君子求賢審官知臣下之勤勞詩緝因言后妃主酒漿之事故因采卷耳而念使臣之勞直矜念其道路之跋涉嗟乎宫中矜念乎外臣何便一至於此耶且即卷耳之采恐非后妃之所宜親也即宫中女伴恐亦未有出采卷耳於中野也詩本人情託言矜念恐皆未得此詩之㫖唯詩傳云文王遣使求賢而閔行役之囏也勞之以卷耳似為稍近然采采卷耳口吻實出於婦人豈上之人體行役者室家之懷思而代為之詠耶若金罍兕觥似亦其室家待行役者之歸將酌之以釋其懷且傷也云爾姑存之以備一説南有樛木葛藟纍之樂只君子福履綏之南有樛木葛藟荒之樂只君子福履將之南有樛木葛藟縈之樂只君子福履成之樛木屈曲而下垂后妃無嫉妬而能逮下故詩人以樛木興樂樂易也和樂也凡樂易的人處人自和樂為衆所親就富貴必綿延子孫必盈衍此便是福履之綏福履之將福履之成此君子即聖人君子之稱故男與婦皆可稱之福履二字聨讀履字不作禄字解易曰視履考祥其旋元吉凡考人之善否莫良於所履其人誠善吉祥不期而自集是之謂福履也綏即寵綏之綏纍延繫也荒則蔓繞而莫分縈則糾結而莫解綏寵賚也將則承奉而莫知成則混合而無閒禮天子后立六宫三夫人九嬪二十七世婦八十一御妻無非所以重神靈廣嗣續也故五日之御禮有定制後世如趙飛燕武曌等専寵妬下卒致禍水滅火逐燕摘𤓰之辭至今令讀者酸鼻視樛木葛藟之詠真天淵哉詩序樛木后妃逮下也註從之詩傳南國諸侯慕文王之徳而歸心于周賦樛木今覽三章皆稱君子傳較勝于序也存之螽斯羽詵詵兮宜爾子孫振振兮螽斯羽薨薨兮宜爾子孫繩繩兮螽斯羽揖揖兮宜爾子孫蟄蟄兮詩傳周人慶文王之多男而賦螽斯詩序后妃子孫衆多也言若螽斯不妬忌則子孫衆多也文王之刑于后妃之逮下兩得之矣詩緝訓振振為盛義較是取象於螽斯當矣而何取於羽羽羽翼也螽斯一生九十九子后妃一人耳安能生若是之多唯是恩養衆妾若卵而翼之者然故其生出衆多而未艾也細味宜爾子孫一宜字便見此一羽字甚重不可忽矣陳氏曰言羽者螽斯羽蟲也無羊之詩羊言角牛言耳狀物類者皆如此嗟乎此之謂腐儒也無羊言羊之角正咏其角之濈濈也言牛之耳正咏其耳之濕濕也則此詩之言羽正咏其羽之詵詵也且豈直此哉魴魚赬尾則尾有取義矣相鼠有皮則皮有取義矣肅肅鴇羽蜉蝣之羽則各有取義矣甚即䑕牙雀角雖無是事而其言亦自有所謂曾謂此下一羽字而獨無所取義哉嗟乎此之謂腐儒也詵詵似擬其羽之柔和薨薨似擬其羽之展舒揖揖似擬其羽之斂戢總之則翼庇羣妾而無妬忌之害也振振狀其生之多且仁繩繩又狀其嗣生而不窮蟄蟄又狀其含生而不盡此蟄字即龍蛇之蟄蟄字易曰夫坤其靜也翕其動也闢是以廣生焉薨薨是其動之闢也揖揖是其靜之翕也是皆有生意存焉故其下曰繩繩兮蟄蟄兮桃之夭夭灼灼其華之子于歸宜其室家桃之夭夭有蕡其實之子于歸宜其家室桃之夭夭其葉蓁蓁之子于歸宜其家人詩傳周人美后妃之徳終始婦道賦桃夭詩序桃夭后妃之所致也不妬忌則男女以正婚姻以時國無鰥民也國無鰥民而家室咸宜是為婦道之始終傳序初不相戾也桃先華次實而葉始茂暢故其詠有次第男女尚乎徳容故云灼灼其華婚姻主乎嗣續故云有蕡其實家人賴於蔭庇故云其葉蓁蓁室家家室雖取叶韻而亦稍有别男子生而願為之有室得賢内助和於閨門矣故云宜其室家妻子好合父母其順矣乎佳兒佳婦一家之福也故曰宜其家室女正位乎内男正位乎外大小上下分定而情洽矣故又曰宜其家人肅肅兎罝椓之丁丁赳赳武夫公侯干城肅肅兎罝施于中逵赳赳武夫公侯好仇肅肅兎罝施于中林赳赳武夫公侯腹心詩傳文王得良臣于野周人美之賦兎罝詩序兎罝后妃之化也闗雎之化行則莫不好徳賢人衆多也似大逺既稱兎罝之人其才可用於世是賦不是興肅肅是敬的意思兎罝之人安識所謂敬乃其被化之深即一設罝之際有致謹而不敢苟者即此肅肅而為赳赳之武這便是有勇而知方者所以許其為公侯之干城公侯之好仇公侯之腹心不然此一獵狩之武夫耳何干城好仇腹心之足云詩緝訓干城為勇而忠訓好仇為勇而良訓腹心為勇而智甚有理蓋干城其捍禦好仇其匹偶而腹心其可與機密者也采采芣苢薄言采之采采芣苢薄言有之采采芣苢薄言掇之采采芣苢薄言捋之采采芣苢薄言袺之采采芣苢薄言襭之詩傳文王之時萬民和樂童兒歌謡賦芣苢詩序芣苢后妃之美也和平則婦人樂有子按本草芣苢宜子較尤得之詩緝謂采而聚之於地既為己有於是就地掇拾之捋取其子由是袺而執其袵由是襭而扱袵於帶間語極有次第此婦人嬉逰事耳曷見其相樂也曰有女仳離啜其泣矣啜其泣矣何嗟及矣即欲為芣苢之采其可得乎故讀采采芣苢之章則知其娛樂而莫知讀中谷有蓷之章則知其愁苦而無奈南有喬木不可休息漢有游女不可求思漢之廣矣不可泳思江之永矣不可方思翹翹錯薪言刈其楚之子于歸言秣其馬漢之廣矣不可泳思江之永矣不可方思翹翹錯薪言刈其蔞之子于歸言秣其駒漢之廣矣不可泳思江之永矣不可方思詩傳文王化行南國男女知禮詩人美之賦漢廣詩序漢廣徳廣所及也文王之道被于南國美化行乎江漢之域無思犯禮求也意同樹蔭可休而喬木竦拔則無蔭可休游女可求而禮義自守則無隙可求潛行曰泳桴筏曰方皆有深意在據首章漢猶有游女也次章三章云之子于歸無復有出游者也翹翹錯薪喻衆女之髙潔其楚者其蔞者皆為人所刈將來無復可休息之望矣正應上南有喬木二句之子于歸自有秣其馬者自有秣其駒者以禮親迎非復昔日出游之可望見矣豈可以非禮犯哉漢之廣矣四句總咏不可求之意記曰男有分女有歸今之子及笄未及笄者皆有歸而無復有出游者故言刈其楚復言刈其蔞言秣其馬復言秣其駒言物各有主非直楚不可刈蔞亦不可刈也女各有歸匪直馬不可秣駒亦不可秣也一節深一節遵彼汝墳伐其條枚未見君子惄如調饑遵彼汝墳伐其條肄既見君子不我遐棄魴魚赬尾王室如燬雖則如燬父母孔邇條枚條肄言時物之變也未見君子惄如調飢何懷之甚既見君子不我遐棄何幸之深乃慰勞之詞維曰魴魚赬尾王室如燬云云忘如燬之暴虐懷孔邇之深恩此可以觀文王徳化之所感矣詩序汝墳道化行也文王之化行乎汝墳之國婦人雖閔其君子猶勉之以正也詩傳受辛無道商人慕文王而歸之賦汝墳亦一説惄言此心之怵惕也小弁亦云惄焉如𢷬如飢如𢷬皆狀此心之惄惄也此訓飢意小弁訓思也俱未當麟之趾振振公子于嗟麟兮麟之定振振公姓于嗟麟兮麟之角振振公族于嗟麟兮詩序麟之趾闗雎之應也闗雎之化行則天下無犯非禮雖衰世之公子皆信厚如麟趾之時也詩傳周人美其公子之多仁也賦麟趾較直截麟之徳在趾之不踐生草不履生蟲在定之不以抵在角之不以觸故以起興振振者生而仁厚之稱中原呼臀為定定者臀也臀坐著則定如易稱艮其背曰艮其止止即背也若訓定作額則與角相去不逺矣且與趾甚相懸也詩人取義當不若是之無序存之以告通方者吁嗟麟兮有大咀嚼詩人意若曰世稱麟徳則以其趾矣乃振振公子生而仁厚而克世其徳吁嗟乎此真是箇麟而麟之趾不足稱也猶人稱說金銀是寶生有好兒子秀出等夷此是活寶而金銀又不足寶也此似深一層意公子子也公姓孫也公族子孫之蕃衍成族者始公子次公孫次公族即後世所謂子孫賢族將大之意召南維鵲有巢維鳩居之之子于歸百兩御之維鵲有巢維鳩方之之子于歸百兩將之維鵲有巢維鳩盈之之子于歸百兩成之詩傳公子歸于諸侯國人觀焉賦鵲巢詩序鵲巢夫人之徳也國君積行累功以致爵位夫人起家而居有之徳如鳴鳩乃可以配焉世稱婦徳不稱婦才婦以才名非善事也詩象鳩性拙而居成巢極當風人意在言外凡言人之賢但稱其服飾之美此言夫人之徳亦但稱其坐享成業是其徳足以稱自見于言外矣非文王修齊之化何以致此百兩之御亦云之子于歸者迎之子之來歸也車必有御即往迎者稱御亦可何必轉音云迓耶方方所也盈言其從之多即韓奕所謂爛其盈門者成言其禮之備謂昏禮至此是為遹觀厥成也百兩之送迎總是重其禮不重其物于以采蘩于沼于沚于以用之公侯之事于以采蘩于澗之中于以用之公侯之宫被之僮僮夙夜在公被之祁祁薄言還歸詩傳諸侯之夫人勤於親蠶國人美之賦采蘩蘩非所以生蠶者詩序采蘩夫人不失職也夫人以奉祭祀為職是采蘩采蘋未必諸侯夫人大夫妻之躬為采但本其齊恪以奉祀若身徃為之而克致其潔清云爾被之僮僮于以奠之則是其所身致者末章上二句是趨事有恪下二句是去事有儀總之則誠敬以奉祀也祭貴誠不貴物沼沚之毛可薦於王公可羞於鬼神誠為主也不然亦物耳安足貴哉詩稱蘋蘩易稱用禴葢知所重矣喓喓草蟲趯趯阜螽未見君子憂心忡忡亦既見止亦既覯止我心則降陟彼南山言采其蕨未見君子憂心惙惙亦既見止亦既覯止我心則説陟彼南山言采其薇未見君子我心傷悲亦既見止亦既覯止我心則夷詩傳南國之大夫聘于京師睹召公而歸心焉賦草蟲詩序草蟲大夫妻能以禮自防也似不如傳然註從序久矣亦姑從之草蟲之鳴阜螽之趯蕨薇之生時物亦云變矣乃其妻思念君子始終一心兹可見其性情之正得於聖化之所被者深也不獨曰見止又曰覯止覯則始叙其勞苦致其綢繆而往昔之懷念俱可釋也故曰則降則説則夷然此皆未見君子時懷想其必至此而後可也要識得謝疊山曰惙惙憂之深不止于忡忡矣傷則惕然悲則哀不止于惙惙矣此未見之憂一節緊一節降則心稍放下悦則喜動於中夷則心平氣和此既見之喜一節深一節讀采采卷耳之詩見后妃之思其君子也一而不他讀喓喓草蟲之詩見大夫妻之思其君子也一而不他讀汝墳殷其靁之詩見行役者之妻思其君子也一而不他此所謂發乎情止乎禮義者此所謂風之正者歟于以采蘋南澗之濱于以采藻于彼行潦于以盛之維筐及筥于以湘之維錡及釡于以奠之宗室牖下誰其尸之有齊季女詩傳内子勤于祭祀國史美之賦采蘋詩序采蘋大夫能循法度也大夫妻稱内子能循法度則莫要于承祭矣首章叙其采次章叙其盛且湘末章叙其奠極有次第蘋藻之采常物耳筐筥之盛錡釡之湘常器耳宗室牖下之奠常儀耳唯尸之有齊則誠敬之為可尚也左傳云苟有明信澗溪沼沚之毛蘋蘩蕰藻之菜筐筥錡釡之器潢汙行潦之水可薦於鬼神此一段説得極好記曰祭也者必夫婦親之所以備内外之官也故采蘩之詩稱被之僮僮夙夜在公此章稱誰其尸之有齊季女蔽芾甘棠勿翦勿伐召伯所茇蔽芾甘棠勿翦勿敗召伯所憩蔽芾甘棠勿翦勿拜召伯所説詩序甘棠美召伯也召伯之教明于南國詩傳召康公勤于勞民燕人懷之賦甘棠語更直截翦必加之伐故云勿翦勿伐翦必致其敗故云勿翦勿敗翦必令之拜故云勿翦勿拜拜下垂也凡人翦樹之枝葉其勢必拜垂於下今蘇庠范文正公手植柏有木撑柱其下使之不垂是勿翦勿拜之一証也或曰翦與剪異剪方可剪其枝葉翦安得翦其枝葉哉翦射也傷也總言勿傷勿伐勿敗勿拜也云耳説即解悦字為是悦故茇于斯憩于斯也如音税而解作舍則前茇字已云草舍矣將舍而復舍乎書召公告武王戒其狎侮小人告成王欲其諴於小民則其當時布徳於南國槩可想見矣此所以去後有甘棠之思厭浥行露豈不夙夜謂行多露誰謂雀無角何以穿我屋誰謂女無家何以速我獄雖速我獄室家不足誰謂鼠無牙何以穿我墉誰謂女無家何以速我訟雖速我訟亦不女從詩傳埜人强昏不得而訟女人終拒之賦行露詩序行露召伯聴訟也召伯時何有此彊暴侵陵之事葢紂之舊染猶存而文王之化猶未純被之日也自非召伯之明聴貞女之志其曷以自明乎禮女子夜行必以燭况道間之行可夙夜乎謂行多露辭婉而拒嚴矣就穿屋看來若謂雀有角矣而實無角也就穿墉看來若謂䑕有牙矣而實無牙也就速獄看來若謂女於我曽有室家之事矣而實無家也六禮不備貞女不行雖速我獄而室家不足我肯女從乎哉此與下章宜統看始之淫亂也不有其躬而今則惟恐其沾濡雖召致獄訟而必不苟與也非禮義之克閑何以有此謂行多露恐其身之或濡也室家不足責其禮之未至也亦不女從決其合之不苟也羔羊之皮素絲五紽退食自公委蛇委蛇羔羊之革素絲五緎委蛇委蛇自公退食羔羊之縫素絲五總委蛇委蛇退食自公詩序羔羊鵲巢之功致也召南化文王之政在位皆節儉正直徳如羔羊也朱子因本是説著此四字而俗儒又將此四字分解此四句可哂之極詩傳大夫貞而能儉忠于公室國史美之賦羔羊註衣服有常而從容自得體得明曰皮曰革曰縫皆有謂曰皮則有毛附麗在曰革則毛毨而鞟存也曰縫則革敝而縫見也五紽五緎五總皆云素絲是所謂表裏一於素者也晏子一狐裘三十年必希革而縫見矣是下皮字革字縫字之一証也補傳曰合五羊之皮為一裘循其合處以素絲為英飾也錢氏曰兩皮之縫不易合故織白絲為紃施之縫中連屬兩皮因以為飾是紽縫飾緎其界而總其合也故統名曰紽而及見革之合異為同處則曰緎見縫之聨結莫解處則曰總耳書畢命曰兹殷庶士席寵惟舊怙侈滅義服美於人驕淫矜侉將由惡終俗之不良可想也一旦文王先之以卑服道之以敬止曽未幾時而在位者皆如此此所謂聖神感化之妙也殷其靁在南山之陽何斯違斯莫敢或遑振振君子歸哉歸哉殷其靁在南山之側何斯違斯莫敢遑息振振君子歸哉歸哉殷其靁在南山之下何斯違斯莫或遑處振振君子歸哉歸哉詩序殷其靁勸以義也召南大夫逺行從政不遑寧處其室家能閔其勤勞而以義勸焉易曰地雷復又曰夫征不復曰無徃不復靁收而發聲是一陽之復也夫征而不復婦人能無深念乎故觸雷而起興息休息也處居處也無大别但首章云莫敢或遑次章復申一敢字三章復申一或字耳摽有梅其實七兮求我庶士迨其吉兮摽有梅其實三兮求我庶士迨其今兮摽有梅頃筐塈之求我庶士迨其謂之通章當重看一求字懼時之過而必待士之求乃為女子之正謂之者致詞於媒妁傳言於父母也女子以身事人少有㸃汚終身之辱也要識此女子非是急於歸惟欲珍託此身於良人可免或然之辱耳桃夭婚姻之期也梅落則愆其期矣故以摽梅見賦詩序摽有梅男女及時也紂時淫風盛行召南被文王之化女子待嫁以免或然之辱是矣申公詩説摽有梅女父擇壻之詩却本詩傳闕文中一擇字來大有理葢擇必求一佳偶此詩三言求我庶士也嘒彼小星三五在東肅肅宵征夙夜在公寔命不同嘒彼小星維參與昴肅肅宵征抱衾與裯寔命不猶詩傳小臣奉使而勤勞于公賦小星詩序小星惠及下也夫人無妬忌之行惠及賤妾進御于君知其命有貴賤能盡其心矣較勝禮妾御莫敢當夕夫人惠下而命妾進御於君故以肅肅宵征為幸宵征而曰肅肅可以占進御之共恪矣三五在東正夙夜在公之候維參與昴乃抱衾與裯之時此所謂見星而往見星而還不敢當夕者也女徳無極婦怨無終安知所謂命哉肅肅宵征而一安於命蓋不獨其夫人賢也衆妾於是乎不可及矣江有汜之子歸不我以不我以其後也悔江有渚之子歸不我與不我與其後也處江有沱之子歸不我過不我過其嘯也歌詩序江有汜美媵也勤而無怨嫡能悔過也詩傳諸侯之夫人終容其媵也賦江有汜葢兩得之矣江猶有汜有渚有沱也嫡可無媵妾之從乎故以起興以是用其人與是偕之行過則往其家之謂也其嘯也歌承悔且處説悔且處則其嘯也歌矣初時不我以則不與之往過其家既悔其不以則必處之得所而共歌於其室野有死麕白茅包之有女懷春吉士誘之林有樸􅈪野有死鹿白茅純束有女如玉舒而脱脱兮無感我帨兮無使尨也吠詩傳云野人求婚而不能其禮女氏拒之賦野有死麕詩序云惡無禮也是時天下大亂彊暴相陵遂成淫風被文王之化雖當亂世猶惡無禮也故三章次第由淫而漸制於禮能拒無禮者之所犯也此詩美女子之守然首章曷云懷春而致誘乎其初猶仍乎淫風也次章云有女如玉不及懷春則非復白茅之可包矣後終拒之云舒而脱脱兮無感我帨兮無使尨也吠則凛然禮義之閑是感於聖化之深也曷以野有死麕興鹿善淫懷春之女淫而無復人心是死麕之在野人得而包之者也何怪乎吉士之誘哉首章全是罪女子詩曰無忝爾所生懷春之女若死麕之在野也亦可自愧死矣易曰藉用白茅旡咎吉士之誘若用白茅以包死麕也亦可自汗顔矣次章又以林有樸􅈪句興野有死麕白茅純束句又詩之一體也林有樸􅈪不成材者也但言有女如玉則其人之懷春乎不懷春乎未可度思也至拒之舒爾脱脱兮云云則其帨不可動也其尨不可警也况可得而及其身乎此之謂凛然不可犯也陶其情云愚按此詩不可得其解若解為正風豈有貞女而吉士可誘者讀首二章有野有蔓草之意焉若卒章則墮落淫䙝暗約之蹊竇矣何彼穠矣唐棣之華曷不肅雝王姬之車何彼穠矣華如桃李平王之孫齊侯之子其釣維何維絲伊緡齊侯之子平王之孫通章重肅雝二字肅雝曷徵於王姬之車蘧伯玉車聲轔轔識者知其為君子是肅雝以執婦道即下嫁之車可以豫識之也次章是美其同芳三章是美其相合皆非肅雝不能致此女尚徳容故何彼穠矣華如桃李下先言平王之孫次之以齊侯之子禮男先于女故其釣維何維絲伊緡下先言齊侯之子次之以平王之孫詩傳齊襄公闕王周人恥之賦何彼穠矣列之小雅照平王之孫看亦是但此詩今列之召南即據詩序云美王姬也亦可然平王解平正天下之王終屬牽强闕疑可也彼茁者葭壹發五豝于嗟乎騶虞彼茁者蓬壹發五豵于嗟乎騶虞詩傳虞人克舉其職國史美之賦騶虞詩序騶虞鵲巢之應也鵲巢之化行人倫既正朝廷既治天下純被文王之化則庶類蕃殖蒐田以時仁如騶虞則王道成也一發而五豝五豵言發之者少而取之者多也愚竊以為不然一發矢耳安能命中若是之多得哉所謂發者發生也發育也豝與豵微物耳乃一發生發育至於五豝五豵之多焉則他獸之生生者可知矣故上言葭與蓬亦以草木之微者論言草木若是其蕃殖禽獸若是其化生真有取之不盡而用之不窮者故以為真騶虞也云爾若註所云未敢謂是也敢問髙明騶虞不食生物所全有幾王者仁育萬物至於生生不窮斯方是天地覆載之仁吁嗟乎騶虞葢謂騶虞之不足稱也此照前吁嗟麟兮看亦深一層説邶汎彼柏舟亦汎其流耿耿不寐如有隠憂微我無酒以敖以遊我心匪鑒不可以茹亦有兄弟不可以據薄言往愬逢彼之怒我心匪石不可轉也我心匪席不可卷也威儀棣棣不可選也憂心悄悄愠于羣小覯閔既多受侮不少靜言思之寤辟有摽日居月諸胡迭而㣲心之憂矣如匪澣衣靜言思之不能奮飛婦徳之堅貞猶柏舟之堅緻也而不得於夫若柏舟泛流而無所泊故以取喻隠憂而曰如有其辭温且厚矣茹非度也納也烝民篇云柔亦不茹據亦非依之以為重也婦人意若曰唯鑒能隨妍媸之照而並納之我心匪鑒不可以茹似猶有不能忍者如有兄弟之可據猶可言也乃女子有行逺父母兄弟亦有兄弟而不可以據矣我非之子之愬而誰愬哉薄言往愬逢彼之怒其情滋以戚矣所以又自反而不敢深致怨也若曰不能度物吾不知所度云何若曰不可依以為重將挾彼兄弟以仇其夫耶是皆不通之論也薄言往愬愚斷謂非愬於兄弟何也女子有行逺父母兄弟於理不應往即往愬焉於兄弟之情必用好言以寛解何便至逢彼之怒且上云亦有兄弟不可以據葢亦知其不足以依矣往愬何為哉愬而逢怒是愬于夫無疑者匪石不可轉明專一而無他匪席不可卷明終從而不棄威儀棣棣不可選明律身自有常度不可有所選擇而自貶以苟合辟拊心也上著一寤字言不敢明致辟也但唯寤寐之間拊心以自解耳摽即摽有梅之摽訓落字猶俗語所謂自解自落也覯訓遇謂遇此讒譖之病也受侮則受其侵陵之侮耳日月無迭虧之理詳語意若謂覯閔受侮日復一日月復一月相迭而虧㣲也云爾所以心之憂矣如匪澣衣靜言思之不能奮飛若是其不堪也若以日月比嫡妾相迭而微是已猶有不微之時也似失詩人之意心之憂矣如匪澣衣抑何其難處之甚也靜言思之不能奮飛則終無可他適之理矣此女子之安於命者朱子曰婦人不得於夫宜其怨之深矣而曰我思古人實獲我心又曰靜言思之不能奮飛怨而不過如此凡於人倫有不得者皆當以此為法如屈原不忍其憤懷沙赴水此賢者之過也賈誼云歴九州而相其君何必懷此都也又失之逺矣讀詩者須合如此看再按詩序柏舟言仁而不遇也孔叢子載孔子讀柏舟見匹夫執志之不可易也甚有理若註謂婦人不得于夫將藉酒一敖一遊以自解耶且婦人從一而終奮飛其將何往耶從仁而不遇説首章謂舟必得人以維楫而後有所濟國無其人莫知底止此仁人憂痛之深而非飲酒敖遊之所能釋者也其次章謂見此一段光景我心既不能容僚友猶兄弟也往愬又反見怒三章謂雖是如此然節操終不可改易威儀終不可選擇而苟合四章謂己之懷憂正見愠於羣小而覯閔受侮之不可言末章則謂君與臣皆屬昏瞶含垢忍恥不能奮翼以飛去也此語意俱有著落無牽强且於匹夫執志不易之贊甚相合可從綠兮衣兮綠衣黄裏心之憂矣曷維其己綠兮衣兮綠衣黄裳心之憂矣曷維其亡綠兮絲兮女所治兮我思古人俾無訧兮絺兮綌兮淒其以風我思古人實獲我心緑衣黄裏是傷其反背綠衣黄裳是傷其倒置緑兮衣兮二兮字宜深味綠兮絲兮女所治兮則綠兮衣兮之所從也更宜深味綠兮絲兮女所治兮非又有一絲而又治之也絲即緑衣之絲也女所治者若曰方自少艾時女即嬖寵之以至此耳我今亦柰之何唯思古人曽有遭此而善處之者以自勵焉不至於有過而已綠兮絲兮女所治兮是莊公狂惑之萌也萌而不已則必至于為衣而黄裏黄裳矣則必至庶姜孽孽庶士有朅州吁弑完而戴媯大歸矣易曰臣弑其君子弑其父非一朝一夕之故也其所由來者漸矣由辨之不早辨也葢謂此也世之為君為父者曷其柰何弗辨弗自折其萌絺兮綌兮淒其以風正對上綠兮絲兮女所治兮看一何其愛藉之深一何其敝棄之甚實獲我心非先得我心之所求也婦人不得於其夫復何求哉但反之我心有幸而蒙恩以終身者有不幸而嬖寵以中棄者棄則無如之何自傷悼而已自勉勗而已是我心本應若是而古人有不幸遭此者歴歴皆然是古人實已獲我心而我今又獲古人之心也註添一求字便費解兩曰心之憂矣毫無怨誹於其外兩曰我思古人畧無尤責於其夫燕燕于飛差池其羽之子于歸逺送于野瞻望弗及泣涕如雨燕燕于飛頡之頏之之子于歸逺于將之瞻望弗及佇立以泣燕燕于飛下上其音之子于歸逺送于南瞻望弗及實勞我心仲氏任只其心塞淵終温且惠淑慎其身先君之思以勗寡人燕春來秋去有離别之義莊姜撫戴媯之子平時恩信相親及莊公沒而嫡妾相依如雙燕之飛鳴常相隨逐也今戴媯大歸而已獨留不得復如雙燕矣故三章皆以起興禮婦人送迎不出門此曰逺送于野又曰逺于將之又曰逺送于南何其繾綣之難割耶莊姜不幸遭大變唯戴媯之相依耳至此媯又不得已而大歸此情其曷以舍諸而此禮亦不能拘矣詞所云云蓋所謂話不盡頭而行難分手者也曰泣涕如雨不覺淚泗之交流曰佇立以泣曷勝踟蹰之難舍曰實勞我心深悼衷曲之痛傷此何以故仲氏任只其心塞淵有契結於我心而不能自解者任是心相信故緊承其心塞淵句塞實者不偽妾淵深者不淺露終温且惠慎淑其身本其心塞淵來先君之思以勗寡人亦本其心塞淵來未有心稍偽且淺而能守大順以淑身明大義以勗人者凡人識見語言皆本於心心少偽且淺則識見語言皆隨之終温且惠淑慎其身此非有定守有深識者誰能到此若於人情所不堪處能以先君之思惓惓勗人其告語之真誠識慮之髙逺又豈常人思慮所可及哉仲氏秉心若此而莊姜知之是其所謂心相信者先君之思言當念先君而不可自失其守也温且惠上著一終字慎其身上著一淑字是女徳之極善者嚴華谷云風人含不盡之意此但叙離别之恨而子弑國危之戚皆隠然在不言之中又於末章云此章皆述戴媯之美以為别辭所以致眷戀無己之意又述戴媯相勉之辭雖以見戴媯之賢而意緒黯然矣説得甚好抑愚猶有説焉此詩何獨取諸燕又何以云燕燕也凡祈髙禖以弗無子在燕初至之日完與州吁皆莊公之子也非燕燕乎而州吁弑完以自立不無差池頡頏下上於其間故詩人婉詞於燕燕之于飛爰及於之子之于歸葢隠然有深意焉向使完猶在位仲氏曷為其大歸哉漢史云莫逐燕逐燕日髙飛髙飛上帝畿葢有以識此矣不然胡取於燕燕又何以云差池云頡頏云下上若是之再三耶此當參緑衣終風日月三詩看又當參碩人篇看碩人末章河水洋洋北流活活直説到庶姜孽孽庶士有朅燕燕之差池頡頏下上其所由來者漸矣愚謂此詩似興而實賦也敢問之髙明日居月諸照臨下土乃如之人兮逝不古處胡能有定寧不我顧日居月諸下土是冒乃如之人兮逝不相好胡能有定寧不我報日居月諸出自東方乃如之人兮徳音無良胡能有定俾也可忘日居月諸東方自出父兮母兮畜我不卒胡能有定報我不述詩序日月衞莊姜傷己也詩傳衞州吁弑其君桓公莊姜歸於齊賦日月今玩父兮母兮二句似為傷己歸齊之詩日居月諸想古有此語故柏舟及此皆以為咏然居諸語辭胡不云日居月居日諸月諸也豈以日新日日新又日新居然其無改月匪特晦弦朔望之異而已也由哉生明以至于哉生魄諸常改異故以居諸分屬耶此古語之習矣不察者愚意其或如此也存之以問明者逝者一往而不返也不古處者不以古道自處也註回惑二字最善莊公惑嬖妾而棄莊姜如病狂喪心者然不古處而不我顧不相好而不我報無良而不述皆起於心志蠱惑而不能定也故再四以胡能有定為望莊姜曰我思古人實獲我心其望莊公曰逝不古處胡能有定以古道自處又欲以古道處其夫真賢哉婦也記云知止而后有定心有定主則必重國本凝國祚矣不我顧本不古處來不我報本不相好來父兮母兮畜我不卒即俗諺所謂父母飬得我的小不能保得我的老之謂也葢深自傷悼之辭觀下篇顧我則笑謔浪笑敖惠然肯來莫往莫來便見莊公之報我不述處胡能有定望之至于再至于四是為厚道此詩雖似呼日月而訴然逝不古處承照臨下土來似若云日月之照臨皆有常度而之人何失其常處之若是也逝不相好承下土丕冒來似若云日月之丕冒相為照臨而之人何悖其常行之若是也徳音無良承出自東方來葢悼之人亦出自國胄何獨若是其不良也畜我不卒承東方自出來葢悼已亦出自父母何獨若是其不終也章章有因字字有義不徒取叶韻而已者亦不但呼日月而訴之也此當合緑衣終風二詩看緑衣是傷其嬖惑顛倒之非終風是悼其狂眊蔽錮之甚此詩則無可奈何而呼日月呼父母以控訴也然猶極誠以感動注望焉而終無怨尤嗔疾之意此莊姜善處人道之不幸而可為天下萬世棄婦之法則也其賢婦矣哉終風且暴顧我則笑謔浪笑敖中心是悼終風且霾惠然肯來莫往莫來悠悠我思終風且曀不日有曀寤言不寐願言則嚏曀曀其陰虺虺其雷寤言不寐願言則懷夫妻相敬如賔顧我則笑而謔浪笑傲豈刑家之儀夫婦之道不可以不久也惠然肯來而莫往莫來豈永終之情莊公歹處不獨在謔浪笑敖莫往莫來上即顧我則笑惠然肯來便不是了悼曰中心其悼隠矣思曰悠悠其思長矣且曰願言則嚏願言則懷葢所謂王庶幾改諸予日望之者也寤言願言二言字是助語辭猶永言瞻言之謂終風風之惡者也且暴則其狂特甚矣且霾則其昏特甚矣且曀而不日有曀是蔽之蔽者曀曀其陰而又虺虺其雷是蔽甚而又發顛者此最善狀莊公之狂惑世稱病狂喪心者曰風子義取諸此吕東萊曰驟雨迅雷其止可待曀曀之陰虺虺之雷殊無開霽之期說得極好擊鼔其鏜踊躍用兵土國城漕我獨南行從孫子仲平陳與宋不我以歸憂心有忡爰居爰處爰喪其馬于以求之于林之下死生契闊與子成説執子之手與子偕老于嗟闊兮不我活兮于嗟洵兮不我信兮兵以鼔進以金退不愆於六步七步乃止齊焉未聞擊鼓其鏜而踴躍以用兵者即此便是喪師之兆不必爰喪其馬而後知也首言國有工築而獨驅我於鋒鏑之下次言敵已平成而猶置我於戎行之間居處皆失其宜喪馬求林固其所必然者誰無室家何獨令我之不得活且信至此乎易曰說以先民民忘其勞説以犯難民忘其死州吁身犯大逆而勞民以逞誰其説之無怪乎其衆怨而莫為之用也按左傳隠公四年衞州吁弑桓公而自立將修先君之怨於鄭而求寵於諸侯使告於宋曰君若伐鄭以除君害君為主敝邑以賦與陳蔡從宋人許之夏宋陳蔡衞伐鄭圍其東門五日而還秋四國復伐鄭是謂平陳與宋不我以歸者易之解曰利西南无所往其來復吉有攸往夙吉師者不得已而用以解難者也即有攸往夙旋為善斯可以居且處者乎不我以歸而爰居爰處是必至於喪馬而求林也從役者之憤且怨其能免哉君子以是知衞州吁之不終也契闊訓隔逺之意似矣以愚據字義解契合也闊離也死生契闊與子成説若曰或死或生或契或闊與子成約誓不相忘棄云爾故下章下一闊字正應上闊字下一活字正應上生字讀契為挈而訓契闊為隔逺未敢以為然也洵訓作信信讀作伸亦是自愚論之洵與信通作信字解亦無害詩人意若曰執手而期偕老是我之信也今汝專意行師使我信從而不返忍俾我不得全其信乎是洵未嘗不訓信也而信亦不必轉讀為伸也二于嗟字通是怨上之詞人皆求活于嗟闊兮不我活兮獨何心也人皆有信于嗟洵兮不我信兮獨何心也凱風自南吹彼棘心棘心夭夭母氏劬勞凱風自南吹彼棘薪母氏聖善我無令人爰有寒泉在浚之下有子七人母氏勞苦睍睆黄鳥載好其音有子七人莫慰母心詩傳寡母欲去而子自訟焉詩序凱風美孝子也或謂寡母不安靖于其室而非欲去也甚有理棘非美材且是難長之木待凱風鼓動而後生故以為喻棘心喻子之幼稚棘薪喻子之成立寒泉在浚邑之下邑人賴之以生養有子七人乃不能養一母耶是負罪引慝之詞睍睆好貌檀弓華而睆是一証雄雉于飛泄泄其羽我之懷矣自詒伊阻雄雉于飛下上其音展矣君子實勞我心瞻彼日月悠悠我思道之云逺曷云能來百爾君子不知徳行不忮不求何用不臧此雖以雄雉起興然即有比喻君子之意此從役者必非以下之人觀其婦可知其夫矣自貽伊阻言其可以歸不歸非由人之不我以歸者可以歸不歸便有貪求忮害於其外故此云自貽伊阻後云不忮不求何用不臧泄泄其羽有舒緩自得意下上其音有飛鳴自得意故一曰我之懷一曰勞我心前稱展矣君子矣此云百爾君子者何展矣者思而稱之之辭也此百爾云云是深思而熟慮之之辭若曰男子志天地四方即久役於外無害者要貴知徳行耳誠能不忮害不貪求則無所往而不臧矣看上章泄泄其羽下上其音之人也悻悻自得或不無忮害貪求之念婦人深知其情性故為之冀願若此耳此可以常婦目哉不忮不求正是徳行一章言初往之時二章言漸逺三章言日月之久辭之序也匏有苦葉濟有深涉深則厲淺則揭有瀰濟盈有鷕雉鳴濟盈不濡軌雉鳴求其牡雝雝鳴雁旭日始旦士如歸妻迨氷未泮招招舟子人涉卬否人涉卬否卬須我友詩序刺衞宣公也公與夫人夷姜並為淫亂蓋宣公上烝夷姜而夷姜從之所謂濟盈濡軌而雉鳴求牡者也匏可佩以渡水匏方有苦葉而濟有深涉可佩用之乎度其淺深而揭厲焉可也此是教以禮義之當度有瀰濟盈四句承上濟有深涉來若曰車可以行陸濟之既盈必不可車涉而濡其軌者乃雌雉之鳴獨可求之非其偶乎此深刺共為淫亂者之非也飛曰雌雄走曰牝牡是矣然不曰牝雞之晨乎雄狐綏綏乎詩蓋謂雄雉宜鳴以求雌牝雉不宜鳴以求其牡也若註則謂禽鳴以求獸矣有是理乎雝雝鳴雁一章是古禮陳古禮所以深刺今之不然也一章二章以徒涉喻犯禮此章以待舟喻得禮人皆徒涉我獨招舟子而不徒涉既待舟而後濟又須待我友而同濟喻人必待禮而行又以配偶相從也再按首章以徒涉喻次章以雉鳴喻三章雝雝鳴鴈云云正照雉鳴求牡之非四章招招舟子云云正照濟盈濡軌之失是文章之極有闗要處詩序云刺衞宣公與夫人共為淫亂是習習谷風以陰以雨黽勉同心不宜有怒采葑采菲無以下體徳音莫違及爾同死行道遲遲中心有違不逺伊邇薄送我畿誰謂荼苦其甘如薺宴爾新昏如兄如弟涇以渭濁湜湜其沚宴爾新昏不我屑以毋逝我梁毋發我笱我躬不閲遑恤我後就其深矣方之舟之就其淺矣泳之游之何有何亡黽勉求之凡民有喪匍匐救之不我能慉反以我為讎既阻我徳賈用不售昔育恐育鞠及爾顛覆既生既育比予于毒我有㫖蓄亦以御冬宴爾新昏以我御窮有洸有潰既詒我肄不念昔者伊余來塈詩序刺夫婦失道也谷風來自大谷是盛怒之風也又習習然連續不斷所謂終風也又陰又雨無清明開霽之意所謂曀曀其陰也皆喻夫之盛怒無休息也以谷為穀而曰陰陽和而雨澤降夫婦和而家道成誤矣大風有隧有空大谷是切證徳音是婦稱其夫之辭蓋夫初與婦相合必有一種言語如所謂死生契闊與子成説者是也但令此徳音常在則及爾同死是女子所甘心者奈何可中道違乎故曰徳音莫違及爾同死采葑四句若曰采葑菲者采其枝葉之可食而不當計其下體娶婦者取其徳之可以成家而不當計其容貌但夫子初時之成説始終莫違則及爾同死是婦之至願也中道而棄徳音之謂何此四句似宜如此解錢氏曰凡菜茹近地之莖葉多黄腐不可食中心有違句女子意若曰黽勉同心不宜有怒此我托身之幸也徳音莫違及爾同死此我偕老之願也今不幸而怒且違至棄于中道無亦於予之初心大相違背乎故曰中心有違云爾若註所云足有不從心而能自欲前者乎心有不能止其足而兩相背者乎此無理之解也涇以渭濁二句若曰涇本濁渭本清今涇反以渭為濁何不視渚沚之處湜湜然其清見底而涇以為濁可乎喻新昏不善而反以我為不善由夫為其所惑故也夫妻如魚水之歡故以逝梁發笱喻曰我躬不閲遑恤我後則其情特苦而悲獨深矣閲字不應作容字解閲視也詩意若曰我身在此尚不能閲而制之况已去後而又遑顧恤之哉毋逝我梁毋發我笱蓋亦徒然云爾矣此無可奈何之詞而三復之有餘悲者也非我躬不能容而無暇為新昏計之說也就其深矣四句不是興如今俗説隨方逐圓將髙就低以為作家計也云爾故下緊接何有何亡四句蓋謂將沒作有求為體面不敢失禮于親戚朋友也四章黽勉二字正應前黽勉二字五章方出一徳字見已助夫作家全是徳而夫則專以容取人也昔育恐育鞠及爾顛覆此極道窮時艱苦之情故下云以我御窮我有㫖蓄亦以御冬言我當有時常防其或無而深為之備也宴爾新昏以我御窮言爾於安樂即忘其艱苦而忍為之棄也此其語意相反對甚明我寧及爾顛覆爾寧比予于毒乎洸訓武貌是矣潰訓怒色何據就愚見潰疑是放決意詩人意若曰黽勉同心不宜有怒今則有洸矣徳音不違及爾同死今則有潰矣此皆女之詒我而我所肄習者獨不念始合之時伊喜余之來而塈息乎始何其接禮之厚今何若是之少恩也此數句似宜如此解式微式微胡不歸微君之故胡為乎中露式微式微胡不歸微君之躬胡為乎泥中此詩雖勸黎侯之歸亦有責衞君之意觀其詞曰胡為乎中露胡為乎泥中蓋情見乎詞矣微君二微字詩緝作不有解言黎侯為狄所逐寓于衞而不見禮微之又微者也故言微乎微乎君胡不歸乎失國大故也彼以微視之若無有者無望其救患矣君何處此中露乎次章又深言之彼不惟輕視吾君之事且輕視吾君之身矣何為處此泥中乎中露是取霑濡之辱而不見芘覆也泥中是取陷溺之辱而不見拯救也旄丘之葛兮何誕之節兮叔兮伯兮何多日也何其處也必有與也何其久也必有以也狐裘蒙戎匪車不東叔兮伯兮靡所與同瑣兮尾兮流離之子叔兮伯兮褎如充耳詩序旄丘責衞伯也黎臣子初至衞見旄丘有葛初生其節甚密及其後也葛長而節闊矣故因以取興誕字尚書註作大字解大節見疎闊之意蓋影衞君臣闊畧而付之罔聞也此篇註極明當靡所與同同字極妙凡人心同休戚患難不期而相救心靡與同安望其出力以相援耶此黎之臣子所為切諷也凡人心同與國之休戚不獨知救援之義其於已國之政事必振飭而不偷不然未有不亡其國者玩伯兮叔兮之詞則衞與黎非止與國而已也乃黎之君臣至瑣尾流離之甚而衞之人褎如充耳曾不一憐救焉豈人情乎哉未幾衞為狄所滅蓋天理也黎實衞之附庸黎遭狄難乗車而東以告于衞衞人不恤謂利害不切于已耳不知狄人無厭唇亡齒寒未有能免其患者是以有滎澤之敗褎訓多笑貌不知何出不若詩緝所引傳曰盛服也為是蓋凡盛服則有瑱名曰充耳非真塞其耳也此責其不能聴已之訴遂譏其褎然盛服如真以瑱塞其耳而無聞也簡兮簡兮方將萬舞日之方中在前上處碩人俁俁公庭萬舞有力如虎執轡如組左手執籥右手秉翟赫如渥赭公言錫爵山有榛隰有苓云誰之思西方美人彼美人兮西方之人兮詩序簡兮刺不用賢也此詩既稱賢者所作必無輕世肆志之心蓋賢者思見西方之盛王則其所抱負者大矣曽見有抱負者簡易而不恭乎解者惟見簡之一字故為若説不知此簡字乃簡閲之簡且重言之正見其加意簡閲處蓋曰此雖一技而不可忽也故緊接方將萬舞句若作簡易不恭説方將二字如何承得上王荆公詩云古人事一職豈敢苟然為正得簡兮之詩之意方説碩人俁俁公庭萬舞何以及有力如虎執轡如組曰此其所自表見者男子志天地四方有力如虎執轡如組蓋亦足為馳驅用矣乃僅僅備員舞列左手執其籥右手秉其翟乎以是容色之充盛豈不可霑豐腆公言錫之一爵而已乎此其所甚不平者語極聨絡意甚貫串執籥秉翟而至于赫如渥赭公言錫爵此豈碩人之所願乎此豈所以待碩人者乎山有榛隰有苓雖是興辭然實影言上有君下有臣意不然此二語亦無謂彼美人兮西方之人兮非嘆其逺而不得見也蓋深注望之辭若曰彼盛際之顯王豈伊異人耶西方之人能自奮立者稱於世耳今西方豈無其人哉能效盛際之顯王即盛際之顯王而我亦可為天下用矣此其望最切而意最深毖彼泉水亦流于淇有懷于衞靡日不思孌彼諸姬聊與之謀出宿于泲飲餞于禰女子有行逺父母兄弟問我諸姑遂及伯姊出宿于干飲餞于言載脂載牽還車言邁遄臻于衞不瑕有害我思肥泉兹之永歎思須與漕我心悠悠駕言出遊以寫我憂詩序泉水衞女思歸也首二章是叙其來時日逺於至親故思之不能置而謀及諸姬欲歸寧于父母之既終也云爾詩緝解問我諸姑二句云今父母終矣姑姊尚存也問其安否感親之沒而念骨肉之存甚有理蓋婦人之情自如是也若朱註復謀其可否於諸姑伯姊於首章似重複且於三章為贅語矣二章註泲禰地名皆自衞來所經之處三章註干言地名適衞所經之地極明晣三章是商其歸計而終之曰不瑕有害則止乎禮義而不敢歸矣故下章緊承云我思肥泉兹之永嘆云云瑕字何字甚相逺奚以云瑕何古音相近而通用也狼跋篇云徳音不瑕思齊篇云昭假不瑕未嘗無瑕字也瑕玷也此云不瑕有害者蓋初自疑曰如此其可以不瑕乎卒乃自決曰此有害而不可行也云爾語意甚婉曲而有味如註云瑕何通用將曰不何有害乎不成文理之甚矣二子乗舟篇亦有不瑕有害句註云不瑕疑詞蓋必謂有害之為決辭也朱子葢未及改正耳先脂於所牽之處次牽於所脂之處是二事出自北門憂心殷殷終窶且貧莫知我艱已焉哉天實為之謂之何哉王事適我政事一埤益我我入自外室人交徧讁我已焉哉天實為之謂之何哉王事敦我政事一埤遺我我入自外室人交徧摧我已焉哉天實為之謂之何哉詩序刺仕不得志也既曰王事又曰政事何居王事總名也政事則其日所經理者耳適歸也益加也即易益用凶事之益敦厚也遺投也即書遺大投艱之遺盡人而求曰交毎事而責曰徧讁我者罪而尤之之謂摧我者困而挫之之謂人臣雖不為利禄然上人不可不加體念也終窶且貧至于室人之交徧謫摧莫知其艱可乎哉乃斯人略無怨憾但歸命于天其賢矣夫北風其涼雨雪其雱惠而好我攜手同行其虗其邪既亟只且北風其喈雨雪其霏惠而好我攜手同歸其虗其邪既亟只且莫赤匪狐莫黑匪烏惠而好我攜手同車其虗其邪既亟只且序云刺虐也故君子見幾而作同行者意決於去也同歸者意一去不復返也同車則即就路而終不顧矣此只在去國上説非於中分貴賤如註所云也虛訓作寛邪讀作徐訓作緩亦或詩人之體不敢妄論若據愚見即就虛邪二字説亦有可通者國家貴實不貴虛貴正不貴邪衞棄仁賢而不用如北門之窶貧簡兮之萬舞蔑禮法而不視如新臺之設網二子之乗舟實耶虛耶邪耶正耶此有識者所寒心思與好我者決去而不留也孟子曰不信仁賢則國空虚左傳曰國家之敗由官邪也此愚謂即以虛邪二字説亦有可通者虛邪二字並而邪為尤甚虚不過國無人耳邪則志穢行醜唯恐人指而議之如二子乗舟篇云願言思子不瑕有害不去而思則將鉗於市烹於鑊矣此所謂其虚其邪既亟只且者吁賢者之遘此亦大不幸哉唯虚則邪入唯邪則虚愈甚是又二義之相兼者註赤狐黑烏皆不祥之物人所惡見固矣然不祥之大者孰如宣公之醜惡宣姜之汚穢乎三綱淪九法斁蕩然無復人道是所謂莫赤匪狐莫黑匪烏者易曰王臣蹇蹇匪躬之故北門有焉又曰君子見幾而作不俟終日北風有焉靜女其姝俟我於城隅愛而不見搔首踟蹰靜女其孌貽我彤管彤管有煒説澤女美自牧歸荑洵美且異匪女之為美美人之貽序云刺時也衞宣夷姜為淫國人化之此非靜女也自期與淫者視之見其閒雅之可愛曰靜女耳詩緝對游女看亦好易曰見金夫不有躬无攸利此靜女俟人於城隅貽人以彤管而且歸人以荑其不有躬也甚矣衞俗真醜穢哉搔首踟蹰一語寫盡女子之淫態矣其貽彤管而歸荑又不足言也始猶俟於城隅終歸荑自牧真同禽獸之相逐者無恥之甚也詩緝自牧歸荑就男子説匪女之為美照悦懌女美美人之貽照貽我彤管好蓋女子俟男子於城隅男子自牧歸故歸之荑以荅彤管之貽也彤管固有煒而所可悦懌者此女之美也註既又二字欠體貼匪女之為美二句若曰此何足以比女之美哉亦聊藉以答美人之貽耳新臺有泚河水瀰瀰燕婉之求籧篨不鮮新臺有洒河水浼浼燕婉之求遽篨不殄魚網之設鴻則離之燕婉之求得此戚施詩序刺衞宣公也籧篨戚施是古語然字義不知所解據註籧篨戚施是惡疾宣公作新臺要子婦則其精力猶雄也安有此疾哉籧篨不能俯則常仰戚施不能仰則常俯又未有兼此二疾者曰此詩人之所為善詆也稍知自好者安忍齒及其子婦宣公要子婦而奪之可謂有人心哉取疾於籧篨之不能俯戚施之不能仰葢詆其莫容於覆載間耳吁以此為訓後世猶有楚乎王唐𤣥宗之所為者不殄云者猶云老而不死者也謝疊山謂宣公既無人道亦非人形甚當衞宣殺二子再傳而為狄所滅楚平召鞭尸之禍唐𤣥殺三子奔西蜀幾失天下淫亂之報毫髮其不爽蓋如此可鑒哉二子乗舟汎汎其景願言思子中心養養二子乗舟汎汎其逝願言思子不瑕有害詩序思伋夀也此詩是悼死者其實是惡生中心養養者抱持于胷臆而不得伸也不瑕有害者商決於利害而不敢遂也註不瑕疑辭極當不瑕是疑辭則有害是決辭矣此不瑕有害與泉水篇不瑕有害稍異泉水之害害於義理也自商其瑕與否知其有害而自止也此詩之害害於身家也為商其瑕與否傷其有害而可憐也宣公上烝夷姜下納伋婦至伋夀不得其死及朔立為惠公左右公子怒其前事以立黔牟後惠公卒懿公立而百姓大臣猶以其父之殺伋也皆不服狄乗其釁殺懿公以滅衞重訂詩經疑問卷一
