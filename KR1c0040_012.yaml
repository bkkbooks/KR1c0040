body:
  text: 重訂詩經疑問卷十二明姚舜牧撰魯頌駉駉牡馬在坰之野薄言駉者有驈有皇有驪有黃以車彭彭思無疆思馬斯臧駉駉牡馬在坰之野薄言駉者有騅有駓有騂有騏以車伾伾思無期思馬斯才駉駉牡馬在坰之野薄言駉者有驒有駱有駵有雒以車繹繹思無斁思馬斯作駉駉牡馬在坰之野薄言駉者有駰有騢有驔有魚以車祛祛思無邪思馬斯徂此篇詩只重在思無疆無期無斁無邪數字上次要看斯臧斯才斯作斯徂數字又次看彭彭伾伾繹繹祛祛數字其驈皇驪黃騅駓騂騏等不過舉其種種有此類皆可以應上襄之選耳非各注定不可移易者以車之以是左右之意言此車不可無此馬也思無疆不専牧馬一節凡公之君國子民盡人與物無不極其思慮而圖謀之逺真有無疆域之可限者即馬一節觀之而皆馴良可御若隨所思而俱臧焉斯可見其略矣語意即衛文公秉心塞淵而騋牝三千者思馬思字與無思不服思字同馬實無思而若與其思相應者然故下字如此注僖公牧馬之盛由其立心之逺極佳又按秉心塞淵注云人操心誠實而淵深則無所為而不成此云人致思深逺而不苟則無所為而不善此注之極有見者彭彭言其盛埋照下一臧字伾伾言其任埋照下一才字繹繹言其行埋照下一作字祛祛言其行之狀埋照下一徂字無疆是思之逺無期是思之久無斁是思之勤無邪是思之正然思必歸於正然後已易曰牝馬地類行地無疆馬之臧者其行無疆故應上無疆字驥雖不稱力而有材力者能耐久故應上無期字易廣八卦傳於坎曰為馵足為作足馬之作足者其行無止息故應上無斁字徂者往也馬之善徂者不失其馳故應上無邪字臧才作徂雖分說而必兼有焉乃稱良馬疏云禮諸侯六間馬有四種此詩首良馬朝祀所乘故云彭彭見其有力有容也次戎馬齊力尚強故云伾伾見其有力也三田馬齊足尚疾故云繹繹見其善走也卒言駑馬主給雜使貴肥健故云祛祛見其強健也亦有據有駜有駜駜彼乘黃夙夜在公在公明明振振鷺鷺于下鼓咽咽醉言舞于胥樂兮有駜有駜駜彼乘牡夙夜在公在公飲酒振振鷺鷺于飛鼓咽咽醉言歸于胥樂兮有駜有駜駜彼乘駽夙夜在公在公載燕自今以始歲其有君子有榖詒孫子于胥樂兮詩序頌僖公君臣之有道也注燕飲而頌禱一而字下得妙詩夲燕飲而章內都著夙夜在公句首章更著在公明明句見君臣所先圖者在國家之幾務而政有餘暇然後燕以樂且醉言舞即言歸而所祝願維在有年以惠我生民有榖以詒我孫子真是善頌善禱明明訓辨治也極當醉言舞于胥樂兮是形容其醉之自得處非屢舞仙仙之舞也湛露云不醉無歸此云醉言歸可謂不繼以淫者矣有年是國家第一事故春秋謹書之甫田篇亦云自古有年凡人有一善其子孫必則而效之敬明其德允文允武是魯侯所當自朂以詒其孫子者思樂泮水薄采其芹魯侯戾止言觀其旗其旗笩笩鸞聲噦噦無小無大從公于邁思樂泮水薄采其藻魯侯戾止其馬蹻蹻其馬蹻蹻其音昭昭載色載笑匪怒伊教思樂泮水薄采其茆魯侯戾止在泮飲酒既飲㫖酒永錫難老順彼長道屈此羣醜穆穆魯侯敬明其德敬愼威儀維民之則允文允武昭假烈祖靡有不孝自求伊祜明明魯侯克明其德既作泮宫淮夷攸服矯矯虎臣在泮獻馘淑問如臯陶在泮獻囚濟濟多士克廣德心桓桓于征狄彼東南蒸蒸皇皇不吳不揚不告于訩在泮獻功角弓其觩束矢其搜戎車孔博徒御無斁既克淮夷孔淑不逆式固爾猶淮夷卒獲翩彼飛梟集于泮林食我桑黮懷我好音憬彼淮夷來獻其琛元龜象齒大賂南金詩序頌僖公能修泮宫也注此飲於泮宫而頌禱之詞謂征淮夷皆未然事愚不敢為信閟宫泮水其詞固多夸美而其事亦必有因如初無此事而曰桓桓于征狄彼東南既克淮夷憬彼淮夷恐當時即為夸大語未必若斯之甚也且此泮宫之飲何為哉意當時方修泮宫而偶值淮夷之捷飲至於斯故作詩以張大之耳其指固不在飲酒而頌禱也觀首三章思樂二字便見當時必有大慶而士民思樂觀之非止為飲而已者無小無大從公于邁是言隨從者之衆也然必從得人之歡心來首章止言其旗之笩笩鸞聲之噦噦無小無大從公于邁而已次章不獨言其馬之蹻蹻且及其音之昭昭見其樂道好賢之聲聞已昭著於其外而且載色載笑和顔色以接引之而使盡入於教育之中此方是王公建學作人之意三章曰既飲㫖酒永錫難老矣又曰順彼長道屈此羣醜者何蓋學校之設非徒虗文之崇飾而已也內明禮義以薰淑乎民心外宣文教以威服乎方國順彼常久可行之道自治而治人則不獨順治其內而化誨懷服將舉此方國之羣醜而盡屈服之者此公之能事也故此特言之而下文方舉淮夷事或曰此羣醜只指魯衆言禮孔子告哀公曰君之所為百姓之所從也能順天道羣醜有不服乎其證也是不然學校所以教之也非屈之也上章云匪怒伊教則教之事已舉矣何事于屈乎而况乎下有淮夷之事也長道是常久可行之道與大道稍别順彼長道必自明明德始故承說敬明其德敬明云者一敬以明其明德者也故下文云克明其德克廣德心此句在通詩為極重敬慎威儀是敬眀其德之要務故特指言之抑之篇亦云敬慎威儀維民之則文武守邦是祖考望後人之至意故云允文允武昭假烈祖非必其祭時始昭假之也靡有不孝言所為皆承先繼志而無不孝也故曰自求伊祜穆穆節雖似分則民格祖二事然意實一串統由敬明其德來照下章克明其德自見得上欲其敬明德故下穆穆字此著其克明德故下明明字明明魯侯四句正照前順彼長道屈此羣醜二句獻馘獻囚是釋奠于學事而矯矯虎臣淑問如臯陶則夸大之辭也味克廣德心一語魯征淮夷只是修文德以威之云爾在泮獻馘在泮獻囚在泮獻功併下集于泮林皆行文㸃綴語上已云桓桓于征狄彼東南而在泮獻功矣此復云角弓其觩束矢其搜戎車孔博徒御無斁者非復張大其于征之威也言魯國常有此而常可為淮夷之備也故既克淮夷孔淑不逆下緊接式固爾猶淮夷卒獲正言其克明德于上整此備于下而審固其謀猷可屈服此淮夷而求無後患也所謂順彼長道屈此羣醜者蓋如此式固爾猶句極重淮夷之於魯非一世之患也所從來久矣思所為備如上文所云而又加固慎焉庶可以永服其心而無復反側也曰孔淑不逆可見誠服于其德矣飛梟惡鳥也而集于泮林食我桑黮懷我好音見淮夷亦在我化誨懷服之內也凡夷方所貢曰獻琛元龜象齒大賂南金非淮夷所産而備舉之者見方物之畢獻也亦夸大之意閟宫有侐實實枚枚赫赫姜嫄其德不回上帝是依無災無害彌月不遲是生后稷降之百福黍稷重穋稙稚菽麥奄有下國俾民稼穡有稷有黍有稻有秬奄有下土纘禹之緒后稷之孫實維大王居岐之陽實始翦商至于文武纘大王之緒致天之屆于牧之野無二無虞上帝臨女敦商之旅克咸厥功王曰叔父建爾元子俾侯于魯大啓爾宇為周室輔乃命魯公俾侯于東錫之山川土田附庸周公之孫莊公之子龍旗承祀六轡耳耳春秋匪解享祀不忒皇皇后帝皇祖后稷享以騂犧是饗是冝降福既多周公皇祖亦其福女秋而載嘗夏而楅衡白牡騂剛犧尊將將毛炮胾羮籩豆大房萬舞洋洋孝孫有慶俾爾熾而昌俾爾壽而臧保彼東方魯邦是常不虧不崩不震不騰三壽作朋如岡如陵公車千乘朱英緑縢二矛重弓公徒三萬貝胄朱綅蒸徒增增戎狄是膺荆舒是懲則莫我敢承俾爾昌而熾俾爾壽而富黃髮台背壽胥與試俾爾昌而大俾爾耆而艾萬有千嵗眉壽無有害泰山巖巖魯邦所詹奄有龜蒙遂荒大東至于海邦淮夷來同莫不率從魯侯之功保有鳬繹遂荒徐宅至于海邦淮夷蠻貊及彼南夷莫不率從莫敢不諾魯侯是若天錫公純嘏眉壽保魯居常與許復周公之宇魯侯燕喜令妻壽母宜大夫庶士邦國是有既多受祉黃髮兒齒徂來之松新甫之柏是斷是度是尋是尺松桷有舄路寢孔碩新廟奕奕奚斯所作孔曼且碩萬民是若詩序頌僖公能復周公之宇也詩緝謂此詩止為僖公能修寢廟張大其事而為頌禱之辭序蓋摘其中復周公之宇一語耳閟宫魯廟也成王未嘗賜周公天子禮樂唯魯後世謂周公嘗有居攝一事謂可用天子禮樂也而僭之三家因謂皆周公之後也則皆可用天子禮樂也而歌雍舞佾肆無忌憚故孔子深譏切之而於此時存閟宫之詩蓋春秋之意也及按詩傳云僖公八年始用郊禘史克賦閟則禮記明堂位云成王以周公有大勳勞賜伯禽天子禮樂真齊東之謬說矣敢存此以正其謬首章原周之所自始次章叙周公之所由封三章叙周公受封而歲舉郊廟之祀四章叙魯用天子之禮樂而獲慶之多五章叙魯有攘荆蠻之功而受祭之福六章七章又叙其有淮徐之功八章又大叙其保魯受福之多以見寢廟之當新九章則叙其所以新寢廟者以應首章開端之語其章法語脉極貫串而聮絡要細細體㑹曰閟宫有侐便見有廟有寢深邃而清嚴降之百福即如牛羊腓字之㑹伐平林鳥覆翼之等事后稷有相之道遍天下天下之稼皆其稼便天下之土皆其土故云奄有下土禹稷之功相為終始無稷則禹平水土何益無禹則稷之教稼穡何施故云纘禹之緒太王無翦商之心而肇基王迹其行事若有翦焉者也故魯人不諱言之或曰翦斷也商命若自此斷截也天意欲至於此文武隨天意之所至而至之是謂致天之屆克咸厥功注周公亦與焉句極有見大啓爾宇是開其國也非作其家也後章復周公之宇正照此為周室輔欲其世魯而與周同其休也輔意輕王曰叔父四句是道其欲封之意乃命魯公四句是實行侯封之典山曰龜蒙鳬繹川曰沂汶洙泗土田曰灌隂常許附庸曰顓㬰句須孫之又孫總曰孫故僖公曰周公之孫龍旗承祀二句雖似郊春秋匪懈二句雖似廟而實皆有之且細玩皇皇后帝皇祖后稷云云似還主郊祀一邉其曰周公皇祖亦其福女蓋謂周公亦體后帝后稷之心而福之也龍旗以下通在郊上看春秋二字只作歲時解周公亦皇祖也因上稱皇祖后稷故此稱周公皇祖耳秋而載嘗節専指閟宫之祭言白牡騂剛至籩豆大房是天子之禮萬舞洋洋是天子之樂俾爾熾而昌以下是周公饗其祭而福之也熾而昌指其業所統承壽而臧指其身所享受保彼東方魯邦是常云云又申言其熾而昌壽而臧處閟宫為祀周公作故孝孫有慶下極言其降福之多下章昌而熾昌而大總申其所謂熾而昌也黃髮台背萬有千嵗眉壽無有害黃髮兒齒總申其所謂壽而臧也奄有龜蒙保有鳬繹眉壽保魯邦國是有總申其所謂保彼東方魯邦是常也淮夷來同南夷率從居常與許復周公之宇總申其所謂不虧不崩不震不騰也壽胥與試宜大夫庶士則所謂三壽作朋如岡如陵者不外是焉總之則言祭閟宫受福之多寢廟不可以不新也讀詩者要識得此意熾有火炎意昌有日新意炎且日新曰熾而昌下文云遂荒大東至于海邦遂荒徐宅至于海邦正其炎且日新者有壽而不臧者必其德足以凝命曰壽而昌書曰考終命曰攸好德看七章二保字便見保有東方魯邦是常常侵於齊許假於鄭淮夷震驚徐方繹騷此便是其虧崩震騰處故下章云居常與許淮夷來同遂荒徐宅三壽作三卿豈以此三卿有三事之任福國而壽民也耶當僖公時有季友文仲其人三壽作朋壽胥與試或謂是與如岡如陵即國家安於磐石泰山而四維之意朱英飾矛緑縢約弓皆載於車上秦小戎厹矛沃錞竹閉緄縢亦車上弓矛之飾徒各有胄而飾以貝綅以朱則軍容之極盛者戎狄是膺三句下復出俾爾昌而熾壽而富等語正見其膺懲之莫禦處皆神祜之所在也如此方與上文為有情且見是閟宫之詩觀八章首云天鍚公純嘏自見得昌而熾與上文只倒得一下昌而大則言其熾之日益光大也壽而富之富是富盛之富黃髮台背正言其壽而富也壽胥與試試字即用字不必說到試其才力此句正與三壽作朋應耆而艾是老而日加頥養也萬有千歲眉壽無有害正由頥養得之遂荒大東遂荒徐宅二荒字即豳居允荒大王荒之之荒言由此開荒而日充拓之也魯邦所詹詹字義與専字同言魯邦専倚此以立國故稱重於天下也魯侯是若語意與末章萬民是若語意同言此是魯侯之意而今得如其願也如其意曰若天鍚公純嘏句是血脉提掇語初時說祭之受福乃一向說開去了須著此一語以提醒見得此箇是神之福祜廟寢誠不可以不新也凡看書須於此理㑹乃得其章㫖或曰此申前郊祭之福故用一天字曰非也天與神一也天保篇一向說天而歸說神之的矣則此篇論廟祀而下一天字何害哉况眉壽保魯云云與前黃髮台背云云初無二意正不必其拘泥也而况此詩専為閟宫作哉天鍚公純嘏節分兩截上四句一氣說下言多歷年所保此東土復此侵地而完周公之舊物此天以純嘏鍚魯侯下六句亦一氣說下言魯侯燕喜有令妻壽母以和於家冝大夫庶士以和於朝而邦國是有以保其封今既多受祉黃髮兒齒之壽徴見焉則純嘏之鍚魯侯蓋以身享承之矣寢廟之作其可已乎哉此下著徂來之松一節常見侵於齊許假璧於鄭想當時有歸服之意故詩人稱之燕喜二字當就平日之安享言則下文既多受祉說得去曰令妻壽母便見其燕喜於家曰冝大夫庶士便見其燕喜於朝曰邦國是有便見其燕喜於國既多受祉則承上眉壽保魯三句言故著黃髮兒齒句見今已有眉壽之徴則保魯而居常與許復周公之宇固其所必然者如此看較辭不重復而語有下落當時僖公曾從齊桓公伐楚又曾郤淮夷故詩人以此頌之常與許猶未復故詩人以此禱之松柏取之名山而斷之斧斤度之繩墨量之尋尺皆制作之所不可已者松桷之有舄則舉其一以例其餘也寢以藏衣冠其制貴深嚴而敦密廟以奉祭祀其制貴宏厰而軒翔故一曰孔碩一曰奕奕萬民是若者若萬民之心也國家一工役與民心相宜協此方是人君之舉動商頌猗與那與置我鞉鼓奏鼓簡簡衎我烈祖湯孫奏假綏我思成鞉鼓淵淵嘒嘒管聲既和且平依我磬聲於赫湯孫穆穆厥聲庸鼓有斁萬舞有奕我有嘉客亦不夷懌自古在昔先民有作溫恭朝夕執事有恪顧豫蒸嘗湯孫之將詩序祀成湯也雖說商人尚聲先奏樂後迎牲致祭時亦伐鞉鼓合管聲以依磬聲然所以感格處全在此心之誠敬故下篇云鬷假無言而此篇亦云於赫湯孫穆穆厥聲曰穆穆蓋言無聲之可聞也觀四節云溫恭朝夕執事有恪則所為奏假者從可想矣不是之察而但曰商人尚聲恐非善讀詩者鞉鼓是大小二鼓置我鞉鼓言其多樂之陳設也故首云猗與那與奏鼓簡簡止是鼓不兼鞉下鞉鼓淵淵方兼奏看簡簡淵淵自見得今將舉祭行禮時亦先奏鼓三闋豈亦殷禮之遺與想湯孫奏假綏我思成光景抑何等凝神定思豈専在樂而非樂不足以綏之故伐鞉鼓合管聲以依磬聲然其實主祭者穆穆其容而無聲之可聞也故就上樂聲而形容之曰穆穆其聲云爾說者徒泥聲之一字將此二句總申上四句曰聲之穆穆云則吾所未解也文王篇云穆穆文王維天之命篇云於穆不已雍篇云天子穆穆皆無聲也此欲以聲言將謂此樂聲乎何為綴之湯孫之下將謂此湯孫之聲乎則鬷假無言又將出聲於何所此愚不能無辨也湯孫奏假綏我思成於赫湯孫穆穆厥聲正相應總只是下篇鬷假無言一句禮記說思成語亦好若細詳此二字思成承上烈祖來當是思弔伐而成王業之人此所云綏我思成者謂湯孫如此其奏假庶或綏安我思成王業之人也下篇賚我思成者謂清酒若是其載酤庶或寵賚我思成王業之人也故一承在衎我烈祖下一承在申鍚無疆下敢正髙明磬聲最清越而幽逺能辨於他音他音稍一乖戾髙下便合不來必和且平而後能與其聲相依附記曰石聲磬磬以立辨伐木云神之聽之既和且平聲到和平處然後可悅於鬼神照前篇無斁看來斁有少止意當是鼓之有節也庸鼓有斁萬舞有奕我有嘉客亦不夷懌則聲與舞合一非二矣客與主和洽無間矣神其有不歆乎所謂綏我思成者蓋如此湯孫奏假綏我思成到我有嘉客亦不夷懌這方是衎于烈祖而總之則夲此心之致敬來故著自古在昔一節溫恭朝夕二句一串下閔馬父一假說得極好通詩重綏我思成句而綏我思成全在此心之恭恪湯孫之將將此恭恪焉耳矣嗟嗟烈祖有秩斯祜申鍚無疆及爾斯所既載清酤賚我思成亦有和羮既戒既平鬷假無言時靡有爭綏我眉壽黃耉無疆約軧錯衡八鸞鶬鶬以假以享我受命溥將自天降康豐年穰穰來假來饗降福無疆顧豫蒸嘗湯孫之將詩序祀中宗也首節注甚明及爾斯所正言及汝中宗也中宗中興夲於成湯故頌始烈祖酤與羮皆祭時所躬獻者有次序存焉故下既載亦有字靣既載清酤賚我思成亦有和羮既戒既平總是秉一誠以對越也故緊接鬷假無言時靡有爭句如此則祭受其福矣故著綏我眉壽黃耉無疆句上篇綏我思成我所綏也此賚我思成神所賚也時靡有爭夲奏假無言來此爭字要看得好謂各執其事無相奪倫也既載節已完祭事則受福事矣然所謂有秩斯祜申鍚無疆者未之盡也故約軧節又舉助祭諸侯受命降康之事以見假饗之必然降福之無已皆是烈祖秩祜之所遺此是詩之前後大發明處諸侯之助祭由我受命之溥將也故此句粘足上三句然又有起下意此以見詩詞之貫串而血脉之流通也以假以享是人之以來假來饗是神之來天命𤣥鳥降而生商宅殷土芒芒古帝命武湯正域彼四方方命厥后奄有九有商之先后受命不殆在武丁孫子武丁孫子武王靡不勝龍旗十乘大糦是承邦畿千里維民所止肇域彼四海四海來假來假祈祈景員維河殷受命咸宜百祿是何詩序祀髙宗也祀髙宗而先祖德謂其中興不墜先烈也商之祀開於契成於湯中興於武丁而實皆天之命也故此詩序頌之語脉喫緊在數命字上天命𤣥鳥降而生商即維嶽降神生甫及申意蓋謂天命降生此契時在𤣥鳥至之日簡狄祈郊禖而得之者後世附㑹其說曰吞鳦卵而生契可笑也古者立郊禖其禮以𤣥鳥至之日用大牢祀天子親往后率九嬪御此詩所謂天命𤣥鳥降而生南也或者乃謂簡狄吞鳦卵而生契故其後郊禖必於𤣥鳥之日嗟乎稷與契同時人也克禋克祀以弗無子后稷之母之祀非亦以𤣥鳥至之日耶豈契生于稷之前稷之母始見此異而後祀耶履帝武曰履巨跡命𤣥鳥曰吞鳦卵千古不經之談可載之經以詔後世耶生商云者言商之統系皆自此其生出也與厥初生民同宅殷土芒芒是契初受封事天命生契生商契就是商之古帝古帝命湯正域四方即是帝天之命故承說方命厥后奄有九有厥后指成湯自成湯以後武丁以前諸先后皆承天命矣而中衰幾殆所賴以不殆者在武丁為人之孫子盡繼述之孝也故承說在武丁孫子又承說武丁之武靡所不勝而世莫不承肇域彼四海於湯正域彼四方先後其重光也此為祀武丁之詩正字雖作治字解然有始字意在域彼四方以四方為域也下文肇域彼四海正照此一句命武湯正域四方則此方即命之成湯也故云奄有九有武丁孫子非武丁之孫子也武丁即是孫子細體此口氣似今說某人家􅽮如此基業全在這某人孫子身上一般朱子將襲湯號釋武王二字極當看撻彼殷武篇便見其靡不勝處龍旗二句甚言諸侯服從之多耳不重在祭上邦畿千里維民所止言生齒蕃衍而居處於京師者甚衆且多也若謂民之所止不過千里則失詩人之語意矣肇字雖作開字解亦有始字意在再造者之功與開創者同四海來假云云言輻輳歸命於天子甚衆且多而隨景山以輻貟直到於大河也殷受命咸宜正應前數命字契率履不越宜受命宅殷土湯聖敬日躋宜受命正四方武丁恭默思道宜受命域四海此其福祉之積申鍚無疆而百祿之是何也何負荷也濬哲維商長發其祥洪水芒芒禹敷下土方外大國是疆幅􅊷既長有娀方將帝立子生商𤣥王桓撥受小國是逹受大國是逹率履不越遂視既發相土烈烈海外有截帝命不違至于湯齊湯降不遲聖敬日躋昭假遲遲上帝是祗帝命式于九圍受小球大球為下國綴旒何天之休不競不絿不剛不柔敷政優優百祿是遒受小共大共為下國駿厖何天之龍敷奏其勇不震不動不戁不竦百祿是總武王載斾有䖍秉鉞如火烈烈則莫我敢曷苞有三蘖莫遂莫逹九有有截韋顧既伐昆吾夏桀昔在中葉有震且業允也天子降于卿士實維阿衡實左右商王詩序大禘也商世但稱成湯而不知自契始故開首說濬哲維商長發其祥見世有明德而發祥之甚逺也要說契之教化繼神禹平治之功敷於四海故先從洪水芒芒說起方將云者謂其勢將向於昌大也將字不得即解作大字桓撥之撥即撥亂反正之撥逸居無教則近於禽獸盡力於明倫之教撥亂而反之正其桓如何受小國大國受字即歸斯受之之受言舉小大之國皆歸之翕受中皆教以人倫而使無不通也率履不越正是契之身教處以身教者從故當時之民視契之所履無有不啓動其良心而歸於教育者故曰遂視既發到遂視既發才見其撥正之功才見其桓撥之實相土烈烈是言其能光大而恢廓也帝命不違夲帝立于生商來已非一日矣而至于湯天命一時齊㑹故湯降生也若稷之彌月不遲焉乃湯則唯知栗栗焉以承上帝此帝命式于九圍也不違至于不遲字面冝細體統在帝命上說聖敬以下則湯之所以承帝命者前後二帝命字照看自見得千聖相傳只一箇敬字湯以義制事以禮制心如下文行政用武皆夲此心之栗栗來故其敬稱聖敬敬則日益收斂日益躋升矣而湯且持之悠久維上帝之是祗寧不益大當於帝心乎此帝命式于九圍也聖敬日躋詩人頌湯之詞而湯不知也彼知昭假于上帝耳故復下昭假遲遲上帝是祗二句帝命式于九圍則小球大球小共大共無不來歸矣歸斯受之故章首俱提掇一受字為下國綴旒便冝有為天下撫綏的事故承說何天之休而敷政優優為下國駿厖便冝有為天下驅除的事故承說何天之龍而敷奏其勇為政有體但於寬嚴強弱間調停而劑量之使不墜於一偏耳語曰大弦急者小弦絶又曰優游不斷又曰太剛則折太柔則廢四者不偏而優優以敷布之則天休遍被於下國而福祿歸之矣故曰敷政優優百祿是遒書曰政貴有恆優優之謂也勇非所尚也而有時乎乘天龍以懷萬邦則勇亦不可廢者但貴乎善用之不張皇而震驚不生事而搖動不畏難而戁恐不率易而竦懼則其勇所以安天下非以毒天下而福祿綏之耳故曰敷奏其勇百祿是總龍字不作寵字解龍飛騰變化天下之勇莫加焉故曰何天之龍敷奏其勇下文云武王載斾有䖍秉鉞如火烈烈則莫我敢曷正敷奏之實也政曰敷政勇曰敷奏見皆當周布而使遍也王者之師何以如火之烈子産曰水柔也人玩而溺之火剛也人畏之不可犯正此烈烈之意莫我敢曷莫敢誰何也武湯載斾秉鉞以誅不義總是去暴安天下之民善承帝命式九圍之意昔在中葉二句是追說湯初年事書云肇我邦于有夏若苖之有莠若粟之有秕小大戰戰罔不懼于非辜是所謂有震且業也允矣天子口氣若曰信哉湯為天之子也故天降豫卿士阿衡左右以定天下也大禘禘祖之所自出故自契以至於湯歷歷言之而必有配饗于廟者故及阿衡之功帝立子生商帝命不違上帝是祗帝命式于九圍數帝字命字是語脉下何天之休何天之龍允也天子降于卿士統是帝命之意撻彼殷武奮伐荆楚冞入其阻裒荆之旅有截其所湯孫之緒維女荆楚居國南鄉昔有成湯自彼氐羌莫敢不來享莫敢不來王曰商是常天命多辟設都于禹之纘歲事來辟勿豫禍適稼穡匪解天命降監下民有嚴不僭不濫不敢怠遑命于下國封建厥福商邑翼翼四方之極赫赫厥聲濯濯厥靈壽考且寧以保我後生陟彼景山松柏丸丸是斷是遷方斫是䖍松桷有梴旅楹有間寢成孔安詩序云祀高宗也武丁嘗恭默思道矣傅說亦嘗啓之學于古訓矣此以撻伐為威者何盤庚沒而殷道衰荆楚恃其強以外叛國幾不振矣維是撻伐之師出而裒其旅截其所責之以大義而知畏且令諸侯聞者之皆畏則此舉似亦不可少也要之皆從思道學古中出也所以稱中興之令主與奮伐而入其阻裒其旅截其所方可以服其心而不二孔明征南而曰自此不復反矣亦此意異域亦有人心也責以大義而彼自知畏服矣武丁不獨肆其威又能盡所以化誨懷服道此方是王者之師天命多辟節是由平荆楚之威說到服諸侯處以見中興之烈歲事來辟勿豫禍適但曰稼穡匪解則侯職之所重蓋可見矣王祭不共包茅不貢其曷以逭伐哉天命降監二句泛說小民之可畏不僣不濫以下方著武丁身上說見其能嚴乎下民受天之明命而大建中興之福也商邑猶舊也而稱翼翼者豈獨在更新之飭哉維王振奮于其上人心自覺改觀焉而都邑始為天下重耳且更有聲教之宣威靈之震壽考令終以貽子孫無疆之福故詩人一一指言之以見中興之所為極盛也陟彼景山節是立廟以安武丁之神靈也故曰寢成孔安武丁有百世不磨之功宜立百世不遷之廟重訂詩經疑問卷十二
