body:
  text: 重訂詩經疑問卷八明姚舜牧撰大雅文王在上於昭于天周雖舊邦其命維新有周不顯帝命不時文王陟降在帝左右亹亹文王令聞不已陳錫哉周侯文王孫子文王孫子本支百世凡周之士不顯亦世世之不顯厥猶翼翼思皇多士生此王國王國克生維周之楨濟濟多士文王以寧穆穆文王於緝熙敬止假哉天命有商孫子商之孫子其麗不億上帝既命侯于周服侯服于周天命靡常殷士膚敏祼將于京厥作祼將常服黼冔王之藎臣無念爾祖無念爾祖聿修厥德永言配命自求多福殷之未喪師克配上帝宜鑒于殷駿命不易命之不易無遏爾躬宣昭義問有虞殷自天上天之載無聲無臭儀刑文王萬邦作孚此篇以修德凝命為主言文王之德昭升于天故受天命以有天下後世子孫欲保守此命以常有天下全在法文王之德觀首語文王在上於昭于天結語儀刑文王萬邦作孚便見得中間無念爾祖聿修厥德是提醒極切要語文王在上二句不是文王既沒而其神在上昭明于天之謂言文王在位之日小心翼翼昭事上帝其德昭升于天而天命屬焉故周邦雖舊而受命則維新也在上云者蓋周公與成王言之辭如今人稱已故宗祖云某公在上云爾先儒不察乃舍文王存日之德而稱文王既沒之神亦謬矣且既說在上又說昭明于天理亦缺順子孫不忍死亡其親啓口必云在上此是稱其存時不是稱其沒後頌堯曰光被四表格于上下頌舜曰𤣥德升聞皆稱其德非稱其神也神則何以新天命哉周頌桓之篇云於昭于天亦以德言不以神言有周不顯二句緊頂上說不顯所以甚言其顯不時所以甚言其時有周豈不顯乎言王業浸盛也帝命豈不時乎言適當其時也文王陟降二句正言當日文王在位時事凡一注想一動履凛然必嚴天命而常若在帝之左右者然此其德之所以昭升于天也因上文但說於昭于天未明言其所以昭故復著此二句注首云其神在上昭明于天末復云其神在天並不提起一德字恐非周公告成王之㫖亹亹文王即承上陟降左右說天命不已而文王之德之純亦不已則其令聞之不已將有上逮於天者故天眷而陳錫之也此與上章本一氣貫令聞本令德來令聞不已正見其昭升于天故緊接陳錫語陳錫哉周侯以下正見其受命事文王之德純亦不已故令聞不已令聞不已故陳錫之命亦不已陳錫哉二句舊用周字句侯訓維而綴在下愚謂不然成王時同姓已就封矣周公欲張大文王受命而子孫悉蒙其庥庇故從侯服說到宗本上來若曰陳錫哉周侯皆文王之孫子也文王之孫子本為王支為侯百世而同休故凡周之士不顯而亦世焉初從侯服說到本支又從本支說及臣子總是張美文王之德之顯受命之時觀不顯亦世不顯二字便見得侯諸侯也宗本為王支庶為侯是定理因說諸侯故錫字上著一陳字耳不特此侯字不當解作維字即下章侯于周服侯服于周侯字亦不應作維字解侯諸侯也服侯服也當時天命在商商以天子臨周而周侯服于商帝既命商之子孫皆以諸侯禮事周是侯于周之服也侯于周之服即是侯服于周故下字若此耳集注凡遇侯字不論有解無解通作維字訓不知侯之訓維出于何據也文王之德不顯而周之士亦不顯文王之孫子本支百世而周之士不顯亦世皆由修德來故下緊承說世之不顯厥猷翼翼厥猶翼翼言其謀圗於邦國者皆秉小心以為之翼贊也文王小心翼翼周之士厥猶翼翼亦感召之機然哉思皇多士六句反覆說多士之生是國家楨幹而文王亦深賴之見修德不可以無輔也下章提無念爾祖聿修厥德而呼王之藎臣亦是此意生此王國天生之也王國克生文王教化作成之也怙冒西土修和有夏是文王寧國事而非得疏輔後先奔走禦侮輩亦不能成故曰濟濟多士文王以寧穆穆非狀其容狀其德之深逺也德之深逺由此心常明而常欽翼來故曰穆穆文王於緝熙敬止人心是人之主最不可使昏蔽才一昏蔽則不能檢㸃而自主然非常加檢㸃則又不勝其昏蔽此緝熙敬止四字缺一不可也注不已其敬覺說未透上云亹亹此云穆穆下篇云翼翼此何以分曰翼翼者言此心之常欽惕也亹亹者言此心之常黽勉也穆穆者言此心之極深逺也常欽惕則常黽勉愈黽勉則愈欽惕而深逺不可窺此稱穆穆文王必歸之緝熙敬止也下文論聿修厥德曰永言配命亦此之意夫假哉之假宜作昭假之假解有商孫子有字宜作臣有之有看周原是侯服文王時尚仍其舊而天命實歸之商孫子侯服于周自此始故云侯于周服下是克商後事故云侯服于周詩人一字不苟下如此前但云假哉天命至侯服于周則天命昭然在周矣故始云天命靡常微子未嘗事周也傷微子一語是劉向之文而朱子述之不及削耳呼王之藎臣曰無念爾祖是一章大㫖意念爾祖在修厥德修厥德在永言配命永言是心口常念及之謂念兹在兹即是亹亹即是緝熙敬止永言配命須以失天命者為鑒故及殷之未喪師云云此四句歸重在下二句始猶不敢斥王而呼王之藎臣此云命之不易無遏爾躬則直指成王而使之自責自修矣宣昭義問有虞殷自天教之無遏爾躬事無遏爾躬即天之厯數在爾躬無使天祿永終意不必引紂之自絶比有虞殷自天方是教以度殷之廢興而折之於天宣昭義問言宣布昭明以義理詢問於人也此正聿修厥德無遏爾躬事若問聞通用前令聞何不通用令問耶抑有虞殷自天愚亦謂當時虞賔在朝三恪在列故周公於昭宣義問下即指以為鑒若曰自有虞以至於殷其廢與興皆自天命之甚可畏也若是而修德以昭義問其可緩乎上天之載二句總說天道之微不可以測識意然天命實主於民心修厥德以懷萬邦莫有如文王者儀刑文王則萬邦作孚而天命可永保矣此二句是極緊要語故結尾言之儀刑文王不是泛然模擬其外而已就此章論之陟降左右我如何而學其所為陟降緝熙敬止我如何而學其所為緝熙其注想之也若見于羹見于牆而其體行之也亦趨而亦步如是始謂之儀刑始無愧於文王始可致萬邦作孚而永保維新之天命張子云存文王即存天載之神極有見作孚二字聫讀即無不用情之意反照就是作僞如解作孚曰作而信之將解作僞曰作而僞之乎始說文王在上於昭于天周雖舊邦其命維新終說上天之載無聲無臭儀刑文王萬邦作孚而中稱帝命不時假哉天命天命靡常峻命不易一行一回顧一提一喚醒而於中又喫緊語曰聿修厥德永言配命則忠告善道蓋莫有踰於斯詩矣成王之得為令主有由哉讀此詩全要沉玩六命字一德字書成王曰敬迓天威嗣守文武大訓無敢昏逾蓋深得此詩之㫖矣此篇每章語相承接纍纍如貫珠又是一格明明在下赫赫在上天難忱斯不易維王天位殷適使不挾四方摯仲氏任自彼殷商來嫁于周曰嬪于京乃及王季維德之行大任有身生此文王維此文王小心翼翼昭事上帝聿懷多福厥德不回以受方國天監在下有命既集文王初載天作之合在洽之陽在渭之涘文王嘉止大邦有子大邦有子俔天之妹文定厥祥親迎于渭造舟為梁不顯其光有命自天命此文王于周于京纘女維莘長子維行篤生武王保右命爾燮伐大商殷商之旅其㑹如林矢于牧野維豫侯興上帝臨女無二爾心牧野洋洋檀車煌煌駟騵彭彭維師尚父時維鷹揚凉彼武王肆伐大商㑹朝清明此篇章句下分說最明然要知天命無常惟德是與周家自王季太任積德以生文王文王又加培植焉故誕受天命生武王以伐商成此丕丕之業修德凝命是文王事故四章云天監在下有命既集六章云有命自天命此文王武王不過承文王既集之命耳故六章云篤生武王保右命爾燮伐大商讀此詩要識其詞㫖之所在明明在下二句是甚說天人之相對越處兼善惡豫奪言為妙天難諶斯二句緊頂上一串下曰天難忱斯有去留莫定之意曰不易維王有保持極艱之意不易維王維字有大意蓋凡有身有家者其事皆不易勝然其事止于身耳家耳即有差失亡身耳其姓猶在也亡家耳其身猶在也維王者威命靈爽足以富貧生殺天下之人其賦性之凶惡者或以自行其恣睢而禀質之昏愚者或以受欺於奸佞荼毒脧削靡所不為天下痛憤以籲天而彼方自以為無事及菑害並至赤滅隨之求為匹夫而不可得此何以哉其位其權與僅僅有身有家者異故其威福之及於天下者大而不善居之者其受禍亦獨慘也故曰不易維王下文使不挾四方正是此意天位位字是虛字言天位此殷之適也使不挾四方是天的大㫖意合著此㫖意便足以王稍失此㫖意便隨以亡何以先仲任而及王季上言天位殷適仲任自殷商來故承說之耳觀維德之行在乃及王季下則知王季仲任為合德之配乃生此文王大聖人也豈偶然哉細玩維德之行一語則其所從來者逺矣但不及追說耳小心翼翼是文王一生學問舉其事則肅肅雍雍亦臨亦保是也聿懷多福懷字不作來字解解作來者謂文王後來許大之福由如此昭事以聿來之耳不知聖人視所現在通是福而常恐不足以保其有是謂懷詩得聖人之意故亦如此說耳若解作來字大失聖人之意矣不敢從厥德不回從小心翼翼來小心以昭事其德未有自陷於回邪者輔慶源曰一有回曲則此心便息此理便絶天人上下皆不相管攝矣說得極妙受方國是自然來歸者如虞芮質成之類天監在下有命既集正是文王之受命處首云眀眀在下赫赫在上此云天監在下有命既集正相回顧語此在下二字即首章在下二字此集字極下得妙論語云色斯舉矣翔而後集言周旋審視而後下集之也此云天監在下有命既集蓋亦旋視此在下之人維文王之德足以凝命而下集之耳皇矣云監觀四方求民之莫正此意監與集二字正相應方說有命既集乃提文王初載天作之合云云見天生文王復生文王之配來始嘉合篤生武王以承保右之命其事甚不偶然也詩於太任大姒備叙其所出而於嫁嬪親迎之禮一一詳之見聖人重大禮而不苟且以見其合之非偶也俔從人從見是見生於人世者詩意謂此大姒是天所降生者故用俔天字靣若曰此天之妹而俔生於人世者云耳訓磬訓譬恐未是文定厥祥是聘親迎于渭是娶舉兩端而六禮備矣古人之重嘉禮也如此不顯其光就親迎時說韓奕篇韓侯迎止亦曰不顯其光于周于京如何聯上句解所謂于周者即前章來嫁于周也所謂于京者即前章曰嬪于京也詩謂大姒克嗣大任之徽故復從大任說當時于周于京與王季維德之行女事莫過於大任今日纘此女事者維有莘之長子亦與文王維德之行故篤生此武王而克承保右之天命也將于周于京聯上句解而將維行之行作嫁字解可發一笑篤是加厚之意篤生武王見天有意以生此人也保定意右助意既定而復助是為成命燮訓和極是今人稱善調燮者必用文武火為之天命燮伐蓋命武王以威惠並行之也此下字之妙處侯興侯字訓維字最可笑此句上云維豫矣如亦從維字曰維豫維興可也如巧從侯字曰侯豫侯興可也因何維與侯並用而侯從維解哉據愚見此侯字宜作本字解當時武王猶為諸侯所從三千人即侯之衆也故曰維豫侯興耳觀武王載誓師之詞曰受有臣億萬惟億萬心豫有臣三千惟一心商罪貫盈天命誅之則武王亦知上帝之意衆寡之不足論矣而何待衆人之贊决哉曰武王之伐商非其得已也苟自此師之陳而受有悛心天有返命武王亦何樂於必伐哉而當是時則必無是事也故衆人即帝命以贊其决耳上帝臨女無二爾心此語極大而可以通用者在此章則專從伐商言耳要識得武王師衆之盛盛以三千之一心也盛以上帝之鍳臨也不然將莫敢與如林者潔長短矣胡煌煌彭彭之足云凉彼武王凉字依漢書作亮解愚謂凉薄也正照上洋洋煌煌彭彭看言彼何若斯之富厚而此何若是之凉薄哉然一肆伐而㑹朝清明矣中庸一戎衣而有天下是凉之說也觀㑹朝清眀句則知未伐之先不勝其汚濁矣生民在濁汚中亟望時雨之洗滌天戈一指而清明即見於㑹朝此武王之師善承上天燮伐之命而克貽周家有道之長也書用爽厥師正㑹朝清明之意綿綿瓜瓞民之初生自土沮漆古公亶父陶復陶穴未有家室古公亶父來朝走馬率西水滸至于岐下爰及姜女聿來胥宇周原膴膴堇荼如飴爰始爰謀爰契我龜曰止曰時築室于兹乃慰乃止乃左乃右乃疆乃理乃宣乃畝自西徂東周爰執事乃召司空乃召司徒俾立室家其繩則直縮版以載作廟翼翼救之陾陾度之薨薨築之登登削屢馮馮百堵皆興鼛鼓弗勝乃立臯門臯門有伉乃立應門應門將將乃立冡土戎醜攸行肆不殄厥愠亦不隕厥問柞棫拔矣行道兊矣混夷駾矣維其喙矣虞芮質厥成文王蹶厥生豫曰有疏附豫曰有先後豫曰有奔奏豫曰有禦侮此篇詩柄是自文王至此三篇大抵皆周公所作以戒成王者文王篇專述文王之德大明篇本王季維德之行說到文王之德受天命以及武王此篇又本大王遷都以開王業說到文王總見聖子神孫相為前後所以能成此丕丕之基後世君有天下者當思此積纍締造之艱守成業以致盛治綿綿瓜瓞句極比得好通章只此一句足以槩之又詩之一格也民之初生與厥初生民一般看蓋原周之始也劉安成曰周人之生盛於岐周豐鎬之時而始於公劉居豳之日公劉以前固生於后稷而不窋以失職而奔竄周民幾無生矣故厥初生民時維姜嫄此一初也民之初生自土沮漆又一初也自土土字即土著土字自土沮漆蓋土著於二水之間耳未有家室非無家室也未若後來之立室家耳胥宇是大槩說後章定民居立廟社皆其事也不專主已室家說大王遷岐非擇而取之及至岐則必相其可居者居之故因見周原之膴膴堇荼之如飴始謀之人鬼而築室于兹焉公劉遷邠時相其隂陽觀其流泉度其隰原此云周原膴膴堇荼如飴大抵風氣之美惡略見於山川而精藴之袐藏可徵於生物公劉之相視視山川也大王之相視視生物也知此理而地不難識矣今堪輿家大約不出此兩端居以生物為本有生物則有生民衛文公徙居楚丘營立宫室曰景山與京降觀于桑亦是此意太王見此地可居始起意而圗之曰爰始洪範之謀及乃心也於是謀之於衆曰爰謀洪範之謀及卿士庶人也於是爰契我龜洪範之謀及蓍龜也曰止曰時緊承上二句說爰始爰謀謀之人矣而胥以為可爰契我龜謀之鬼矣而兆得其吉是皆曰此其所可居者是止也皆曰此其所宜居者是時也止即居止之止時即時宜之時曰即人鬼同然之辭到乃慰乃止方是告其民使居之耳若此二曰字作告其民下乃慰乃止不幾于復說乎築室于兹未便就築蓋曰此宜築居于是耳與上聿來胥宇同皆大槩泛論之詞乃慰乃止是慰諭安止其民使定居也乃左乃右是多方料理其事使可以定居也乃疆乃理乃宣乃畝是又為立恆産使為安居樂業計也自西徂東周爰執事則凡自西來居者周旋委曲以為之謀使農工醫賈各執其事而相濟焉是皆聖人心思之所到而處置之必周者也先定民居為民謀生計而後立室家為廟社重門之制是大王之極知輕重先後處量地以成邑度地以居民是司空事致衆庶合徒役是司徒事故次第召之俾立室家句已含廟堂門社意其繩而下是將所欲營者分别何為宗廟何為廄庫何為宫社胥引繩以取直而縮版以載焉特其所先營者宗廟耳故云作廟翼翼而下章始詳言之非謂其繩則直縮版以載專為作廟言也救之節就縮版以載句詳言之見人心之樂趨人力之踊躍與庶民子來不日成之意同鼛鼓不勝非鼓不能止也鼓令之進何常令之止此但形人心奮躍以從事勝於鼛鼓之振作耳首立宗廟次立重門又立冡土許大規模宛然王者之制大王之識見創作於是乎不凡小矣冡土是國之社禮凡起大事動大衆必宜乎社而後行大王立此冡土正謂自今苟用戎醜必宜之而攸行耳非謂即今日所役之衆為攸行亦非謂立此冡土而即令戎醜之啓行也要看得好從立室家說到戎醜攸行便見居守齊備衆力盛強足以威制敵人之意故六章承說云云其語意極緊嚴行文甚次第肆不殄厥愠二句非不能絶昆夷之愠怒亦不墜已之聲聞之說大王所避者狄人也非昆夷也即就昆夷說既不殄絶其愠怒將侵陵之未已也如何不墜已之聲聞且厥愠厥問同一厥字何上厥屬夷而下厥屬之已耶不知此不如是解蓋大王所守之土地祖宗之土地也所撫之人民祖宗之人民也一旦為狄所迫舍之而逺徙即能保全其生靈為無恙聲問不從此隕乎吾寧無愠心乎今幸遷岐下度土相居如是以安我人民如是而立我室家如是而建我廟社視昔有光于今為烈即痛思祖宗不能殄我心之愠怒而創立新業亦可不隕墜昔日之聲聞此大王之所可自慰處而詩人揣得其情以見乎辭者也孟子所引特斷章取義耳而注即泥之為解不敢從注大王始至此岐下之時一假解得極明路從岐山出故云兊兊二陽在下一隂在上開口處其道也厥成成字即獄成成字凡獄已成而上讞及未成而求斷者皆謂之成此虞芮之所質是未成之獄也然但云質厥成而不竟其說即接文王蹶厥生句何也蓋二國雖來質成各愧而歸無事文王之平决而文王之所知者則知有蹶厥生而已矣故其詞若此文王蹶厥生不是由此動其起興之勢此蹶字當作蹶者趨者之蹶字看此生字當作天地之大德曰生生字看蓋天地之生民衆矣生民之倚命于君重矣而當紂之時慘烈誅夷生靈不勝其荼毒文王不暇徐行安步也而急趨以拯之出之水火之中而置之袵席之上此之謂蹶厥生也觀下疏附先後奔奏禦侮則可知當時諸臣之所為力者皆相文王以蹶厥生之事矣不然則文王所謂四臣之助將助豫興起之勢耶抑别謂其有所助耶吾不敢以為然也惠鮮鰥寡懷保小民蹶厥生也按密徂共伐崇戡黎亦蹶厥生也春生秋殺皆上天之仁慶賞刑威皆王者之德豫曰有四句皆文王自謂自幸之詞疏附恐非率下親上之謂疏疏導也附附益也文王雖聖而心常慊焉望人疏導而附益之故云然奔奏奏字不必讀作走字奏進也一奔一奏即往來傳宣德意之臣也但不必說到宣譽耳疏附是啓沃之臣開我生生之意者也先後是輔翼之臣佐我生生之政者也奔奏是傳宣之臣布德以利我生民者也禦侮是捍衛之臣奮威以安我生民者也總之則蹶厥生之助也讀此詩要重看乃慰乃止四節及文王蹶厥生一句芃芃棫朴薪之槱之濟濟辟王左右趣之濟濟辟王左右奉璋奉璋峩峩髦士攸宜渒彼涇舟蒸徒楫之周王于邁六師及之倬彼雲漢為章于天周王夀考遐不作人追琢其章金玉其相勉勉我王綱紀四方詩序棫朴文王能官人也注通本作人說亦官人之意首章言棫朴芃芃然薪之槱之者自至興辟王濟濟然左之右之者自來次章左右奉璋緊承上左右趣之說若曰此左右來趨者非泛然來㑹而已者奉有圭璋而其奉也峩峩然當世之髦士也注謂祭祀之禮王裸以圭瓉諸臣助之亞裸以璋瓉非矣文王在當時侯也非王也焉得用圭瓉而諸臣以璋瓉從耶看當日虞芮質成後諸侯聞而來歸者四十餘國如朝㑹之禮然則可識此詩之指矣若謂文王裸用圭瓉而諸臣以璋瓉從是文王之身僣王也有是理乎愚不敢以不辨周王之行何以有六師之從曰當時已賜有節鉞得專征伐矣但六師不令而自從則盛德之所感耳重看一及字曰左右奉璋曰六師及之分明朝覲訟獄征討皆來歸之如天子矣故曰文王三分天下有其二文王諸侯耳何以致左右之奉璋六師之追及蓋其作興鼓舞之有素也乃所作興鼓舞文王亦何心哉追琢其外金玉其內自足綱紀乎四方不期其歸而自歸雖禁其歸而有不能者一盛德之所致也故復著倬彼雲漢二章以贊咏之雲漢其長竟天故以興周王之夀考周王夀考則其作人者遐逺矣故云遐不作人遐字不作何字解此作人二字訓變化鼓舞之也極當追琢章注追之琢之云云連下三箇所以字又連下三箇至矣字吾不知其何謂蓋此二句詞雖偶聨而意實串下所云追琢者追琢此金玉也就文王之著顯於外者言也所云金玉者承受此追琢者也就文王之存主於內者言也詩人謂文王之夀考作人不是僞召來的觀其外之發政施仁種種周到真是追琢其章一般乃其內關雎麟趾藹然充足真是金玉其相一般勉勉焉我王以此德被及於天下真足為四方之綱紀而四方諸侯雖欲不歸其綱紀內有不可得者所謂周王壽考遐不作人者蓋如此若謂追之琢之則所以美其文者至矣猶或可曰金之玉之則所以美其質者至矣便不可通曰勉勉我王則所以綱紀乎四方者至矣又將何以解乎此愚不能無辨也追琢其章分明是文之光四方顯西土事金玉其相分明是文王之德之純此二句歸重在下一句綱紀四方總是之德之純發揮於政治者能鼓舞統率乎人心耳愚故謂此章之為又申上意也辟王周王我王皆後世之尊稱瞻彼旱麓榛楛濟濟豈弟君子干祿豈弟瑟彼玉瓉黃流在中豈弟君子福祿攸降鳶飛戾天魚躍于淵豈弟君子遐不作人清酒既載騂牡既備以享以祀以介景福瑟彼柞棫民所燎矣豈弟君子神所勞矣莫莫葛藟施于條枚豈弟君子求福不回詩序受祖也文王承太王王季之積纍是為受祖而豈弟二字又其受祖之本須重看豈弟君子何嘗有干祿之心人見其以豈弟得祿故云干祿豈弟耳末章求福不回亦此意寶器不薦於䙝味四句語極粹鳶魚在化育中自然飛躍于天淵人物在聖化中自然鼓舞作興而不知所以為之者遐不作人正言其所被者逺而無外而不自知也周王壽考遐不作人言其變化鼓舞與雲漢為章者同其久此云豈弟君子遐不作人言其變化鼓舞與鳶魚飛躍者同其逺故皆用遐字遐不作何字解既曰以享以祀以介景福何以又著瑟彼柞棫節曰此詩之所重者豈弟也清酒節但言祭祀受福而無豈弟君子語故復提說神所勞矣以申其所以能介景福意也再照綿篇柞棫拔矣皇矣篇柞棫斯拔看此燎字還是除其旁草而使木之茂也莫莫葛藟節與首章無異一云干祿豈弟一云求福不回深著其無心於福祿而福祿自歸之也首與尾正相應表記言得之自是不得自是以聽天命引豈弟君子求福不回二語蓋文王當日有一毫覬幸之心即回邪也首章著豈弟之得祿次節申明其必然乃所謂福祿不過神人之交與耳故著鳶飛戾天三節見人與神皆不能外此豈弟之德也末章直申照首章耳思齊大任文王之母思媚周姜京室之婦大姒嗣徽音則百斯男惠于宗公神罔時怨神罔時恫刑于寡妻至于兄弟以御于家邦雍雍在宫肅肅在廟不顯亦臨無射亦保肆戎疾不殄烈假不瑕不聞亦式不諫亦入肆成人有德小子有造古之人無斁譽髦斯士詩序思齊文王所以聖也凡後章事神治民聲聞作成事通可見文王之聖而所以得聖本賢母之胎教為多細玩篇章自見得思齊思媚二思字應作思字解不是語辭齊字亦應作齊字解不必讀作齊字蓋家以內大小莫不聽命焉維端然齊一以整飭其紀綱此方是家之嚴君大任所思在齊其家便能養成文王之聖德而開周家有道之長故曰思齊大任文王之母媚有柔和承順意周姜原是箇賢母大任思柔和承順以得其歡心克盡婦道故云思媚周姜京室之婦為人母只一箇齊字為人婦只一箇媚字而根心者為佳故此上俱著一個思字思齊母道思媚婦道便自有徽音之播而大姒一一以效之一一以嗣之所以無妬忌於宫闈而螽斯麟趾獨稱美于無窮也周家女德於斯為盛據詩序本文王之所以聖由太任來而得賢內助以承宗廟然後可深當乎先公之心而罔怨且恫是亦不可少者此次章血脉本嗣徽說來而中著刑于寡妻句其文章特妙據注言文王順于先公而鬼神歆之無怨恫者其儀法內施於閨門而至于兄弟以御于家邦也語意極佳自愚論之上三句只說文王得賢內助以當先公之心下三句說文王又以其身儀刑於寡妻以其恩聨屬乎兄弟以御乎家邦之衆內外相成以著其美故下承說云雍雍在宫肅肅在廟若注專重刑于句則未有寡妻者將不至于兄弟耶吕東萊曰毫髮不愧于隱微然後逺近可孚故神罔時怨神罔時恫始可以刑寡妻至兄弟大姒之德固好然文王之儀刑自不可少者刑只是以身為教陳止齊曰古人於夫婦之分極加嚴焉刑于寡妻刑于二字其法近忍不止於巽與也其言極善蓋閨闈之間眤嫟之愛所從來矣不以威克厥愛如刑焉如何成得至于兄弟至字不是帶過說至懇至也兄弟一體而分是至親其相友愛是至情此至于云者正親之愛之以盡其至情也若本刑于帶過說恐未是御字亦不應讀作迓訓作迎車駕牛馬以行全賴人為之御可無險阻傾敗之虞家邦之衆猶車馬然非整齊料理於其上其孰能治之此特下此一御字耳不知何所見而讀作迓訓作迎也雍雍二句雖照上而實開說總見其居處之不苟也不顯亦臨無射亦保總是箇小心翼翼緝熙敬止處射作斁解吾不知其何始即此篇亦有古之人無斁斁字何不亦用射字耶愚謂射即是射字疑是觸及之意詩若曰雖不顯著而常若鑒臨雖不觸及而常加保守云爾如此解自可通不必訓作斁戎疾是外來的不能保其不至修德是分內事故烈假可保其不瑕凡人有聞才加敬慎有諌才加進修文王雖無聽聞而心常惕焉必歸於法式雖無諌諍而心常求焉深入於義理此緝熙敬止之極功與上不顯亦臨同意注所云較未得文王勉勉不已之心成人有德小子有造則無一人不在化育之中所謂一時人材皆得其所成就者即此便是譽髦斯士處而實由文德之純亦不已者來故著古之人無斁句上文不顯亦臨無射亦保不聞亦式不諌亦入正是古之人無斁處文王之光大無玷成就人才總由其無斁之心來而所以修德養心得成盛美却由禀氣之莊敬來故首章本思齊大任以見文王之所以聖也皇矣上帝臨下有赫監觀四方求民之莫維此二國其政不獲維彼四國爰究爰度上帝耆之憎其式廓乃眷西顧此維與宅作之屏之其菑其翳修之平之其灌其栵啓之辟之其柳其椐攘之剔之其檿其柘帝遷明德串夷載路天立厥配受命既固帝省其山柞棫斯拔松柏斯兊帝作邦作對自大伯王季維此王季因心則友則友其兄則篤其慶載錫之光受祿無喪奄有四方維此王季帝度其心貊其德音其德克明克明克類克長克君王此大邦克順克比比于文王其德靡悔既受帝祉施于孫子帝謂文王無然畔援無然歆羡誕先登于岸密人不恭敢距大邦侵阮徂共王赫斯怒爰整其旅以按徂旅以篤周祜以對于天下依其在京侵自阮疆陟我髙岡無矢我陵我陵我阿無飲我泉我泉我池度其鮮原居岐之陽在渭之將萬邦之方下民之王帝謂文王豫懷明德不大聲以色不長夏以革不識不知順帝之則帝謂文王詢爾仇方同爾兄弟以爾鉤援與爾臨衝以伐崇墉臨衝間間崇墉言言執訊連連攸馘安安是類是禡是致是附四方以無侮臨衝茀茀崇墉仡仡是伐是肆是絶是忽四方以無拂詩序皇矣美周也天監代殷莫若周周世世修德莫若文王此篇叙大王王季之德以及文王伐密伐崇之事總見是天命所在非人力所可為看監觀四方求民之莫句見天本無私於人只求一人焉可以平定天下措生民於清净寧謐之中便欣然以天下付之所以為人君者當常懷安定生民之心而不負上天付托之意曰監觀四方求民之莫則上天擇君之意已略見矣維彼二國維此四國當時必有所指此不可考而認二國為夏商謂爰究爰度是尋謀四方之國則於監觀四方求民之莫語似多了一轉或曰二國即下章密與崇也亦有理上帝耆之耆字即周頌耆定武功之耆字維彼四國爰究爰度云云當是四國中有究心於治理度量於民瘼者上帝之心即耆定焉而增其式廓耳注訓究為尋訓度為謀而總云求於四方之國苟上帝之所欲致者體認缺明爰究爰度正對不獲言蓋未有不究度而能獲者乃眷西顧二句緊接上說來言當時爰究爰度可以安定斯民者惟大王焉所以眷焉西顧而與之安宅也此字指大王此維云者維大王能承此式廓之命也作之屏之其菑其翳是撤去其障蔽修之平之其灌其栵是削治其道塗啓之辟之其柳其椐是芟除其叢植攘之剔之其檿其柘是存植其美材總之則開創以莫民之事所以帝命眷焉而王業之所由始也大王自邠而遷于岐故云帝遷明德串夷載路不是混夷駾矣之說當時狄人侵我邠邑人民已為其所有大王不忍舍之去曰二三子何患乎無君我將去之而使之隨於是民從之如歸市焉而皆自狄人中出故云串夷載路耳大王本避狄人之侵不得已而居岐曰此維與宅乃天鑒其𠂻與之岐以開王業之大詩頌之曰帝遷明德要見人只是一個修德能修其德即萬一有不得已事中間友獲大福未必不是天之美意要識得明德曰帝遷厥妃曰天立見通是天意所在乃眷西顧此維與宅已受命矣而爰及姜女聿來胥宇實非偶然故云受命既固看帝省其山句見天無日不監觀於周即柞棫斯拔松柏斯兊觀之則大王之所以安定其民者蓋益大當乎天心矣所以帝與作邦又與作對而生此大王王季焉耳乃慰乃止以奠生民之居乃召司空司徒以立廟社門堂之制此是帝作邦而生有賢嗣曰大伯王季是帝作對此句意重在作對上注自其初生大伯王季之時而已定矣句極好此對字即下章以對于天下對字有此邦而無賢君以承之其何以對國人故此下一對字維此王季因心則友云云雖是因太伯之讓而云然然此處不必多說但謂大王生箇太伯又生箇王季天意便有在矣維此王季因心則友則友其兄不以存與去間也則維知篤厚周家之慶載錫讓德之光受祿而無喪焉所以能傳世而奄有此四方也若謂太伯因何而讓王季王季因讓而益修德將太伯王季通看做有心的人覺未快因心則友則友其兄則篤其慶三則字語極緊若曰王季之因心則存此個友而其友則友此大伯也則知篤厚我周家之慶而其他皆所不知也帝度其心恐非制其心之說貊亦不應作莫字解蓋言王季之心維此孝友克篤周家之慶可以仰承乎上帝故帝心亦監度之而使其聲聞宣布於遐邇也度即鑒度之度貊即蠻貊之貊若謂帝制王季之心使有尺寸能度義又清淨其德音使無非間之言不知帝何以制其心又使其無何等非間之言也愚不敢從德音必本於明德故貊其德音下緊承說其德克明其德克明云云不是王季之德有此六者王季之德只一個克明而已克明此明德胸中了無障蔽自隨物之至而能分别其等類這便是克類明足以類物其聰明特逹首出於庶物之上這便是克長眀足以類物而長人則我之德足以綱紀四方而莫不在其統馭之內這便是克君維其克君故王此大邦而其王此邦也却又以柔和之道治之而克順焉以一體之情聨之而克比焉比及于文王其德即克明之德而靡悔焉此既受帝祉施于孫子傳之萬世無窮也愚謂如此解庶得詩人之意此詩稱王季曰其德克眀康誥稱文王曰克明德而此詩上章云帝遷明德下章云帝謂文王豫懷明德可見只一箇克明而非有六者也大學一書中只說得一箇明明德此其一證前人有明德而後人更改之便是悔欲言文王伐密事先說帝謂文王無然畔援無然歆羡見得文王之斯旅也唯以對天下而初無一毫自利之心欲言文王伐崇事先說帝謂文王豫懷明德不大聲以色云云見得文王之斯舉也唯以順帝則而初無一毫自逞之意帝謂文王云云正是天命之所在文王克明德自無畔援歆羡之心而此曰帝謂文王無然云云若天有所以告戒之者天玉成一聖人聖人仰承乎帝命本是如此畔援歆羡雖聮綿却字各有義畔疆畔也有疆畔以分彼此然後從而攀援之是之謂畔援歆動念也此念既動斯不能禁其羡慕之心是之謂歆羡此二者皆人心之陷溺也無然畔援歆羡絶無一毫之陷溺超然先登於其岸矣身先登于岸然後能救援生民之陷溺故下緊接伐密之事王季則篤其慶文王以篤周祐正見其相承處以對于天下正應前章作對一對字王赫斯怒爰整其旅亦已親征密矣如何說安然在周之京且無矢我陵云云說人無敢陳兵於陵飲水於泉以拒我愚以意逆詩人意若曰文王此行雖奮怒以徂征然此心實無畔援歆羡也惟依然如其在京者以侵自阮疆並不橫加肆虐蓋所怒者止在密之君而不及於密之士女也故視所陟之陵曰我陵我阿曰我泉我池秋毫不加犯焉所謂密人即吾人也由是度其鮮原而居岐之陽在渭之將聮之邦域之中而絶其侵陵之患此之謂萬邦之方下民之王也無矢我陵四句是初行師時視密之人民即吾之赤子而無犯秋毫度其鮮原三句是既征討後收密之都邑入吾之版圗而視同一體此總是文王視四海為一家意故下文云萬邦之方下民之王注相其髙原而徙都焉所謂程邑也不知令密都之耶周自都之耶如令密都之不應既伐而復與之居如周自居之則周又未嘗都於程邑也注徙都一語大缺分曉方嚮方也萬邦趨嚮曰萬邦之方王歸往也下民歸往曰下民之王明德原是天所賦於人者我能全此明德便足以類萬物足以長天下君萬邦所謂求民之莫者只求此明明德者而已故帝謂文王曰豫懷明德不長夏以革愚不敢強解但就字義度之夏有盛大意革有改制意或者帝謂文王凡所設施不恃盛大以改制矣乎未知是否大聲以色便在聲色上見非明德自然之昭著長夏以革便在夏革上見非明德自然之作為有識有知便在知識上見非明德自然之法則故聲色不可大也夏革不可長也但不識不知默順帝天之則此之謂明德而帝之所深懷者觀豫懷明德一語見天為生民求安定無日不懷明德之君也故責望之極殷用聲色即是大用夏革即是長要看得圓融天道變化不窮實有則而不過故稱帝則此帝則是自然之變化初無知識於其間才著知識便非帝則之自然故命之曰不識不知順帝之則易曰乾元用九乃見天則又曰先天而天弗違後天而奉天時此不識不知順帝之則事天何心於生人殺人哉因可生而生之耳因可殺而殺之耳皆有則而不過在文王時如崇侯之譛其罪豈可赦哉舉兵而薄伐要以行天之誅耳吕氏云雖舉兵以伐崇莫非順帝之則而非我極看得好文王原有伐崇一事詩人著其奉天命而非我故著帝謂文王詢爾仇方合下一章臨衝間間章正指其伐崇事注緩攻徐戰一段極說得好凡讀詩須先討求個大㫖大㫖既得橫東監西無不合著如此詩大㫖在監觀四方求民之莫二句上乃所謂莫民者只在明明德之人故叙大王說個帝遷明德叙王季說個其德克明叙文王說個豫懷明德而中間稱上帝耆之帝省其山帝度其心帝謂文王不一而足總見上天為民求一賢君若此其切為人君者必明明德於天下然後可對天下仰望之心可不負上天立君之意此詩人立言之大㫖也不是之求而徒求之文詞間是章句之儒而非吾所望於說詩者經始靈臺經之營之庶民攻之不日成之經始勿亟庶民子來王在靈囿麀鹿攸伏麀鹿濯濯白鳥翯翯王在靈沼於牣魚躍虡業維樅賁鼓維鏞於論鼓鐘於樂辟雍於論鼓鐘於樂辟雍鼉鼓逄逄矇瞍奏公此篇因孟子引說古之人與民偕樂故後儒承說前二章是民樂文王臺池鳥獸之樂後二章是民樂文王鐘鼓之樂不知此靈臺是文王所築以望氛祲察災祥時觀遊節勞佚者自是王政所不可廢乃文王就於此臺畔建有辟雍之制懸設鐘鼓於其中令矇瞍習肄其業倘萬幾之暇遊息於斯即令此矇瞍間鐘鼓而奏公焉蓋不特朝廷有諌諍之陳宫壼有史管之記在輿有旅賁之規即一游息時未嘗不聞樂而警惕於其心也此是文王建靈臺辟雍大主意後世因辟雍定為天子之學蓋亦仍此意而為之也不究文王游息警惕之意而但稱民樂文王臺池鳥獸鐘鼓之樂謬甚矣敢伸微喙以正千古之大謬高明者幸虛心裁奪焉首章叙民之樂成此臺是民愛其君欲其時觀游以節勞佚也次章正叙文王在囿在沼時觀游以節勞佚事乃文王當此之時即臨辟雍設鐘鼓而令矇瞍奏公故復著虡業維樅二章讀詩者於此等處識輕重之有在斯可與言詩矣文王有聲篇張子注靈臺辟雍文王之學也鎬京辟雍武王之學也極有見於論論字不作倫字解論論說也即游息討論之謂詩謂此鐘鼓不虛設而於論時始設之此辟雍不苟臨而於樂時始臨之故再為咏佚而言曰鼉鼓逄逄矇瞍奏公正見此鐘鼓之設設之於論而不虛也此辟雍之臨臨之於樂而不苟也而怡適性情於臺沼之游者又收養性情於矇瞍之奏矣文王之時為樂而又不淫於樂蓋如此此愚謂靈臺之詩非專為民樂其樂而作也凡矇瞍所奏皆修身養性齊治均平之事天下之公言也天下之公事也故曰奏公似不必改訓功字下武維周世有哲王三后在天王配于京王配于京世德作求永言配命成王之孚成王之孚下土之式永言孝思孝思維則媚兹一人應侯順德永言孝思昭哉嗣服昭兹來許繩其祖武於萬斯年受天之祜受天之祜四方來賀於萬斯年不遐有佐此篇專美武王能式下土昭嗣服以開萬年之祜乃其要只在世德作求上而永言配命永言孝思則其作求之實用功處也照下繩其祖武看此下武二字或是下之人能履上人之武也故曰下武維周世有哲王詩序云下武繼文也謂武王雖用武功實上文而下武亦一說三后世有明德於昭于天故云三后在天首章重王配于京句乃其作配處不在繼其位而在繼其德故緊出世德作求句作求二字要重看先世如何以立心如何以制事皆德之所在也我作而思焉而必求以繼其志述其事此之謂作求統觀大王王季文王之德總只是個昭事上帝德與命原非二也故永言配命是世德作求之喫緊處永言配命常求合於天之心也常合於天心便常合於人心而人無不信之矣此之謂成王之孚孚之所在即式之所在未有孚而不式未有式而不本于孚者永言孝思即永言配命之意蓋先世之德與天命相合一而我思欲與先哲王相合一即與天命無二矣此永言孝思下承說孝思維則維則者維則此哲王之德也永言二字宜細嚼式與則正相應孝思維則乃可為下土之式媚兹一人應侯順德緊承維則二字來王者維則先哲玉則世德在武王矣當時諸侯其孰不歸之而侯邦之人其孰不應而順之此侯字正照上成王之孚一王字此德字正照上世德作求一德字見王者孝思維則所以能致人之媚兹致人之順應故更出永言孝思二句以贊其嗣服之無忝也若訓侯字作維字則上文孝思維則亦既用維字矣此胡獨取巧而改用一侯字耶且應之維以順德語殊缺暢似未得詩人之㫖嗣服二字即書大誥嗣無疆大厯服之稱謂嗣守先業之人也昭哉嗣服云者謂如此其永言孝思則克紹先業而於嗣服為有光耳昭兹來許雖承上昭字來其實說繼世而王者兹此也繼世者不知其幾許故稱來許耳昭兹來許一章若謂昭哉嗣服武王於是乎不可及矣即此嗣服之昭美傳至於今兹繼世者吾不知其幾許也若能皆言孝思皆言配命而能繩繼先哲王之步武則於萬斯年常可受天之祜而勿替矣武王世德之作求可傳於後世者蓋如此受天之祜節緊頂上說言昭兹來許皆繩祖以受祜則常可受四方之來賀而常可以得人之佐助也蓋媚兹順應在當日而世世藩屏王室可傳之於萬斯年故曰不遐有佐耳遐字不作何字解文王有聲遹駿有聲遹求厥寧遹觀厥成文王蒸哉文王受命有此武功既伐于崇作邑于豐文王蒸哉築城伊淢作豐伊匹匪棘其欲遹追來孝王后蒸哉王公伊濯維豐之垣四方攸同王后維翰王后蒸哉豐水東注維禹之績四方攸同皇王維辟皇王蒸哉鎬京辟雍自西自東自南自北無思不服皇王蒸哉考卜維王宅是鎬京維龜正之武王成之武王蒸哉豐水有芑武王豈不仕詒厥孫謀以燕翼子武王蒸哉此詩首二章稱文王末二章稱武王中四章稱王后皇王分屬文武蓋築城作豐維垣維翰是后王君公之事而維禹之績鎬京辟雍則帝皇統一之事也蒸字照書蒸蒸乂照後篇蒸之浮浮看應作鬱盛之意解若八章並用蒸哉二字為贊又詩之一格也此篇言文王遷豐武王遷鎬之事皆出於不得已讀者細玩章句首尾相接處可見其父子之一心矣曰有聲又曰遹駿云者言其聲之疾且大也遹疾速意遹求厥寧遹觀厥成是文王一生心事遹求厥寧是矣遹觀厥成不幾於太疾乎曰非也凡生民不幸遭其君之荼毒如陷之水火中望救之心至亟也夙夜以拯之而置之袵席之上則於民為有濟稍出之遲疑而拯之怠緩則無及矣易解之彖曰旡所往其來復吉有攸往夙吉來復之辭文王自道其遹求厥寧之心也夙吉之辭文王自道其遹觀厥成之心也此二語宜串看乃得其意文王受命有此武功就帝謂文王豫懷明德帝謂文王詢爾仇方云云看便見得伐崇即作豐也故云既伐于崇作邑于豐當時崇侯虎不獨譛西伯一事然觀譛及西伯而其為人之毒惡可知矣其民之不寧可知矣舉兵薄伐正遹求厥寧之心也匪棘其欲遹追來孝二句極說得文王心事透文王無然歆羡不大聲色何嘗有一毫自利之心維是太王遷都以安民王季克明以順比自來相承維此孝而文王遹追而及之自不得不若此其汲汲耳看太王肇基王迹便是孝於先公王季王此大邦便是孝于太王來孝是自來相傳之孝也遹追是追及前人之孝也注特追先人之意而來致其孝殊未快不曰王功曰王公者文王求寧之心原公諸天下而其功昭濯於天下亦與天下公之者也文王之德本足綱紀乎四方而自伐崇作豐來覺尤昭濯於天下四方莫不歸向而倚毗焉故曰王公伊濯維豐之垣四方攸同王后維翰翰即羽翰之翰鳥以翰蔽翼其身文王以德蔽翼天下故稱維翰豐水東注維禹之績二句不是泛泛說當時武王已得天下遷都於鎬矣鎬在豐水東意必武王導此豐水東注於鎬便諸侯朝貢之途故稱豐水東注維禹之績緊承曰四方攸同皇王維辟見即濬導一節亦是寧民之心而天下歸之也若謂豐水東注由禹之功故四方得以來同於此則上章四方攸同將從何道來耶且由禹之功亦看得忒自然了兩章四方攸同總狀天下歸之之意文王自岐遷豐覺較恢大於岐矣而武王既集大統萬國來朝則豐邑又似為窄小其勢不得不遷都於鎬者詩人恐世人疑舍豐遷鎬之為非也故即豐水東注一節見其纘禹之績致四方之攸同又舉辟雍一節見其以德化民來四方之心服又本其由考卜而成又推其為貽謀之不得已以見武王之遷鎬總亦求寧天下以追來孝之心而非有他也讀此詩者必沉濳反覆而知其語意之所在始得說鎬京辟雍便見講學行禮有許大事體在武王方遷鎬即舉行之可謂知先務矣考卜維王章總見其不輕議遷意豐水有芑不是興或曰豐水傍生物繁茂是道其實也武王豈不仕仕字亦不應作事字解此仕字即如今初入仕者必厯事觀政之謂詩意若謂豐水生物繁茂此法宜於子孫武王豈不厯事體而輕議遷哉蓋謂此豐本佳可以都而地形較窄不足容四方之朝㑹為子孫王者謀覺猶未便無寧導水東注而成都焉然後可稱四方之都㑹而貽萬世之丕基是貽謀燕翼之道也此亦求寧以追來孝之心也武王之不得已也如此看較為爽快耳燕訓安翼訓敬而翼子二字聯讀恐未當燕燕鳥也翼翼藉也燕營一壘可居矣而生子衆多不能容則别為一壘以容之是燕鳥翼藉其子之事也今就豐可居矣而生聚者多來㑹者衆自今不遷後世子孫將有大不便者而復作鎬以都之是詒厥孫謀以燕翼子之道也如謂翼子為敬承之子燕翼子為安此敬承之子吾不敢以為是也以燕翼子以字從上句讀來若曰詒厥孫謀蓋以燕翼子之道貽之也文王之心只是個遹追來孝武王之心只是個貽厥孫謀總之只是個遹求厥寧重訂詩經疑問卷八
