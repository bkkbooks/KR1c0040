body:
  text: 重訂詩經疑問卷五明姚舜牧撰小雅鴻鴈于飛肅肅其羽之子于征劬勞于野爰及矜人哀此鰥寡鴻鴈于飛集于中澤之子于垣百堵皆作雖則劬勞其究安宅鴻鴈于飛哀鳴嗸嗸維此哲人謂我劬勞維彼愚人謂我宣驕詩傳懷流民也鴻鴈往來于南北故流民以之起興肅肅者言其羽之蕭踈也于野是外境重看爰及矜人二句于征劬勞其可矜憐何如而况鰥寡之尤可哀乎斯時也苟無勞來還定安集之政民終離散莫歸矣故著此二句以見民之所以更生也集于中澤是來賓而還也正見民之還歸自活意流離在外室家一空止遺頺垣耳今還將整垣以居故云之子于垣雖則劬勞其究安宅蓋乍喜還集而相謂以自慰也離散之餘雖謀安集而生理未復不覺其悲酸也故復著哀鳴嗸嗸句三劬勞一般看首章之劬勞流移中無可安息之勞苦也次章之劬勞還集時不勝拮據之勞苦也末章之劬勞痛思此二者不禁之勞苦也此所謂痛定思痛者喜不自勝而鳴曰宣驕即易之鳴豫也維此哲人云云若謂此一假勞苦要維可諒于有識者而非無識者之可知也其哀鳴特深其寄意特甚將鴻鴈于飛肅肅其羽章描寫來分明是一幅流民圖將集于中澤章描寫來分明是一幅流民復業圖有天下國家者不可不常懷于方寸厲王用榮夷公專利而又用衛巫以監謗故其民流離至此宣王之勞來還定安集真再生之天也夜如何其夜未央庭燎之光君子至止鸞聲將將夜如何其夜未艾庭燎晣晣君子至止鸞聲噦噦夜如何其夜鄉晨庭燎有輝君子至止言觀其旗詩傳勤政也禮辨色而視朝數問夜如何其可以觀涖政之勤矣薑后脫簮珥待罪於永巷宣王自是早朝晏罷卒成中興之名其以是時乎夜未央未必有庭燎之光君子之至此所咏蓋想像君心之不安寢若夜方未半而即懷視朝之思爾晣晣解未當初云庭燎之光言庭燎業已發光矣繼則晣晣其明無有不徹者又繼則天欲曙而燎光已奪僅有輝輝耳諸解噦噦似俱未當愚謂將將是車之方來尚未畢至故將將其有聲耳繼而畢至則噦噦其聲喧雜矣又繼則鸞聲絶而其旗可觀矣故分列于夜未央未艾鄉晨者若是其次第耳沔彼流水朝宗于海鴥彼飛隼載飛載止嗟我兄弟邦人諸友莫肯念亂誰無父母沔彼流水其流湯湯鴥彼飛隼載飛載揚念彼不迹載起載行心之憂矣不可弭忘鴥彼飛隼率彼中陵民之訛言寧莫之懲我友敬矣讒言其興詩傳云念亂也兄弟是同寅于朝者邦人諸友則國中之共事人也不迹是不循古道之人即下文之為訛為讒者載起載行是卧不安枕坐不安席之意心之憂矣不可弭忘則憂念之深也鴥彼飛隼率彼中陵四句若謂此飛隼猶循道以攸往知所懲也民之訛言寧獨無念亂者為之懲止乎蓋甚傷止亂之無其人我友敬矣讒言其興是深探止亂之本訛言是亂政之言讒言是毁人之言蓋正人以邪人為邪邪人亦以正人為邪必先用讒言以去正人然後亂政之訛言為可肆也故詩人欲先止其讒言友敬二字相聫讀書曰同寅協恭和衷哉便是友敬的樣子此所云我友敬矣蓋欲我盡其所謂協恭和衷者以感動之也朱子見前有邦人諸友字靣却認此我友是我之友則前所云兄弟獨遺之耶讒言不興方可止訛言而已亂然其本却在我身友敬上詩人意若曰沔彼流水猶朝宗于海鴥彼飛隼猶載飛載止嗟我兄弟邦人諸友莫肯念亂亦獨何哉誰無父母何不重念以自全也次章沔彼流水其流湯湯鴥彼飛隼載飛載揚是嗟其不知朝宗載止也正指其莫肯念亂者故緊接上念字曰我獨念彼不迹者坐卧不安載起載行此心之憂不可弭忘矣我兄弟邦人諸友何獨異而不加念耶三章再承鴥彼飛隼來若曰此飛隼亦有率彼中陵者是亦知止之當止者何獨於民之訛言莫念而不共懲之乎懲之無他先自治而已我兄弟邦人諸友誠知友敬之當持自相輯睦讒言其能興乎讒言不興而訛言其能亂政乎是所以懲其不迹而已亂者誰無父母而莫肯念及乎以意逆志愚謂此詩之或爾也敢正髙明鶴鳴于九臯聲聞于野魚潛在淵或在于渚樂彼之園爰有樹檀其下維籜他山之石可以為錯鶴鳴于九臯聲聞于天魚在于渚或潛在淵樂彼之園爰有樹檀其下維榖他山之石可以攻玉九臯甚深逺而于野則甚曠濶矣于天則甚髙爽總言其聲聞無所不徹也淵深而渚淺故于渚止著一在字在淵上又加一潛字檀可為車美材也樂彼之園全是樂有此材然其下却有籜有榖是有所不必計者石粗石也且曰他山不知其所自出然可以為錯則非無用於世者况可以攻玉則其為大用又何如也通章罕譬而喻又詩之一體有聲自昭著而不可抑遏者有潛無定在而不可泥求者有樂取其材而不惟其全者有苟求其益而不惟其美者大抵通是泛言惟人之所用何如耳詩箋云教宣王求賢人之未仕者鶴鳴聲聞身隱而名著也潛淵在渚時隱而時見也樹檀下籜闕賢者而下小人也他山為錯舉賢用滯則可以治國也通章自合若朱子所云句自為釋則此詩乃講道學之詩矣愚不可得其解也祈父豫王之爪牙胡轉豫于恤靡所止居祈父豫王之爪士胡轉豫于恤靡所底止祈父亶不聰胡轉豫于恤有母之尸饔詩序刺宣王也詩傳穆王西征祭公述民怨以諫較是周書有所謂虎賁者疑即爪牙之士所以衛王宫者也衛王宫者而使之久役於外豈先王之制哉呼祈父而切責之將何説之辭王制諸侯有故方伯連帥以諸侯之師討之王室有故方伯連帥以諸侯之師救之未聞封圻之兵甲久役於其外者鳥獸以爪牙為威王者以介胄之士為威曰爪牙又曰爪士見宿衛之親軍不宜一日離王之左右者亶不聰是深罪之之辭易曰聞言不信聰不明也此軍法人所共聞而汝獨不聞故深罪祈父之不聰曰王之爪牙王之爪士見職不應役曰有母之尸饔見法不應役吕東萊注可玩皎皎白駒食我場苖縶之維之以永今朝所謂伊人於焉逍遙皎皎白駒食我場藿縶之維之以永今夕所謂伊人於焉嘉客皎皎白駒賁然來思爾公爾侯逸豫無期慎爾優遊勉爾遁思皎皎白駒在彼空谷生芻一束其人如玉母金玉爾音而有遐心詩序大夫刺宣王也宣王中興之後任賢稍懈賢有見幾而去者同朝大夫惜其去而思之故有此詩賢者素持清白人白則馬亦白故以皎皎白駒賦場苖場藿人所共惜願言食之而且欲縶維之蓋望賢者之我留也所謂伊人是想慕其人之辭與秦風蒹葭之所指意同賢者可賓而不可臣故云於焉嘉客留賢者安得公侯以爵人意若謂爾肯惠然其來公與侯是爾本等事將身享而逸豫之無期耳在彼空谷無復場苖場藿之望故接生芻一束句其人如玉以德之純粹溫潤如玉言惟其有是德所以將去而留之切既去而望之深生芻一束見飼馬之無穀而自甘淡薄有不必言者此其人之如玉令人想望之不可見且慕戀之不忍釋也故祝之母金玉爾音而有遐心冀相聞無絶焉而不忍忘也語意一串下賢者未必乘白駒以逺遁彼留賢者意若謂伊人之乘此白駒以行也倘肯食我之苖藿乎我將縶維之以冀旦夕之留於焉逍遙嘉客是我之至願也又見其欲去而不留意在優遊以肥遁也復以賁然來思期之曰爾公爾侯逸豫無期若謂此猶可以少止也曰慎爾優遊勉爾遁思若謂此行之不必決也然終見其必欲去而不我留也則重嗟此駒之在空谷束生芻而於其人之如玉深戀戀焉曰毋金玉爾音而有遐心若謂猶可相聞無絶乎尚如挹其逍遙嘉客之清輝也其愛戀也極誠其挽留也極懇而其為辭也極委婉而有餘思詩緝謂賢者肯來訪己賁然若有榮耀焉亦望之之辭也彼去而已留於是羡賢者退居之樂謂爾若為公為侯則將勤勞國事無有逸豫之期今爾肥遁優哉遊哉足以自樂願加保重耳故曰慎爾優遊勉爾遁思亦看得好唐風有枤之杜欲致之而不能得秦風之蒹葭欲親之而不能就此白駒欲留之而不能挽黃鳥黃鳥無集于榖無啄我粟此邦之人不我肯榖言旋言歸復我邦族黃鳥黃鳥無集于桑無啄我粱此邦之人不可與明言旋言歸復我諸兄黃鳥黃鳥無集于栩無啄我黍此邦之人不可與處言旋言歸復我諸父詩序刺宣王也不我肯榖者不於我肯加美意也不與我明不與我明白可生之路也不可與處不可與共處也此三章主意專在此三句上而語實相承按此篇注民適異國不得其所故作此詩下篇注民適異國依其婚姻而不見收恤故作此詩何以異乎愚謂此篇是將適異國而恐不得其所也下篇則已適異國而實不見收恤也讀其文自可見然總之則見當時之政失以致若此之流移又見當時之俗澆以見若此之偷薄也我行其野蔽芾其樗婚姻之故言就爾居爾不我畜復我邦家我行其野言采其蓫昏姻之故言就爾宿爾不我畜言歸思復我行其野言采其葍不思舊姻求我新特成不以富亦秪以異詩序刺宣王也蔽芾其樗而就爾居本為安居謀言采其蓫而就爾宿本為足食謀爾不我畜是不為我計居食而善遇我也昏姻之謂何原其意不過以貧賤棄我耳詩人意忠厚故但以不思舊姻責之此特字即柏舟實維我特特字是新姻之持出者即下文之所謂異也富字與異字對成不以富亦秪以異當云誠不以彼之富厚厭我之貧亦秪以其特異忘我之庸庸者耳如此解庶異與特非二義富與異相反對也敢問髙明不思舊姻求我新特從古來人情世態蓋如此秩秩斯干幽幽南山如竹苞矣如松茂矣兄及弟矣式相好矣無相猶矣似續妣祖築室百堵西南其户爰居爰處爰笑爰語約之閣閣椓之槖槖風雨攸除鳥鼠攸去君子攸芊如跂斯翼如矢斯棘如鳥斯革如翬斯飛君子攸躋殖殖其庭有覺其楹噲噲其正噦噦其冥君子攸寧下莞上簟乃安斯寢乃寢乃興乃占我夢吉夢維何維熊維羆維虺維蛇大人占之維熊維羆男子之祥維虺維蛇女子之祥乃生男子載寢之牀載衣之裳載弄之璋其泣喤喤朱芾斯皇室家君王乃生女子載寢之地載衣之裼載弄之瓦無非無儀唯酒食是議無父母詒罹詩序宣王考室也詩傳落新宫也同凡父母築一室必為其子孫計深逺乃承其後者不友于兄弟則親戚叛之未有能保其居者故此詩前以兄弟式相好為祝無相猶為戒猶從犬從酋狠獸也故采芑之詩云克壯其猶小旻之詩云謀猶回遹此字可作兩解作好解能幹之謂也作不好解狠惡之謂也此處應作不好解注謀也似也俱未當君子將營宫室宗廟為先廄庫為次居室為後此章曰似續妣祖築室百堵或者其宗廟乎約之閣閣節曰風雨攸除鳥鼠攸去或者其廄庫乎如跂斯翼節則其堂也殖殖其庭節則其室也室中為寢故承之曰下管上簟乃安斯寢云云則築室於是為備而次第見矣宗廟之築所以妥祖妣之神靈故首云似續妣祖綿之篇云俾立室家必先之作廟翼翼此亦一證也抑此妣祖疑即薑嫄也薑嫄為周人之始此立廟以祀必先之也觀厥初生民時維薑嫄句可見廟制始祖坐西向東取生生之義其餘三昭靣南三穆靣北而廟門則總向南故云西南其户記曰齊之日思其居處思其笑語此所云正先築此宗廟為致思之地也三章注上下四旁皆牢固正廄庫之居芋訓尊大也似無出處愚謂此芋字即今榖食中芋頭之芋也凡芋栽之土中子生甚衆廄畜馬尚生息之蕃庫畜積取栽培之意此芋義之所由取也若曰君子築此以栽植生産云耳敢正髙明注將二章為天子之宫三章為天子尊大之居似未得立言之旨如跂章注極明快覺非髙大而直之謂覺明覺也響亮也楹亦非柱也架于柱者也凡室必以楹計有覺其楹意謂室之前後楹皆明亮無蔽云耳噲噲其正狀正靣之爽快噦噦其冥狀冥處之深遠下管上簟乃安斯寢承上攸寧之室來蓋室中必有寢也夢占非實有是事祝願其生男女賢淑可以永承此居故先從夢占立説耳所謂獻吉夢者是也牀加之席地之上可以坐可以寢者地即席地之地耳凡人小而聲宏者其受福必大故著其泣喤喤句裼非褓也孟子有袒裼裸裎語記有襲裘袒裘語此裼亦衣也但止裼而無襲耳載衣之裳是裼而襲者也敢問髙明無非無儀儀字不當作善字解儀容儀也女子貴德不貴儀才致飾于容儀便是其可非處便是其詒罹于父母處故詩人特著非儀二字若謂有善可稱亦非婦人則詩之致頌思齊思媚嗣徽者非耶記載張老祝人之新居者曰歌于斯哭于斯聚國族于斯君子謂善頌善禱此詩先以凡弟無相猶為戒後歸到生男子室家君王生女子無父母詒罹頌祝曷以加焉張老之言意者其本諸此乎居第必傳子孫勿為子孫計非創業垂統之人也思祖父之艱辛至於兄弟相戕而自壞其基業不肖之子孫也誰謂爾無羊三百維羣誰謂爾無牛九十其犉爾羊來思其角濈濈爾牛來思其耳濕濕或降于阿或飲于池或寢或訛爾牧來思何蓑何笠或負其餱三十維物爾牲則具爾牧來思以薪以蒸以雌以雄爾羊來思矜矜兢兢不騫不崩麾之以肱畢來既升牧人乃夢衆維魚矣旐維旟矣大人占之衆維魚矣實維豐年旐維旟矣室家溱溱詩序傳皆言宣王考牧也此咏牧事之成而因及富庶之貞符見太平之象逈異於向昔之雕耗也首章賦羊與牛至于再上是舉羣與犉以見其生息之蕃下則著其和且安以見蕃息之可愛首語誰謂云云矜詑其新有因拒前言無者以解其嘲也或降或飲或寢或訛曲盡牛羊散牧之景狀何蓑何笠或負其餱曲盡牧人共事之景狀訛訓動未當此字從言從化當是鳴與動俱之意三百維羣未必誠三百也若俗語所謂二三百耳九十維犉未必誠九十也若俗語所謂八九十耳三十維物亦未必誠三十也若俗語所謂二三十耳如此體會庶可得詩人之語意抑疑物色何以必三十也古者郊社廟祭之牛必卜而用之卜與十古書法相類或者三卜維物爾牲則已具乎敢問髙明再提爾牧來思以薪以蒸以雌以雄見牛羊馴擾不假驅䇿奔逐之勞故牧人有餘力以及于採獵也緊承爾羊來思矜矜兢兢不騫不崩見物類之並育無相害也麾之以肱畢來既升見人與物之意兩相解耳牛羊皆然而獨舉羊者羊善觸而難擾也矜矜兢兢訓堅強騫訓虧崩訓羣疾似無謂愚謂矜即矜持之矜兢即兢業之兢騫即斬將搴旟之騫崩即若崩厥角之崩詩人意謂維羊性剛而善觸未有不假於驅䇿者維時物性擾馴羣類咸若不待驅逐而其外矜矜然其中兢兢然各覔水草而不騫相為羣友而不崩其類之馴和蓋如此此牧人得安意於採獵逮其夕也但麾之以肱而畢來既升也如此看庶前後融通而可得詩人之意牧人職牧耳曷思及於衆與旐哉而况衆維魚旐維旟也乃偶而寐寐而夢及於是者何天地間有開必先而其幾嘗發於無知覺之童稚天其將降豐年乎民其將有室家乎是以若或開之牧人而發為斯語耳不然即語牧人以此夢牧人亦不能記而况其得之於夢中者能歷歷語以告人乎固知此夢之非偶而詩特詳哉其言之也不然此詩亦夢耳何經之足云或曰牧人原無是夢而託言以頌禱耳若前篇所云曰熊羆蛇虺誠有是物若衆維魚旐維旟則無是理也無是理而為是辭可為善頌善禱乎不得援前夢以為例衆維魚旐維旟皆是以少致多之象有豐年然後有民人之庶故曰衆維魚矣實維豐年有室家生息之多然後有所以統之者故曰旐維旟矣室家溱溱大人之占全是據理非若後世之圓夢者曲詞以阿世也首章見牧類之衆多次章見牧事之備具三章見牧人之間暇四章見牧夢之佳祥攬此詩明是一幅羣牧圗所謂詩中有畫節彼南山維石巖巖赫赫師尹民具爾瞻憂心如惔不敢戲談國既卒斬何用不監節彼南山有實其猗赫赫師尹不平謂何天方薦瘥喪亂𢎞多民言無嘉憯莫懲嗟尹氏大師維周之氐秉國之均四方是維天子是毗俾民不迷不弔昊天不宜空我師弗躬弗親庶民弗信弗問弗仕勿罔君子式夷式已無小人殆瑣瑣姻亞則無膴仕昊天不傭降此鞠訩昊天不惠降此大戾君子如屆俾民心闋君子如夷惡怒是違不弔昊天亂靡有定式月斯生俾民不寧憂心如酲誰秉國成不自為政卒勞百姓駕彼四牡四牡項領我瞻四方蹙蹙靡所騁方茂爾惡相爾矛矣既夷既懌如相酬矣昊天不平我王不寧不懲其心覆怨其正家父作誦以究王訩式訛爾心以畜萬邦詩序云家父刺幽王也謂刺宣王用尹氏以致亂也然通篇之語總刺尹氏而不及王末二章但曰我王不寧以究王訩耳此家父之善為辭也首四句言尹氏位望之尊重不宜虛冒而竊處行政不善使我憂心如火燔灼而不敢戲談煞何等威焰國既卒斬何用不監是盡頭話見事至於此有不得不言者實草木之實也有實其猗全由土氣之平均此以南山生物之平影尹氏之不平不平二字是通篇緊要語凡平天下在先平其心心不均平則視民之好惡與己不相關而任用匪人行政乖謬有不可言者矣此大學平天下章總揭個潔矩二字天方薦瘥三句相遞説見神怒而人怨所亟宜懲嗟而悛改者觀民言之無嘉可以徴民心之痛怨矣故下章有惡怒字靣憯字何以訓曾字憯憯傷也言人所宜動心者憯莫懲嗟深怪其心莫知憯動懲創而嗟閔也氐是物之根抵言民生之休戚國家之安危皆係此一人之身也國均者國所賴以均平者也秉國之均言其所執持是均平天下之任不可以不平者維周之氐秉國之均四方是維天子是毗煞何等責任而可以不平處乎不弔昊天由立心行政之不平所以見怒於天而不加愍恤也不宜空我師師字即前師尹大師師字言尹氏不平不見愍於昊天則不宜虛據此大師之位也空者虛據之謂也弗躬弗親本不平其心來凡大臣存心於天下即夙夜匪懈以身任之猶若有不勝者而敢委之他人乎弗問弗仕二句謂大臣身任天下之重要在用人可弗問而弗仕乎今有道德者外之而弗問能政事者棄之而弗仕而曰世無人焉是罔君子也罔君子則用小人矣故緊接式夷式已無小人殆瑣瑣姻亞則無膴仕四句君子與小人對問仕與膴仕應此正規其宜親君子遠小人而不可殆及其國家也意極貫而理極明注似未得詩人之旨弗問弗仕正是其罔君子處故獨下一勿字式夷式已注不兩平解極善任小人必尤私其所親者故戒之曰瑣瑣姻亞則無膴仕傭字不宜作均字解愚謂即傭工之傭也書稱天工人其代之人不代天之工即天之不任其工也正應上弗躬弗親説昊天不傭四句雖平然細玩之不傭又本於不惠來此章二君子即照上章君子看罔君子則君子不屆安望其夷倘躬親問仕而君子如屆則亂可止息而民心闋矣既屇而君子如夷則民皆得所而惡怒是違矣此望其逺小人親君子以反鞠訩大戾之意上章式夷是望尹氏之平其心此章如夷則望其用君子以平其政後章既夷則望其僚屬和平説懌平政以平天下也三夷字正相照不傭不惠即降此鞠訩大戾如屆如夷即俾民心闋而惡怒是違如彼禍不可言如此亂可旋止此上之人宜憯然動心而速為懲嗟者不弔昊天節緊承上章説言如此其可止亂而竟不如屆如夷不見愍於昊天亂靡有定式月斯生俾民不寧此我憂心之所以如酲也誰秉國成不自為政而卒勞百姓之一至是乎蓋深罪之之辭國成成字不作平字解國成者所以均平天下一成而不可改者也誰秉國成可不躬親而問仕乎故緊接不自為政云云不自為政卒勞百姓既傷其不可居我瞻四方蹙蹙靡所騁又嘆其無可往相爾矛相字不宜作視字解相助也若助之以矛者方茂爾惡四句一正一反語意若曰方茂爾惡相爾矛矣安能平心以平政是所當戒者既夷既懌如相酬矣何難平心以平政是所當勉者獨奈太師之不知擇也故又無所歸罪而罪諸天緊接昊天不平云云我王不寧我王室不寧也前章云民不寧此云王不寧百姓不寧未有王室能寧者不懲其心懲字正應前憯莫懲嗟懲字蓋一懲其心則必知己之邪不懲其心必將以正人為邪未有不覆怨其正者王訩訩字即前鞠訩訩字究王訩者究尹氏昏亂王室之由在不平其心而任小人也今以此誦式訛其心使懲改以畜萬邦爾心正與其心相照應因尹氏之不自懲其心故以此誦式訛之爾訛從言從化謂以此言感化之也畜萬邦畜字極妙凡善畜者必擇與其所欲而屏去其所不欲者使之姁詬於化育之中畜萬邦亦然首章刺尹氏任重而致亂次章原其亂在不平而召天人之怨三章極道其委任之重不可以虛據四章病其遠君子而親小人五章言禍福轉移之在我六章咎其不能轉而禍民之深七章表己欲他騁而不可能八章是弭其惡而望其夷九章罪其終迷而不懲十章則明言己之所以作誦者是究其所以亂天下是開其所以畜萬邦不可不聽改也通篇是刺尹氏之所致亂者而王用尹氏之失自在言外若謂篇終窮亂本而歸之王心則王訩二字不宜若是其直斥爾心二字不宜若是其狎肆是不可以不辨者正月繁霜我心憂傷民之訛言亦孔之將念我獨兮憂心京京哀我小心癙憂以癢父母生我胡俾我愈不自我先不自我後好言自口莠言自口憂心愈愈是以有侮憂心惸惸念我無祿民之無辜并其臣僕哀我人斯于何從祿瞻烏爰止于誰之屋瞻彼中林侯薪侯蒸民今方殆視天夢夢既克有定靡人弗勝有皇上帝伊誰云憎謂山蓋卑為岡為陵民之訛言寧莫之懲召彼故老訊之占夢具曰豫聖誰知烏之雌雄謂天蓋髙不敢不局謂地蓋厚不敢不蹐維號斯言有倫有脊哀今之人胡為虺蜴瞻彼阪田有菀其特天之扤我如不我克彼求我則如不我得執我仇仇亦不我力心之憂矣如或結之今茲之正胡為厲矣燎之方揚寧或滅之赫赫宗周褒姒滅之終其永懷又窘隂雨其車既載乃棄爾輔載輸爾載將伯助豫無棄爾輔員于爾輻屢顧爾僕不輸爾載終踰絶險曾是不意魚在于沼亦匪克樂潛雖伏矣亦孔之照憂心慘慘念國之為虐彼有旨酒又有嘉殽洽比其鄰昏姻孔云念我獨兮憂心殷殷佌佌彼有屋䔩䔩方有榖民今之無祿天夭是椓哿矣富人哀此惸獨詩序大夫刺幽王也正月不必是四月大寒之後必有陽春當正月而有繁霜亦可慘矣看後章胡俾我愈胡為虺蜴胡然厲矣念國之為虐天天是椓則當時所以慘虐其民者可想見矣國有殃民之厲政天有失節之繁霜是感召之必然者也孰謂洪範庶政之應為誣罔矣哉民之訛言何為者政行慘虐而又欲箝天下之口故造此姦偽之言耳不曰執政而曰民者不敢斥也念我獨兮獨字極有意上訛言以欺下舉世之無知者又訛以相傳而不知民之夭椓國之淪亡有識君子懷獨憂焉而每不諒於其世也故此云念我獨兮憂心京京後復云念我獨兮憂心殷殷京大也憂在天下國家故曰京京曰憂心京京矣又曰京我小心癙憂以癢則此心所抱一腔之憂但若鼠之幽伏不可以明言者而實不勝其癢癢也此極言己心隱憂之甚曰憂心京京又曰癙憂以癢又曰憂心愈愈又曰憂心惸惸又曰心之憂矣又曰憂心慘慘又曰憂心殷殷煞何極其憂之深曰哀我小心曰哀我人斯曰哀今之人曰哀我惸獨煞何極其哀之甚父母生我云云蓋疾痛則呼父母之辭也説好説歹但從口出是謂好言自口莠言自口莠害榖者也榖為善則莠為惡矣好言自口莠言自口正民之訛言取辦於口而無實者巧言篇蛇蛇碩言出自口矣正是此等之言凡為好莠之言者必植黨比周以相阿附見有獨抱深憂者衆共訕誹而反凌辱之故曰憂心愈愈是以有侮京京是憂之大愈愈是憂之甚惸惸是憂之獨從祿無祿正相應我無祿與民丁此禍不知將于何可從祿也瞻烏云云正足于何從祿之意瞻彼三節詩緝講極有理謹録其全文於左林以竹木叢聚得名宜有喬木今斧斤伐之所存維薪蒸喻虐政所殘其民凋斃也方民之危殆無所赴訴視天若夢夢然罔聞知此特天之未定耳少焉天定則福善禍淫人未有不為天所勝者惟皇上帝所憎者誰歟天之所以為大非有所憎其為天所勝者皆人自取禍耳山則髙矣而謂山為卑然有為山脊之岡者有為大阜之陵者而謂之卑可乎喻小人訛言變亂是非以賢為否如此而王會不懲止之乃召彼宿舊元老但問之占夢之事所問不急也李義山詩云可憐夜半虛前席不問蒼生問鬼神亦此意也君臣迷甚皆自謂聖如烏鳥之雌雄無以相别也人謂天為髙而我不敢不曲身傴僂而行懼壓也人謂地為厚而我不敢不纍足小步而行懼陷也天地本無壓陷喻身處亂世禍出意外不可謂必無之事而不懼也我大呼而出此言人孰不疑其言之過然實則有倫有理何也蓋當時羣小肆毒以害人無所不至不可不慮故言耳哀今之人何故為虺蜴之行務為傷害人乎扤揑扤也不宜訓動字彼求我則如不我得者非真求為法則也小人初用事則以賢者有譽望而援引之以美觀聽所謂求我以為法徒好名耳非真有任賢之心也其始求我惟恐不得既而議論不合則空執畹之視為仇讐不用力於我矣知賢當力薦之既用當力主之庶賢者得展所藴今不用力則貌敬而情踈賢者之身不安矣安能當羣小之攻乎重言仇仇者言不一仇之無往而不忤其意也政者正也故曰今茲之正今茲之正胡然厲矣是問詞赫赫宗周褒姒滅之是應辭中間著燎之方揚寧或滅之句見即燎之方揚有不易滅者而赫赫然之宗周一婦人足以滅之其禍本之可畏蓋如此也或云褒姒滅之是舉前事以監戒若當其時不應若斯之直指也甚有理大凡執政之為姦惡者必先主宦官宫妾於其內苟無內主未有敢遽然放肆於其外者此曰褒姒滅之下篇亦曰艷妻煽方處吁此可以識禍本之所在而欲懲訛言之大姦當自己之清心寡欲始矣滅滅意同而字别滅取以水滅火義故中從火而側從水褒姒一婦人實為滅國之本而人不見其滅之之形故去滅旁之水改下一威字漢史云此禍水也滅火必矣是一證窘字何以無解又窘隂雨何以解作必有大難窘之也此隂雨即芃芃黍苖隂雨膏之之隂雨也且終其永懷亦非君子永思其終之説君子永思其終何以起得下又字凡言又者既如此而又如此也愚謂此懷字即齊風曷又懷止之懷詩意若曰禍本在褒姒非君子所宜懷者况可終其永懷乎乃君子既嬖寵不移而終其永懷又屯膏不施而窘其隂雨且疾正人之難親而棄其爾輔則必輸其載而人莫我助矣是或詩人之旨也敢問髙明無棄爾輔節緊承上章説若曰與其輸載而將伯以為助曷若求輔於未輸之先也輻賴輔以為附猶君賴賢以為毗故教之無棄爾輔僕則所以御車者故又教之屢顧爾僕會是不意若曰此會是可以不意得者乎謂君當必加之意也魚之樂在遊於江湖在沼非其樂也况丁於亂時意濳伏而孔照言其禍亂已著濳伏之人皆照然其見之也唐玄宗幸蜀民有來獻者詢之曰臣伏草茅中知有此事久矣正此意小人欲得其君以專天下之利必先植黨以自固非其朋友即其親戚朝夕以酒食相徴逐綰結紏纒而不可解其遇異已而可為國家輔者衆議譁然以斥之使國家虛無人而後己可得專其利此民之訛言亦孔之將之由來也詩人推本於旨酒嘉殽洽比其鄰昏姻孔云可謂洞燭其幽隱之情矣比曰洽比所謂小人之交甘如醴也云曰孔云是謂民之訛言亦孔之將也云訓旋字未當在小人洽比其鄰必令君自棄其輔蓋不兩立者殷殷訓疾痛未當言殷勤往來於胸中也佌佌彼有屋節言彼小人安然有居食之樂民獨無祿而遭此夭椓之禍乎當此時唯富者其或可耳惸獨將若之何蓋深哀其無所歸也以此結語激人君深憫人窮速懲訛言之將擇爾輔之任𢎞隂雨之施盡人勝天可救瞻烏爰止之大變語極懇而望極深首章著執政倡亂獨懷其隱憂次章悼己生之不時懷憂而遭侮三章傷國之淪亡莫知所止四章究天定之可畏五章怪王心之莫懲六章表已之號言七章疾小人之杌我八章原厲正之所自九章嗟懷佞棄賢之必輸其載十章謀所為善載者可踰其險十一章鳴己之照禍而懷憂十二章狀小人之比周十三章哀惸獨者莫勝夭椓之禍總之則病小人倡訛言以仇君子王心不懲而棄其輔終至滅赫赫之宗周為可惜也十月之交朔日辛卯日有食之亦孔之醜彼月而微此日而微今此下民亦孔之哀日月告凶不用其行四國無政不用其良彼月而食則維其常此日而食于何不臧􅖙􅖙震電不寧不令百川沸騰山冡崒崩髙岸為谷深谷為陵哀今之人胡憯莫懲皇父卿士畨維司徒家伯冡宰仲允膳夫棸子內史蹶維趣馬楀維師氏艷妻煽方處抑此皇父豈曰不時胡為我作不即我謀徹我牆屋田卒汙萊曰豫不戕禮則然矣皇父孔聖作都于向擇三有事亶侯多藏不憗遺一老俾守我王擇有車馬以居徂向黽勉從事不敢告勞無罪無辜讒口囂囂下民之孽匪降自天噂沓背憎職競由人悠悠我里亦孔之痗四方有羡我獨居憂民莫不逸我獨不敢休天命不徹我不敢效我友自逸詩序大夫刺幽王也此章大指傷君權之不攬致皇父交結黨與內主宫闈戕虐其民以自殖故首以日食賦而怪王心之莫懲也十月純隂故稱陽月以存陽辛隂金卯隂木日食在十月之交朔日辛卯全是隂盛而陽微為天變之極大禮曰陽事不得謫見於天日為之食日食亦天行之定數但王者修德行政用賢去姦能使陽盛足以勝隂有當食而不食者唯時十月之交純隂用事朔日辛卯又支干皆隂乃日有食之是可徴隂黨之用事王政之不綱矣故云亦孔之醜彼月云云者若曰隂陽不兩盛彼月而微則陽盛而制隂此日而微則隂盛而抗陽小人用事殘虐其下有不可勝言者此就含下皇父外交內結自殖以殃民意故云今此下民亦孔之哀日月告凶二句重月不避日上四國無政二句正謂維王者之政如此故日月之不用其行也四國瞻仰天子王政不綱是謂四國無政賢良所以輔政者不用其良則小人用事政無由善矣行政用人是二事而未嘗不相因要識得四國無政不用其良是通章大主意于何二字有咀嚼陽制隂是常理故曰彼月而食則維其常隂抗陽則必有主持不善而旁落下移者是不可不求其故以銷此變也故曰此日而食于何不臧􅖙􅖙震電節承上日食來言不特有此而又有此災變之甚人君所宜動心而修改者而何為其不然也故終之曰哀今之人胡􅉃莫懲十月雷已收聲不宜震電故曰不寧且非其時令也非時震電復有山川崩溢陵谷變遷之異此就含下皇父非時變動戕虐其民意心驚惕曰􅉃創改為懲易曰洊雷震君子以恐懼修省正􅉃懲之謂也注訓􅉃為曾大未當雨無正篇云會我􅉏御􅉃􅉃日瘁會􅉃字並出各一義未聞􅉃之可訓為會也胡􅉃莫懲則必致亂亡之禍矣故今之人止著一哀字卿士是由外而入兼六官之長者得時用事於其內同事者爭為之附故就其人次第而舉之耳不然冡宰宜位司徒之上膳夫趣馬不宜錯居內史師氏之列此下煽之一字最妙小人有無窮之欲火非得柔媚者從中而從臾亦無自而張熾惟彼艷妻方專寵於其內無人不附而無言不從如彼燻灼者之加以扇無有不燎原者是國家之禍本也詩罪皇父及羣工而歸到艷妻煽方處誠探本之論皇父是惡之魁艷妻是亂之本胡為我作即作都于向之作皇父以向為都必建廟社營宫室以新其規其勢未有不動民者但不宜奪取民居而毁徹其墻屋橫用民力而汚萊其田土若是其戕惡不仁耳豈曰不時云云若曰豈其不識時也胡為我作而不即我謀耶凡執政有大興作必先謀及庶民未有不即謀而橫奪民之居食者孔聖者自以為聖也卿士安得有三卿曰擇三有事亶侯多藏者擇取三卿中附己者聚斂以益其富也亶侯疑信任之謂擇三卿中附己者以益己之富便不留一人以衛守王家矣此事相因而見者注但取富人以為卿又不自強留一人以衛天子體貼未當擇有車馬者以居徂向此方是取富人以實向之都也西漢董卓營郿塢之居正如此既擇三有事亶侯多藏又擇有車馬以居徂向知有已不知有君真小人之尤也亶侯多藏以居徂向不特廟社宫室之營建而已也不奪民居將安所頓置不勞民力將安所落成此下民所以不勝其苦也從事不敢告勞而又罹讒口下民其何以堪之讒口即其所擇三有事及有車馬者蓋皇父之私人也噂沓背憎四字各一義噂是諂言沓是復言背是後言憎是毁言此皆出讒人之口取悅於上而嫁禍於下者即此四字深味之可謂曲盡小人之情狀矣注未當味職競二字不但是專力為之將有爭其能以為之者我里即向地也如此其被奪如此其任勞又如此其遭讒故曰亦孔之痗作都于向勞民傷財民之生産盡矣筋力疲矣而其役猶未得己者故曰四方有羡我獨居憂民莫不逸我獨不敢休論戕民之禍原始於皇父而成於衆小人故曰匪降自天職競由人論事已至此無可奈何即歸咎於人無益也不若安命之為愈故曰天命不徹我不敢效我友自逸吁語及此可謂痛摧其心骨矣首三章極言日食災變之甚後四章極言皇父黨惡之害原皇父之黨惡由幽王失德之所致也此詩人因日食以作賦重嘆四國之無政用人之不良歟浩浩昊天不駿其德降喪飢饉斬伐四國旻天疾威弗慮弗圖舍彼有罪既伏其辜若此無罪淪胥以鋪周宗既滅靡所止戾正大夫離居莫知我勩三事大夫莫肯夙夜邦君諸侯莫肯朝夕庶曰式臧覆出為惡如何昊天辟言不信如彼行邁則靡所臻凡百君子各敬爾身胡不相畏不畏于天戎成不退飢成不遂會我􅉏御􅉃􅉃日瘁凡百君子莫肯用訊聽言則答譛言則退哀哉不能言匪舌是出維躬是瘁哿矣能言巧言如流俾躬處休維曰于仕孔棘且殆云不可使得罪于天子亦云可使怨及朋友謂爾遷于王都曰豫未有室家鼠思泣血無言不疾昔爾出居誰從作爾室詩序云大夫刺幽王也雨自上下者也衆多如雨而非所以為政也詩傳云王室播遷大臣閔之賦雨無其極傳較近是此詩是責臣之去位者然其所以去實由其君辟言之不信而唯恐罹於讒譛之禍也故始為怨天之詞以發端中備道時世之難處而體其情之所必至末則正言以責之緊要在各敬其身一句上君不修德而致飢饉之荐臻臣民之離散故首以浩浩昊天不駿其德為言天一也自元氣廣大言曰昊天自仁覆閔下言曰旻天當飢饉斬伐之時天心應垂憐憫故改稱昊天為旻天而又深咎其疾威弗慮而弗圖也舍彼有罪四句正其疾威弗慮弗圖處凡改圖必先思慮故詩人先慮而後圖舍彼有罪四句本以有罪形無罪此舍字解作置字甚當詩意若曰彼有罪者宜受其罰則既伏其辜可置勿論矣若此無罪者胡亦淪胥以遍及之乎此就含下信讒逺賢意懷德維寧宗子維城君不修德而城壞是謂周宗既滅靡所止戾此深言其有敗亡之兆也正大夫離居專避讒譛之罪而不因飢饉注未當勩有勤勞耐久意自處於安逸非勩也雖居位而偷惰於旦夕亦非勩也詩意重人離不重天變其所以離在君不信辟言不在天降飢饉水旱之災何代無之在君修德以弭之耳此詩人發端於飢饉而深咎旻天之弗慮弗圖也注將天變人離並言之甚欠妥旻天疾威弗慮弗圖其詞雖是咎天其實咎王之不能恐懼修省也庶曰式臧覆出為惡此正言其弗慮弗圖處故下章緊接如何昊天辟言不信要識得法度之主曰辟法度之言辟言也辟言不信則必親信讒佞樂聞諛言罪其不能言而悅其能言者矣此是君人者第一病痛故詩人特發之正言法語人君之藥石也正言法語之不信能思慮改圖而為善乎此是覆出為惡之病根羣臣以王之不信辟言而離居而莫肯夙夜莫肯朝夕蓋未聞敬身之道也敬身只是一個謹恪各謹恪自持而同寅協恭以為事此方是天工人代之義故詩人呼几百君子而告以各敬爾身胡不相畏不畏于天正大夫三事大夫邦君諸侯各有當共之職夙夜朝夕匪懈以事一人乃為各敬其身之實事知此則必知相畏以畏天矣書曰欽哉惟時亮天工此敬身之説也曰百僚師師百工惟時此相畏之説也曰勑天之命惟時惟幾此畏天之説也戎成不退飢成不遂總由辟言不信來會我􅉏御慘慘日瘁應前正大夫離居二句見衆人皆去而我獨當其勞所謂莫知我之勩也此􅉃􅉃日瘁即北山篇或慘慘劬勞之謂再呼凡百君子望愈切而責愈深矣凡百君子莫肯用訊云云緊承會我􅉏御二句來若曰我獨如此而爾輩會莫敢出聲但唯聼言則答一聞譛言則退此辟言終無由聞王之所以終於惡也聽言者可聽之言君所樂聞者則答之而無忌譛言者譛已之言已所深懼者則退避而不居凡世之遭讒者情必至是此正其莫肯用訊處哀哉不能言節緊承上二節説來若謂爾于聽言則答譖言則退亦無怪其然也今之世聞忠言則病其不能言而俾處其瘁聞佞言則喜其能言而俾處其休是出言誠有不易者但人臣之義則應言無不盡不應若是之退諱耳此於曲體其情中深寓切責之意凡言之忠者皆根心而發而非取辦于口者乃君不能察而罪及之故曰匪舌是出維躬是瘁注云非但出諸口而適以瘁其躬甚未妥維曰豫仕節又承上説來若曰今之出言不易如此蓋亦難仕矣將謂吾從直道乎是世之所謂不可使者得罪于天子亦謂姑從枉道乎是世之所謂可使者實怨及于朋友可苟仕乎此仕之所以棘且殆也據此情其退去似亦可原者但人臣之義則不應度此以為去留耳此二云字極有意味屈原卜居篇云云全本此謂爾節始勸其復歸而正責之思曰鼠思泣曰泣血言曰無言不疾其情可謂悲且恫矣凡言之切中者必見惡於人故曰無言不疾昔爾出居二句正照謂爾遷于王都二句若曰爾能作室于外而可謂王都之無室家何哉凡責人必以正義然其中却有一假不得已苦情在不論其世而體其情彼猶有辭唯若此詩哀哉以下論其時世若此其難處而原其情真若有甚不得已者我亦備體知之但人臣之義不若是恝必敬其身而思日贊贊襄哉方為正理斯其言曲而中而聞之者不覺其首伏而無辭耳重訂詩經疑問卷五
