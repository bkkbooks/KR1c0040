body:
  text: 重訂詩經疑問卷三明姚舜牧撰魏糾糾葛屨可以履霜摻摻女手可以縫裳要之襋之好人服之好人提提宛然左辟佩其象揥維是褊心是以為刺詩序刺褊也其民機巧趨利由其君儉嗇褊急而無徳以將之也故詩泛言尊貴而不斥其君魏地陿隘其民窘於衣食故生機巧之心而急於趨利男子葛屨既敝以繩紏纒之而用以履霜奔走而不休未嫁之女纎纎其手謂可出以縫裳而利其傭資為好人之服也斯非好人之褊急而曷以至此哉故稱其服飾威儀之美而直刺其褊提提左辟云云是其外狀之舒徐也而中心則褊急矣故承說維是褊心維是二字有細味勤儉是美俗而或失之過則褊矣褊正與寛對不寛不褊君子居身之所珍也彼汾沮洳言采其莫彼其之子美無度羙無度殊異乎公路彼汾一方言采其桑彼其之子羙如英美如英殊異乎公行彼汾一曲言采其藚彼其之子羙如玉羙如玉殊異乎公族詩序刺儉也其君儉而能勤刺不中禮也此非興也魏俗嗇陋即卿大夫之家或亦下侵民利故以采莫采桑采藚刺之言其人雖羙殊異乎大家之體叚也後世有㧞園葵去織婦者達此詩之㫖矣註刺儉不中禮殊未盡園有桃其實之殽心之憂矣我歌且謡不知我者謂我士也驕彼人是哉子曰何其心之憂矣其誰知之其誰知之蓋亦勿思園有棘其實之食心之憂矣聊以行國不知我者謂我士也㒺極彼人是哉子曰何其心之憂矣其誰知之其誰知之蓋亦勿思詩序刺時也大夫憂其君國小而廹而儉以嗇不能用其民而無德教日以侵削故作是詩也此必國家用匪人以亂國是其為士者有深憂焉故曰不知我者謂我士也驕彼人是哉子曰何其云爾註恐未得其肯綮敢問高明園有桃其實之殽園有棘其實之食皆有取意國家必用楨幹之臣園林必植梧檟之木舍喬木而唯桃之殽棘之食國是已非矣而彼不知者猶曰彼人是哉子曰何其真不思之甚者也詩人重懐隠憂故為此言心憂而歌且謡聊以行國如楚屈原行吟澤畔之謂歌謡是不平之鳴而顧謂其驕行國懐無窮之思而顧謂其㒺極士君子憂時憤俗之心不諒於世每如此陟彼岵兮瞻望父兮父曰嗟予子行役夙夜無已上慎旃哉猶來無止陟彼屺兮瞻望母兮母曰嗟予季行役夙夜無寐上慎旃哉猶來無棄陟彼岡兮瞻望兄兮兄曰嗟予弟行役夙夜必偕上慎旃哉猶來無死詩序孝子行役思念父母也國廹而數侵削役乎大國父母兄弟離散而作是詩止謂止彼而不思歸也棄謂棄此而不復返也死則恐其亾終無相見之期也前二章不必說到死三章通說上慎旃哉見父兄之所以念其子弟與子弟之所以慰其父兄者只在一個敬謹知父母之心可以為孝子知兄之心可以為悌弟讀陟岵之詩而不興孝弟之心非夫也十畆之間兮桑者閑閑兮行與子還兮十畆之外兮桑者泄泄兮行與子逝兮詩序刺時也言其國削小民無所居焉人各受五畆之宅行與子還是二人也故稱十畆之間閑閑從容自適之意泄泄放蕩不拘之意曰十畆之間又曰十畆之外曰桑者閑閑又曰桑者泄泄葢深嫉朝市之莫可居而欲飄然於風塵之外也仕者之心如是豈世道之福哉細玩魏之詩見魏之俗尚大抵以褊急勝君子不欲仕而樂就桑者之閑閑小人不欲居而甘就樂土之得所則其時其政葢可知已坎坎伐檀兮寘之河之干兮河水清且漣猗不稼不穡胡取禾三百㕓兮不狩不獵胡瞻爾庭有縣貆兮彼君子兮不素餐兮坎坎伐輻兮寘之河之側兮河水清且直猗不稼不穡胡取禾三百億兮不狩不獵胡瞻爾庭有縣特兮彼君子兮不素食兮坎坎伐輪兮寘之河之漘兮河水清且淪猗不稼不穡胡取禾三百囷兮不狩不獵胡瞻爾庭有縣鶉兮彼君子兮不素飱兮詩序刺貪也在位貪鄙無功而受禄君子不得仕進爾此疑是國家用違其才而士不苟禄故作此詩以致美伐檀本可為車寘之河干非其地矣若是即河水之清漣何取哉抱學本以大受寘之閑散非其任矣即優㳺以窮禄何為哉故就君子之意推之車用以田則可以載禾不稼不穡胡取禾三百㕓車用以獵則可以載獸不狩不獵胡瞻爾庭有懸貆葢謂受匪其禄弗取而弗視之也彼君子兮不素餐兮即照上二句說易曰大車以載君子抱此大具而寘之無用之地何為哉胡取禾三百㕓胡瞻爾庭有懸貆即禄之以萬鍾弗顧也繫馬千駟弗視也之意三百㕓便見是禾藏於室者庭有懸貆便見是非今所獵得者下倣此伐輻伐輪伐檀以作輻作輪也車非輻不具非輪不行碩鼠碩鼠無食我黍三歲貫女莫我肯顧逝將去女適彼樂土樂土樂土爰得我所碩鼠碩鼠無食我麥三歲貫女莫我肯德逝將去女適彼樂國樂國樂國爰得我直碩鼠碩鼠無食我苖三歲貫女莫我肯勞逝將去女適彼樂郊樂郊樂郊誰之永號詩序刺重歛也元元赤子全頼長我者之顧復取之盡錙銖而略不一軫顧焉秦越人之視也民寜不轉而之他哉居上者導利惠民上之直也居下者安生樂業下之直也爰得我直葢謂此可以安生樂業云爾上貪殘而不恤其下民莫不永號矣杜詩云哀哀寡婦誅求盡痛哭郊原何處村此永號之謂也貪殘者之取諸民何所不至哉故曰碩鼠碩鼠無食我黍云云貫即惡貫滿盈之貫三歲言其久貫已三歲而莫我顧莫我徳莫我勞其將何所窮極哉此决于去一往而不返也統魏詩觀之於葛屨見居室者之不體下情於汾沮洳見居官者之不遺民利於園有桃見國是之日非於十畆之間見仕者之不樂於朝於伐檀見賢者之不苟於禄於陟岵見其所以後民者於碩鼠見其所以賦民者總之則儉嗇之過至於褊急而上下皆不勝其求也記曰國奢則示之以儉國儉則示之以禮若魏風者示之以禮其可復先王之舊哉唐蟋蟀在堂歲聿其莫今我不樂日月其除無已大康職思其居好樂無荒良士瞿瞿蟋蟀在堂歲聿其逝今我不樂日月其邁無已大康職思其外好樂無荒良士蹶蹶蟋蟀在堂役車其休今我不樂日月其慆無已大康職思其憂好樂無荒良士休休纔說今我不樂日月其除即云無已大康職思其居好樂無荒良士瞿瞿其憂深其思逺其相戒也與良士而同歸真先王之遺風大勝於他國者職思其居句極妙職職分也職業也士農工商各有其職各有其居就其職而思其居則必各止其所無然㳺縱以荒其職矣故下即承之曰好樂無荒良士瞿瞿意深哉職字不應作主字解役車其休正歲莫之景可以務閑之時也瞿瞿有却顧意蹶蹶有奮勉意休休有安閒意而本瞿瞿蹶蹶來註所謂樂而有節不至於淫所以安也說職思其居又說職思其外見其所思者不獨在居而又當思及於居之外也說職思其外又說職思其憂見其所思者不獨在於職之外而又當及於終身之憂也憂字必如此解方透徹山有樞隰有榆子有衣裳弗曵弗婁子有車馬弗馳弗驅宛其死矣他人是愉山有栲隰有杻子有廷内弗洒弗埽子有鐘鼓弗鼓弗考宛其死矣他人是保山有漆隰有栗子有酒食何不日鼓瑟且以喜樂且以永日宛其死矣他人入室山有樞隰有榆正興子有衣裳子有車馬說到宛其死矣他人是愉見及時為樂自有不容己者說有衣裳有車馬有廷内有鐘鼓有酒食曲盡人間之所享且以喜樂二句相承永日者盤桓以永此日也苟俗尚懈荒即有規其節儉者弗能也乃唐之人不服不乗至有勸其愉樂云者真聖帝遺風之厚哉詩序刺晉昭公也初晉穆公生仇及成師仇立為文公成師封于曲沃大都耦國稱桓叔文公卒昭公立桓叔有伐晉之謀昭公禍在旦夕而不悟國人難察察言之故作此詩非勸昭公為樂也謂可惜此衣裳車馬之物將為他人所有故託言喚醒昭公使之覺悟耳如以其辭謂不可不及時為樂聖人豈取以垂訓乎此詩緝具見而詳載勝於朱註萬萬者宜改而從之揚之水白石鑿鑿素衣朱襮從子于沃既見君子云何不樂揚之水白石皓皓素衣朱繡從子于鵠既見君子云何其憂揚之水白石粼粼我聞有命不敢以告人弱晉而雄沃意全在揚之水二句上見晉昭公非有大無道之事以自絶於民特其委靡不振養成曲沃之強而桓叔又有所以善取其民者故其民傾心而樂從耳桓叔將叛而傾晉必有所以命國人者故素衣朱襮以從之而又心為之隠若無所事事者然上賊下之情譎矣下從叛之意堅矣吁此不軌之臣所以得行其志也詩序刺晉昭公也昭公分國以封沃沃盛強有簒宗國之謀而潘父隂立之將為内應而昭公不知故此詩深警之謂昭公勿以沃為患之在外而猶緩也今國内有謀應之者欲奉沃以為君而簒汝之位腹心作難而外患乗之禍已廹矣我聞其事而不敢以告人也言有命者廹切之辭言不敢告人乃所以深告昭公也椒聊之實蕃衍盈升彼其之子碩大無朋椒聊且逺條且椒聊之實蕃衍盈匊彼其之子實大且篤椒聊且逺條且詩序刺晉昭公也其辭稱桓叔之強其後必盛而其意則憂昭之弱不可為支也碩大無朋者碩大而無與為比也照下碩大且篤句可見椒聊且逺條且二語極可咀嚼曲沃晉之逺條也桓叔譎計以得民而碩大莫與為比焉晉其能國乎詩為此詞見晉之強實在逺條而不在本幹也范睢云本實繁者披其枝披其枝者傷其心大其都者危其國尊其臣者卑其主正如此章之㫖篤厚實也史記云自此秦益富厚輕諸侯此篤厚之意綢繆束薪三星在天今夕何夕見此良人子兮子兮如此良人何綢繆束芻三星在隅今夕何夕見此邂逅子兮子兮如此邂逅何綢繆束楚三星在户今夕何夕見此粲者子兮子兮如此粲者何詩序刺晉亂也國亂則婚姻不得其時焉夫婦好合有綢繆之情故以綢繆束薪興束薪而至于三星在天可不謂儉且勤乎凡淫生於奢佚如此詩所云是俗之極羙者通篇是喜不自勝之辭與淫佚不勝之辭自别有杕之杜其葉湑湑獨行踽踽豈無他人不如我同父嗟行之人胡不比焉人無兄弟胡不佽焉有杕之杜其葉菁菁獨行睘睘豈無他人不如我同姓嗟行之人胡不比焉人無兄弟胡不佽焉詩序刺時也刺時政之亂而苦無兄弟之可托也人無兄弟胡不佽焉不是憐我無兄弟而見助詩意若曰嗟行之人胡不憫我之獨行而見親耶人亦有無兄弟者胡不相憐恤而見助乎葢致望於行之人而又深致望於人之無兄弟者讀杕杜之詩彼無兄弟者其情盖亦悲矣乃今親兄弟同父母者或因財帛以啓争甚且結異姓為腹心更假手為殘賊之計者吾不知其心何如也視此可自愧死矣杕杜凡三見一見於此傷己之無兄弟也再見於後傷己之寡弱不足恃也三見於小雅傷征夫在外而未歸也總是孤特無倚之意羔裘豹祛自我人居居豈無他人維于之故羔裘豹褎自我人究究豈無他人維子之好居居若與為藏笥以待服之意究究若與為檢視以待服之意故好即鄭風遵大路篇不寁故不寁好故好二字據其辭似心喜大夫而就服以致其意者乃詩序刺時也刺其在位不恤其民也豈以羔裘豹祛自我人居居羔裘豹褎自我人究究我等之用情若此者豈無他人之可委哉亦維子之故且好也故自我人而不付之他人耳子何獨不加憐恤於我輩哉是或詩人之意也褎是古袖字與祛不同肅肅鴇羽集于苞栩王事靡盬不能蓻稷黍父母何怙悠悠蒼天曷其有所肅肅鴇翼集于苞棘王事靡盬不能蓻黍稷父母何食悠悠蒼天曷其有極肅肅鴇行集于苞桑王事靡盬不能蓻稻粱父母何嘗悠悠蒼天曷其有常詩序刺時也晉昭之後大亂五世君子下從征役不得侍養父母故作是詩盬亦盬也池自結成不經久而易壊故註作不攻緻君子以王事不可不堅固故力役于外而無暇樹藝之謀子所怙恃者父母也父母所依倚者子也相倚為命而困於王事無如之何故云云豈曰無衣七兮不如子之衣安且吉兮豈曰無衣六兮不如子之衣安且燠兮詩序美晉武公也武公踵祖父之惡滅宗國而自立曷美哉特其大夫之意耳凡為人臣者輿馬服飾惟君所予而不敢請請非禮也得請而不拜命至云豈曰無衣不如子之衣若是其較量焉可謂臣乎哉武公之上凌釐王之下替於此詩可深慨矣此與晚唐藩鎮坐邀天子之寵命者無異劉仁恭謂使者曰旌節吾自有之但要長安名色耳一言不如子之安且吉再言不如子之安且燠則知苟無王命必不能安享侯爵矣王命可輕授簒弑之賊哉有杕之杜生于道左彼君子兮噬肯適我中心好之曷飲食之有杕之杜生于道周彼君子兮噬肯來逰中心好之曷飲食之詩序刺晉武公也武公滅宗國以自立而不求賢以為輔於是賢者隠于山林國人私致其愛慕之意若曰彼賢者其肯暫過我乎若肯過我我中心愛之將何以飲食之乎此與丘中有麻曰將其來食與白駒縶之維之于焉逍遥之意同觀國人欲自為飲食則可徴君之不能養賢矣此噬字即易噬嗑噬字嚙也噬肯適我者猶今人云咬定欲跟我随我也若是則我中心好之矣曷其能飲食之乎葢深致望於賢者之來助而歉焉不能為之禮也葛生䝉楚蘝蔓于野予美亡此誰與獨處葛生蒙棘蘝蔓于域予羙亡此誰與獨息角枕粲兮錦衾爛兮予羙亾此誰與獨旦夏之日冬之夜百歲之後歸于其居冬之夜夏之日百歲之後歸于其室詩序刺晉獻公也公好攻戰故婦人念其夫久役于外賦之曰誰與獨處獨息獨旦云者若曰我將誰與乎而獨處獨息之可憫也再曰百歲之後云者若曰生不得同其生聚維死庶或可以同穴云爾其詞惨且悲矣處居處也此字義寛息則夜之息也旦則朝之旦也采苓采苓首陽之巔人之為言苟亦無信舍旃舍旃苟亦無然人之為言胡得焉采苦采苦首陽之下人之為言苟亦無與舍旃舍旃苟亦無然人之為言胡得焉采葑采葑首陽之東人之為言苟亦無從舍旃舍旃苟亦無然人之為言胡得焉詩序刺晉獻公也獻公好聽讒言故詩以采苓起興言采苓采苓首陽之巔有是理乎凡人之言語且未可信將舍之而不聽于亦且不可如此但當考其言何從而得之推其所自來則虚實盡見矣讒言之得行由不問所來而遽信之耳漢昭帝悟燕王上書之詐葢察其書所由來也秦有車鄰鄰有馬白顛未見君子寺人之令阪有漆隰有栗既見君子並坐鼓瑟今者不樂逝者其耋阪有桑隰有楊既見君子並坐鼓簧今者不樂逝者其亡詩序美秦仲也秦仲始大有車馬禮樂侍御之好焉是矣然秦仲修德為宣王大夫安得有寺人之令詩傳襄公伐戎初命為秦伯國人榮之是為得之秦之樂彈筝拊髀之樂也秦之聲擊甕扣缶之聲也兹鼓瑟鼓簧而且與其民共樂焉民心寜無傾注乎秦何以得民之深也意者犬戎搆難民受凌夷兹幸得脫於鋒刅故叙國有車馬之盛欲相與為樂以終身耶阪有漆隰有栗見上下各有生植也正興下並坐鼓瑟意未見君子而寺人可通既見君子而並坐為樂意當時秦君必通上下之情而深有以結其心者此駟鐵小戎胥樂於從武而益強富厚輕諸侯自此始歟大抵風俗以時變而不善變者未嘗不至於大敝秦初與民並坐鼓瑟憝何等簡易可親然其趨也必至於尊其臣卑其主而上之人不勝其憤則一變而森嚴其堂陛使侍者曾不得持尺寸以上殿焉是始之簡易可親者其極敝必至於禁嚴而難近也先王制禮嚴尊卑之分而未嘗不通上下之情正不如此駟驖孔阜六轡在手公之媚子從公于狩奉時辰牡辰牡孔碩公曰左之舍㧞則獲逰于北園四馬既閑輶車鸞鑣載獫歇驕詩序美襄公也始命有田狩之事園囿之樂故詩亦喜創見而羙之通章是車馬射獵始終之事註極明先王嘗從事于狩矣而木有以媚子從者此薄俗之風也古者田獵匪直取以供三品葢亦寓習武之意若此之田狩則專逞勇武以示其下耳此民俗競趨於強勇也詩緝謂田犬皆長喙非田犬也犬若短喙性驕逸載獫歇驕謂以車載獫而歇其驕逸所謂休其足力也是詩緝云平王以秦之救周而命之異時諸夏之憂反生於所救事之倚伏可豫料耶是故禦戎以自治為上策秦自非子養馬於汧渭之間周孝王賜之邑而開國故其習俗惟盛車馬之飾而競為射獵戰閗之事讀車鄰駟鐵小戎之詩便見秦之所以兼山東而威強者在扵此其所以殃殱下民不保其子孫而受禍之獨烈者亦在於此小戎俴收五楘梁輈㳺環脅驅隂靷鋈續文茵暢轂駕我騏馵言念君子温其如玉在其板屋亂我心曲四牡孔阜六轡在手騏駵是中騧驪是驂龍盾之合鋈以觼軜言念君子温其在邑方何為期胡然我念之俴駟孔羣厹矛鋈錞蒙伐有苑虎韔鏤膺交韔二弓竹閉緄縢言念君子載寢載興厭厭良人秩秩德音詩序羙襄公也西戎暴我宗周而襄公備兵甲以為討津津焉夸說之不已即婦人閔君子而猶有鼓勇之意是為秦風葢風者從上以風下而下胥化之之謂也豈獨秦風哉諸國之詩皆有風意故並稱國風云章首六句叙駕馭車馬之善下二章首六句又併其武備言之統見軍容之盛真足以赴敵而秦之所為強也通章車馬武備之註極明孔羣者大羣也下正言車馬之大羣皆有矛戈弓矢之備以見其從征者之不能脫離耳此徳音二字即徳音莫違及爾同死之德音婦人若曰言念君子起居不寧甚矣何時得厭厭與良人好樂而秩秩再叙其徳音乎則我之心願遂矣云爾三稱言念君子以致其私情而必先叙其軍容之盛是婦人亦知公義之為重也此征西戎詩也初秦成為犬戎所滅周宣王命非子曾孫秦仲為大夫誅西戎不克及幽王為西戎犬戎所殺平王東遷謂秦襄公曰能逐西戎即有岐豐之地襄公内激於前世之讐而外銜天子之命故其軍容極盛即婦人女子亦知勇於赴敵而無所怨也嗟乎在秦復讐之師尚如此况天子明正其罪復不共戴天之讐乎平王不知為秦襄而俾小戎之詩乃出於秦婦人之口吁可恨哉蒹葭蒼蒼白露為霜所謂伊人在水一方遡洄從之道阻且長遡㳺從之宛在水中央蒹葭凄凄白露未晞所謂伊人在水之湄遡洄從之道阻且躋遡㳺從之宛在水中坻蒹葭采采白露未巳所謂伊人在水之涘遡洄從之道阻且右遡游從之宛在水中沚詩傳君子隠於川上闕慕之賦兼葭所指不知何許人然觀其所叙景物皆瀟洒脫塵則其人必高出於塵囂而非流俗之人所同矣秦無好賢禮士之風安得有此意西周禮義之遺尚在伊洛之間或有異人者出而舉世仰之以為不可及者乎曰阻且長曰阻且躋曰阻且右言其逺而不可幾也曰水中央曰水中坻曰水中沚言其近而不可親也古人以右為上故曰右非不相值而出其右也觀上章自見終南何有有條有梅君子至止錦衣狐裘顔如渥丹其君也哉終南何有有紀有堂君子至止黻衣繡裳佩玉將將夀考不忘詩傳襄公克戎始取周地秦人矜之此必秦君廵遊於終南故為此詩終南於秦為望山然非人君之所宜至也秦君之至止或亦假廵狩之名以愚民民故相稱頌以登歌耳自此濫觴後世遂有登封泰山稱遇有老父連呼萬歲者三或亦夀考不忘之遺事歟交交黄鳥止于棘誰從穆公子車奄息維此奄息百夫之特臨其穴惴惴其慄彼蒼者天殱我良人如可贖兮人百其身交交黄鳥止于桑誰從穆公子車仲行維此仲行百夫之防臨其宂惴惴其慄彼蒼者天殱我良人如可贖兮人百其身交交黄鳥止于楚誰從穆公子車鍼虎維此鍼虎百夫之禦臨其宂惴惴其慄彼蒼者天殱我良人如可贖兮人百其身黄鳥猶得止於棘止於桑止於楚此三良者乃用之以殉塟曽黄鳥之不若乎此詩人之所為深悼也上言百夫之特下言人百其身葢推國人之心寜以百人之身代其死非謂一人而百其身也君子從治命不從亂命穆公悔過遷善有聲於秦乃猶命三良之殉乎若康公者不從其亂命可也孟子曰始作俑者其無後乎是俑亦不可用也况於人乎又况國之良乎秦之族滅殆盡不獨始皇之酷暴君子已徵其㣲於用人殉塟之日矣彼晨風欝彼北林未見君子憂心欽欽如何如何忘我實多山有苞櫟隰有六駁未見君子憂心靡樂如何如何忘我實多山有苞棣隰有樹檖未見君子憂心如醉如何如何忘我實多晨風疾飛於北林喻舍去之速而無依戀之意也山隰有上下喻夫婦之唱隨欽欽者憂心之無他適也靡寜者憂心之無少愉也如醉者憂心之莫能解也此特據註為解耳若詩序刺康公也忘穆公之業始棄其賢臣焉說自正大豈曰無衣與子同袍王于興師脩我戈矛與子同仇豈曰無衣與子同澤王于興師脩我矛㦸與子偕作豈曰無衣與子同裳王于興師脩我甲兵與子偕行袍猶加於外也澤則親於肌膚矣裳又服之下體矣一步親一步訓註解澤字極妙抑愚於此詩重有感焉周於西戎犬戎不共戴天之讐也周天子苟能赫然為復讐之舉當時臣子豈無同仇之義乎辭正而嚴師直而壯當必有不戰而屈其兵者乃遷都不顧而委諸秦焉謂之何哉此詩之作或者秦假此命以興師故其民曰王于興師脩我戈矛與子同仇云爾不然岐豐之地雖屬秦而民心猶知有王也此王于興師一王字似無着落詩傳秦襄公以王命征戎周人赴之是我送舅氏曰至渭陽何以贈之路車乗黄我送舅氏悠悠我思何以贈之瓊瑰玉佩詩序康公念母也秦無禮義之國也乃康公為太子時知送舅氏知贈遺之又思其母悠悠焉非良心之尚存乎詩錄之以存厚故不計其後令狐之役也兩曰何以贈之云云若曰此皆薄物而不足以盡吾意也於我乎夏屋渠渠今也每食無餘于嗟乎不承權輿於我乎每食四簋今也每食不飽于嗟乎不承權輿詩序刺康公也忘先君之舊臣與賢者有始而無終也凡人君之禮賢與賢者之所自處不獨在居食之間然非此不足以見其意也此而寢薄禮意從可知矣此賢者之所為去也註引楚元王穆生一叚極佳權輿訓始字不知所自以愚論之權輿二物也即鈞衡並稱之謂葢權用以稱量事物輿用以承載人民是有國之把柄也人君於待賢一節不知分曉其何以堪此大任曰不承權輿者深嘆其不足以堪承也似非繼始之說也敢問高明陳子之湯兮宛丘之上兮洵有情兮而無望兮坎其擊鼓宛丘之下無冬無夏值其鷺羽坎其擊缶宛丘之道無冬無夏值其鷺翿詩序刺幽公也淫荒昏亂㳺蕩無度焉此子字指在上之人言無望者望之不似人君也上之人為人所瞻仰者全在禮度之閑不循禮度而恣情於遨逰歌舞之樂且無冬無夏而無少休息瞻望之謂何此詩人所為刺也東門之枌宛丘之栩子仲之子婆娑其下榖旦于差南方之原不績其麻市也婆娑榖旦于逝越以鬷邁視爾如荍貽我握椒詩序疾亂也幽公淫荒風化之所行男女棄其舊業亟㑹於道路歌舞於市井爾葛覃云為絺爲綌七月云八月載績自君后下至於生民未有不勤於紡績者不績其麻市也婆娑豈生人之理上有宛丘之君則下有東門之人所謂上有好者下必有甚焉者也想宛丘之勝在東門故此及其後二篇皆以東門起興陳都宛丘其東門與丘之間乃國之交㑹處而有枌栩二種之木可以休息故陳大夫子仲氏之女乃婆娑遨逰於其下且直至南方之原野男女交㑹誘說以相贈遺其淫蕩一至於此哉曰子仲之子則無責乎下民矣衡門之下可以棲遲泌之洋洋可以樂飢豈其食魚必河之魴豈其取妻必齊之姜豈其食魚必河之鯉豈其取妻必宋之子凡人自足而無求則安往而不樂衡門一詩統是自樂而無求之詞大丈夫志天地四方不得行其志隠居而已矣讀此詩令人有囂然出塵之思東門之池可以漚麻彼美淑姬可與晤歌東門之池可以漚紵彼美淑姬可與晤語東門之池可以漚菅彼羙淑姬可與晤言詩序刺時也疾僖公淫昏而思賢女以配君子也詩緝因解池水漚麻紵與菅朝夕浸漬然後柔韌而可用僖公若得羙好之賢妃相與居處夙夜警戒庶幾改化也嗟乎君既淫昏忠臣良士之言尚無可入矣雖得淑女為耦可望優柔漸入以望其改化哉其說固已迂矣然則此詩宜何歸朱註男女㑹遇因所見而起興是也觀晤歌晤語晤言自見得因漚麻漚紵漚菅而相歌語以致愛故其詞若此東門之楊其葉牂牂昬以為期明星煌煌東門之楊其葉肺肺昬以爲期明星晳晳東門之楊其葉牂牂然肺肺然昏姻之時已過矣故𦂳接昏以為期句然無柰親迎而猶有不至者明星煌煌明星晳晳其如此昏姻何哉序云刺時也昏姻失時男女多違時使之然也墓門有棘斧以斯之夫也不良國人知之知而不已誰昔然矣墓門有梅有鴞萃止夫也不良歌以訊之訊予不顧顛倒思予詩序刺陳陀也陳陀無良師傅以至於不義惡加於萬民詩傳孔寜儀行父從君闕泄冶刺之首章以棘况不良次章以鴞况不良國人知之知而不已所謂人不堪其憂彼獨不改其樂也凡人之不良者初不畏人之知亦不顧人之訊至於顛倒然後致思則已無及矣此有識者必辨之於蚤不待狼狽而後爲無及之思也防有鵲巢卭有㫖苕誰侜予美心焉忉忉中唐有甓卭有㫖鷊誰侜予美心焉惕惕詩序憂讒賊也宣公多信讒詩人爲賢者憂懼焉詩傳靈公信讒囚泄冶内子憂之愚謂防不可為巢卭必無㫖苕也中唐安得有甓卭亦無㫖鷊也此皆况人之侜予美者亦備一說說文侜壅蔽也程子曰予美心所賢者詩緝解鵲巢積累而成喻爲讒之積漸苕草延蔓而生喻所讒之浸廣誰壅蔽予所美之賢使我心忉忉然憂勞也中唐之徑有甓非一甓也亦以積累而成功卭有㫖羙之鷊草雜衆色以成文猶讒言交織以成惑羙亦體看得好月出皎兮佼人僚兮舒窈糾兮勞心悄兮月出皓兮佼人懰兮舒懮受兮勞心慅兮月出照兮佼人燎兮舒夭紹兮勞心惨兮詩序刺好色也在位不好徳而恱羙色焉親近曰僚流麗曰懰明晳曰燎當月出之皎而唯佼人之思亦異乎綢繆束薪三星在天之咏矣舒字詩作舒遲解言佼人如月之初出而皎潔其行止舒遲窈糾然姿態之羙也是以實勞我心悄然而憂思耳宋玉神女賦云其始進也皎若明月舒其光正用此詩也胡為乎株林從夏南匪適株林從夏南駕我乗馬說于株野乘我乗駒朝食于株胡爲乎株林二句是問其行匪適株林二句是實其事駕我乗馬二句是道其往之無他乗我乗駒二句是道其見之欲亟夏南夏姫之子也夏姫之事太䙝詩人不欲斥言之故託辭於其子古今以色亡者多矣然未有如陳靈之為者其身弑而國亾宜哉朱氏曰衛之亂至墻有茨而極於是有狄入衛之禍陳之亂至株林而極於是有楚入陳之禍比事以觀可爲淫亂者戒彼澤之陂有蒲與荷有羙一人傷如之何寤寐無為涕泗滂沱彼澤之陂有蒲與蕳有美一人碩大且卷寤寐無為中心悁悁彼澤之陂有蒲菡萏有美一人碩大且儼寤寐無為輾轉伏枕詩序刺時也言靈公君臣淫於其國男女相說憂思感傷焉蒲荷菡萏總是喻起美人之思重看三無為字君臣上下所當為者豈其可已乃自上及下維此羙人之思他無所為豈成其為人哉豈成其為國哉作詩刺淫者描寫至此真足以止人心之淫令人惕然於其所當爲者矣陳風大抵與鄭衛相埒䆒其初則起於一大姫之好樂耳閨門風化之原誠然哉統陳詩觀之宛丘東門之枌刺蕩也而宛丘實為蕩之端東門之楊防巢月出株林澤陂刺淫也而株林實為淫之極而又兼之墓門之不良則壊亂甚矣衡門之樂為隠其亦有感於時之非乎檜羔裘逍遥狐裘以朝豈不爾思勞心忉忉羔裘翺翔狐裘在堂豈不爾思我心憂傷羔裘如膏日出有曜豈不爾思中心是悼詩序大夫以道去其君也國小而廹君不用道好潔其衣服逍遥遊燕而不能自強於政治大夫去之然不忍遽忘其君也故曰豈不爾思云云病痛在逍遥翺翔上故詩人就其服傷悼之不然則致美乎黻冕亦國君之所宜有者曷以刺焉庶見素冠兮棘人欒欒兮勞心博博兮庶見素衣兮我心傷悲兮聊與子同歸兮庶見素韠兮我心藴結兮聊與子如一兮詩序刺不能三年也有三年之䘮則有既祥之素冠素韠素衣當時無有為此䘮者故賢者思一見之若是注慕之深庶見者庶㡬一見之也服素冠者是為棘人而必有欒欒之狀故下二章不復言之天理民彛在人心皆有一種惻然相觸處故見棘人之欒欒我心自博博其憂勞也見素衣而傷悲見素韠而藴結亦此意同歸二字謝疊山認是同歸於治之同歸甚善天理在人心本無不同三年天下之通䘮也人孰無三年之愛於其父母乎此禮久曠而庶見於一旦則心有不覺其傷悲者自將樂與之同歸於天理民彛之中也此是人性之同然處同歸即與之為一如一即與之同歸非二意聊與二字正與庶見二字應此詩一意而三疊勞心博慱就傷悲而與之同歸藴結而與之如一矣若曰與子如一甚於同歸則彼之素韠者更賢於素衣素冠者耶隰有萇楚猗儺其枝夭之沃沃樂子之無知隰有萇楚猗儺其華夭之沃沃樂子之無家隰有萇楚猗儺其實夭之沃沃樂子之無室詩序疾恣也疾其恣於政刑不知恤其下也人生幸其有知而樂其家室至於樂子之無知樂子之無家無室則其時誠孔亟而其情誠孔悲矣昔人云安得中山千日酒㝠然直到太平時與此一律匪風發兮匪車偈兮顧瞻周道中心怛兮匪風飄兮匪車嘌兮顧瞻周道中心弔兮誰能亨魚溉之釡鬵誰將西歸懐之好音詩序思周道也國小政亂憂及禍難而思周道焉周道訓適周之路非也風發是上天之變車偈是平地之變此皆出於陡然不測者周先王之道綏柔惠懐奠四國於泰山之安是真君子所履而小人所視以為生者一旦崩弛蕩壊如風發車偈之不可測下民其能無深思乎哉故曰顧瞻周道中心怛兮葢深嘆其衰㣲而早冀其興復也此與大東章周道如砥周道二字同若四牡篇周道倭遲小弁篇踧踧周道則自作大路解無疑者當時周衰極矣檜風猶稱顧瞻周道者何葢周之道天下共由以為宗者使周之子孫猶能興起四國將則且效焉而奚至於陵遲之甚唯其綱弛紀壊甚於風掀而車覆而下國小民無復生理之存此覧世變者深悼於心而致望西周之興復也誰能烹魚二句不是興細味此二句亦不是誰能烹魚乎我則顧為之溉其釜鬵也溉潤澤也善治國者如烹小鮮烹而不溉焦且壊矣溉之釡鬵以善其烹是周道也當時天子衰㣲諸侯強大徵求下國無復膏澤存焉葢未有以烹鮮之道行之者故詩人憮然嘆曰誰能烹魚溉之釡鬵遂𦂳接誰將西歸懐之好音葢深致望周道之復興非謂誰能烹魚乎我願為之溉其釡鬵以興起下句也誰將西歸懐之好音亦不是我願慰之以好音將將我之意也言將我之意於西方也西方之人或有奮然興起之意是好音也我將日懐望之以冀其我荅耳此是下國惓惓注望之意如謂我願慰之以好音不知將慰之誰人也愚謂詩意當不如是簡兮曰云誰之思西方羙人此曰誰將西歸懐之好音當時致思於西周葢如此可見文武周召之徳入人之深吕東萊曰匪風下泉思周之詩獨作於曹檜何也曰政出天子則強不凌弱各得其所政出諸侯則徴發之煩供億之困征伐之暴唯小國偏受其害所以睠懐宗周為獨切也此一叚說得極透曹蜉蝣之羽衣裳楚楚心之憂矣於我歸處蜉蝣之翼采采衣服心之憂矣於我歸息蜉蝣掘閱麻衣如雪心之憂矣於我歸說此必是上之人脩飾於容儀而忘逺慮者故作此以為刺若曰與其目前之脩飾曷於我歸處焉而為深長之思也云爾詩序刺奢也昭公國小而廹好奢而任小人將無所依焉舉衣裳者特其一端耳䟽曰蜉蝣土裏化生掘地而出故曰掘閱其所取喻或以生深宫之中習於華服而不知從儉也耶彼候人兮何戈與祋彼其之子三百赤芾維鵜在梁不濡其翼彼其之子不稱其服維鵜在梁不濡其咮彼其之子不遂其媾薈兮蔚兮南山朝隮婉兮孌兮季女斯饑詩序刺近人也共公逺君子而好近小人焉曹小國也赤芾何至三百之多耶此末章所謂薈兮蔚兮南山朝隮者彼其之子輕之之辭彼其之子三百赤芾二句承在彼候人兮何戈與祋之下要見候人者雖一職之㣲然皆各供其事任其勞也彼赤芾者優㳺於朝著之間不稱其服不遂其媾但比周為黨薈蔚如南山之朝隮何怪婉孌自守者之不得其食哉葢深恨而痛刺之辭註候人而何戈與祋宜也此宜也二字未當不濡其翼自愛其羽毛也不濡其咮自擇其榖食也彼其之子服之不稱媾之不遂能無厚愧乎哉薈兮蔚兮南山朝隮不獨狀氣燄之盛葢狀此輩人皆速化而登之膴仕所謂乗軒者三百人也正與前相應就三百赤芾說不稱其服就不稱其服說不遂其媾是行文之法註婉孌自保不妄從人八字極妙即此便見彼三百赤芾薈蔚朝隮者皆不自保而妄以從人者也鳲鳩在桑其子七兮淑人君子其儀一兮其儀一兮心如結兮鳲鳩在桑其子在梅淑人君子其帶伊絲其帶伊絲其弁伊騏鳲鳩在桑其子在棘淑人君子其儀不忒其儀不忒正是四國鳲鳩在桑其子在榛淑人君子正是國人正是國人胡不萬年詩序刺不壹也在位無君子用心之不壹也大扺詩皆反言以示刺鳲鳩心一而無二其飼子也均君子之心固結而不解故其為儀也一心如結兮是一章大綱領下文正是國人胡不萬年皆本於此其子七兮正見其母之一而不二也鳲鳩心一而不二故其子或在梅或在棘或在榛而皆仰視於其父母淑人君子其心一故其服有常其儀不忒而四國皆仰視以為刑二章註中三則字甚無謂正國人即承上正四國說非二層意胡不萬年不是願其夀考詩意羙此儀之可以正國人者即萬年由之可也首章由儀之一推本其心之一次章正指其儀之一非心之一不能也三章表其可以正四國四章表其可以至萬年總是羙其心如結儀不忒克稱其為君子也冽彼下泉浸彼苞稂愾我寤嘆念彼周京冽彼下泉浸彼苞蕭愾我寤嘆念彼京周冽彼下泉浸彼苞蓍愾我寤嘆念彼京師芃芃黍苖隂雨膏之四國有王郇伯勞之詩序思治也曹人疾共公侵刻下民不得其所憂而思明王賢伯也愾我寤嘆寤字最妙王室凌夷小國困敝君子何日置於懐要唯寐則稍忘耳一寤則愾然發嘆矣辭曰愾我寤嘆念彼周京葢深致望西京之復振也蕭蒿也用之以祭小明篇云采蕭穫菽稂童梁秀屬蕭則用以祭矣蓍則用以筮矣下泉漸浸及之則黍苖從可知已故末章云芃芃黍苖隂雨膏之葢思隂雨之膏以培植而傷寒泉之浸之為腐壊也末章註中二既字二又有字無謂詩意若曰黍苖之芃芃然何以致之有隂雨以膏之也四國之民戴元后為父母而有王何以得之有郇伯以勞之也自昔聖王之惠澤下國葢如此今無隂雨之膏而有下泉之浸我寧無念彼周京乎哉民心撫我則后虐我則讐其曰有王者全在王者存心於天下而時使方伯以勞之耳如註所云似未妥敢問髙明豳風七月流火九月授衣一之日觱發二之日栗烈無衣無褐何以卒嵗三之日于耜四之日舉趾同我婦子饁彼南畆田畯至喜七月流火九月授衣春日載陽有鳴倉庚女執懿筐遵彼㣲行爰求柔桑春日遲遲采蘩祁祁女心傷悲殆及公子同歸七月流火八月萑葦蠶月條桑取彼斧斨以伐逺揚猗彼女桑七月鳴鵙八月載績載𤣥載黄我朱孔陽為公子裳四月秀葽五月鳴蜩八月其穫十月隕蘀一之日于貉取彼狐狸為公子裘二之日其同載纉武功言私其豵獻豜于公五月斯螽動股六月莎雞振羽七月在野八月在字九月在户十月蟋蟀入我牀下穹窒熏鼠塞向墐户嗟我婦子曰為改歲入此室處六月食鬰及薁七月亨葵及菽八月剥棗十月穫稻為此春酒以介眉夀七月食𤓰八月斷壺九月叔苴采荼薪樗食我農夫九月築場圃十月納禾稼黍稷重穋禾麻菽麥嗟我農夫我稼既同上入執宫功晝爾于茅宵爾索綯亟其乗屋其始播百榖二之日鑿冰冲冲三之日納于凌隂四之日其蚤獻羔祭韭九月肅霜十月滌場朋酒斯饗曰殺羔羊躋彼公堂稱彼兕觥萬壽無疆詩序陳王業也周公遭變故陳后稷先公風化之所由致王業之艱難也傳曰民生在勤勤則不匱自君后以至於民未有不由勤得之者豳風一詩全是說小民終歲勤動為衣食計而又思所以尊其若親其上為君者宜惻然動心思所以勸率而勞苦之使下無失所之民也周家八百年基業培植全在於此七月之詩一言蔽之曰豫而已凡感節物之變而脩人事之備皆豫為之謀也觀七月流火之候即興授衣之念則通篇之意可識矣衣食王道之始農桑衣食之原上有無逸之君日夕計民之衣食民自然思勤其農桑養老而慈幼而尊君親上克盡祭祀燕饗祝禱之誠矣詩詞統是說民詩意統是風上民無衣則寒一日不再食則饑饑寒切身雖慈母不能保其子故七月篇首陳無衣無褐何以卒歲同我婦子饁彼南畆以感動其君曰衣兼褐者豳地寒非褐不足以禦之也纔脩田器即舉足而耕少壯者在田老幼者致餉真無一時敢自逸者不待勸而勤此田畯之所以至喜也春日載陽至爰求柔桑是女子親蠶事若春日遲遲采蘩祁祁四句是因采桑又見此采蘩以共祭者遂思及公子同歸而豫為之傷悲也註蠶生未齊未可食桑采蘩以啖之考爾雅蘩前諸草生傳云可以生蠶陸氏云用以洗蠶種然予湖人也家無不蠶而未聞有以蘩啖蠶洗蠶種者不敢信以為然也公子公家之女子也民間之女子思及與公家之女子同歸故豫以逺父母為憂而蠶事之汲汲耳祭祀亦農桑所共給者故就求柔桑及采蘩一節八月萑葦一語不重詩人意謂七月流火八月即收萑葦亦為蠶事計當此蠶月可不勤其事乎語意與前九月授衣同女桑與柔桑異柔桑是蠶初出所食者小桑則條桑之小者耳蠶盛時所食者衆故小大之桑悉取也桑性以斬伐而始茂故條取之女桑未可斬伐故存其條皆豫為明年蠶計也七月鳴鵙四句全重在載績上績則可以就染矣故𦂳承載𤣥載黄我朱孔陽條桑是蠶而為帛載績是績而為衣古人從厚動輙先公而後私故纔一載績便思為公子裳一取狐狸便思為公子裘一纉武功便思獻豜于公曰一之日于貉取彼狐狸必從四月秀葽說起既欲生民之察其時又見蠶事之後又有穫之一事始及于褐也重八月其穫一句一之日于貉專取狐狸為裘以共上二之日其同則同事于狩併豵豜盡取之矣葢上之褐首狐而次豜下之褐即豵亦可用也貉賤者之服也纔于貉即思取狐狸爲公子裘即前為公子裳之意褐毛布也皮亦毛類故及之春蒐夏苖秋獮冬狩獵皆有常度也而武事寓於其内故云載纉武功五月斯螽動股一章全是審候蟲之屢更見寒意之漸至必穹窒熏鼠塞向墐户入此室處乃可以卒歲也穹窒熏鼠是二事穹穹窿而高者兩垂之側有空則窒之使無寒氣之入熏鼠則熏墻壁間之穴也熏竟則併塞之矣嗟我婦子曰為改歲是老者之辭條桑載績言私其豵老者亦足於衣褐矣而少壯者未必有也天時祁寒稼事已畢入此室處亦人情之所宜有者故老者特愛憐而命入之民情莫不欲夀其親故從六月食鬰及薁說到為此春酒以介眉夀民情莫不欲自食其力故又從七月食𤓰說到采荼薪樗食我農夫薪樗者積樗為薪也此虗字與上采字對介眉夀或泥註兼供老疾奉賔祭曰賔祭之祝皆有所謂稱夀者亦通九月築場圃四句總是起嗟我農夫三句見今歲之農事甫畢可為宫功之執而又思來歲之農事在即不敢為怠緩之計此統是豳民之勤農意上入執宫功還是官府之役若說入邑葺治其宅秋冬居之則上文穹窒熏鼠塞向墐户入此室處又誰居之耶二畆半為廬在田二畆半為宅在邑或恐是周制非豳俗也要識得上入執宫功見古者之役只爲宫室城守計此外無濫役也藏冰獻祭是民之共宴饗稱觴是民之厚然詩意全不在此若曰二之日不獨纉武功三之日四之日不獨于耜舉趾又有藏氷獻祭一事亦係於職分而不可已者九月十月不獨築場圃納禾稼又有宴饗稱觴一節亦根於至情而不容己者總見農夫無一刻之暇為人上者不可頃刻忘稼穡之務也補傳云國人以羔羊朋酒自詣公堂其禮甚野其意甚真雖在立國之初庶事草草然非三代之時安得此風俗也獻羔祭韭不獨是供上之祀四月盛陽不發氷之藏則陽失之亢而歲亦不登獻羔以啟其藏所以爕隂陽而成歳事也七月之詩凡八章起或稱七月流火或稱四月秀葽或稱五月斯螽動股或稱六月食鬰及薁或稱九月築場圃或稱二之日鑿氷冲冲似參差不齊然首章是衣食之總次章三章則由蠶而及於績四章五章則由褐以及於處見衣褐以卒歲者若是其終歳以勤動也六章叙田功以足食七章就宫功以思農八章共祭祀致祝饗見所謂于耜舉趾者統為此事計不得不終歳以勤動也語意極聯絡血脉極貫通讀者不可草草方蠶而思及公子同歸方蠶績而思為公子裳方貉而思為公子裘又獻豜于公而復為室處計則彼錦衣天下者當思衣所自來而重自惜矣方介夀食農而又為宫功之執又鑿氷以獻羔祭韭又舉酒而升堂致祀則彼玉食天下者當思食所自來而重自惜矣古詩云鋤禾日當午汗滴禾下土誰知盤中飱粒粒皆辛苦又云昨日出城郭歸來淚滿襟遍身綺羅者不是養蠶人又曰二月賣新絲五月糶新榖醫得眼前瘡剜却心頭肉但願君王心化作光明燭此三詩足發豳風之義君心玉燭敢有望於今日云此當合尚書無逸一篇看鴟鴞鴟鴞既取我子無毁我室恩斯勤斯鬻子之閔斯迨天之未隂雨徹彼桑土綢繆牖户今女下民或敢侮予予手拮据予所捋荼予所蓄租予口卒瘏曰予未有室家予羽譙譙予尾翛翛予室翹翹風雨所漂摇予維音嘵嘵居東東征是二事居東者周公始聞流言而避居於東也東征者成王既迎周公以歸而往征其罪也觀書金縢云居東二年則罪人斯得東山云自我不見於今三年則知周公居東僅二年東征則三年非一時事矣讀者徒泥罪人斯得一語謂是東征以誅管蔡不知此不如是解葢初流言時舉國莫知罪之所自出自周公避居東都二年成王始得罪人之主名迎周公以歸破斧缺斨以征之則厯三年耳此註云周公東征二年乃得管叔武庚而誅之似欠考証愚不敢以不辯三監之叛原始於武庚非由於管叔武王伐紂而封紂之子武庚以存其祀天下之至仁也使三叔監之天下之至公也為武庚者徳周可矣恊三監以效忠可矣乃武庚不念周之封為大徳而唯毒周之亡其國日夜思所以為叛偶見管叔兄也而居外周公弟也而居内乗此間計取管叔而誘之流言葢實欲毁周之室家也故此詩首云鴟鴞鴟鴞既取我子無毁我室註二叔以武庚叛非當改作武庚以二叔叛恩勤二字宜串看葢父母恩愛其子無所不用其情則其為之勤勞也亦無所不極其至是皆見之於鞠育之間而實可憐閔者彼無端而計取之不亦太毒乎此詩大㫖在存王室故首章出無毁我室一句次章即承云迨天之未隂雨徹彼桑土綢繆牖户云云見為室家者必如是其豫備而後可免或然之虞也三章予手拮据予所捋荼云云正言其所徹取而綢繆者無非爲此室家計四章予羽譙譙予尾翛翛云云正言其為室家計者若是其勞苦而盡瘁乃今忽有意外之變傾危在旦夕之間予斯不能已於嘵嘵之鳴耳觀無毁我室綢繆牖户曰予未有室家及予室室翹翹數語則此詩之大㫖見矣綢繆牖户是總說拮据卒瘏正其所爲綢繆事凡鳥營巢必手口共作故始稱予手拮据後稱予口卒瘏捋荼蓄租正其所拮据而卒瘏者周公在當時事為之制曲為之備無非為王室謀以立萬年不㧞之業乃當時或疑其所為謀者皆為己計今攝政而將不利于孺子故作此詩以曉成王此不獨有國者宜朝夕諷咏以為警即士庶之始為為家室者鞠育之恩勤綢繆拮据之艱苦未有不至於羽譙譙而尾翛翛者乃子孫無端自召其風雨啓民之侮而毁我之室獨不念締造之艱難乎宜各寫一通置之座右我徂東山慆慆不歸我來自東零兩其濛我東曰歸我心西悲制彼裳衣勿士行枚蜎蜎者蠋烝在桑野敦彼獨宿亦在車下我徂東山慆慆不歸我來自東零雨其濛果臝之實亦施于宇伊威在室蠨蛸在户町畽鹿場熠燿宵行不可畏也伊可懐也我徂東山慆慆不歸我來自東零雨其濛鸛鳴于垤婦嘆于室洒掃穹窒我征聿至有敦𤓰苦烝在栗薪自我不見于今三年我徂東山滔滔不歸我來自東零雨其濛倉庚于飛熠燿其羽之子于歸皇駁其馬親結其縭九十其儀其新孔嘉其舊如之何四章統是體征人之意慶幸其歸可以慰室家之願也觀起語並以我徂東山為賦則其情可知己慆慆不歸言初從征時慆慆無歸志也既東歸矣曷為其西悲也曰此人情也置室家逺行非人情之所欲一旦釋甲胄而完歸其喜恱當何如哉喜之之極不覺反生其悽愴也今人遇喜事而生悲正如此勿士行枚士字即作軍士之士看亦可行枚二字宜聮看初往東時常虞罹於鋒鏑而今敦然獨宿於車下視死於瘡痍亦天壤矣此士之所以懽幸也敦團聚之之貌獨者對衆之辭家無主者即内有室人其荒凉光景必至於此果臝之實數句描寫凄然如畫想室中景象似可畏矣然儘在外之受用不若居室之荒凉况出一生於萬死而今得旋歸其懐思曷容已哉曰不可畏也伊可懐也可謂曲盡人情矣婦嘆于室亦聞東征而愾嘆也與我心西悲正相照應洒掃是潔其中穹窒是固其外總之待夫之至而安藉之也我征聿至其喜當何如哉註行久而感深語妙甚男女居室自是人間一樂事東征聿歸而各得完聚葢皆出於望外者其新舊之喜恱豈可勝言哉讀可憐無定河邉骨猶是春閨夢裡人之句則知此詩之體念人情非聖人不能作也既破我斧又缺我斨周公東征四國是皇哀我人斯亦孔之將既破我斧又缺我錡周公東征四國是吪哀我人斯亦孔之嘉既破我斧又缺我銶周公東征四國是遒哀我人斯亦孔之休又按公提王師臨小醜若用兵力一鼓滅之何待三年之久乎觀書載公化商之事勤拳懇惻如父兄之愛其子弟則可識詩人之所謂哀人斯矣哀我人斯而肯用兵器以殺戮乎詩緝辯斧斨及錡銶非征伐之兵器也蓋周公奉王命以討罪有征無戰四國聞王師之至即窮蹙自守周公又遲之三年不為急攻之計故未嘗從事於戰陣維行師有除道樵蘇之事斧斨錡銶之用為多厯時之久則必敝故詩首及此耳若云兵器則是與血戰而取勝也曷云周公東征四國是皇哀我人斯亦孔之將云云哉此血流漂杵孟子所不盡信於書者也此辯甚有理可從按七月篇云取彼斧斨以伐逺揚墓門篇云墓門有棘斧以斯之通作伐木之器說非兵器也傳曰錡鑿屬銶木屬皆非兵器若兵器則宜用弓矢干戈矛㦸矣何取于斧斨錡銶哉哀我人斯亦孔之將𦂳承四國是皇說葢四國之人惑於流言之騰其心必搖動而不能自主也如是則何利之有自天誅一加而使知從逆者之無所逃干紀者之不能逭則民志帖然其大定矣是造福之極大者是之謂哀我人斯亦孔之將吪訓化遒訓歛而固極當當時羣叔流言四國必有去正而從邪者必有縱肆而不軌者天討加而化誨之使歸於正戢歛之使守其法誰復有䧟于匪彛者乎故𦂳承之曰哀我人斯亦孔之嘉亦孔之休讀東山之詩見周公體歸士之心讀破斧之詩見歸士識周公之心伐柯如何匪斧不克取妻如何匪媒不得伐柯伐柯其則不逺我遘之子籩豆有踐註亦是以愚論之詩人意若曰嘗言伐柯矣今視此柯也其則端具於其身信乎柯必伐而後可識其則也嘗言娶妻矣今遘之子也籩豆燦然其有踐信乎妻必娶而後可識其禮也此兩喻葢謂平日欲見公今一見之得瞻儀範之隆挹禮度之羙不虗此願見之心故言之亹亹有深幸耳書曰凡人未見聖若弗克見聖既見聖若弗克由聖即此之謂也若止言得見之易意義淺淡無味敢問高明九罭之魚鱒魴我覯之子衮衣繍裳鴻飛遵渚公歸無所於女信處鴻飛遵陸公歸不復於女信宿是以有衮衣兮無以我公歸兮無使我心悲兮唯九罭而後得鱒魴是甚不易見也今我覯之子而得覩衮衣繍裳之儀範焉此生亦何幸哉鴻非就於渚者亦非就於陸者偶飛而遵渚遵陸耳公歸豈無所乎歸豈復來乎葢不過信宿於是焉而已此東人繾綣不忍公去之至意也是以有衮衣兮其欣仰亦何至無以我公歸兮無使我心悲兮其懐戀亦何深信非盛德不足以至此狼䟦其胡載㚄其尾公孫碩膚赤舄几几狼㚄其尾載䟦其胡公孫碩膚德音不瑕凡人小遇顛蹶䟦于前則㚄于後㚄於後則䟦於前此何以故充養未至而變故之得以攖吾𠂻也聖人之𠂻常一而常定常定而常閑風霾隂曀而太空自如濤浪掀翻而坎止自若舜不述於烈風雷雨禹不懼於黄龍負舟孔子不畏於匡周公自得於東皆其天之常定也究其本則范氏無欲二字盡之矣此叚註極透快可誦書金縢云武王既䘮管叔及其弟流言於國曰公將不利於孺子周公乃告二公曰我之弗辟我無以告我先王是周公避居東都實案也夫以周公恩勤鞠育之深綢繆拮据之甚功在王室碩大而膚敏夫孰不見且亮之而一旦避出居東非公之自孫而何哉詩曰公孫碩膚葢亦道其實也嚴華谷曰凡人處利害之變則舉止不安其常懼者或至于䘮屨喜者或至于折屐詩人以赤舄几几為周公之聖其善形容聖人矣赤舄几几無失其常度德音不瑕無玷其聲聞此之謂周公古今稱輔幼主者曰伊尹周公矣太甲狎于不順也伊尹嘗放之於桐成王惑于流言也周公顧避之于東何其畏嫌也曰周公之所處與伊尹異太甲之不順太甲一時之非而其心則知有尹也君知有尹而當時又無如尹者非尹以先王訓戒之安望其改圗若周之流言出於管蔡之親而驟入於成王之耳其惑有未易解者一旦弗避而相疑若王室何而况乎當時猶有二公在也卒之風雷變而金縢啓而迎好如初公之一避其可少哉故知得其君之心而又無可退托者不嫌於直任有見疑於君而其間又有可托者不嫌於少遜太王避狄人曰肆不殄厥愠亦不殞厥問周公避居東曰赤舄几几徳音不瑕重訂詩經疑問卷三
