body:
  text: 重訂詩經疑問卷四明姚舜牧撰小雅呦呦鹿鳴食野之蘋我有嘉賔鼓瑟吹笙吹笙鼓簧承筐是將人之好我示我周行呦呦鹿鳴食野之蒿我有嘉賔德音孔昭視民不恌君子是則是效我有旨酒嘉賔式燕以敖呦呦鹿鳴食野之芩我有嘉賔鼓瑟鼓琴鼓瑟鼓琴和樂且湛我有旨酒以燕樂嘉賔之心詩傳燕賢也是凡説詩宜先討求大旨不徒泥其章句如此篇大旨在求教示之益専重人之好我二句然此二句不即指嘉賔説詩人意本謂我有嘉賔須具堂上下之樂筐篚之將此何以故蓋人求教示之益必先得此人之心人之好我方示我以周行耳次因説我有嘉賔德音孔昭云云正謂此嘉賔有可以教示我必用旨酒而式燕以敖可也次又説今我幸有嘉賔而必備琴瑟之樂致和樂之湛正將以此燕樂嘉賔之心庶乎嘉賔之不棄而示我以周行耳如此看語意始相承而血脈亦流貫若謂首章是示我以大道次謂不待言語之間而其所以示我者深又次謂安樂其心則非止養其體娛其外而已則初之示我周行者專在言語耶旨酒式燕以敖者止是養其體娛其外耶且章首原説人之好我不説賔之好我意甚明白敢正髙明真西山曰鹿食蘋則相呼呦呦焉而樂君臣賔主之相樂亦猶是也愚謂是則然矣然所以必取諸鹿者鹿優遊於山野間初無求於人世賢者之養重亦猶是也自非上之人盡燕享之誠欵洽之意彼曷以輕顧哉所以具酒殽將筐篚備琴瑟之樂而殷勤以致厚然後可祈其教示之益瑟堂上之樂笙堂下之樂鼓瑟吹笙即承上説無二意承筐是將是幣帛陳于筐篚以將敬也人之好我二句泛説見周行之不輕示所以求之者必致其勤欵而後可祈嘉賔之樂與也好字重看即心乎愛矣之謂示不專言語間周行説得寬凡修身齊家治國平天下大道理皆是也德音孔昭是本其平日之充養顯播于天下者言視民不恌視字與示字别凡充養完粹的人其視衆寡小大自然敬畏而不肆所以説視民不恌不是説示民使不偷薄一説德音孔昭是嘉賔之言詞不苟視民不恌是嘉賔之瞻視不輕所以君子是則是效而燕饗之不可已我有旨酒嘉賔式燕以敖照上説必求其人之好我也三章我有嘉賔鼓瑟鼓琴云云又照前看見得幸有嘉賓若此必如是其致敬然後可致其和樂之情可燕樂嘉賔之心説到燕樂嘉賔之心乃見我之真好通于人人之真好通于我方肯示我以周行四牡騑騑周道倭遲豈不懷歸王事靡盬我心傷悲四牡騑騑嘽嘽駱馬豈不懷歸王事靡盬不遑啓處翩翩者隼載飛載下集于苞栩王事靡盬不遑將父翩翩者隼載飛載止集于苞杞王事靡盬不遑將母駕彼四駱載驟駸駸豈不懷歸是用作歌將母來諗詩序勞使臣之來也詩傳勞使臣之勤也勤字較勝來字首章之傷悲懷歸而傷悲也次章之不遑啓處懷歸而不遑也三章不遑將父四章不遑將母正道其所懷歸者見傷悲啓處之不寧也末章將母來諗蓋望人將此懷歸之情以告君耳其語極次第而其意極悲酸懷歸者懷父母而思歸也故不遑將父二章無豈不懷歸句隼小鳥也尚飛集于苞栩人獨何心而違其父母乎説到此其情悲且切何如凡王者用人之力必先體人之情豈不懷歸將母來諗其體人情可謂曲且至矣為使臣者能無每懷靡及以仰答之乎皇皇者華于彼原隰侁侁征夫每懷靡及我馬維駒六轡如濡載馳載驅周爰咨諏我馬維騏六轡如絲載馳載驅周爰咨謀我馬維駱六轡沃若載馳載驅周爰咨度我馬維駰六轡既均載馳載驅周爰咨詢凡使臣之行宣上德而逹下情自非咨訪其土俗民情之宜則其馳驅也何益哉所以不但諏之又謀之度之而復詢之且必咨之周而後已是其所為每懷靡及者故為使臣者不可不盡諏謀度詢之周而其所以周爰咨之者不可不存每懷靡及之念不曰使臣而曰征夫者見使臣此心其屬亦此心也諏謀度詢雖一事然既分四字則微有别所謂諏者訪問其民情土俗何如也謀則就是而擬議其所為興革度則因是而酌量其所可通行詢則又加審焉纎悉毫微必求其當而後己也如是而咨訪之周則窮簷蔀屋之情悉達于廟堂之上而九重之德意可下沛于深山窮谷之中是之謂宣德達情而無負于使臣之命按書曰詢謀僉同又曰弗詢之謀勿庸凡謀必先之諏必加之度必至於詢而後定也然四字上通著一咨字咨訪問也古今稱大知而首好問好察其有深意哉爰於也就於其地集其耆老遺逸而咨訪之且考求其典故併今之所當因革宜何如者四牡皇華皆出一懷字統見當時之君其心常通于人心故知其所懷不出于君親之外也四牡是勞使臣之詩故曰豈不懷歸以曲體其情皇華是遣使臣之詩故曰每懷靡及以深作其勸常棣之華鄂不韡韡凡今之人莫如兄弟死喪之威兄弟孔懷原隰裒矣兄弟求矣脊令在原兄弟急難每有良朋况也永歎兄弟鬩于牆外禦其務每有良朋蒸也無戎喪亂既平既安且寧雖有兄弟不如友生儐爾籩豆飲酒之飫兄弟既具和樂且孺妻子好合如鼓瑟琴兄弟既翕和樂且湛宜爾室家樂爾妻孥是究是圗亶其然乎詩序燕兄弟也閔管蔡之失道故作常棣焉起興于常棣者常棣根株相連比而華蕚更相輝映也箋曰承華者曰鄂鄂以承華華以覆鄂鄂華相承覆而韡韡猶兄弟相承覆而怡怡也凡今之人莫如兄弟是一章之大旨死喪之威不必作畏字解威正與懷對威非人所懷而兄弟孔懷此天性至情也觀諸原隰裒而兄弟求便見得原隰裒矣二句詩緝解方困窮流離羣聚於原野之時維兄弟相求而相依亦好以脊令在原興兄弟急難見兄弟偶有急難必若脊令之飛之鳴之行之搖之不敢自寧也此是倒提文法程子曰脊令首尾相應兄弟急難之際其相應如是也體得好今言人兄弟如左右手之相救即此喻以鬩墻之變形出禦務之必然見兄弟之友愛自當如此務字不必改作侮字凡外事之當抵禦者皆是也若改作侮則止一事矣兩讀每有良朋見友朋之義雖切至然未有如兄弟者况也况字傳作兹字解蒸也蒸字緝作衆字解注俱云發語辭似不必過求矣然愚謂古人下一字必有一字之義若云發語辭何不均用况字蒸字耶若况訓兹蒸訓衆似亦未確竊謂况者交好之情况也蒸者憤氣之鬱積也良朋當急難之時豈無一種不安之情况然是况也莫能用情也付之永歎而已良朋當外禦之時豈無一種不忿之蒸鬱然是蒸也匪不反兵之讐也其可以興戎乎哉如此體看庶得况蒸二字之義而二也字亦有著落未識是否敢正高明喪亂既平一節轉摺甚妙友朋所禆于生人不小矣此所云蓋謂較兄弟稍有差别耳知兄弟之親又知朋友之義是善讀詩者薄俗酒食相徴逐知有良朋而忘兄弟更有私妻子而薄同氣隔藩籬若分胡越者故著儐爾籩豆二章見兄弟不可不具不可不翕也儐爾籩豆以下正見安寧之時兄弟之友愛自有不容己者必如是而後可以宜室家樂妻孥不特死喪之時為宜然也既具既翕二既字宜體有一不具而心能安乎有一不翕而心能安乎是字然字即照上文説蓋兄弟具而樂且孺兄弟翕而樂且湛若此其宜室家樂妻孥此是一假真情實理凡今之人所不可不知者人惟不反求而實從事焉所以不知其然耳詩人云云端是教人反求諸心而實知此理也此詩意義極明析每章下注亦明透可誦唯章句下注三章但言急難則淺于死喪四章則又以情義之甚薄者猶有所不能已云云較未得詩人之意詩人本意若曰凡今之人莫如兄弟矣即如死喪之威人所畏逺而兄弟則孔懷焉觀諸原隰之裒兄弟之求至性真情自有不容解者故一有急難則如脊令之在原者然雖有良朋不過永歎焉耳而有是乎兄弟鬩于牆少有言語之傷而外務則共抵禦之雖有良朋蒸也無戎而又有是乎此語遞遞相承總發一假至親之真情實意以見凡今之人莫如兄弟非謂急難淺於死喪而外禦其務又情義之甚薄者也敢問髙明周道所重親親也故周書曰時庸展親此詩人反覆言之著為燕饗之歌令聽之者油然生友愛之心也嗟乎先王之篤厚同氣至矣培植國本深矣彼煮豆燃箕而喋血禁門者獨非人類哉何無人心至此也凡有兄弟者當寫一通置之座側伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木嚶其鳴矣求其友聲相彼鳥矣猶求友聲矧伊人矣不求友生神之聽之終和且平伐木許許釃酒有藇既有肥羜以速諸父寧適不來微我弗顧於粲灑掃陳饋八簋既有肥牡以速諸舅寧適不來微我有咎伐木于阪釃酒有衍籩豆有踐兄弟無逺民之失德乾餱以愆有酒湑我無酒酤我坎坎鼓我蹲蹲舞我逮我暇矣飲此湑矣詩序燕朋友故舊也此詩何皆以伐木興入山伐木必多人故著丁丁許許于阪見亦以夥類同行有朋友相須之義也相彼鳥兮四句不是以鳥形人之不如鳥一物也猶然同聲以相求人靈于鳥萬萬者舍卑下以進高明舍友生何賴焉人而知求則中心恱懌其相應和何如中心聽從其忘爾我何如其和其平真有通極于神明者所以神之聽之終和且平耳倘聲不相應而相求人情尚乖戾而傾欹神誰聽之而安望其終和且平哉此語句交接處宜細加體會可自得之求友生何與于神曰人神一理也求友生以洽人心即洽于神之心矣故曰神之聽之終和且平小明篇論僚友亦説到神之聽之式榖以女神則何聽哉和且平是錫之以和平之福也上著一終字宜玩味寧適不來微我弗顧寧適不來微我有咎總是反已而必求恩禮之懇至也諸父諸舅兄弟皆友也何以陳設若斯之殊曰兄弟其親者也釃酒有衍籩豆有踐足以燕矣諸父其尊者不有肥羜可輕召致乎若諸舅則異姓之尊者非灑掃陳饋八簋肥牡其曷以饗諸中庸云親親之殺尊賢之等禮所生也正此意友也者友其德也無擇於尊卑同姓而諸父異姓而諸舅同行而兄弟皆相須夾輔以有成者故厯厯言之諸父諸舅皆尊者故但言速而不敢必其來兄弟同儕故必召之使來而無逺失德者不相能而為仇也有酒湑我無酒酤我言不計有無而必其相會也坎坎鼓我蹲蹲舞我言為我飲湑而鼓且舞也故下緊承曰逮我暇矣飲此湑矣蓋不使其終相逺也逮其暇者政事之暇也天保定爾亦孔之固俾爾單厚何福不除俾爾多益以莫不庶天保定爾俾爾戩榖罄無不宜受天百祿降爾遐福維日不足天保定爾以莫不興如山如阜如岡如陵如川之方至以莫不增吉蠲為饎是用孝享禴祀蒸嘗于公先王君曰卜爾萬夀無疆神之弔矣詒爾多福民之質矣日用飲食羣黎百姓遍為爾德如月之恆如日之升如南山之壽不騫不崩如松柏之茂無不爾或承天有定未定天保而曰定定而曰孔固則其定也不可移矣此謂天之既定者也天下無德外之福故詩人祝君以福必本之以德言天安定爾位亦甚堅固矣然非單厚不足以凝福而非福之除亦無以見其為單厚也非多益不足以言庶而非莫不庶亦無以見其為多益也今天俾爾每事盡厚則何福不可消除俾爾多行利益則民物莫不蕃庶此足以徴天保定爾亦孔之固矣蓋天之定不在福與庶在俾爾單厚之足以凝福俾爾多益之足以致庶者為可見也二三章首止稱天保定爾無亦孔之固句承上文不必再也俾爾戩榖罄無不宜詞雖與上章類而意較更深蓋此二語是本其平日所為之盡善而盡無不善者言之所以受天百祿又降爾遐福維日不足上章之俾爾單厚何福不除俾爾多益以莫不庶本諸此下章之以莫不興如山如阜如岡如陵如川之方至以莫不增亦本諸此四五六章正道其本此以孝享故神貽之多福民遍為爾德如月恆日升如南山之壽松柏之茂受福若此其穰穰也此之謂天保定爾亦孔之固是二語實一詩之綱領也卷阿篇連下俾爾彌爾性者三此篇一曰俾爾單厚二曰俾爾多益三曰俾爾戩榖罄無不宜其命意略同戩榖是盡善罄無不宜是盡無不善易曰視履考祥其旋元吉正如此然此皆天所栽培也故上加俾爾二字易曰自天祐之吉無不利正如此罄無不宜承上戩榖説盡善的自盡無不善盡無不善乃為盡善其意相承必重言之始較完足耳受天百祿緊承俾爾戩榖罄無不宜説降爾遐福維日不足又言天之申命有加而未艾也觀受字降字自見得三章以莫不興以莫不增本受天百祿降爾遐福維日不足來蓋曰如山高矣又復如山脊之岡曰如阜大矣又復如大阜之陵此以見其莫不興川本源深流長矣而曰方至則又盛長之初此以見其莫不增也此正見天保定爾亦孔之固處吉蠲為饎四句是竭誠意以共祭祀君曰卜爾二句是傳神意以嘏主人禴祀蒸嘗正其所為孝享者周祭先公先王故曰于公先王卜爾卜字不宜作期字解蓋凡人所凝受皆自其平日所為者卜之神意謂主人如此孝享必其平日所為無不單厚多益而戩榖無不宜矣即此卜之而萬壽無疆固其所必然者故云君曰卜爾萬夀無疆弔字不宜訓至字弔垂念也神垂念則詒之福不垂念則詒之禍矣節南山不弔昊天即此弔字神之弔矣二句緊接上章説民之質矣四句又緊承此二句説蓋神之福人無可見而民之質而無偽遍為爾德乃其福之所可徴者要識得質本質也本等也出作入息耕食鑿飲是民之本等故曰民之質矣日用飲食民之質矣四句不平歸重下二句非日用飲食之民不能遍為爾德故從民之質矣説起以民俗民德對言者非爾德者何戩榖是也君戩榖而無不宜民歸德而無不宜是謂遍為爾德孟子曰天不言以行與事示之而已矣以行與事示之如之何使之主祭而百神享使之主事而民治是天意也然百神之享非民治何以徴焉詩表吉蠲孝享神貽之福而極之羣黎百姓遍為爾德則行與事之所示者昭然而天心見矣詩與孟子之言相發明蓋如此洪範陳斂時五福説到用敷錫厥庶民棫朴詠文王之德亦説到壽考遐不作人大抵德福相因必以民化為極前既言其福興矣增矣此又欲其永久故以日月之恆升言然日月猶有虧昃也故又言南山之壽不騫不崩則可謂堅固矣然人君之福非享之一身已也又如松柏之茂無不承其庇覆則天地鬼神山川草木無不賴之是之謂福之極此以終天保定爾亦孔之固之意采薇采薇薇亦作止曰歸曰歸歲亦莫止靡室靡家玁狁之故不遑啓居玁狁之故采薇采薇薇亦柔止曰歸曰歸心亦憂止憂心烈烈載飢載渴我戌未定靡使歸聘采薇采薇薇亦剛止曰歸曰歸歲亦陽止王事靡盬不遑啓處憂心孔疚我行不來彼爾維何維常之華彼路斯何君子之車戎車既駕四牡業業豈敢定居一月三捷駕彼四牡四牡騤騤君子所依小人所腓四牡翼翼象弭魚服豈不日戒玁狁孔棘昔我往矣楊栁依依今我來思雨雪霏霏行道遲遲載渴載飢我心傷悲莫知我哀詩序遣戍役也詩傳勞師也傳較勝于序通篇皆託將士自道之辭然勞苦悲傷上能厯厯為彼詳道之結語云莫知我哀乃所謂深知其哀者也薇曰作止曰柔止曰剛止及于常之華蓋厯舉時之變也曰歸曰歸歲亦莫止是將士自計來年代戍之時以自定其心凡行役不無飢渴之苦故行時曰載飢載渴旋時曰載渴載飢我戍未定言身尚未至戍所也在途曰憂心烈烈在戍曰憂心孔疚一字不輕下我行不來言我行未能即還也與後今我來思來字相照應似不應作致死解一月三捷是將士自期之辭君子所依二句要識輕重蓋君子之依依此戎車以制勝也小人其可不效力乎故特下一腓字腓足肚也足行則先自動言必隨君子行以取勝也四牡騤騤是整肅以為行者故下小人所腓句四牡翼翼是裝嚴以為守者故下豈不日戒句曰靡室靡家曰不遑啓居曰我戎未定靡使歸聘曰不遑啓處曰豈敢定居曰豈不日戒此可以識戍役者忠君之情急上之義首章是將行時故於今歲采薇時出戍即念及來歲莫冬光景因以義自割其室家之情曰玁狁之故以義自忘其啓居之勞曰玁狁之故次章是在途時而不勝悲之烈烈且無奈飢渴之勞欲通一訊候焉不可得也故以義自斷曰我戌未定靡使歸聘三章則已至戍所時在陽月矣然王事靡盬不遑啓處一有旋心非夫也故復以義自斷曰憂心孔疚我行不來若謂即憂室家之甚不可負公家之役也云爾四五章是在戍次年事故以常華興軍容之盛曰豈敢定居一月三捷必期其戰功之成又由戎車及兵事之飭曰豈不日戒玁狁孔棘深嚴其禦備之守此正戍役之以義自奮處末章是極道歸時勞苦之情此皆公義所不容已者大注敘其勤苦悲傷之情而又風以義是一詩之大旨據注是從遣戍之時直説到言旋之日而終之曰我心傷悲莫知我哀蓋謂此一假悲傷勞苦我皆知之而皆能為爾道之爾行可無復顧慮也必如是而後可以激戍役勤王之心是則然矣然愚謂此不必爾也自采薇遣戍以至于雨雪來思是實實原有此事上之人能體之備載諸詩凡後來遣戍者則歌此以遣之耳若通篇皆作豫道之辭則薇之自作而柔而剛以及于常之華直及于雨雪之霏霏似為夢語豈其然乎敢妄論以質之高明我出我車于彼牧矣自天子所謂我來矣召彼僕夫謂之載矣王事多難維其棘矣我出我車于彼郊矣設此旐矣建彼旄矣彼旟旐斯胡不斾斾憂心悄悄僕夫况瘁王命南仲往城于方出車彭彭旗旐央央天子命我城彼朔方赫赫南仲玁狁于襄昔我往矣黍稷方華今我來思雨雪載塗王事多難不遑啓居豈不懷歸畏此簡書喓喓草蟲躍躍阜螽未見君子憂心忡忡既見君子我心則降赫赫南仲薄伐西戎春日遲遲卉木萋萋倉庚喈喈采蘩祁祁執訊獲醜薄言還歸赫赫南仲玁狁于夷此勞還率之詩大抵道其承命之時急難勤王而不忘憂畏之心故其成功也易耳觀首章云王事多難維其棘矣次章云憂心悄悄僕夫况瘁則其情可見矣其往城朔方而玁狁于襄皆此急難憂瘁之心之所致也故四章又表其往來之不遑者曰維畏此簡書五章又推其室家之憂念者曰維薄伐西戎則知其素所畜積者見諒於內外此一舉成功而玁狁于夷耳當時文王得専征伐以王命命南仲伐玁狁併及西戎故稱自天子所稱王事稱王命稱天子命我此詩總是上之人體將率往來之辭及其室家相念之辭故凡稱我者皆南仲自我也我心則降則室家自我耳若王命南仲似出命之辭天子命我似承命之辭而赫赫南仲又再三為褒稱之辭錯雜以成文者蓋勞還率總是褒大其功故不覺其辭之錯雜也出車由郊而牧而此詩倒言者南仲身先士卒獨駕而至於牧餘車猶在郊也觀召彼僕夫謂之載矣自見得自天子所謂我來矣見我承君命以往行不可緩也臣子所任皆王事也而玁狁西戎相訌而內侵此乾坤何等時耶而可自怠緩為乎故曰王事多難維其棘矣設建旗幟軍容也故曰旐曰旄曰旟旐曰旗旐錯舉言之不必牽泥朱雀玄武青龍等以合曲禮車攻篇亦有建旐設旄句將率方以任大責重為憂而僕夫之情况亦恐懼而憔悴故曰憂心悄悄僕夫况瘁如是而事復何憂哉故愚謂此二句是當日成功之本王命南仲往城于方是當時命將之本意蓋先王所重者生靈也城守而驅狄使不敢內侵則吾事畢矣固不必攻戰以取勝也其不免薄伐云者亦不得已為之耳上章止言出車勤王耳未明言其何所命也此章方説王命南仲往城于方出車彭彭旗旐央央見上所云出車建幟以急難者蓋承此命耳故南仲始出令軍中曰天子命我城彼朔方以振厲士卒之氣士卒皆用命而玁狁于襄焉其出也有名其作也有勇而其往也無敵此之謂王者之師此之謂王者之將威靈氣焰赫然動人皆本天子命我一語來于襄者掃除之謂也玁狁惕威而逺遁是謂之于襄昔我往矣四句剔出王事多難二句王事多難二句剔出豈不懷歸二句蓋南仲心維簡書之畏此往來不憚勞苦以勤王也此章是專表南仲心事喓喓草蟲六句此通是室家語見室家之思南仲也甚切只為其薄伐西戎有未暇歸耳此章承上章又剔發南仲平日心事取信于室家故室家雖念之而且知勤王之為義也天子命往城朔方耳此何以云薄伐西戎曰天子之命有專制有權宜朔方西戎皆國家患也當時専制在朔方而偶見西戎之竊發提師以薄伐焉亦閫以外將軍制之權宜之事也且當時天子或更有命南仲或專有請皆不可知春日遲遲百卉萋萋倉庚喈喈采蘩祁祁執訊獲醜薄言旋歸寫一假旋師光景分明畫出個太平氣象來而終之曰赫赫南仲玁狁于夷蓋歸此大功于其帥而不自居此謂勞還率之詩也執訊獲醜不必是西戎或玁狁亦有之觀玁狁于夷句便見得于襄者掃除而無敵也于夷者蕩平而無事也將兵者必常懷憂畏之心然後可奏勤王之績將將者必知其將之常懷憂畏也然後可期其敵愾之功有枤之杜有睆其實王事靡盬繼嗣我日日月陽止女心傷止征夫遑止有枤之杜其葉萋萋王事靡盬我心傷悲卉木萋止女心悲止征夫歸止陟彼北山言采其杞王事靡盬憂我父母檀車幝幝四牡痯痯征夫不逺匪載匪來憂心孔疚期逝不至而多為恤卜筮偕止會言近止征夫邇止凡戍役兩期而還初年春莫行次年夏代者至留備秋十一月而歸又次年春莫還家此常期也詩人逆其室家之情而代之言自次年罷役防秋時至又次年春莫時想料其思念之意描寫其企望之懷宛然如出於深閨思婦之底裏此之謂曲盡人情者王者以人道使人又以人情曲體久役之人如之何其不感動天下而使民之自忘其勞首二章上四句是詩人代室家之詞下三句則推其詞之所謂也思婦數日而過故曰繼嗣我日日月陽止正備秋之後可以言歸之日也故云女心傷止言非復向之不遑啓居時也女心悲止甚于傷矣征夫歸止異于遑矣陟山采杞見歸期之已過而意料在行者之必然也故曰檀車幝幝四牡痯痯征夫不逺匪載章見過期而不來故又重恤焉而謀之卜筮也此皆人情之所必到處征夫遑止計其時之可遑也征夫歸止度其時之可歸也征夫不逺料其旬日之當還也征夫邇止決其旦莫之必至也詩緝云此詩四章皆不言戍役來歸之事唯述其未歸之時室家思望之切如此則今日之歸其喜樂為何如也所以慰勞之也魚麗于罶鱨鯊君子有酒旨且多魚麗于罶魴鱧君子有酒多且旨魚麗于罶鰋鯉君子有酒旨且有物其多矣維其嘉矣物其旨矣維其偕矣物其有矣維其時矣詩序美萬物衆多能備禮也不若詩傳燕大臣也賦魚麗得之魚麗于罶鱨鯊言所得之魚品旨且多也故興君子有酒云君子有酒設酒肴以樂賔也不専言酒也旨言其酒肴之腴美多言其當筵之備具有言其藏畜之餘盈總之則所謂備物也禮意在後三假見後三章蘇氏云云亦是以愚論嘉與旨何别偕與多何别且上云有酒此何以換一物字耶换一物字便見酒只是個物也所以將是物者情也詩人之意蓋曰物其多矣而非徒物也維其禮意極其嘉美也物其旨矣而非徒旨也維其禮意與之偕到也物其有矣而非徒有也維其禮意時存而不忘也前注所謂見主人禮意之勤以優賔正于此三假見得不然即有酒之旨且多多且旨旨且有亦物耳何禮意之足云嘉嘉樂也偕偕到也此本禮意來易解唯時字似未易體然嘗觀蘇子赤壁賦云我有斗酒藏之久矣以待不時之需是時之説也使燕饗禮意有一時之或忘則酒肴或幾忘設矣能隨取而隨有哉此詩前後各三章相照應相申發又一格南有嘉魚蒸然罩罩君子有酒嘉賔式燕以樂南有嘉魚蒸然汕汕君子有酒嘉賔式燕以衎南有樛木甘瓠纍之君子有酒嘉賔式燕綏之翩翩者隼蒸然來思君子有酒嘉賔式燕又思此燕饗通用樂章故不獨頌嘉賔而主人樂賔之嘉意亦具見焉序云樂與賢也是讀其詩似以有魚興有酒然其意實以嘉魚興嘉賔也觀下章甘瓠翩隼自見得若前三章連下二有字末章連下二思字又作文之妙法也次章衎字不應亦訓樂字此詩一意四疉只於樂衎綏又四字上稍見分别耳若衎亦訓作樂與前何以别乎易曰鴻漸于磐飲食衎衎象曰飲食衎衎不素飽也此當以相宜自適意看三章樛木甘瓠興主賔極當綏字照纍字極佳翩翩者隼二句謂嘉賓之惠然肯來也故承謂君子有酒嘉賓式燕又思又思應來思極緊見好賢之心之終無已也甘瓠纍於樛木猶本屈己下賢來若隼之翩然來思則賢者自聞風而至矣自非主人樂賔之深且甚何以得此總四章論樂歡會也藉此燕以相歡會也衎宜適也藉此燕以相宜適也綏字照纍字見燕之綢繆所謂中心好之曷飲食之者也又字照來字見燕之重復所謂逮我暇矣飲此湑矣者也南山有臺北山有萊樂只君子邦家之基樂只君子萬壽無期南山有桑北山有楊樂只君子邦家之光樂只君子萬夀無疆南山有杞北山有李樂只君子民之父母樂只君子德音不已南山有栲北山有杻樂只君子遐不眉夀樂只君子德音是茂南山有枸北山有楰樂只君子遐不黃耉樂只君子保艾爾後南山北山有臺有萊等物見崇高峻大處必草木生長其上足為世之資用况樂只君子柱石楨幹為邦家之基闡繹宣揚為邦家之光愛養生息為民之父母則得夀得名固其所必然者故曰邦家之基曰萬壽無期曰邦家之光曰萬壽無疆曰民之父母曰德音不已下文即其所謂萬壽者申之曰遐不眉壽曰遐不黃耉見其所謂無期無疆者蓋如此也即其所謂德音者申之曰德音是茂又申之曰保艾爾後見其所謂不已者不獨茂於其躬而又能延及其後也總之則重在邦家之基邦家之光民之父母上敢問高明有基然後光基且光然後稱民之父母語有次第遐不眉夀若曰其眉夀豈不遐乎遐不黃耉若曰其黃耉豈不遐乎是詩人倒字文法非遐何音近而通用也如必作何字解天保篇云降爾遐福亦將曰降爾何福乎白駒篇云而有遐心亦將曰而有何心乎此不通之論也敢一辨之朱注謂燕饗通用之樂章君子指賔客詩緝照序云得賢則能為邦家立太平之基君子指成王亦是蓋邦家之基邦家之光萬夀無期萬夀無疆德音是茂保艾爾後等語似下頌上之辭恐非燕饗之樂也詩傳謂大臣報主也是蓼彼蕭斯零露湑兮既見君子我心寫兮燕笑語兮是以有譽處兮蓼彼蕭斯零露瀼瀼既見君子為龍為光其德不爽夀考不忘蓼彼蕭斯零露泥泥既見君子孔燕豈弟宜兄宜弟令德夀豈蓼彼蕭斯零露濃濃既見君子鞗革沖沖和鸞雍雍萬福攸同蕭維長大而可承天之澤君子維有令德而可承天子之澤此一詩取興大主意興詞若在我心寫兮止然必到燕笑語而有譽處乃為天子零露之湑也燕笑語兮二句緊承我心寫兮一句説曷為燕笑語而有譽處也凡諸侯朝於天子名分森嚴莫敢踰越即大飲賔之饗若與殿陛之肅肅者稍殊然隆其禮以致敬猶未伸其欵洽之情維是既饗而燕若後篇厭厭夜飲在宗載考之時上意下情雨相宣逹天子若降色笑言語以逮下而諸侯凡有令德如下文所云者悉承其譽命而可為自處之地是之謂有譽處而天子殷勤接下之意庶幾其少慰也故曰我心寫兮燕笑語兮是以有譽處兮而下章又反覆申言之也記曰饗以訓恭儉燕以示慈惠蓋正謂此觀首章一燕字及三章孔燕字便見得凡人務德不務譽然非譽命之上逮有未可自安者此譽處二字之相因也易曰終以譽命上逮也正此意首章只説得燕笑語兮是以有譽處兮而未竟其所謂笑語者何如也譽處者何如也為龍為光其德不爽夀考不忘孔燕豈弟令德夀豈鞗革沖沖和鸞雍雍萬福攸同是所謂燕笑語而可以譽處也要識得為龍龍字不宜作寵字解諸侯承流宣化凡所為變化霖雨天下者猶龍也必稱其職而無忝是之謂為龍為龍為光緊承既見君子來蓋見其所為龍者真能膏澤下民見其所為光者真能照臨下國故承説其德不爽夀考不忘夀考不忘即是永享之意凡為人牧者緊要在豈弟二字而豈弟之實必始于家庭是謂令德而可以永享其樂者故説孔燕豈弟即緊承宜兄宜弟令德夀豈疑忌兄弟最是大薄惡事必克恭以宜其兄大念鞠子哀以宜其弟始稱令德而夀豈凡宜兄宜弟的必宜民宜人所謂為龍為光者根本在是令德申上其德不爽句夀豈申上夀考不忘句鞗革沖沖和鸞雍雍非令德而有是乎故緊承説萬福攸同凡譽譽其德也故首章曰有譽處兮次章即出其德不爽句三章出令德夀豈句末章又驗其所謂令德者終之曰萬福攸同其語極次第而流貫湛湛露斯匪陽不晞厭厭夜飲不醉無歸湛湛露斯在彼豐草厭厭夜飲在宗載考湛湛露斯在彼杞棘顯允君子莫不令德其桐其椅其實離離豈弟君于莫不令儀詩序傳皆謂天子燕諸侯也露必待陽而晞飲必至醉而歸期其饗也露必濡于豐草飲必設于宗考隆其禮也杞棘承湛湛之露桐椅生離離之實君子承燕而不喪其令德不失其令儀此天子所樂豫而錫之燕享之隆禮也詩敘燕飲于前而推本于君子之德儀旨深哉不醉無歸即醉酒飽德之意在宗載考示親厚以成其禮也左傳曰臣卜其晝未卜其夜周書曰德將無醉曷云厭厭夜飲不醉無歸乎曰此燕也燕示慈惠必致殷勤于獻享之外而又不可因是以廢政事之勤既朝且夕而復燕之于宗寢庶幾燕笑燕語而可盡其欵欵之情此庶子司宫甸人閫人各執燭以共事載之儀禮為可考者而非若後世所為長夜之飲也且其辭曰顯允君子莫不令德豈弟君子莫不令儀則又以禮相終始而不繼以淫矣與書傳之所謂固自不相悖也逮我暇矣飲此湑矣正夜飲之一證莫不令德令儀者就一人之身而莫非令德之存令儀之著也非衆諸侯之説顯允曰令德豈弟曰令儀亦自不可移易彤弓弨兮受言藏之我有嘉賔中心貺之鐘鼓既設一朝饗之彤弓弨兮受言載之我有嘉賔中心喜之鐘鼓既設一朝右之彤弓弨兮受言櫜之我有嘉賔中心好之鐘鼓既設一朝酬之詩序天子錫有功諸侯也是此詩一意而三疊總是大饗而錫之以弓矢也必從受言藏之云者見此弓之珍藏非一日專以待有功之人故一遇康侯即本中心之貺大飲以錫豫之耳下二章不過换易得數字無二意受言藏之言其重也中心貺之言其誠也一朝饗之言其速也注極妥然要識詩意一直下貺曰中心饗曰一朝總見王者亟嘉有功之意凡錫弓矢必以饗行之禮也載是載其所藏者抗之使正不邪櫜是櫜其所載者韜之使好無壞非喜不足以言貺非好不足以言喜總之則皆根於中心之誠也饗是燕飲之總名右則勸飲而尊其位酬則復勸而報其勞總之行於一朝而錫之以弓矢事也易之晉曰康侯用錫馬蕃庶晝日三接正此意彼因獻請出之囚而賜專征伐者可謂中心之貺乎可謂一朝之饗乎吁此忠良之所為悚仄也菁菁者莪在彼中阿既見君子樂且有儀菁菁者莪在彼中沚既見君子我心則喜菁菁者莪在彼中陵既見君子錫我百朋泛泛楊舟載沉載浮既見君子我心則休詩序樂育材也注云亦燕飲賓客之詩亦以材賢歸之賔客耶不若詩傳燕賢也為妥菁菁者莪在彼中阿興君子之德有可動人處故一見之而樂且有儀自不容已也樂固是喜樂然下文却有我心則喜句此應只是歡會言錫我百朋句重看賢材之親就益我身心禆我治道原不小小真百朋之錫也故樂且有儀我心則喜下出此一句下章乃言我心則休樂且有儀歡會而更有儀文也儀文似外貌故二章又言我心則喜然所喜何為君子之德真有足重于天下者一見之恍若百朋之錫也故三章云錫我百朋若是則我欲見君子之心可自慰矣故四章云泛泛楊舟載沉載浮既見君子我心則休見昔憂今喜之不自勝也後二章注極明六月棲棲戎車既飭四牡騤騤載是常服玁狁孔熾我是用急王于出征以匡王國比物四驪間之維則維此六月既成我服我服既成于三十里王于出征以佐天子四牡修廣其大有顒薄伐玁狁以奏膚公有嚴有翼共武之服共武之服以定王國玁狁匪茹整居焦穫侵鎬及方至于涇陽織文鳥章白斾央央元戎十乘以先啓行戎車既安如輊如軒四牡既佶既佶且間薄伐玁狁至于大原文武吉甫萬邦為憲吉甫燕喜既多受祉來歸自鎬我行永久飲御諸友炮鱉膾鯉侯誰在矣張仲孝友詩序傳皆云宣王北伐也此詩章法極整首章是總敘盛夏出師之由次章則申其所為車服就道者以見行師之有度三章則申其所為嚴翼共武者以見制勝之有本四章則申其所云孔熾者蓋若斯之急故選鋒鋭進之奮揚五章則申其所為薄伐者不事于窮追故文武並用之可法末章則道其歸至燕喜有賢者與事以見一時中興功烈之可稱蓋此詩不獨美吉甫實以美宣王也玁狁擾亂是卒然事故不得已六月而興師凡戎車必駕四馬故云戎車既飭四牡騤騤常服即韎韋素裳白舄將帥所服以為常者以其為我之常服故次章云既成我服以其常服以共武故三章云共武之服非於此則以服字解而於彼又以事字解也玁狁孔熾我是用急是一詩大主意此詩意在美吉甫而若為吉甫自謂之詞凡稱我者皆吉甫自我也其稱吉甫云者則詩人稱之之詞耳注可以見馬之有餘可以見教之有素又見其應變之速從事之敏而不失其常度此數語體貼俱佳但據本文論蓋只就上文戎車既飭四牡騤騤載是常服三語申言之見當時之所駕馭者皆素所訓習之馬故六月即成我服師行之不失其常耳似不必一一支離也敢問高明有説我服是軍士之服非也服必先於將帥將帥服軍士不必言矣觀我之一字自見得曰王于何以又云天子王子者天子之命也承天子之命以出征故云佐天子兩觀王子出征語便見宣王赫然中興處前云戎車既飭四牡騤騤矣又云比物四驪間之維則矣此何以復云四牡修廣其大有顒意者上所云是統言戎車之飭軍士之所乘也下所云特出于戎馬之中是路車之飭將帥之所乘也觀即承薄伐玁狁以奏膚公句便見得敢問髙明嚴是持法無縱翼是秉心不渝兵家之要道也吉甫之善將全在此有嚴有翼四字上服是服事是事共照前服字看事自在內不必别以事字訓膚訓大公訓功似矣以愚論之膚即尺寸之膚膚字公即天下公共之公字也蓋王者視天下為一身凡內而腹心外而疥癬之疾孰非切于己之肌膚當與天下共討平者乎以其切于肌膚而為天下之所公討則稱戎事之為膚公也亦宜而何必訓膚之為大公之為功敢問髙明匡王國是正其不正定王國是去其不正者而莫不安寧也以匡王國以佐天子以定王國是章法中之血脈語上言玁狁孔熾而未言所以熾故四章詳言之以見六月興師之不獲已也茹收斂也不安分而自逞曰匪茹不必作度字解整居是盤據于內者侵是遊掠于外者整居焦穫侵鎬及方至于涇陽竊據而且深入矣凡旗幟皆組織文章而畫以鳥隼是謂織文鳥章不必改織字作幟字元戎十乘以先啓行是選精鋭以為先鋒者兵法謂先人奪人者正謂此觀織文鳥章四勺何等堂堂正正何等先人奪人所謂直而壯律而臧誠然哉戎車既安節承上元戎十乘來見其車非不適調而安穩也其馬非不壯健而間習也即犁其庭殱其類而滅之亦無不能者乃其薄伐也僅至于大原而止蓋曰此皆天之所生者皆天子之所欲生者其犯而入境也不得不奮其威其驅而逺遁也不必盡滅其類德與威並著而操與縱維宜所謂文武之將莫踰于斯人者非萬邦之所為程憲者哉故詩人特頌之玁狁之侵直至于涇陽吉甫之伐但至于大原此方是王者之師燕喜即飲至之燕也旋師而飲至其喜慶何如此便是既多受祉處來歸自鎬我行永久是道其所為設燕之意飲御諸友炮鱉膾鯉見其與燕之多人設燕之特盛也侯誰在矣張仲孝友稱與燕者有此人焉足為斯燕之光重也天子之卿受地視侯故張仲稱侯不應作維字解不獨曰張仲而稱曰孝友孝友之人心能忠于君和于友而共成國家之事兹可以徵當時將相之調和矣吉甫之成功豈直以已之嚴翼而已哉有文武之吉甫有孝友之張仲蓋兩相輝映者此詩落句賢張仲所以賢吉甫之善將賢吉甫所以賢宣王之得人內順外威成中興之偉烈豈偶然哉薄言采芑于彼新田于此災畝方叔涖止其車三千師干之試方叔率止乘其四騏四騏翼翼路車有奭簟笰魚服鉤膺鞗革薄言采芑于彼新田于此中鄉方叔涖止其車三千旗旐央央方叔率止約軧錯衡八鸞瑲瑲服其命服朱芾斯皇有瑲蔥珩鴥彼飛隼其飛戾天亦集爰止方叔涖止其車三千師干之試方叔率止鉦人伐鼓陳師鞠旅顯允方叔伐鼓淵淵振旅闐闐蠢爾蠻荆大邦為讐方叔元老克壯其猶方叔率止執訊獲醜戎車嘽嘽嘽嘽焞焞如霆如雷顯允方叔征伐玁狁蠻荆來威詩序傳皆云宣王南征也采芑是賦其事以起興與他詩不同疏義云新田在彼災畝在此師衆如彼練習如此語正相應以為起興之意如此愚竊以為未然新田災畝民所治也况下章中鄉為民居其田為尤治者乎意蠻荆背叛民心共欲伐之即軍行隨地而采芑民無怨其蹂踐者且又見師行之以律采芑之外之無他犯也敢問高明其車三千師千之試一直下見士既衆而且練也涖是臨其事率是帥之以攸往也故先臨而後率騏馬之良也又翼翼順序焉所謂既佶且間者路車即戎路將帥之所乘駕有四騏故言有簟茀魚服之車飾有鉤膺鞗革之馬飾魚服是弓鞬矢服亦飾于車上故從簟茀為句膺有樊纓之飾不可瑣舉故總鉤膺鞗革為句次章其車三千內含有師干之試意又益旗旐央央句見士既衆且練而建設幟斾又精彩之足以讐人也簟茀魚服鉤膺鞗革車馬之飾固盛矣然此猶戎車之所宜有也約軧錯衡八鸞瑲瑲曷為飾之戎馬之間乎朱芾斯皇有瑲蔥珩曷為服之躬擐之地乎曰凡軍之容所以示國之威重也車馬不飭齊旗斾不鮮采固無以見威靈之振發然非彰大君之錫命而示之以間暇則猶未可以奪其氣者維鳴和鸞于戎馬而昭命服于軍行使聞見者知天子負托之重而又知將軍應敵之暇庶可以不戰而屈人之兵耳况其車三千師干之試固克練于平時而陳師鞠旅伐鼓淵淵又克慎于應敵之際乎吁此方叔之成功不獨在戰鬪間而詩人必先美其軍容之威重也若後世趙充國之征先零庶幾近之鴥彼飛隼興軍行之威猛而其飛亦集興進退之有節故下文云云方叔率止鉦人伐鼓而下舊分將戰戰時戰罷三假看愚謂未然蓋方叔之所率者訓練之士也其令于軍中者最齊一而嚴明鉦人伐鼓陳師鞠旅有一毫之不苟者故就其嚴明齊一者復稱美之曰顯允方叔伐鼓淵淵振旅闐闐蓋謂其自始至終皆進退之有度耳非謂將戰戰時戰罷若注之所分也軍中所重威明誠信故再稱顯允方叔伐鼓淵淵則衆之進亦淵淵矣振旅闐闐則衆之退亦闐闐矣一字不苟下前三章止説軍之容軍之律耳而未及蠻荆之罪蠢爾蠻荆大邦為仇正指蠻荆之罪之可伐處元老大人之稱師稱丈人吉無咎克壯其猷非元老其孰能之注方叔雖老而謀則壯一雖字甚不妥示威重以加伐是謂克壯其猷然止于執訊獲醜而已斯老成之將也執訊獲醜亦猶戰而執之獲之故承戎車嘽嘽三句但方叔嘗與北伐威名素著有不戰而屈其兵者故云顯允方叔征伐玁狁蠻荆來威知其戰又知其不盡由于戰斯善識詩人之旨此詩頌方叔實頌宣王宣王之中興全于六月采芑二詩見之此詩每三句為一韻末章首六句二句為韻而下又三句為韻是詩之一體我車既攻我馬既同四牡龎龎駕言徂東田車既好四牡孔阜東有甫草駕言行狩之子于苖選徒囂囂建旐設旄摶獸于敖駕彼四牡四牡奕奕赤芾金舄會同有繹決拾既佽弓矢既調射夫既同助我舉柴四黃既駕兩驂不猗不失其馳舍矢如破蕭蕭馬鳴悠悠斾旌徒御不驚大庖不盈之子于征有聞無聲允矣君子展也大成宣王中興之君也何以先武事而詩人頌之曰周之衰也以恩弛非以威裂也使嗣之者不震疊其神氣何以中興哉况五年巡狩周先王自有成法宣王不過一申飭之耳巡時必有狩故古稱巡狩此詩之行狩蓋稱復古云狩必先車馬故首云我車既攻我馬既同四馬龐龐緊承我馬既同説駕言云者凡君出必先命有司所之使所從之衆所之之地皆得以有備也田車既好承車攻説四牡孔阜承馬同龐龎説東有甫草不是將往狩于甫田凡車馬之行必從水草之地此所云從此東道以行狩也上但言徂東此指言行狩見所徂在巡狩非徒行也駕言行狩則有司知所從事矣故承説之子于苖選徒囂囂云云蓋從此選徒衆建旗旄行將摶獸于敖云爾非已至東都而選徒以獵也選徒囂囂見衆而且肅建旐設旄見序而且整駕彼四牡四牡奕奕是諸侯來朝之車飾赤芾金舄是諸侯來朝之服飾會同有繹句見當時諸侯莫不畏且懷者故會朝之畢至也天子時巡諸侯必次第朝會此定禮也周衰此禮廢弛久矣宣王內修外攘赫然中興其行狩東都諸侯逺近趨蹌聮落次第而至故知前此之廢弛非諸侯之敢慢也天子自弛之耳今此之整飭非諸侯之惕畏也天子自飭之耳決拾既佽弓矢既調總是先整其所為射者射夫是從諸侯來朝之人既同者協同以從于射也柴何以作㧘字解按虞書柴望秩于山川禮天子巡守柴而望祀山川覲諸侯柴者燔柴以祭天也望於山川者望山川以致祭也巡守至方嶽亦燔柴祭天專祭此方嶽之神時必取用犧牲故云射夫既同助我舉柴謂助我舉此柴望之禮也維射在舉祀以禮神則非徒取禽獸以充庖食也下文大庖不盈正與此相照應再按般之篇云於皇時周登其高山注美哉此周也其巡守而登此山以柴望則柴望原是巡狩之大禮朱子亦嘗有注矣而何此柴之讀為㧘解為積禽也四黃一節方實是狩事四黃二句説車馬之間習不失其馳舍矢如破則指射御之皆善也蕭蕭馬鳴節不專就終事説看上章不失其馳舍矢如破則車馬旌旗徒衆之盛自始至終各中法度之則矣故美之云蕭蕭馬鳴悠悠斾旌徒御不驚天庖不盈見當時之狩止為柴望之祭而非為口體之奉也此之謂巡狩事若注所謂三等之説恐未得詩人之意末章是總其始終而深美之前云之子于苖此云之子于征前云選徒囂囂終云徒御不驚便見其有聞無聲矣此非有大才德者不能駕馭若此故稱允矣君子而又本其克誠以將事能善其始終若此也故又稱展也大成此一句是重言贊美之詞吉日維戊既伯既禱田車既好四牡孔阜升彼大阜從其羣醜吉日庚午既差我馬獸之所同麀鹿麌麌漆沮之從天子之所瞻彼中原其祁孔有儦儦俟俟或羣或友悉率左右以燕天子既張我弓既挾我矢發彼小豝殪此大兕以御賔客且以酌醴詩序美宣王田也首章致祭以備田獵之具次章擇地以為田獵之所三章悉力以趨田獵之事四章則從事于田獵以共賔客之禮總見王者不輕于獵而非苟為口體之奉也當參前篇大庖不盈看此章專為田獵而作故首祭馬祖以致禱曲禮云外事以剛日內事以柔日田獵外事也故用戊用庚獵與狩皆賴車牢馬健以為用故車攻吉日皆有田車既好四牡孔阜句升彼大阜從其羣醜言有此車馬之善可用之以為獵也未便是獵的事漆沮之從天子之所言此水之旁禽獸最多非侯甸采邑為天子間空之地天子之所宜獵者故云漆沮之從天子之所西漢射獵蹂躪稼穡若相如所形于疏草蓋異于此詩之旨矣瞻彼中原其祁孔有有説祁是中原地名大有禽獸可獵者非也中原即漆沮之中原也其祁孔有即照上獸之所同麀鹿麌麌説見其地誠多獸而可獵耳左右從王者之左右也凡王者搜狩必親執路鼓以御衆從王者不率左右以從事其何以愜天子之心故曰悉率左右以燕天子既張我弓四句方實事于獵而得獸之多以御賔客二句言獵之所得維共諸此也天子以賔客御諸侯有燕有饗饗必酌醴不獨云以御賔客又云且以酌醴見此禽獸之得所以共燕饗之需所以搜狩之不可已也王者巡狩之獵以祭為重故車攻之詩曰助我舉柴大庖不盈搜狩之獵以賔客為重故吉日之詩曰以御賔客且以酌醴嘗讀六月采芑車攻吉日之詩見宣王之命將出師巡狩田獵一時之精神振刷真有赫然其可以復古者故推中興者其稱首焉逮其後稍懈弛也不籍千畝而拒虢公之諌料民太原而違山甫之言伐羌戎而王師敗績此一人之身而若二轍何為哉乃知精神不可一日而不奮而靡不有初之訓萬世之所當拳拳也重訂詩經疑問卷四
