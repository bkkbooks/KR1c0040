body:
  text: 重訂詩經疑問卷二明姚舜牧撰鄘泛彼柏舟在彼中河髧彼兩髦實維我儀之死矢靡他母也天只不諒人只泛彼柏舟在彼河側髧彼兩髦實維我特之死矢靡慝母也天只不諒人只婦人無夫如舟之泛在中河而無所泊也故以喻興儀訓匹也未當儀刑式也言卓然為我所儀刑者特訓亦匹也亦未當特首出也言特然為我所仰望者一與之醮終身不改女子自許之心也改則匿其初心矣故下一慝字看髧彼兩髦實維我儀則共薑少寡也少寡而勵志若斯誠所難得據注髧彼兩髦指共伯補傳云守義既堅必毁其容飾不事膏沐去髮至眉為幼時之狀是共薑自謂也詩緝因引錢氏説髧然兩髦實維我嫠居之容儀特獨也寡獨之人實宜是髧然兩髦煞甚有理牆有茨不可掃也中冓之言不可道也所可道也言之醜也牆有茨不可襄也中冓之言不可詳也所可詳也言之長也牆有茨不可束也中冓之言不可讀也所可讀也言之辱也宣薑本子之妻而失身于其父既為父配而又失身于其子天下淫婦人莫過是矣宣公奪子之妻公子頑蒸君之母內亂至此極矣故曰不可道不可詳不可讀言人所不忍言之事曰言之失醜又曰其説甚長又曰言之汙我齒頰是所謂言之醜言之長言之辱也冓從女是匪冦婚媾之媾從才是男女搆精之搆此云中冓必宫壼祕密之所非舍之交積材木也君子偕老副笄六珈委委他他如山如河象服是宜子之不淑云如之何玼兮玼兮其之翟也鬒髮如雲不屑髢也玉之瑱也象之揥也揚且之晳也胡然而天也胡然而帝也瑳兮瑳兮其之展也蒙彼皺絺是紲袢也子之清揚揚且之顔也展如之人兮邦之媛也詩序刺衛夫人也指宣薑解詩者類云詩人欲刺其非反稱其美以存忠厚是則然矣若是詩則所謂子之不淑云如之何者刺耶美耶愚謂詩體固存忠厚而詩意自有是非如此章之旨本文昭然其明刺非反稱其美以寓刺也注似未得其要領敢陳臆見於左以正髙明君子偕老二句是一詩斷案蓋曰國夫人與國君偕老故副笄六珈以重其始則其威儀容止必委委他他安重如山宏廣如河然後與象服相為厮稱子之不淑不愧此副笄六珈乎而安稱此象服之宜乎故曰云如之何下文翟與展被之以朝祭正是象服鬒髮如雲至揚且之晳蒙彼皺絺至揚且之顔正其服飾之芬麗容貌之輕佻太異於委委他他如山如河處故一則曰胡然而天也胡然而帝也以怪異之一則曰展如之人兮邦之媛也以賤褻之此正所謂子之不淑云如之何者易曰帝乙歸妹其君之袂不如其娣之袂良女子之所重誠在德不在飾矣翟展上著玼瑳字便是致飾於服物其之翟也其之展也其字指宣薑上已云揚且之晳矣此復云子之清揚揚且之顔蓋甚言其眉目之美麗非貞女之德容也重看一顔字注訓額角豐滿似未當展如之人兮是輕之之辭蝃蝀亦云乃如之人也委委他他如山如河煞何等鎮重下二章云云煞何等輕佻吕氏總注問字宜改作怪字惜字宜改作賤字爰采唐矣沫之鄉矣云誰之思美孟薑矣期我乎桑中要我乎上宫送我乎淇之上矣爰采麥矣沫之北矣云誰之思美孟弋矣期我乎桑中要我乎上宫送我乎淇之上矣爰采葑矣沫之東矣云誰之思美孟庸矣期我乎桑中要我乎上宫送我乎淇之上矣此即桑間之詩也衛世族在位者相為淫竊若此安得不亡哉采唐采麥采葑是托辭思美孟薑等是實事薑弋庸三姓是表表於衛者表表者若此他復何言鶉之奔奔鵲之強強人之無良我以為兄鵲之強強鶉之奔奔人之無良我以為君詩序刺衛宣薑也我以為兄為惠公恥之也我以為君為國人恥之也鶉鵲非匹也一奔奔一強強而淫合以為耦是禽類之可醜者曾謂人而可效之尤乎觀先鶉後鵲而下承一兄字先鵲後鶉而下承一君字便見得鶉比宣薑鵲比公子頑奔奔是奔而就強強是強而蒸注居有常匹又曰鶉鵲之不若非是定之方中作于楚宫揆之以日作于楚室樹之榛栗椅桐梓漆爰伐琴瑟升彼虛矣以望楚矣望楚與堂景山與京降觀于桑卜云其吉終焉允臧靈雨既零命彼倌人星言夙駕説于桑田匪直也人秉心塞淵騋牝三千詩序美衛文公也衛為狄所滅東徙渡河野處漕邑齊桓公攘戎狄而封之文公徙居楚丘建城市而營宫室得其時制百姓説之國家殷富焉地故楚地故稱楚宫楚室耳觀下章升彼虛矣以望楚矣可見宫室必有舊址而今復營之故連下作于二字定方中作宫是當營室之期爰定其規模揆以日作室是測方向之宜爰列其內外注楚室猶楚宫互文以叶韻耳非是宫是一室之總名是大槩規模但當定之中以經營室在一宫之內者有前後曲折皆必揆日景以定向前後移易不得室非止內室自門堂以至閫奧凡在一宫之內者皆是也一室有一向故曰揆之以日作于楚室古人作宫室必樹木於其側乃所樹之木非榛栗之可以供籩實即椅桐梓漆之可以作琴瑟蓋既藉之以障蔽又資之以為莫大之用是古人用慮之周到處即民間五畝之宅樹墻下以桑亦是此意首章已言作宫室矣次章是追本其謀遷之初望楚與堂如是以定其基址景山與京如是以正其方向然必曰降觀于桑是不獨為宗社計又重為生靈計故下文云靈雨既零命彼倌人星言宿駕説於桑田蓋其所以植國者深且逺矣傳稱文公務材訓農克復故業不誣哉靈雨既零四句緊承上降觀于桑來是文公之命官訓農事匪直也人又緊承上倌人説來若曰文公之政匪直命此人訓農而已也乃其秉心誠實而淵深盡民盡物無不慮之周處之密即騋牝之馬已至於三千矣人民之繁富又當如何哉語曰志王則王志霸則霸魯僖斯馬斯臧本之思無強衛文騋牝三千本之秉心塞淵自古未有不先定其心思而可致富庶之成效者蝃蝀在東莫之敢指女子有行逺父母兄弟朝隮于西崇朝其雨女子有行逺兄弟父母乃如之人也懷昏姻也大無信也不知命也詩序蝃蝀止奔也首二章再言女子有行逺父母兄弟句謂女子必應知是不可淫奔於外也崇訓終字無據崇髙起也俗語起早二字疑即崇朝之意虹妖淫之氣也倐見於天而倐滅淫奔之婦倐出而倐入也似之懷昏姻也懷字極當男女之欲人皆有之惟懷念於斯則不復知有人道矣故鄙其為大無信不知命首章比莫虹次章比朝虹所謂朝朝暮暮陽臺雨者三章則探其淫欲之心而深唾賤之也相鼠有皮人而無儀人而無儀不死何為相鼠有齒人而無止人而無止不死何俟相鼠有體人而無禮人而無禮胡不遄死詩序刺無禮也儀威儀也止容止也禮大體也無儀無止無禮均罪其宜死可見禮者人之生理也記曰人有禮則安無禮則危與此正相發詩緝云鼠則但有皮齒體而已人異於鼠可徒有形體而無禮儀容止乎謂之人而無禮儀容止則亦鼠之類也不死何為乎何俟乎而胡不遄死乎是深惡之辭孑孑干旄在浚之郊素絲紕之良馬四之彼姝者子何以畀之孑孑干旟在浚之都素絲組之良馬五之彼姝者子何以豫之孑孑干旌在浚之城素絲祝之良馬六之彼姝者子何以告之古以弓旌招賢衛大夫乘車馬建旌旗親詣於賢者之庭誠重其人也重其人不得不侈其事矣豈虛文之崇而已哉自郊而都而城其地為漸近故干旄車馬以漸而加華此衛大夫之致敬盡禮處畀與也答其禮也豫賚也厚其貺也告語也傾其誠也要見衛大夫之好賢不專在車馬旌旄上即車馬旌旄而其所折節者蓋可想矣禮文易答而禮意難酬故曰彼姝者子何以畀之云云此詩序云衛文公臣子多好善賢者樂告以善道也詩緝因體此意謂此賢是來自他國者至浚之郊文公臣子聞其賢而爭覩之故建旄往就于郊者良馬有四往候于都者有加焉往迎於城者又加焉故良馬自四而五而六耳若衛有賢者隱居浚郊文公不能用而臣子往見之則傳所稱文公敬教勸學授方任能者安在乎此極看得有理載馳載驅歸唁衛侯驅馬悠悠言至於漕大夫跋涉我心則憂既不我嘉不能旋反視爾不臧我思不逺既不我嘉不能旋濟視爾不臧我思不閟陟彼阿丘言采其虻女子善懷亦各有行許人尤之衆稚且狂我行其野芃芃其麥控于大邦誰因誰極大夫君子無我有尤百爾所思不如我所之詩序許穆公夫人作也味詩之意夫人蓋欲赴訴於方伯以圖救衛而託歸唁以為辭耳載是啓口之辭不應訓則字夫人見大夫跋涉而來心以為憂亦知其義有不可者特其歸唁之心已發而不能自已耳及其終焉不歸亦可謂發乎情止乎禮義者矣既不我嘉者爾不嘉我之行也視爾不臧者我視爾不善承我之意也觀爾字我字自明晰若注所云是四個既不我嘉了衆稚且狂衆字宜作庸衆之衆字看穆夫人一婦人耳安能控于大邦但據其同仇之情若謂必控大邦庶幾其可以圖復不知將誰可因而誰可至耳吁以一婦人懷兄弟之仇尚如此後世有堂堂天朝忘不共戴天之讐而甘臣讎敵者視此不自愧死哉許大夫追及夫人必有以他言百般慰止之者故曰百爾所思不如我所之衛瞻彼淇奧緑竹猗猗有匪君子如切如磋如琢如磨瑟兮僴兮赫兮咺兮有匪君子終不可諼兮瞻彼淇奧緑竹青青有匪君子充耳琇瑩會辨如星瑟兮僴兮赫兮咺兮有匪君子終不可諼兮瞻彼淇奧緑竹如簀有匪君子如金如錫如圭如璧寬兮綽兮猗重較兮善戲謔兮不為虐兮詩傳衛武公好學明治國人美之賦淇奧瞻彼淇奧緑竹猗猗直興二章非止興學問自修之進益而已也切磋琢磨瑟僴赫咺通照大學解亦可注瑟為矜莊僴為武毅就著於外者言著於外者非由充於中者得之乎必若此分是謂説詩之固也充耳琇瑩二句本如切如磋二句來故下文原接瑟兮僴兮二句充耳琇瑩會辨如星不専美其服飾然非服飾不足以見其容止之尊嚴中庸云齊明盛服非禮不動論語云君子正其衣冠尊其瞻視必相合言之正是此意琇瑩會辨諸侯之法服諸侯皆有之而獨稱武公者何武公抑戒賔筵嘗用自警惟恐或愆於儀而冕辨佩服一準於禮而不僭此詩獨稱為有匪君子也如金如錫如圭如璧亦本切磋琢磨來惟切磋琢磨之無已故不止服飾之尊嚴而充養完粹如金錫之精純如圭璧之溫潤一動作一語言各中其則而不渝所謂動容周旋中禮盛德之至者是德之成也切磋琢磨至瑟僴赫咺其德固以成矣然猶有瑟僴赫喧之可言也必到寬兮綽兮猗重較兮善戲謔兮不為虐兮此方是從心所欲不踰矩地位此乃為德之成也中庸論入德直説到篤恭不顯正是此意取重較字極妙較兩輢上出軾者重較則兩旁皆出軾矣而實以軾為準未嘗越於軾之外也左右皆宜是寬綽之重較處猗猗始生之美也青青成竿之美也如簀則堅且徑而始稱為淇園之佳植矣德由漸而底於成實似之考槃在澗碩人之寬獨寐寤言永矢弗諼考槃在阿碩人之薖獨寐寤歌永矢弗過考槃在陸碩人之軸獨寐寤宿永矢弗告詩傳鄘人美其君子不仕亂邦考槃訓扣樂器似無據然考訓成槃訓盤桓之意曰成其槃樂恐詩人之用字不若是之雕巧也寬是寬間自得之意薖字從草從過意草草可以過得亦自適之意也軸可卷舒唯已之適亦是自如之意注訓盤桓不行非獨有人不及知唯已獨知之意獨寐而寤寤而言或寤而歌或寤而宿真是自在之極孔明抱膝於隆中大類此吾人自有一種樂處不以富貴貧賤而易考槃之弗諼衡門之樂飢真有自得於心而不可以語人者矢弗諼弗過弗告上俱著一永字便有若將終身意士君子未嘗不欲行其道也曷甘於考槃之樂曰此隨其時也而非其心也時苟可行則又未嘗不欲仕矣故讀考槃衡門之詩不獨當知其有隱居之樂而已也碩人其頎衣錦褧衣齊侯之子衛侯之妻東宫之妹邢侯之姨談公維私手如柔荑膚如凝脂領如蝤蠐齒如瓠犀螓首蛾眉巧笑倩兮美目盼兮碩人敖敖説于農郊四牡有驕朱幩鑣鑣翟茀以朝大夫夙退無使君勞河水洋洋北流活活施罛濊濊鱣鮪發發葭菼揭揭庶薑孽孽庶士有朅莊薑無子總由莊公昏惑寵嬖妾而棄正嫡來故詩人首敘莊薑族類之貴次敘莊薑容貌之美又次敘莊薑自齊至衛入朝之次第説國人私相告語共喜其配之得人乃莊公竟置之他顧若河水北流者然至使庶薑之孽孽庶士之有朅尚安望其子姓之生育哉故復著河水洋洋一章國夫人以德勝不以貌勝此曷於貌深致美焉曰莊公之所嬖者色也故詩人就容色而稱之若謂此莊薑亦非無色者而何若是其他嬖也云爾觀仲氏任只一節則莊薑之德殆又大過於容貌矣國配得人是宗社生靈之福故國人深喜莊薑之配私相告語曰大夫夙退無使君勞蓋祝願其有子為宗廟社稷主也莊公竟舍之不顧何為哉大夫夙退無使君勞下何取河水北流而及施罛鱣鮪葭菼之瑣瑣也曰夫妻如魚水其情貴一而有常其流無定所其間無定器至於鱣鮪發而葭菼揭豈理也哉故終之曰庶薑孽孽庶士有朅見莊薑之所為無子也或泥庶薑為齊之媵妾故本齊地之廣饒言之不知夫人薑姓羣嬖胥謂之庶薑耳孽孽即庶薑所生出者所謂孽子也孽子皆勇而好武庶士從之故庶薑孽孽下著庶士有朅句傳稱州吁勇而好兵弒完自立此足以明詩人之意矣謂士女之佼好本諸齊地之廣饒乃齊地之廣饒又從河水洋洋説到鱣鮪發發葭菼揭揭處甚可笑若河水一章言齊地之廣饒士女之佼好宜置在碩人敖敖之前白華篇云滮池北流浸彼稻田白華申后詩也幽王寵褒姒而黜申后莊公嬖羣妾而棄莊薑其事正相類其詩皆有北流句非以比君人之寵澤宜施之正嫡而不宜施之嬖妾耶一則北流活活而無節一則北流偏浸于稻田故皆以為喻其曰河水滮池云者衛東南跨河而滮則在豐鎬之間也此可為一證谷風云母逝我梁母發我笱敝笱云敝笱在梁其魚魴鰥則此云施罛濊濊鱣鮪發發誠刺衛莊之昏惑而非謂齊地之廣饒也氓之蚩蚩抱布貿絲匪來貿絲來即我謀送子涉淇至于頓丘匪我愆期子無良媒將子無怒秋以為期乘彼垝垣以望復關不見復關泣涕漣漣既見復關載笑載言爾卜爾筮體無咎言以爾車來以我賄遷桑之未落其葉沃若于嗟鳩兮無食桑椹于嗟女兮無與士耽士之耽兮猶可説也女之耽兮不可説也桑之落矣其黃而隕自我徂爾三嵗食貧淇水湯湯漸車帷裳女也不爽士二其行士也罔極二三其德三嵗為婦靡室勞矣夙興夜寐靡有朝矣言既遂矣至于暴矣兄弟不知嘻其笑矣靜言思之躬自悼矣及爾偕老老使我怨淇則有岸隰則有泮總角之宴言笑晏晏信誓旦旦不思其反反是不思亦已焉哉詩傳女歸非禮衰而見棄是首章大注説得極透快可誦夫婦之合也必待父母之命媒妁之言來即我謀便不是注云既與之謀而不遂行又責所無以難其事再為之約以堅其志説透淫婦人心事詩緝解匪我愆期二句曰子無善媒以先告我故我行計未辦勝朱注讀乘彼垝垣一章見其情急於從淫始所云子無良媒秋以為期者蓋皆要飾之詞也易曰見金夫不有躬此女子不有其躬且不有其賄真無恥之甚者易本義注虎視耽耽一耽字曰下而專也極善凡人心所下而專者在酒必有酒禍在色必有色禍在貨利必有貨利之禍未有能免者祈福而無禍其耽於詩書禮義之府乎惜乎人皆耽乎彼而不知耽乎此也愚於此詩一耽字深有警云桑之未落其葉沃若桑之落矣其黃而隕以色事他人能得幾時好正此詩之謂也此婦必出於富家故曰以我賄遷又曰三嵗食貧食貧者享其貧也以爾車來以我賄遷未幾也而淮水湯湯漸車帷裳已至矣昔何等逞風光今何等殺風景此三嵗為婦靡室勞矣夙興夜寐靡有朝矣言既遂矣至于暴矣與谷風昔育恐育鞠及爾顛覆既生既育比豫于毒云云何以異乃一則讀之令人憐一則讀之令人唾何以故彼以正合者也正合而中棄其夫之不良也此以苟合者也苟合而中離其婦之自取也自取而其誰憐之又誰不共唾之此女子持身不可不自慎其始也嗟乎而况號為士君子者可一失其身為匪人之比哉靡室勞矣言無有為室若是之勞者女子説到靜言思之躬自悼矣煞極愧悔之深然其始則起於一念之淫欲耳今即自傷悼無救也士君子嘗念及此自不敢一失其身矣此婦來奔方三嵗耳未老也未老而見棄故曰老使我怨言士行之薄一至于此耳淇則有岸隰則有泮此是到底的話正興不思其反句此反字不應作反覆反字看當作出乎爾者反乎爾反字看蓋始也以淫合終必以淫棄此其反之必然者思及其反必不敢一失其身於蚩蚩之氓矣反是不思而今如之何哉亦已而已矣傳曰思其反也思其復也正此思其反之謂也籊籊竹竿以釣于淇豈不爾思逺莫致之泉源在左淇水在右女子有行逺父母兄弟淇水在右泉源在左巧笑之瑳佩玉之儺淇水悠悠檜楫松舟駕言出遊以寫我憂詩序衛女思歸也適異國而不見答思而能以禮者也亦不應説到巧笑之瑳佩玉之儺何衛女思歸之多也豈其少時相與遊翺於泉淇之間終身不能忘耶思歸寧之詩似不如是豈不爾思逺莫致之女子有行逺父母兄弟此猶像欲歸寧的詩若巧笑之瑳佩玉之儺則全是思遊翺之意注謂衛女嫁諸侯思歸寧而不可得愚不敢以為然也芄蘭之支童子佩觿雖則佩觿能不我知容兮遂兮垂帶悸兮芄蘭之葉童子佩韘雖則佩韘能不我甲容兮遂兮垂帶悸兮詩序刺惠公也驕而無禮大夫刺之芄蘭質本柔弱而不勝枝葉之長蔓故以興童子之無知能者此詩刺惠公之即位也少無知能不足以當國事而方侈然其自得故重傷之誰謂河廣一葦杭之誰謂宋逺跂豫望之誰謂河廣曽不容刀誰謂宋逺曽不崇朝詩序宋襄公母歸于衛思而不止故作是詩跂豫望之言跂足可以望見之也説苑載襄公為太子請於桓公立目夷公問何故對曰臣之舅在衛愛臣若終立則不可往矣襄公欲見母也云見舅蓋恐傷父之志也桓夫人嗟一葦可杭而不敢反襄公謂舅愛臣而不敢往其母子蓋亦明於禮義之大者也伯兮朅兮邦之桀兮伯也執殳為王前驅自伯之東首如飛蓬豈無膏沐誰適為容其雨其雨杲杲出日願言思伯甘心首疾焉得諼草言樹之背願言思伯使我心痗詩序刺時也言君子行役為王前驅過時而不反焉此詩曲盡人情語亦次第豈無膏沐誰適為容語意極佳漢秦嘉夫婦相答書辭本此兩言願言思伯而甘心於首疾心痗焉可謂賢婦人矣思伯而至于心痗恐非諼草所能療也有狐綏綏在彼淇梁心之憂矣之子無裳有狐綏綏在彼淇厲心之憂矣之子無帶有狐綏綏在彼淇側心之憂矣之子無服詩序刺時也衛之男女失時喪其配耦焉注甚明之子無裳與己何與而深念之是淫情之見乎辭者由梁而厲而側著其身之漸近也以衣而涉曰厲帶所以束是衣者投我以木瓜報之以瓊琚匪報也永以為好也投我以木桃報之以瓊瑶匪報也永以為好也投我以木李報之以瓊玖匪報也永以為好也此詩語極輕佻似男女相贈答之辭不足以録然投瓜報瓊却亦有從厚之意斷章取之可也報以瓊琚猶云匪報也則所謂永以為好者蓋出於瓊琚之外矣詩序美齊桓公也衛有狄人之敗出處于漕桓公救而封之遺之車馬器物焉衛思厚報之而不能故設為瓜瓊不等之喻耳此甚有理勝朱注可從王彼黍離離彼稷之苗行邁靡靡中心搖搖知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉彼黍離離彼稷之穗行邁靡靡中心如醉知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉彼黍離離彼稷之實行邁靡靡中心如噎知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉黍離大夫之感慨深矣其痛切甚矣乃但云悠悠蒼天此何人哉疾其人而不斥蓄其辭而不露俾讀者知廢之有自來而可以明已之意又俾感憤者知所振奮而可以釋己之憂此詩之可以怨可以興者也後世謂黍離降為國風者評其體耳若其辭意則固有可取者西都之丘墟固幽王寵褒姒所致然平王忍棄之而不顧也亦不得辭其責小辨云踧踧周道鞠為茂草我心憂傷惄焉如搗亦是此意君子于役不知其期曷至哉雞棲于塒日之夕矣羊牛下來君子于役如之何勿思君子于役不日不月曷其有佸雞棲于桀日之夕矣牛羊下括君子于役苟無飢渴詩序刺平王也君子行役無期度大夫思其危難以風焉曷至哉曷日至於其家也注且今亦何所至哉似未得口氣曰雞棲于塒日之夕矣羊牛下來曰雞棲于桀日之夕矣牛羊下括見所思不忘于時刻也豚有柵雞有棲塒必其苟棲處桀必其穩棲處下來者自牧而來也下括者下而入括也牛羊皆有欄括其關扃也注訓括為至未當思其夫而至於苟無飢渴則其所想念者無不至矣君子陽陽左執簧右招我由房其樂只且君子陶陶左執翿右招我由敖其樂只且詩序閔周也君子遭亂相招為祿仕隱於伶官而陽陽陶陶以相樂時事可知矣此不過形容歌舞自得之意非真招之由東房就舞位也琴瑟友之鐘鼓樂之亦是此意陽陽陶陶即是樂凡人怨行役之勞而歸念其家之貧賤不無戚戚難堪之狀之君子方在役歸而即從事於歌舞略無幾微見於顔色故其婦識其意而稱之曰君子陽陽君子陶陶而又皆終之曰其樂只且蓋深嘆美其氣度之自得也其夫婦亦賢矣哉揚之水不流束薪彼其之子不與我戍申懷哉懷哉曷月豫還歸哉揚之水不流束楚彼其之子不與我戍甫懷哉懷哉曷月豫還歸哉揚之水不流束蒲彼其之子不與我戍許懷哉懷哉曷月豫還歸哉通章大注極妙勞王師戍侯國雖平日無與者亦不可况父之大讐乎詩言彼其之子不與我戌申其詞婉而其刺深矣一束之薪不難流轉而揚之水不能流號令不行至此哉此彼其之子不與我戌申而王人之逺戍無還期也詩意極婉而深若戍之應否及號令之所以不行又不一語及焉此為風人之體故列之王風戌申不可而又以申之故及甫與許真無復人心者揚之水一見於此一見於鄭一見於唐見於鄭者亦曰不流束楚不流束薪見於唐者曰白石鑿鑿白石皓皓白石粼粼按唐晉地也周之遷國晉鄭焉依是此間必有所謂揚之水者故三詩皆稱之耳若訓揚悠揚也水緩流之貌恐或未然揚之水想是停蓄而不流者故此與鄭風皆云不流束薪不流束楚楚輕於薪蒲愈輕彼其之子指畿外之民中谷有蓷暵其乾矣有女仳離慨其嘆矣慨其嘆矣遇人之艱難矣中谷有蓷暵其修矣有女仳離條其嘯矣條其嘯矣遇人之不淑矣中谷有蓷暵其濕矣有女仳離啜其泣矣啜其泣矣何嗟及矣乾是枝葉之枯老者修則枝幹之滫髓也濕則根蒂之滋潤者也此喻亂世凶年之憔悴蕭索日甚一日無復潤澤氣象如畫曰有女仳離不及男者男皆散而之四方無復存也慨其嘆猶有聲條其嘯則蹙口出而聲亦微矣至於啜其泣乃所謂吞聲飲淚者謂人之不淑由時之不淑則可謂人之不淑即時之不淑則不可然要非其人之敢為不淑也無可奈何妻子自不能保耳何嗟及者言事已至此雖嗟亦無及也是摧心折骨之辭時值凶荒使民日悴而無生色固為可閔乃有不才守令因凶荒之時假借救貧名色實規利于中富之戶而吸其滫髓如此詩之所謂暵其乾暵其修暵其濕者胡不仁之甚也敢附識于此讀采采芣苡不知其為樂讀中谷有蓷方知采采芣苡是逍遙遊於人間世者所以凡詩皆合看方可得其旨趣之深有兔爰爰雉離于羅我生之初尚無為我生之後逢此百罹尚寐無吪有爰爰雉離于罦我生之初尚無造我生之後逢此百憂尚寐無覺有兔爰爰雉離于罿我生之初尚無庸我生之後逢此百凶尚寐無聰詩序閔周也桓王失信諸侯背叛搆怨連禍王師傷敗君子不樂焉此詩為繻葛之戰而作兔陰狡善逸喻鄭人縱恣自如雉耿介善鬭喻周人為王力戰而受禍也吪字從口從化或亦言辭之類若解作動字説不動以死恐未必然尚寐無吪無覺無聰若曰寧熟睡而置之弗言也置之罔覺也置之弗聞也蓋深悼所逢之難言難覺難聞耳尚無為尚字宜作猶字解尚寐尚字宜作可字解若曰寧可如此云爾綿綿葛藟在河之滸終逺兄弟謂他人父謂他人父亦莫我顧綿綿葛藟在河之涘終逺兄弟謂他人母謂他人母亦莫我有綿綿葛藟在河之漘終逺兄弟謂他人昆謂他人昆亦莫我聞詩序王族刺平王也周道衰微棄其九族焉葛藟宜于丘野藟於樛木而在河之滸則蔓延無所繫著矣此以起興而緊接父子兄弟之不相保也謂他人父而莫我顧謂他人母而莫我有謂他人昆而莫我聞其將安所倚恃哉又將安所控訴哉語語痛心可為酸鼻彼采葛兮一日不見如三月兮彼采蕭兮一日不見如三秋兮彼采艾兮一日不見如三嵗兮葛為絺綌蕭供祭祀艾療疾病葛生於初夏采于盛夏故下承三月蕭采于秋後故下承三秋艾必三年之久為佳故下承三嵗詩序懼讒也蓋人臣任事於外一日不見於君懼小人即乘其間也故其詞若此後世若工官桀謀譖霍光俟光出沐日奏之恭顯欲譖蕭望之候望之出沐日上之兹可鑒已古語云一日不朝其間容刀可畏哉大車檻檻毳衣如菼豈不爾思畏子不敢大車啍啍毳衣如璊豈不爾思畏子不奔穀則異室死則同穴謂豫不信有如皎日詩序刺周大夫也禮義陵遲男女淫奔故陳古以刺今大夫之不能也周之紀綱壞極矣一大夫以刑政治其私邑猶能使淫奔者畏憚而不敢是一木之支也惜諸大夫皆不能然而居大夫之上者又陵夷而不克振也生則異室一節詩緝作古男女守禮之正看謂生則不相瀆死則從一以終也丘中有麻彼留子嗟彼留子嗟將其來施施丘中有麥彼留子國彼留子國將其來食丘中有李彼留之子彼留之子貽我佩玖詩序思賢也莊王不明賢人放逐國人思之而作是詩欲其來而相與從遊欲私飲食之以致其殷勤且望其遺我以善道也鄭緇衣之宜兮敝豫又改為兮適子之館兮還豫授子之粲兮緇衣之好兮敝豫又改造兮適子之館兮還豫授子之粲兮緇衣之席兮敝豫又改作兮適子之館兮還豫授子之粲兮職貴與服相稱盡職而宜其服則其敝也孰不願為之更新哉而又適子之館還又授子之粲其愛之無已其寵賚之也亦無已矣既美緇衣之宜又恐其敝而更為之又適其館而親就之還又授粲以飲食之武公之善其職與周天子之所以敬禮其臣描寫兩盡玩適子之館語此詩是周人所作士無賢不肖入朝見疾武公以諸侯入為卿士宜周人之所疾忌今稱譽之願望之親往省之又即饋遺之且不以粗糲進也拳拳如此豈非好賢之至乎宜相宜也好正好也言非此不足以彰其美也席則安焉之謂服之不衷身之災也焉得好焉得席將仲子兮無踰我里無折我樹杞豈敢愛之畏我父母仲可懷也父母之言亦可畏也將仲子兮無踰我牆無折我樹桑豈敢愛之畏我諸兄仲可懷也諸兄之言亦可畏也將仲子兮無踰我園無折我樹檀豈敢愛之畏人之多言仲可懷也人之多言亦可畏也愛愛其身也懷懷其人也懷其人寧復愛其身特畏于父母兄弟外人之言耳詩序刺莊公也仲子指祭仲叔段失道而公弗制且與祭仲謀欲待而殺之故詩人反其意若祭仲有請而設為公拒之之辭以天理感動之公論開悟之諷公縱不愛段獨不畏父母乎獨不畏公族之議乎獨不畏國人之多言乎是為譎諌叔于田巷無居人豈無居人不如叔也洵美且仁叔于狩巷無飲酒豈無飲酒不如叔也洵美且好叔適野巷無服馬豈無服馬不如叔也洵美且武詩序刺莊公也叔處于京繕甲治兵以出於田國人媚説以從之然莊公獨不能制乎段不義而得衆故其衆就田狩適野而稱美之曰巷無居人巷無飲酒巷無服馬則其識從可知己仁好武三字俱就田狩適野上見之不必深説楊龜山謂先王之道微而禮義消亡政教不明而國俗傷敗人之好惡不足以當是非而毁譽不足以公善惡此等詩之謂叔于田乘乘馬執轡如組兩驂如舞叔在藪火烈具舉袒裼暴虎獻于公所將叔無狃戒其傷女叔于田乘乘黃兩服上襄兩驂雁行叔在藪火烈具揚叔善射忌又良御忌抑磬控忌抑縱送忌叔于田乘乘鴇兩服齊首兩驂如手叔在藪火烈具阜叔馬慢忌叔發罕忌抑釋掤忌抑鬯弓忌詩序刺莊公也上篇是段自出田此篇是段在鄭從莊公出田鄭未有多材好勇如叔者國人創見而誇羡之故其詞若此段以國君介弟之貴不自謹重甘袒裼暴虎獻于公所公不誨止之其私昵之黨乃致媚愛之辭曰請叔無狃習此事數數為之戒其或傷汝也莊公于是為可刺矣磬控應良御縱送應善射拔矢括也舍拔則矢發矣故曰縱弰弓弰頭也發矢則弓弰倒覆於前若送之者然故曰送騁馬曰磬止馬曰控固矣然要識騁時未嘗不控也捨拔曰縱覆弰曰送固矣然要識捨時即為之送也非二事釋掤是蓋矢鬯弓是韜弓詩緝云段有不義之謀兄弟之間人所難言詩人優柔之意但言段矜能恃勇暴虎以獻氣陵其兄私黨諂事甘言媚説方且踊躍馳騁不能自已從容畢事意氣自得其氣習輕揚粗暴如此殆非令終之器所謂智伯射御足力則賢而以不仁行之者也公何為不早禁止之乎此一段説得極痛快鄭氏曰叔以國君介弟之親京城太叔之貴而所好者馳騁弋獵也所矜者袒裼暴虎也所賢者射御足力也出而人思之者飲酒服馬之儔也氣習到此而又恃其君母之愛玩於莊公之惟其所欲而不誰何也欲不為亂得乎按鄭氏之説固當然叔何人也莊公之弟也莊公苟不仇其母而間其弟於詩書禮義之府止其馳騁服馬飲酒之非其弟未必不改從其母未必不感化母子天性無傷也乃縱其所欲而不誰何至于克段于鄢誰之咎哉故愚謂叔段之敢為非義不在之京之日而在放縱弋獵之時莊公之忍為賊不在克鄢之時而在容縱養成之日平王怨其父忘弒逆之大讐莊公怨其母甘殘忍之悖行皆一念之差所使清人在彭駟介旁旁二矛重英河上乎翺翔清人在消駟介麃麃二矛重喬河上乎逍遙清人在軸駟介陶陶左旋右抽中軍作好詩序刺文公也師不得已而用之也惡其人而授之師令翺翔逍遙於河上豈君國之道哉易曰在師中吉王三錫命正與此相反胡氏責鄭文公一段極佳羔裘如濡洵直且侯彼其之子舍命不渝羔裘豹飾孔武有力彼其之子邦之司直羔裘晏兮三英粲兮彼其之子邦之彥兮詩序刺朝也言古之君子以風其朝焉直謂其製之方正侯謂其體之平舒蓋此侯即射禮張侯之侯觀下文緊承彼其之子舍命不渝則可見矣作毛順而美解似未當再觀邦之司直承孔武有力來邦之彥兮承三英粲兮來則舍命不渝於洵直且侯句必有粘貼決不宜作毛順而美解所謂孔武有力者非賁育之謂也其敢行禮義不畏強禦其人乎故稱其為邦之司直舍命不渝朱子訓身居其所受之理而不可奪極當凡人臣立朝必有理所當為者是命也此身與此理若旅寓然可謂舍而不渝乎必其服而習居而安若記所稱藏身之固者斯之謂舍命不渝斯之謂邦之司直邦之彥晏安也言其服之宜稱而安舒也三章雖平首章為主下二章蓋就上章所稱而申美之也苟非舍命不渝可稱邦之司直邦之彥乎據此詩而求其人必也子産乎其行已也恭其事上也敬其養民也惠其使民也義此便是舍命不渝的樣子他若子皮子太叔裨諶等皆鄭之良也當亦可以稱此詩之所美者遵大路兮摻執子之袪兮無我惡兮不寁故也遵大路兮摻執子之手兮無我魗兮不寁好也詩序思君子也莊公失道君子去之國人思望焉不寁故不寁好言不可倉卒於故舊情好也蓋以先君之義諷之庶其或留云耳漢申公白公強起穆生曰獨不念先君之德歟亦此意若作淫婦為人所棄則其人之行必在隱僻之所曽是遵大路而執其袪乎再按唐風羔裘豹袪是詠其臣之辭亦有維子之故維子之好故好二字女曰雞鳴士曰昧旦子興視夜明星有爛將翺將翔弋鳬與雁弋言加之與子宜之宜言飲酒與子偕老琴瑟在御莫不靜好知子之來之雜佩以贈之知子之順之雜佩以問之知子之好之雜佩以報之詩序刺不好德也陳古好德而不淫於色者以刺今之不然也女曰雞鳴士曰昧旦此夫婦相呼應之辭子興視夜以下則其婦復促其夫夙興以作事也通章重在婦警其夫上二章加字宜字注極當家道最難得者靜好二字男女各安寧而無所事曰靜無事而無乖戾曰好詩不曰夫婦靜好而徵之琴瑟之靜好其語意極佳凡家中靜好便是好消息一動擾則乖戾立至矣欲琴瑟之靜好得乎來意氣之召致也順兩情之莫逆也好中心之嘉與也三知字極佳知其夫之所與而寧解佩以贈遺婦人之識過丈夫逺矣婦人固以好德語其夫不惜贈遺以結其歡心矣然何至解此服飾之玩乎意此雜佩之組繫皆出于婦人之手故願為繫以組貫以珠懸以玉備贈遺問報之禮之用耳曰子興曰與子曰知子抑何其親愛之深乃所告語唯勸勉以成其家成其為人是婦之極賢者婦人知有室家之樂耳此乃不安於宴寢而警夫以男子之事期靜好以終身且望夫以親賢友善進於成德之域其誠賢婦矣哉孰意鄭而有此婦也又孰謂鄭音之皆淫也記曰鄭音好濫淫志衛音促數煩志今按衛有淇奧之歌鄭有羔裘之美雞鳴之咏可槩謂之淫志煩志乎有女同車顔如舜華將翺將翔佩玉瓊琚彼美孟薑洵美且都有女同行顔如舜英將翺將翔佩玉將將彼美孟薑德音不忘詩傳鄭世子忽辭昏於齊祭仲諫之詩序刺忽也太子忽嘗有功於齊齊侯請妻之齊女賢而不取卒以無大國之助至於見逐故國人刺之顔如舜華而將翺將翔佩玉瓊琚能如彼美孟薑洵美而且都乎顔如舜英而將翺將翔佩玉將將能如彼美孟薑德音之不忘乎山有扶蘇隰有荷華不見子都乃見狂且山有喬松隰有遊龍不見子充乃見狡童即山有扶蘇隰有荷華見上下皆有佳植也而何獨所見之不良也都華美也充舂容也稍别此特據注為解耳若詩傳謂衛靈公棄其世臣而任狂狡子良憂之賦山有扶蘇詩序刺忽也所美非美然似為得之蘀兮蘀兮風其吹女叔兮伯兮倡豫和女蘀兮蘀兮風其漂女叔兮伯兮倡子要女倡和夫婦之常然男先於女理之正也祈其倡而和且要寡廉鮮恥極矣要應作久要不忘平生之言要字看注訓成字似未當此特據注為解耳按詩序刺忽也小臣願忠於國而力不能自為也故望伯叔諸大夫共圖之彼狡童兮不與我言兮維子之故使我不能餐兮彼狡童兮不與我食兮維子之故使我不能息兮不與我言而我亦能餐不與我食而我亦能息言我之自在原不取足於女無能為我害也此特據注為解耳詩序刺忽也不與賢人圖事權臣擅命也狡童指當時用事之臣説子惠思我褰裳涉溱子不我思豈無他人狂童之狂也且子惠思我褰裳涉洧子不我思豈無他士狂童之狂也且所謂人盡夫者其人也淫婦哉狡童褰裳之婦真良心喪盡者此特據注為解耳詩序思見正也狂童恣行國人思大國之正已也狂童指鄭突子之丰兮俟我乎巷兮悔豫不送兮子之昌兮俟我乎堂兮悔豫不將兮衣錦褧衣裳錦褧裳叔兮伯兮駕豫與行裳錦褧裳衣錦褧衣叔兮伯兮駕豫與歸詩序刺亂也昏姻之道缺陽倡而陰不和男行而女不隨故悔而作是詩始悔其不送不將也故言自今裝載盛備俟有駕豫者即與同行同歸耳非豈無其人之説將承奉也與送别碩人其頎衣錦褧衣后夫人飾也彼婦人不獨衣錦褧衣且裳錦褧裳娼優后飾殆又過之哉東門之墠茹藘在阪其室則邇其人甚逺東門之栗有踐家室豈不爾思子不我即詩序刺亂也男女有不待禮而相奔者曰其人甚逺思之深曰子不我即就之切貞者唯恐其凂淫者唯恐其不即風雨淒淒雞鳴喈喈既見君子云胡不夷風雨瀟瀟雞鳴膠膠既見君子云胡不瘳風雨如晦雞鳴不已既見君子云胡不喜曰風雨淒淒雞鳴喈喈極道其時之無聊也淑女當淒涼之景益勵其貞操淫女當淒涼之景益熾其淫欲此特據注為解耳詩序思君子也亂世則思君子不改其度焉亦有理青青子襟悠悠我心縱我不往子寧不嗣音青青子佩悠悠我思縱我不往子寧不來挑兮達兮在城闕兮一日不見如三月兮青青子襟是其人挑兮達兮是其人情致之可悅也此特據注為解耳詩序刺學校廢也亂世則學校不修焉揚之水不流束楚終鮮兄弟維豫與女無信人之言人實迋女揚之水不流束薪終鮮兄弟維豫二人無信人之言人實不信揚之水必是止而不流者故下緊承之曰終鮮兄弟維豫與女見豫之心只在女一人無他遇也人之言實迋女耳迋是一時之妄言不信是其平素之不誠也此特據注為解耳若詩序閔無臣也君子閔忽無忠臣良士終以死亡而作是詩也出其東門有女如雲雖則如雲匪我思存縞衣綦巾聊樂我員出其闉闍有女如荼雖則如荼匪我思且縞衣茹藘聊可與娛詩傳鄭有貞士得之矣雲狀其綺麗可觀故應之以縞衣綦巾荼狀其輕白可愛故應之以縞衣茹藘縞衣綦巾縞衣茹藘是莊家風味如雲如荼則所謂邦之媛也物之尤也野有蔓草零露漙兮有美一人清揚婉兮邂逅相遇適我願兮野有蔓草零露瀼瀼有美一人婉如清揚邂逅相遇與子偕臧六禮不備貞女不行邂逅豈可久之道曰適我願兮曰與子偕臧蓋一時情好之辭也禮不野合野有死麕之女子苟無舒而脫脫一節與野有蔓草之女子何異哉溱與洧方渙渙兮士與女方秉蕳兮女曰觀乎士曰既且且往觀乎洧之外洵訏且樂維士與女伊其相謔贈之以勺藥溱與洧瀏其清矣士與女殷其盈矣女曰觀乎士曰既且且往觀乎洧之外洵訏且樂維士與女伊其將謔贈之以勺藥溱洧之地原可以行樂而在上者又縱其嬉遊而莫之禁寧不至于蕩且淫記曰國奢則示之以儉國儉則示之以禮愚曰國淫則示之以禁禁至則不淫矣三月上已之辰采蘭水上以袚除不祥即此便是鄭之惡俗愚所謂示之以禁者即禁諸此也凡觀風設教者能隨其敝俗明禁之於世道人心必有挽補將謔之將將意也與相字别鄭俗之淫固甚於衛然若雞鳴之賢婦人東門之獨行君子則幾與二南匹矣所謂舉世皆濁而未必無獨清者也齊雞既鳴矣朝既盈矣匪雞則鳴蒼蠅之聲東方明矣朝既昌矣匪東方則明月出之光蟲飛薨薨甘與子同夢會且歸矣無庶豫子憎詩序思賢妃也哀公荒淫怠慢故陳賢妃之警以風之焉詩傳桓公好內衛姬針之匪雞則鳴二句不出賢妃口吻此詩原不作於賢妃當時羡賢妃之事故作是詩以美之耳大注心常恐晚故聞其似者以為真説得極好初説盈次説昌又次説會且歸是作文之法朝無會歸之理甚言起不早臣子之心將厭倦欲歸耳此齊初立國之詩即此便見齊之所以興詩録雞鳴史載脫珥此千古盛事也要見人生在勤勤必先於早起早起則一日事無不周辦而可無叢脞之斃矣甘與子同夢者非婦也安於寢而罔覺者非夫也古今妃后多矣周宣稱薑后齊桓稱衛姬楚莊稱樊妃是千古絶倡子之還兮遭我乎峱之間兮並驅從兩肩兮揖我謂我儇兮子之茂兮遭我乎峱之道兮並驅從兩牡兮揖我謂我好兮子之昌兮遭我乎峱之陽兮並驅從兩狼兮揖我謂我臧兮詩序刺荒也哀公好田獵國人化之以成俗故獵者旁午於道畢事而歸猶意氣勃勃自矜其能而不知其非也還與儇相應茂與好相應昌與臧相應兩肩兩牡兩狼則叶韻而逐之也從者隨而逐之也所尚者弋獵便捷便見齊俗之急功利處所遇者相稱譽便見齊俗之喜夸詐處俟我於著乎而充耳以素乎而尚之以瓊華乎而俟我於庭乎而充耳以青乎而尚之以瓊瑩乎而俟我於堂乎而充耳以黃乎而尚之以瓊英乎而詩傳昏禮不親君子譏之大明篇稱親迎于渭是世子未嘗不親迎也韓奕篇稱韓侯迎止是侯王未嘗不親迎也齊俗獨不親迎乃有此詩必是上之人未嘗率先之也風俗係上之好尚信然哉充耳以纊懸瑱必備五采故就著庭堂叶韻素青黃瓊華瓊瑩瓊英字面初無所别也唯重在俟我於著於庭於堂上東方之日兮彼姝者子在我室兮在我室兮履我即兮東方之月兮彼姝者子在我闥兮在我闥兮履我發兮詩序刺衰也君臣失道男女淫奔不能以禮化也貞女從人必以昏合故于歸謂之昏禮旦躡足而來暮躡足而去此謂淫奔東方未明顛倒衣裳顛之倒之自公召之東方未晞顛倒裳衣倒之顛之自公令之折栁樊圃狂夫瞿瞿不能晨夜不夙則莫注二説從前為是折栁樊圃章注所解未是愚逆詩人之意若曰折柳樊圃此細事也即狂夫猶然瞿瞿不敢輕為之况臣子承君之召令乎但恨不能測其晨夜不失之夙則失之莫耳記曰善則歸君過則歸已蓋如此刺意具在言外南山崔崔雄狐綏綏魯道有蕩齊子由歸既曰歸止曷又懷止葛屨五兩冠緌雙止魯道有蕩齊子庸止既曰庸止曷又從止藝麻如之何衡從其畝取妻如之何必告父母既曰告止曷又鞠止析薪如之何匪斧不克取妻如之何匪媒不得既曰得止曷又極止詩序刺襄公也是正意然齊之臣子難言之故此詩不斥其君之惡而唯歸咎于魯桓與敝笱篇意同魯為望國在齊之南故指南山以言魯雄狐綏綏言遲疑以求其匹喻魯桓求昏于齊也此是魯之正道故下緊接魯道之有蕩云云若説適魯之道則魯通于齊自然有個大道何待論齊子之歸而後及哉亦何至于重及哉載驅篇又何至于四及哉此及之彼及之至于再至于四蓋重傷魯之不綱而齊子之敢為姦也魯道有蕩非謂適魯之道平易之謂也魯自周公制禮來夫夫婦婦內內外外秩然莫敢踰越此其道子孫所宜世守者乃今綱弛紀壞此道蕩然無復存焉故曰魯道有蕩齊子由歸非適魯之道平易之謂也觀齊子由歸一由字便見得魯道有蕩當與匪風篇顧瞻周道大東篇周道如砥道字同看周道者周先王之道也天下所視以為刑者也魯道者魯周公之道也舉國所守以為則者也此詩人均致嗟嘆之意也若四牡篇周道倭遲小辨篇踧踧周道則俱當就大路解矣婦人謂嫁曰歸歸寧亦曰歸此刺公與夫人如齊故稱齊子由歸非謂嫁為歸也既曰歸止下接曷又懷止言縱之歸非禮也又曷為懷之而不忍舍也此通刺魯桓非刺齊襄物各有偶其理昭然魯道無復存焉故齊子敢自用以歸齊耳鞠止鞠字即書鞠子之哀鞠字愛之之深曲加鞠育而不加誅也不曰于歸曰由歸便見由是以歸齊也敝笱篇云齊子歸止是明證庸用也用以歸也齊子既用以歸齊魯桓又曷為悅之不相離也亦是刺魯桓懷不忍舍也從不相離也鞠愛憐之不加誅也極窮縱之不能制也此詩通刺魯桓齊襄無復人道不必刺無田甫田維莠驕驕無思逺人勞心忉忉無田甫田維莠桀桀無思逺人勞心怛怛婉兮孌兮總角丱兮未幾見兮突而辨兮詩序大大刺襄公也無禮義而求大功不修德而求諸侯志大心勞所以求之者非其道也詩傳景公欲求諸侯大夫刺之無田二句作比無思二句復作比恐詩無此體愚謂無田二句是起下無思二句耳婉兮孌兮四句或其所思之人逺而不得見故思之徒增忉怛也盧令令其人美且仁盧重環其人美且鬈盧重鋂其人美且偲詩序刺荒也襄公好田獵畢弋而不修民事百姓苦之陳古以風焉盧犬環下有聲令令然若親聞而喜之如聞車馬之音欣欣然有喜色之意其人指古人實評品襄公若曰古田獵若而人今田獵若而人否美且仁猶叔于田之美且仁蓋言其美而好也仁字只作好字解叔于田稱不如叔也其人美且仁是鄭習之不美處故其後有鄭伯克段于鄢一節盧令令其人美且仁是齊俗之不美處故其後有田氏篡齊一節教化關國之習俗習俗關國之興廢信然哉敝笱在梁其魚魴鰥齊子歸止其從如雲敝笱在梁其魚魴鱮齊子歸止其從如雨敝笱在梁其魚唯唯齊子歸止其從如水詩傳魯桓公會襄公于濼遂與夫人如齊齊人刺之易曰間有家悔亡家可弗間乎哉家之弗間是敝笱之在梁也其魚魴鰥其魚魴鱮其魚唯唯蓋必至是而無疑者聖人之立世防意深哉魴與鰥二魚名魴鱮亦然唯唯者惟所出入而無忌之貌如雲如雨如水雖總是多意然細分之如雲則象其從之多簇擁而行也如雨則象其從之多連綿而至也如水則象其從之多奔流而不知返也讀衛之施罛濊濊見衛莊縱逸於壼之內也故其後有州吁之弒讀敝笱在梁見魯桓縱逸於壼之外也故其後有彭生之乘夫為妻綱斷斷乎不可使有一念之縱也載驅薄薄簟茀朱鞹魯道有蕩齊子發夕四驪濟濟垂轡濔濔魯道有蕩齊子豈弟汶水湯湯行人彭彭魯道有蕩齊子翺翔汶水滔滔行人儦儦魯道有蕩齊子遊敖詩序刺襄公也無禮義故盛其車服疾驅於通道大都與文薑淫播其惡於萬民焉載驅二句是車上光景四驪二句是馬上光景總之則致飾於其外也視曷不肅雍王姬之車大相逺矣發夕是夕發言雖至于夕猶發駕也注離于所宿之處正謂此誦女德者曰幽間貞靜齊子之夕發何為哉翺翔而飄然自適遊敖而蕩然忘返視幽間貞靜天壤矣婦道之惡至文薑而極婦人宜有氷蘖之操曰豈弟便不是彭彭狀其行之盛應湯湯儦儦狀其行之疾應滔滔注儦儦衆貌未當猗嗟昌兮頎而長兮抑若揚兮美目揚兮巧趨蹌兮射則臧兮猗嗟名兮美目清兮儀既成兮終日射侯不出正兮展我甥兮猗嗟孌兮清揚婉兮舞則選兮射則貫兮四矢反兮以禦亂兮詩序刺魯莊公也齊人傷魯莊公有威儀技藝然而不能以禮防間其母失子之道人以為齊侯之子焉人君之所重者德也不咏德而咏威儀技藝之美是美中有刺展我甥一語有深刺選者中選也非異於衆也射可以禦亂而不能禦內亂此魯莊之大可惜者章句下趙子曰一段注極佳二章雖兼舞而實歸重于射重訂詩經疑問卷二
