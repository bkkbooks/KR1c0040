body:
  text: 重訂詩經疑問卷九明姚舜牧撰大雅厥初生民時維姜嫄生民如何克禋克祀以弗無子履帝武敏歆攸介攸止載震載夙載生載育時維后稷誕彌厥月先生如達不坼不副無菑無害以赫厥靈上帝不寧不康禋祀居然生子誕置之隘巷牛羊腓字之誕置之平林㑹伐平林誕置之寒氷鳥覆翼之鳥乃去矣后稷呱矣實覃實訏厥聲載路誕實匍匐克岐克嶷以就口食藝之荏菽荏菽斾斾禾役穟穟麻麥幪幪瓜瓞唪唪誕后稷之穡有相之道茀厥豐草種之黃茂實方實苞實種實褎實發實秀實堅實好實頴實栗即有邰家室誕降嘉種維秬維秠維穈維芑恆之秬秠是穫是畝恆之穈芑是任是負以歸肇祀誕我祀如何或舂或揄或簸或蹂釋之叟叟蒸之浮浮載謀載惟取蕭祭脂取羝以軷載燔載烈以興嗣歲卬盛于豆于豆于登其香始升上帝居歆胡臭亶時后稷肇祀庶無罪悔以迄于今詩序尊祖也文武之功起於后稷而后稷生于姜嫄故首章指說時維姜嫄時維后稷下章歷叙其生之靈異克相稼穡之功肇祀以迄于今頌所謂思文后稷克配彼天者是也厥初生民雖原周人之初然唯有稼穡乃有生人生后稷所以生此民也姜嫄為高辛世妃所以禋祀以弗無子但上帝敏歆而介止又其生特異而赫靈所以怪異而棄之非無人道之感世所謂巨跡之說也辨在後巨跡之說自昔傳之然愚以為此傳之訛也請先釋履帝武敏歆攸介攸止字義然後為解古者祀帝于郊禖是郊禖即帝所陟降處謂之帝武履帝武者履此陟降之地也敏速也歆居歆也介介助也止依止也姜嫄履上帝陟降之武上帝即速于居歆焉於是即介助之即依止之由是而往載震而有任載夙而不遲載生産而長育故云載震載夙載生載育時維后稷云爾後儒襲前訛不察訓履帝武為履巨人之迹訓敏為拇訓歆為動附㑹曰歆歆然如有人道之感拇則足大指耳若何歆歆然如有人道之感哉且此履帝武為履巨人之跡則攸介攸止又在何方此敏歆為拇指歆動如人道之感則下云載震者又是何物此皆所謂不通之論也此所謂不經之談也可著之經以詔後世哉敢申臆見正千古之大謬要識首章是總叙一篇之辭下數章乃詳言其事逹小羊也出何典孟子不曰若火之始然泉之始逹乎首生胥苦於不逹維姜嫄之産后稷若或通之是所謂先生如逹也何比之生小羊哉即有出典語涉俚䙝愚不敢謂為是也凡産子未有不坼副者未有無菑害者而况先生乎先生若是厥靈赫赫可異矣故棄之不必於此外又神其說也上帝不寧三句說得活注亦體認得活蓋以赫厥靈雖靈而實異異故反疑上帝或不我寧或不康我禋祀而居然生是子也故置之隘巷平林寒氷云若謂已寧已康則不應駭異而委棄之矣腓足腹也腓字者不踐踏而反加護庇也后稷之生以赫厥靈竒矣三棄之而三不死更竒克岐克嶷擬其貌狀端偉不凡也以就口食時便知藝荏菽禾麥真天授之人也有相之道句極重天之所以生萬民者非此稼穡乎乃天能生地能成而不能使其民之生且成棄若何以相天之時若何以因地之利一一左右而曲成之使稼穡之利昭然大播於天下則有相之道也易曰后以財成天地之道輔相天地之宜以左右民方苞種褎發秀堅好頴栗數字注極明然要識其所以有相處即有邰家室是堯舉為農師而封之邑也重封邑以報有功不重主姜嫄之祀誕降嘉種節是堯舉棄為農師而播其教於天下也維秬維秠維穈維芑是約舉是穫是畝是任是負是互文以歸肇祀則言其任負以歸肇明禋之祀也有稼穡始有祭祀故特言之非為稷始受國為祭主曰肇祀也要識得誕我祀如何以下五句正言其如何以為祀載謀載惟而下四句見祀之時更須著如此如此也然苟非黍稷則無以薦明德之馨此稼穡之用於祀禮為極大也興來歲只說今歲如是祭以盡報成之禮又興嗣歲亦如是其稼穡以舉祀耳非興來歲以繼往歲之說也卬古仰字言仰盛於豆也于豆于登非止黍稷而要以黍稷為主上章泛言祀此言上帝居歆見祀禮之大至於祀上帝亦維此黍稷此有相之功所為至大也曷云庶無罪悔郊社之禮所以祀上帝也禮不行於郊社神必罪我而降之殃即反之此心亦不能無悔恨者自后稷教稼穡以肇明禋之祀世世遵守之庶可無罪悔以迄于今耳此是總結其有相之功之大且逺也以迄于今見生生至于今也正照前厥初生民句敦彼行葦牛羊勿踐履方苞方體維葉泥泥戚戚兄弟莫逺具爾或肆之筵或授之几肆筵設席授几有緝御或獻或酢洗爵奠斚醓醢以薦或燔或灸嘉殽脾臄或歌或咢敦弓既堅四鍭既鈞舍矢既均序賔以賢敦弓既句既挾四鍭四鍭如樹序賔以不侮曽孫維主酒醴維醹酌以大斗以祈黃耉黃耉台背以引以翼壽考維祺以介景福詩序忠厚也二字足蔽此詩矣戚戚二字說得最親切兄弟至戚也克念天顯念鞠子哀皆從惻怛中流出何等戚戚覺得此一假戚戚之情自然親愛不容已所以舜於傲象欲常常而見之不忍其相逺也詩稱戚戚兄弟莫逺具爾而教以或肆之筵或授之几親親之情藹然於吟咏之間真足令人心興起兄弟相逺則日踈相近則日親苟無逺行他故而自逺且踈真無戚戚之心者莫逺具爾是戒其無相逺而相邇也故承說肆筵授几以親邇之注看得忒自然了肆筵是槩設授几是優尊老此為情之周到處肆筵而復設之席安其坐也授几而更有緝御足其使令也設席亦是槩設的有緝御是加優於尊老者緝御即禮記更僕之謂細玩肆筵設席節供御何等委悉禮儀何等周旋品薦何等豐腆樂意何等舂容詩稱行葦忠厚信不誣也舍矢既均未必均也觀投壺禮云云自見凡射以多中為雋故於舍矢既均處見之所以序賢也以不侮為德故於四鍭如樹處見之所以序不侮也四鍭如樹便見其人內正外直比禮諧樂是謂之不侮非多中而無勝人之容曰不侮也兄弟何以稱賔曰以曽孫為主則衆兄弟皆賔矣是禮文之通稱也故下章著曽孫維主句曽孫維主節何獨加厚於老者曰此禮之所以為曲到也燕而射雖尚德然必强有力者能之序賔以賢以不侮亦必有祈爵之禮此尊老者不過端視之耳自非曽孫酌之以大斗而致祈不虛此席乎况燕毛所以序齒也則尊老之禮又宜加重焉前章云或授之几授几有緝御即是此意此禮之所以為曲到也黃耉台背以下方是頌禱之詞老人筋力衰憊全望引導輔翼可益延年以介景福箋訓引翼曰引在前翼在旁疑即祝哽祝噎左右扶持之謂或謂以善道相引翼以享其祺福若書所謂攸好德考終命者道理覺大然恐燕私禱祝之詞似不如此此與棠棣伐木頍辨篇相似與角弓篇正相反當參看抑賔筵篇分射與燕為二此篇合射與燕為一而柄謂祭畢而燕父兄耆老之詩蓋泥四章有曽孫維主之一語也又泥既醉之答此篇也而愚以為不然既祭矣我孔熯矣父兄耆老助祭於其間求無跛倚之形亦已足矣而既畢之燕可復令觀射於其間乎即少壯者此日既承祭祀之大禮矣不應復舉射禮以祈爵也况祭畢之燕無暇細詳而但燕毛以序齒能肆筵設席授几緝御若是其從容乎此燕此射决當是平日燕私之燕故若此其欵曲周致耳其稱曽孫云者蓋謂當此燕㑹即曽孫亦不得以挾其貴至此以共饗云耳而必謂此篇為祭畢之燕泥既醉是答此篇之詩愚不敢信以為然也既醉以酒既飽以德君子萬年介爾景福既醉以酒爾殽既將君子萬年介爾昭明昭明有融高朗令終令終有俶公尸嘉告其告維何籩豆靜嘉朋友攸攝攝以威儀威儀孔時君子有孝子孝子不匱永錫爾類其類維何室家之壼君子萬年永錫祚𦙍其𦙍維何天被爾祿君子萬年景命有僕其僕維何釐爾女士釐爾女士從以孫子詩序太平也太平無事而後君臣可燕飲以相樂蓋成王祭畢而燕羣臣此羣臣上答之詩也王人之燕將德意而不在酒故蒙其燕者不獨稱醉酒而稱飽德昭明訓光大明德也明德具吾心昭於上下四方是人君之所以昭臨天下者此德不具將何以承天命受景福乎故首章祝介爾景福此章祝介爾昭明昭明有融高朗令終一氣說下所謂有融者非於昭明外更有分毫加增也只此㸃昭明不蔽於一念之私不纍於一毫之欲表裏洞徹常湛常清而融融如氷壺如秋月如太虛之無㸃翳耳若是則此心超然於萬物之上與天地同其貞觀與日月同其久照而可以永終不窮故曰昭明有融高朗令終昭明有融才是高朗少㸃翳便屈於物欲卑汚甚矣高朗云乎哉令終緊承高朗來高高朗朗可以常照天下故稱令終卑汚的如何能久照得高朗固是令終然欲善其終必謹其始成王幼冲嗣服而可無深念乎故復著令終有俶句仲虺言謹厥終惟其始伊尹言慎終于始皆此意公尸嘉告云者借其辭可以逹已祈祝之意也其告維何是詩人語籩豆靜嘉三句是公尸之辭而實出父兄之口即父兄之辭也籩豆靜嘉是嘉其禮物朋友有攝攝以威儀是嘉其禮儀一串下歸重下二句蓋朋友之樂為攝全由貴德尊士來朋友有攝攝以威儀是嘏辭威儀孔時以下則承嘏辭之意而衍之以致其祝也君子有孝子箋訓成王有孝子之行極是蓋因容貌之形見以知其孝行之深厚即孝行之深厚可卜其嗣服之無窮也故緊承孝子不匱永錫爾類二句祭義云孝有三小孝用力中孝用勞大孝不匱王者躬大孝何所不至何匱之有子云有教無類易云方以類聚此類字當作肖類之類看若曰爾孝子既如是其不匱我將永錫爾以克肖者永永承爾之宗祀也故下文云云永錫爾類下三節是遞遞相承語玩注甚不安於心敢先舉所可疑者於左始陳臆見以質高明一曰室家之壼句不宜輕一曰祚𦙍不宜分而為二一曰天被爾祿不宜加先當使三字一曰景命有僕不宜認是天命之所附屬一曰女士不宜認女之有士行者一曰從以孫子不宜認隨又生賢子孫蓋永錫爾類即謂錫之以賢子孫也而室家其所自生故其類維何下緊說室家之壼句見此中一團精瑞之所鐘他日受福祚之佳𦙍永永其肇錫焉故承說君子萬年永錫祚𦙍然所謂祚𦙍未明也天所福祿之賢子孫謂之祚𦙍故承說其𦙍維何天被爾祿而天被爾祿全於臣僕之歸附見之故承說君子萬年景命有僕然所謂有僕未明也天下之士女無不歸往之謂也故承說其僕維何釐爾女士乃士女之生無非從以左右其孫子使世為天下君故又申言之以明景命有僕之意而總之則所謂永錫爾類也不是之察而輕室家一句祚𦙍其安所出乎分祚𦙍為二福祿其誰所承乎天被句加先當使三字後又將何所加乎景命句云天命之所附屬有字其不必解乎釐以句謂女有士行生淑媛使為妃則上章室家之壼非女士乎從以句謂隨又生賢子孫則永錫祚𦙍者又何物乎讀之前後齟齬不能為解故敢申臆見以質之如此高明幸虛心一裁訂焉室家之壼最鍾靈育秀觀螽斯麟趾之振振可見有僕有字宜重看有僕然後成其為君書曰民非后罔戴后非民罔與守萬邦故曰景命有僕有僕正是天被爾祿之所在正月篇屢顧爾僕亦指臣說不就附屬說周書云綏厥士女甫田云以穀我士女士女女士總國家之臣妾也故下云從以孫子從以者從而左右之也正應上有僕字詩意若曰天錫女以祚𦙍必豫女以臣僕左右其祚𦙍也不曰士女曰女士者叶下文孫子韻耳即孫子二字亦倒用朱子知逆解孫子曰賢子孫何獨順解女士曰女有士行耶曰威儀孔時君子有孝子正言其德之昭明而承祚𦙍之錫開萬年之統是所謂高朗令終者然昭明有融實自今日始故曰令終有俶鳬鷖在涇公尸來燕來寧爾酒既清爾殽既馨公尸燕飲福祿來成鳬鷖在沙公尸來燕來宜爾酒既多爾殽既嘉公尸燕飲福祿來為鳬鷖在渚公尸來燕來處爾酒既湑爾殽伊脯公尸燕飲福祿來下鳬鷖在潨公尸來燕來宗既燕于宗福祿攸降公尸燕飲福祿來崇鳬鷖在亹公尸來止熏熏㫖酒欣欣燔炙芬芬公尸燕飲無有後艱詩序守成也太平天子能持盈守成神祗祖考安樂之於繹以賔尸可見焉此篇叙既祭而繹以賔尸見情意之周到宜享其福祿也故重言以申美之為尸時不寧而今則寧矣宜言其時措之宜也處言其居處之安也宗言為人所宗而尊熏熏言無不自得而樂總是公尸之自適處成是安享其成之成為是無為而為之為下是自上而下之下崇是其崇如天之崇總皆易之之辭而皆言今日之所享無有後艱則自今以後又將承享其福祿而無虞者此頌祝之至辭也既燕于宗是昨日之燕所謂樂具入奏以綏後祿者故下承攸降而曰來崇焉蓋言所降之福祿日積而高大也假樂君子顯顯令德宜民宜人受祿于天保右命之自天申之干祿百福子孫千億穆穆皇皇宜君宜王不愆不忘率由舊章威儀抑抑德音秩秩無怨無惡率由羣匹受福無疆四方之綱之綱之紀燕及朋友百辟卿士媚于天子不解于位民之攸塈凡受祿而膺天命者必本於令德而令德之顯顯只在宜其民與人未有不得人心而可以格天之心受保右申重之命者故詩人特次第言之干祿節緊承申命說凡所稱福祿者不止是及其身及其子孫而皆有令德皆承上天之命此方是申重之無已讀詩人之詞若祝願其子孫受福於無艾咏詩人之意實祝願其君之身保盛美於無窮美矣而實祝頌矣而實規此是詩之有關於君德處穆穆皇皇而下雖是頌美之詞然實欲其王之穆穆君之皇皇欲其不愆忘以由舊章也欲其威儀之抑抑德音之秩秩欲其無怨惡以率由羣匹受福無疆而為四方之綱也又欲其為綱為紀以燕及朋友為百辟卿士之所媚而深望其不解于位為民之攸塈也詞在君之子孫而意在君之身詞若自然能之者而意實欲其君勉焉以從事此詩人惓惓祝願之深意穆穆皇皇皆敬德之著於容貌者據詩詞雖有天子穆穆諸侯皇皇之分然要之凡為君王者皆須有穆穆皇皇之心有穆穆皇皇之度况此處專重王者混說為佳不愆不忘二句不作自然說言不敢過差不敢遺忘維先王成憲之是守若前有大路率循以由之而不敢一毫之踰越也此之謂穆穆皇皇而可以宜其民人者此句是此章之喫緊語率由舊章何以必先之不愆不忘蓋先王之舊章動以法度繩其下最人所難效而易愆最人所敬憚而易忘者若是而何率循之為維是動懲愆過心警遺忘而時加念及焉然後知舊章之為美尊信而率由之故詩人於率由舊章上先之以不愆不忘云威儀節承上穆穆皇皇來為君王者常存敬恪之心而威儀自然其抑抑德音自然其秩秩且無私怨無私惡而惟羣匹之是師亦若前有大路而率由之不敢悖然則德宜其民人而受福無疆足為四方之綱矣此無怨無惡二句又此章之喫緊語而詩人所深致祝者羣匹是衆賢即易之所謂夷主也人君能遵由衆賢之所行方可以凝命而獲福易曰遇其夷主吉行也正此意率由羣匹何以必先之無怨無惡蓋凡稱賢者必以禮義間其身而以典章規其上與諛佞之柔和取悅者不同上之人雖加敬而未必無怨心焉而况柔佞者日夕浸淫於其側未必無惡心焉故必為人君者真知羣匹之所為有益於身心有禆於治理而如前所謂怨惡者一不萌於其心方能親信而率由之也故詩人喫緊在無怨無惡而朱子於怨惡上又加一私字極透快可玩之綱節又緊頂上說來曰之綱真是一個綱曰之紀真是一個紀所謂勉勉我王綱紀四方者是其所整飭維持真足為朝廷之法守而在朝諸臣不過仰受其成焉耳所以說燕及朋友如是而百辟卿士其孰不心悅而親媚之據其親媚之情但維曰不解于位民之攸塈而已不解于位無他只是常存穆穆皇皇之心不愆不忘而率由舊章常秉抑抑秩秩之度無怨無惡而率由羣匹此是令德永宜于民人而所以承保右申重之命者端不出乎此也故詩人於其末也又喫緊言之既曰率由舊章矣何以又曰率由羣匹羣匹者動守成法以舊章導其君者也故必率由羣匹乃謂之率由舊章然又何以曰不解于位人君之所以率由者此心也此心少解動棄仁賢而藐成法矣故必不解于位然後能率由羣匹率由先王之舊章此詩三章一鞭加一鞭而總歸令德以受申重之命蓋不止是公尸答燕之詩實萬世君人之龜鑑也篤公劉匪居匪康乃埸乃疆乃積乃倉乃裹餱糧于槖于囊思輯用光弓矢斯張干戈戚揚爰方啓行篤公劉于胥斯原既庶既繁既順乃宣而無永嘆陟則在巘復降在原何以舟之維玉及瑶鞞琫容刀篤公劉逝彼百泉瞻彼漙原乃陟南岡乃覯于京京師之野于時處處于時廬旅于時言言于時語語篤公劉于京斯依蹌蹌濟濟俾筵俾几既登乃依乃造其曹執豕于牢酌之用匏食之飲之君之宗之篤公劉既溥既長既景乃岡相其隂陽觀其流泉其軍三單度其隰原徹田為糧度其夕陽豳居允荒篤公劉于豳斯館涉渭為亂取厲取煆止基乃理爰衆爰有夾其皇澗遡其過澗止旅乃密芮鞫之即人君身居九重最患不知民事周公於成王之初政也作無逸俾具知稼穡之艱難召公作篤公劉使備知締造之勞苦總是一意篤即前篇以篤周祜之篤周家篤厚於民事者莫如公劉故每章首篤公劉三字公劉處西戎中必常被其凌侮而奮然有不自安之意故首著匪居匪康句下著思輯用光句乃埸乃疆而下皆從匪居匪康一念來處患難中而怡然居康萬無振奮之理齊姜謂晉重耳曰懷與安實敗名其知此理也夫人雖有振奮之心而料計未周籌盡未定而草率為之萬無可成之理看公劉乃埸乃疆乃積乃倉乃裹餱糧而思輯用光爰方啓行煞何等料計之周籌畫之定所以一舉而造萬世之大業公劉此舉主意只在思輯其民人所以能締造此大業計不在民而維為家室慮吾未見其有成也大王遷岐爰始爰謀只在乃慰乃止乃左乃右疆理宣畝上用功是克守公劉思輯之家法者次節全是相土以謀居故首提于胥斯原句曰既庶既繁既順乃宣而無永嘆是正道其相度之意若曰今斯之遷非細故也必居此原也既庶而衆既繁而盛既順而宜乃為之左右宣理而無永嘆焉斯不枉此遷也已故一陟一降相視之極其周曰陟則在巘復降在原者蓋正應前于胥斯原一句也注朦朧訓庶繁曰居之衆順宣曰居之遍於三既字一乃字全不加察吾不敢信為是也君子無故玉不去身而啓行必加刀劒維兹相視斯原上下於山坂之間故所佩維玉及瑶鞞琫容刀而已言不能多帶也東萊謂以如是之佩服親如是之勞苦斯其為厚於民極說得透三節是營定邑居事逝彼百泉云云不應分上觀下觀說前云于胥斯原既相得此溥原矣而欲定為都邑不妨審視之詳乃又逝彼百泉而瞻彼溥原曰是可以居矣而未識京之所在也乃陟高岡乃覯于京見此地形高聳民可稠居是京師之野也于時定居於此而為之處以處其民為之廬以止其旅為之出政之堂而言言為之論事之所而語語蓋諦視若斯之詳也所謂公劉篤厚於民事者蓋如此凡大地必有大水環送來而水泉所凝聚處開陽發秀此便是個都㑹故公劉必逝彼百泉瞻彼溥原京不是地名公劉所都地曰京當時槩從平坡看難以定止維陟南岡下視之乃知今所都之地是個京師之野而然後定居焉堪輿家所謂南山須用北山看者是也處處不是為之居室上處字對廬字下處字對旅字當時隨行的有即欲定處者為之處以處之其尚在客旅者為之廬以旅之耳要識下處旅言語四字是死字上處廬言語四字是活字四節不是落成宫室蓋定居後飲食以合其渙也當時定居於京是謂于京斯依然蹌蹌濟濟之衆臣非筵几其曷以召之召之既至非飲食其曷以聫之故俾筵俾几於其前而執豕酌匏於其後當飲食時即曉以一統之大義而為之君焉示以一體之至情而為之宗焉蓋方啓行時人心雖協齊而今已散居或恐人心之泮渙故才一定居而即為此聮屬人心之大計耳易曰風行水上渙先王以享于帝立廟享帝使知所尊立廟使知所親皆所以合其渙正是此意從遷之民衆矣而筵几飲食止及蹌蹌濟濟之臣是舉其大者而遍及之也甫田云攸介攸止蒸我髦士亦是此意既登乃依非依几也即前斯依之依蓋蹌蹌濟濟雖說有此臣而實未至也俾筵俾几以召之始登乃依耳要看得活乃造其曹曹字如何作羣牧之處解周語云民所曹好漢書每云吾曹曹者衆類之稱上蹌蹌濟濟是士大夫曹其衆民也乃造其曹在既登乃依下正說士大夫咸集于此乃造曹衆之民使皆至此看今日之所為飲之食之者正教之以君之宗之之事也書盤庚涉河以民遷乃話民之弗率誕告用亶其有衆咸造此造字之所由取也其事同其義同是一證若說造羣牧之處執豕于牢成何文理此朱子所宜亟改者君之宗之教士大夫君之使羣曹知所君也教士大夫宗之使羣曹知所宗也既溥既長從瞻彼溥原來既景乃岡從乃陟南岡來相其隂陽視嚮背之宜也觀其流泉察水泉之利也此固辨土宜以授民事故隨說定其軍賦然險要之當守亦於上數句見之此緊接其軍三單一句也照下度其隰原徹田為糧度其夕陽豳居允荒看便自見得其軍三單雖是定其軍賦徹田為糧雖是定其稅法豳居允荒雖是又廣山西之田然愚細詳其㫖似不如是詩意重在豳居允荒上蓋當時公劉啓行來止是于胥斯原隨而定居以合其渙雖居豳地猶未全有也于是料理其軍其軍三單料理其糧徹田為糧乃度其夕陽而日開荒以充拓之故下章云于豳斯館涉渭為亂止基止旅直至芮鞫之即蓋言公劉之遷若是其相地而止居若是其開荒而充拓所以為篤厚其民而詩人終言之也儒者不達斯㫖謂既溥章是辨土宜以授民而定其軍稅之法于豳章是又總叙其始終吾不敢以為是也其軍三單徹田為糧豳居允荒即前乃積乃倉乃裹餱糧弓矢斯張干戈戚揚爰方啓行口氣然則公劉之匪居匪康豈直西戎之時為然哉即遷豳之日而此志殆未嘗少懈矣豳居允荒荒字是開荒之荒有大意在不宜作大字解周頌天作高山大王荒之正是此荒字于館即春秋傳館穀館字公劉開荒於豳即館穀於豳故云于豳斯館然涉渭必須舟渡故云涉渭為亂豳地西北寒甚非精力耐寒者不足以堪之故取其厲取其煆而止於其基乃為之疆理其事既止基而衆且有矣然後夾遡二澗以止其旅乃居止稠密而安集可更無遷徙也芮疑虞芮質成之芮鞫窮盡也言豳地開荒止居盡頭處直到芮見鄰豳之盡頭處故曰芮鞫之即耳恐非即芮鞫而居之之說也泂酌彼行潦挹彼注兹可以餴饎豈弟君子民之父母泂酌彼行潦挹彼注兹可以濯罍豈弟君子民之攸歸泂酌彼行潦挹彼注兹可以濯溉豈弟君子民之攸塈此篇重豈弟二字豈弟主德言存誠信愛民之心自通好惡於民而行强教悅安之政二傳所云兼用之可也泂酌彼行潦云云有大意在若曰行潦無根之水也挹彼而注此尚可以為用况實有豈弟之心行豈弟之政不足以澤民而為民之父母乎此方是召康公戒成王意民之父母民之攸歸民之攸塈雖平然靡瞻靡依此父母也靡怙靡恃此父母也必為民所歸為民所塈方可稱父母之實故下文推極言之濯罍之濯訓滌濯溉之溉亦訓滌將曰滌滌乎溉必是溉器是因用而得名者此特照注為解耳詩序云皇天親有德嚮有道也詩緝本此言酌彼薄陋之物可以祭祀使天饗之者由設祭者是豈弟之君子為民之父母也祭不必用行潦甚言不在物也極體看得好宜從有卷者阿飄風自南豈弟君子來游來歌以矢其音伴奐爾游矣優游爾休矣豈弟君子俾爾彌爾性似先公酋矣爾土宇昄章亦孔之厚矣豈弟君子俾爾彌爾性百神爾主矣爾受命長矣茀祿爾康矣豈弟君子俾爾彌爾性純嘏爾常矣有馮有翼有孝有德以引以翼豈弟君子四方為則顒顒卬卬如圭如璋令聞令望豈弟君子四方為綱鳯凰于飛翽翽其羽亦集爰止藹藹王多吉士維君子使媚于天子鳯凰于飛翽翽其羽亦傅于天藹藹王多吉人維君子命媚于庶人鳯凰鳴矣于彼髙岡梧桐生矣于彼朝陽菶菶萋萋雍雍喈喈君子之車既庶且多君子之馬既間且馳矢詩不多維以遂歌讀此詩要識召康公規戒之意藹然默寓於諷咏之中有卷者阿而適際飄風之自南豈弟君子所以來游而來歌也以矢其音緊承說若曰君臣之間有倡有和君來游來歌矣臣亦願矢其音而君試垂聽焉耳矢有直陳無隱意故就今日之伴奐優游隨規之彌爾性似先公酋說到土宇昄章又進一步矣又規之彌爾性為百神主說到受命茀祿更進一步矣更規之彌爾性純嘏爾常何者此性非他天所命也天命本然之德本足以長人而為天下君本足以守成而為百神主本足以嗣大厯服而受無窮之福祉但患其君以逸豫滅厥德而不能彌其性斯無以綱紀四方常享此太平之福耳故召公首及之然所藉以彌爾性者在用馮翼孝德之人以造於顒卬圭璋之地故次第及之然有是君方有是臣感召之機若梧桐鳯凰然未有不相投者患不相求耳今王有車馬王宜籲召天下之賢才共圖治理而非可伴奐優游以自休者故以矢詩不多維以遂歌終焉招賢士養性靈守成業而致成治此是召康公一詩大主意本來游來曰伴奐爾游即承游字曰優游爾休一字不苟此伴奐二字有大議論在伴伴伴也伴儅也奐奐釋也成王游卷阿時必與羣伴儅相奐釋於斯地為詩歌以愈快召康公偶見此謂是治亂一大關頭也就於其游歌時矢音以規諷之先教之彌爾性隨教之親近賢人君子以為盡性之助後教之備車焉以招徠天下之賢才蓋親禮賢士大夫以享太平之樂勝於同宦官宫妾優游於卷阿之上也故特從伴奐爾游矣說起儒者不察將伴奐通泮渙與優游共訓間暇之意為千古之大謬愚偶有所見亦願矢詞以正于高明嘗讀唐史見老伴伴字面宦游謁益藩敬問大內呼宦侍宫娥果稱伴兒伴伴乃信伴字所從來而伴奐二字終不可通為泮渙也再按訪落繼猶判渙謂工夫間斷義理未馳未嘗通用伴奐伴音判奐音喚謂可通用愚不敢盡信也俾爾彌爾性俾字有大責成意在此一句是一篇大緊要語不應作終其壽命解天保三俾爾是天所賦畀此三俾爾是人所注望皆忠臣望君之辭彌字亦不作終字解彌滿也充盡之謂也盡其性則可為四方之則四方之綱此愚謂此一句是一篇之大㫖也中庸盡性之說本諸此酋字亦不應作終字解酋是特達過人之稱今世稱酋長取此意昄章應作版圖看周自文武受命以至於今而太平無事極一時之盛故稱受命長而茀祿康純嘏即上文之受命茀祿也爾常者常膺此無窮之厯服常享此太平之茀祿也載見篇云俾緝熙于純嘏純嘏而本之緝熙亦此篇俾爾彌爾性意三言俾爾彌爾性規之使常存此性也常存則享如此之福祿不存則隳先公之業神人携而大命去矣可畏哉愚固謂此性是天命之性非可以壽命解也如以壽命解即已不令終繼世未必無賢者而寧渠至是哉有馮有翼在有孝有德之人而君可藉之以引以翼者故其詞云然馮可依以為安翼可賴以為輔是引翼之人引即引君當道之引翼即豫為女翼之翼是馮翼之事曰有德是矣何以先有孝孝是天性第一義故孔子稱為至德要道中庸一書統論盡其性首稱大孝達孝有孝有德是克全其性之人君人者不得此等人引翼何以能彌其性有馮有翼是虛說有孝有德是實說以引以翼是實用孝德者以為之馮翼也所以能為四方之則四方同此性也吾先彌性以立極四方其誰不則而效之記曰君者則人者也顒卬是容止之尊嚴圭璋是充養之純粹聞望是見聞之隆赫總之皆君德也皆彌性之符驗也皆得於馮翼孝德之助而致之者綱為衆紀之所繫君為萬姓之所繫一人正天下莫不歸於正故曰四方為綱以引以翼四方為則是泛說顒顒卬卬如圭如璋令聞令望是實用馮翼孝德引翼以造其極者故稱豈弟君子四方為綱吉人吉士總是馮翼孝德之人在朝曰士在外曰人耳亦集爰止是吉士已立於朝矣故維君子使而媚于天子亦傅于天是吉人欲見於世者故維君子命而媚于庶人媚天子媚庶人總是為上為德為下為民事分而言之者見得維上之所使所命耳鳯凰鳴矣于彼髙岡見賢士當出潜離隱之日梧桐生矣于彼朝陽見賢君當明出地上之時此言一時相值之甚偶菶菶萋萋喻賢君禮遇之殷雍雍喈喈喻賢士和鳴之感此言一時相召之必然但曰君子之車云云而不言其所以用引言而不發含意於無窮此最詩之極妙處反復更端矢詩亦既多矣而曰不多者愛君無已之心猶以為未足也維以遂歌云者若曰此維因王之游歌而遂矢陳之不知其詞之可當於君心否也喫緊要其深思而自得民亦勞止汔可小康惠此中國以綏四方無縱詭隨以謹無良式遏冦虐憯不畏明柔逺能邇以定我王民亦勞止汔可小休惠此中國以為民逑無縱詭隨以謹惛怓式遏冦虐無俾民憂無棄爾勞以為王休民亦勞止汔可小息惠此京師以綏四國無縱詭隨以謹罔極式遏冦虐無俾作慝敬慎威儀以近有德民亦勞止汔可小愒惠此中國俾民憂泄無縱詭隨以謹醜厲式遏冦虐無俾正敗戎雖小子而式𢎞大民亦勞止汔可小安惠此中國國無有殘無縱詭隨以謹繾綣式遏冦虐無俾正反王欲玉女是用大諫詩序召穆公刺厲王也是注謂同列相戒之辭者想當時上悅於詭隨執政者轉相效尤使一輩無良小人放恣於邦國之中公然大肆其冦虐而民不勝其勞苦故作此詩以告執政者而實所以刺其君也劈頭說民亦勞止汔可小康惠此中國以綏四方見生民不勝其勞苦今亦可少康寧之矣蓋中國四方之根本也根本病枝葉無有不受病者惠此中國庶四方有所仰藉以綏寧耳此是一篇大題目下無縱詭隨云云正承說此係根本之所在所以當嚴加任用不可放縱無良的人胡行亂做貽中國之害而携四方之心曰民亦勞止汔可小康詞緩而意懇曰惠此中國以綏四方意正而詞嚴只說惠此中國以綏四方而緊出無縱詭隨以謹無良語何也朝廷之用舍關生民之休戚用匪其人而貽害于內外不小小也故其詞云云無從詭隨四句一氣下重首一句用人者能審其人之心術無縱詭隨者得列於其位則彼無良者自知所斂戢而可止冦虐之害矣彼雖不畏明而寧不憯然知所懲乎謹字遏字憯字正應上無縱二字詭隨是小人之心術無良是小人之品格冦虐是小人之荼毒不畏明是小人之放肆憯動心貌小人雖一向放肆而無畏苟無縱之彼亦必有憯然動其心者故特用憯字如何訓作曽字看後章曾莫惠我師曾是莫聽屢用曾字此詩獨何巧用憯字要人作曾字解耶柔逺二句緊承上說來若曰如是其慎用人所以柔其逺能其邇以定我王室也是所謂惠中國以綏四方之道也語意極回顧有情書稱柔逺能邇歸結在難壬人此稱柔逺能邇喫緊在謹無良總一意康字休字息字愒字安字不重所重在惠此中國上而喫緊只在無縱詭隨一語其反覆乎言之者蓋極小人情狀之可惡見已之諫所以為緊切耳凡人臣事君始何嘗不洗心為國逮其後稍自逸也悅詭隨而任之則前勞盡棄矣曰無棄爾勞以為王休蓋提醒而令之知謹也比前柔逺能邇以定我王語更切惛怓非歡譁也惛從心以昏怓從心從奴是小人之心昏迷於利欲奴奴然以思逞者故究其欲則無所不至而曰罔極觀其狀則備諸醜態而曰醜厲窮其情則曲為固結而曰繾綣此所謂無良也乃其在君側只一味詭遇以隨人故拳拳以無縱詭隨為說無良之肆為暴虐豈敢自縱哉小人工於媚悅而巧於彌縫人主不覺入其彀中其情始恣放而思逞是其縱君縱之也使燭之蚤而防之豫俾詭隨者不能一行其奸則其人自斂戢而不敢肆矣故曰無縱詭隨以謹無良謹字正與縱字對上言無俾民憂是釋民之害此言無俾作慝是絶彼之惡絶得小人之惡方可以釋民之憂敬慎威儀二句重在近有德上近有德則自逺無良矣然必先從敬慎始是根本之論也邪說興正道敗是理之必然者無俾正敗全由禁邪來戎指無良說其人雖小而彼所懷挾及其規為動關天下國家倘一不謹而其禍將不可言矣故曰而式𢎞大曰以綏四方是泛說曰以為民逑見其必如此而後可聚民也曰以綏四國言四國由此其可綏曰俾民憂泄則民去其憂矣去其憂則國可保全無害也故曰國無有殘曰正敗正猶在也曰正反則正盡覆無存矣此語之淺深也曰柔逺能邇以定我王使知所趨也曰無棄爾勞以為王休使知所圖也曰敬慎威儀以近有德使知所本也曰戎雖小子而式𢎞大使知所謹也曰王欲玉女是用大諫使知所聽也五章結語處三用王字所以警其臣者至矣而未必出于王之心也如是立言者使其臣聽之深聳而不違而其君聽之亦深思而不怒耳所謂言之者無罪聽之者足以戒正是此等語玉女玉字下得極妙凡人甚相愛者必冀成其美而維恐其有一毫之玷瑕此玉女之說也思令所以玉其成則不得不自珍玉矣西銘曰玉女于成明白正大以諫之曰大諫玉女而用大諫者他山之石可以攻玉也上帝板板下民卒疸出話不然為猶不逺靡聖管管不實於亶猶之未逺是用大諫天之方難無然憲憲天之方蹶無然泄泄辭之輯矣民之洽矣辭之懌矣民之莫矣我雖異事及爾同僚我即爾謀聽我囂囂我言維服勿以為笑先民有言詢于芻蕘天之方虐無然謔謔老夫灌灌小子蹻蹻匪我言耄爾用憂謔多將熇熇不可救藥天之方懠無為夸毗威儀卒迷善人載尸民之方殿屎則莫我敢葵喪亂蔑資曽莫惠我師天之牖民如塤如篪如璋如圭如取如㩗㩗無曰益牖民孔易民之多辟無自立辟價人維藩大師維垣大邦維屏大宗維翰懷德維寧宗子維城無俾城壞無獨斯畏敬天之怒無敢戲豫敬天之渝無敢馳驅昊天曰明及爾出王昊天曰旦及爾游衍詩序凡伯刺厲王也是觀首稱上帝板板及天之牗民以下分明刺王之詩維我雖異事及爾同僚似為同列相戒語耳大抵有君如是其臣從之作詩者不敢即先斥言始姑為戒同列語而後深警乎君心也要識得首二句是提綱語出話以下正申其板板而病民處故作詩以大諫此章是一詩之綱領出話不然二句直說下總見其無經國之逺圖而靡聖管管二句又本其心之藐忽而妄為者言之故深嗟其猶之未逺是用大諫焉耳出話不然便是為猶之未逺處出話不然然字是人心之同然然字凡人懷深逺之謀者其出言必不苟斯人也信口胡言而未嘗思為久逺計但維謂世無聖人自任其局小之見即國有大謀大政所當亶心為之者而彼且不加誠實焉嗟乎斯其猶之未逺而下民之所以卒疸也是用大諫蓋為此耳猶之未逺即上為猶不逺但上是重言以病之之詞此是輕言以嗟之之詞管管即管窺管字蓋曲局淺小之見未窺聖人之大意者謂世有聖人而虛心以聽之則其見日益大而其猶日益逺靡聖而一任管管之見所見能幾何所圖能幾何此最是君人之大病亶訓誠是但就不實于亶語詳之此亶字當是大政事大謀議所當亶心以為之者而一以不誠處之故曰不實于亶耳憲憲即成憲憲字自以為憲憲則不顧理之是非矣此本靡聖管管來管管則憲憲憲憲則泄泄而不思為國家久逺計矣故教以辭之輯矣民之洽矣云云辭之輯矣四句正出言合理而為猶之深逺足以宜其民人者辭之輯與懌全由此心體㑹聖謨之洋洋發出所以先得人心之同然語意若曰其辭如此此方是民之洽民之莫是之謂訏謨是之謂逺猶云爾之洽之莫與胥洽胥莫不同認得此語意真切照上出話不然為猶不逺看極有意味我雖異事三節反覆著其不受善言實心為朝廷做事正形容其靡聖管管不實于亶處囂囂亦從管管來自以已見為得而反笑人言之為非也故承說我言維服勿以為笑我言維服之服即衣服服字言已所言有關於民生國計是日用之最切者書說命云說乃言維服照下民之方殿屎則莫我敢葵看便識此維服之義矣詢于芻蕘是先民之言灌即灌溉之灌灌灌者欲入其耳而沃其心也蹻即古腳字蹻蹻者下遺而不加之意也憂謔者以老成憂國之言為謔浪也將行也熇熇暴虐之意與上輯字懌字正相反夸毗二字聮讀謂以夸大之言毗其君也民方如蜩螳如沸羮而彼乃謂太平無事諛悅其君以取容焉李林甫楊國忠之所為也此二字極描得小人情狀出凡君子垂紳正笏端言於廟堂之上小人必多方以迷亂之而使終不得伸焉善人即懷有逺猶無由得展若尸之不言不為者然是之謂威儀卒迷善人載尸原闕自省又出怪異以警懼之尚不知變而傷敗乃至災異之譴告天之怒也怪異之警懼天之渝也此不知敬而戲豫馳驅以處之傷敗其可免乎此詩人之所為惓惓也易曰洊雷震君子以恐懼修省戲豫馳驅不照前憲憲泄泄等辭說戒其臣曰無然憲憲無然泄泄戒其君曰無敢戲豫無敢馳驅語各有體讀昊天曰明數語天之威命靈爽無時而不監觀在下而人之往來作息無一而不對越在上兢兢業業有不可瞬息忘者文王陟降在帝左右此方是敬天的樣子此詩前五章統責其臣不知畏天而不為深逺之謀後三章始責其君一於懷德而實修敬天之事上篇先致責辭而以是用大諌終此篇略提責詞而以是用大諫始各一體蕩蕩上帝下民之辟疾威上帝其命多辟天生蒸民其命匪諶靡不有初鮮克有終文王曰咨咨女殷商曽是彊禦曽是掊克曽是在位曽是在服天降慆德女興是力文王曰咨咨女殷商而秉義類彊禦多懟流言以對冦攘式內侯作侯祝靡届靡究文王曰咨咨女殷商女炮烋于中國斂怨以為德不明爾德時無背無側爾德不明以無陪無卿文王曰咨咨女殷商天不湎爾以酒不義從式既愆爾止靡明靡晦式號式呼俾晝作夜文王曰咨咨女殷商如蜩如螳如沸如羹小大近喪人尚乎由行內奰于中國覃及鬼方文王曰咨咨女殷商匪上帝不時殷不用舊雖無老成人尚有典刑曽是莫聽大命以傾文王曰咨咨女殷商人亦有言顛沛之揭枝葉未有害本實先撥殷鑒不逺在夏后之世詩序召穆公傷周室大壞也是首稱上帝又出天字分明借上帝以指其君上帝蕩蕩而可肆疾威乎此其意可識矣首三四句若歸咎於天而隨接天生蒸民四句見此非天之命也人自不以善道終故致命之多辟耳自此以後通說鮮克有終事天命人本無不善而人初時亦無不善維其後不克有終天命亦從而改移故曰其命匪諶厲王任榮夷公以罔利而又用衛巫以監謗彊禦掊克之人皆居位任事與當時殷紂之惡一般故詩人借殷商以深刺之曽是云者治世曽未有此人亦曽未用此人曽是此人而可用之在位在服乎在服者服是事也此彊禦掊克一輩人慆淫無度固天所降生苟為君者心存愛民放流屏棄之彼亦胡敢肆其志哉唯是庸君污暴作興此一輩人故彼始竭力為之耳天命皆善而曰天降慆德何也善是人之本性而中間有為不善如叔向之母所譏者即初生時便不同謂非天之所生不可也彊禦掊克何世無之維君之興與不興耳凡君道之所宜為者曰義義之類不一而足皆君人所宜秉執者若彼彊禦之臣摶擊以為威多取懟於天下且肆為流浪不根之言正宜加察而逺斥之者顧反與相對合唯其言之是聽其冦攘式內何怪哉所以衆懷怨憤共作詛呪不知其所届止究竟也上並舉彊禦掊克此何以特申彊禦彊禦者必掊克貪暴本一事也故云冦攘式內冦攘者攘奪民財也此一節正申上章女興是力意流言以對不是彊禦者用流言以應對也此輩人亦知人所共憤而恐禍之及也姑為流言以自飾乃君反嘉賞之契合以為對所以彼得冦攘式內耳以對正照秉義說秉義者不與對而此實與之對也侯字宜作衆字解作字祝字宜相聮讀凡祝詛皆民心作而為之者故云然祝有祝其降祥者有祝其降禍者今方言並稱呪祝似不必改作為詛改祝為呪也噓濡姁育是君人之道炮烋如虎狼斂天下之怨怒豈君人之所宜有哉而彼方以為得計是所謂斂怨以為德者是真不明之極者故即承之曰不明爾德云云用彊禦掊克之臣是炮烋於中國之實事故能斂天下之怨天下未嘗無賢者維是不明其德賢者望望而去耳故曰不明爾德時無背無側然君德之所以不明者實由無賢者之輔導故又曰爾德不明以無陪無卿反反覆覆言之總申其不用賢以克明而斂怨以為德也天立君以為民極全望其明明德於天下何嘗令其沉湎於酒彼昏於酒而縱彊禦掊克之臣以炮烋於中國是所謂不義從式者此不義從式正與上文而秉義類相照應言義之不秉而維惡之是用也爾止君人之所止也君不秉義而湎酒是謂愆爾止小大近喪言天下小小大大皆不能存活而近於喪亡也人尚乎由行謂上人見此景象速宜改轍乃尚由此以為行也匪上帝不時云云言上帝常欲人之皆善世之皆治豈故為此不善之時維是老成典刑世所倚以為治者殷既不用舊而又不遵先王之典刑故至於此耳甚言其非天之故也雖無老成人一轉極妙今人不用舊動說無老成人人亦不敢與為辨然世雖無此老成人也典刑立於先王傳於後世今亦豈盡亡乎如此責之便使他無詞可對天本與人君以明德彼沉湎于酒惟不義之是從老成典刑之盡棄此正是其鮮克有終處故從彊禦掊克炮烋說到不明爾德即提天不湎爾以酒又責其不用老成不聽典刑明白說匪上帝不時見果是人之罪非天之為也明德是君之本實不明德而秉義即外具可觀其能長久乎人未有元神喪而不死者國未有君德衰而不亡者木未有本實撥而不瘁者首章提命之多辟由其君之罔終乃君之罔終全在用彊禦掊克之臣故次章指出用彊禦掊克之臣全在不秉義類故三章指出不秉義類而炮烋於中國全由不明其德故四章指出不明其德全在沉湎於酒故五章指出沉湎於酒而不明其德則必至沸怒而喪亡故六章指出喪亡之由在不用老成人與典刑故七章指出若是則自撥其根本而夏殷之事可為萬世之明鑒矣故八章明白言之總歸在人之罔終非由天之多辟通篇說殷商事只末一句泄出本意來此議論之極佳處此文章之極妙處首提大綱而章章以文王曰咨致反覆嗟嘆之意又詩之一格大抵世所尊信者宗祖所鑒視者近代文王與殷紂事周人歷歷能言之而後王忽焉不知所警戒故自蹈于昏愚之覆轍此詩自首章而下章章提文王曰咨咨爾殷商以喚醒之至末稱殷鑒不逺在夏后之世以警切之使克守天命之初永為下民之辟而不自撥其本實以取危亡之大害其立意極正大而其命辭極緊嚴蓋不獨成周之針銘而已也凡君天下者皆當書此篇于屏几以為萬世之殷鑒重訂詩經疑問卷九
