body:
  text: 重訂詩經疑問卷十一明姚舜牧撰周頌於穆清廟肅雍顯相濟濟多士秉文之德對越在天駿奔走在廟不顯不承無射於人斯詩序清廟祀文王也周公既成洛邑相成王朝諸侯率以祭文王焉祭文王冝頌文王之德乃其詞維曰肅雍顯相多士秉德對越駿奔者何蓋聖人之德無日不與人心相感通但即其在人心者言而其顯承無射蓋可以想見矣此極善形容處肅雍雖分訓敬訓和實是一物蓋在廟只是一箇敬而敬之從容合禮處即是和肅而不雍勉強之敬也維合得此二字然後為皇皇之度顯相即相維辟公之相有顯明之德者也周公亦在其中濟濟多士則諸侯以下助祭者此皆秉文之德則諸侯可知而天子又不必言矣究竟此文德不出肅雍二字對越越字是發越之越言對答而發越之也文王在天之靈洋洋乎如在其上是為對越對越在天言此心之仰承駿奔走在廟言此身之趨蹌統夲秉文之德來頌文德者曰文明柔順文明是其顯處柔順是其承處有是二者之德自然不觸怒於人故曰不顯不承無射於人斯蓋深咏文德之入人深而至今在也承作尊奉解射作厭斁解皆不敢從思齊篇云雍雍在宫肅肅在廟不顯亦臨無射亦保此云肅雍顯相即其雍雍肅肅之在人心也云不顯不承無射於人斯即其亦臨亦保之至今存也故中著一語云秉文之德維天之命於穆不已於乎不顯文王之德之純假以溢我我其收之駿惠我文王曾孫篤之首節從天命一直說下言維天之命於穆不已未有能全體之者於乎不顯文王之德之純無二無雜無間斷先後一天命之不已焉然則文王其天乎此是一直說下非相擬合之詞假以溢我節緊承上假昭假也溢流溢也愚揣詩意謂文王德極其純其所蓄積深矣倘今之祭昭假在天之靈而流澤波溢於我我其以身收受之不敢忽也從此景德以為行莫非我文王之駿惠而子子孫孫將篤其慶澤而未艾焉如此解或可得詩人之意若謂何轉而為假恤訛而為溢則吾所不信也曾孫篤之之篤即皇矣篇則篤其慶之篤曾孫之能篤其慶亦由文王之慶之長也連下三我字皆親之之辭維清緝熙文王之典肇禋迄用有成維周之禎維清緝熙愚謂似不如是解清言心體之不混也緝熙言繼續其光明而心體之常清也詩意若謂自古典則之詒有矣然未有心體澄然繼續其光明而創制立則如文王之所詒者維其若是故自肇祀以迄于今治功有成維周家之禎祥皆文王之典之所致也所以迄今以往思祀之不可已耳文王篇云穆穆文王於緝熙敬止昊天有成命篇云於緝熙單厥心敬之篇云學有緝熙于光明載見篇云俾緝熙于純嘏皆就此人之心學言此獨注云所當清明而緝熙者所當二字愚不能解論文王之德只是箇緝熙敬止論文王之典只是箇維清緝熙不繼續其光明曷以稱至德稱大典肇禋即就文王之初祀言烈文辟公錫兹祉福惠我無疆子孫保之無封靡于爾邦維王其崇之念兹戎功繼序其皇之無競維人四方其訓之不顯維德百辟其刑之於乎前王不忘烈文云者有功烈而又有文德之稱天子感諸侯助祭以獲福亦欲以福報之乃其詞曰無封靡于爾邦云云又曰無競維人云云此方是天子錫福之詞首節四句一直下語却甚有次第諸侯何能錫天子之祉福乃祭不可無助裸之人也助而獲福猶其錫矣無封靡于爾邦二節總收於乎前王不忘一句似作一氣解照二無字起語似作二假解若照四其字及收語則四之字又宜作四假解詩意若曰汝烈文辟公助祭而錫兹祉福惠我以及子孫我亦願有答焉封靡非善物也無封靡于爾邦維王其克崇焉戎功不可棄也念兹戎功繼序其克皇焉孰有競於人乎無競維人四方其取訓矣孰有顯于德乎不顯維德百辟其儀刑矣凡此皆前王之所以錫厥後者也於乎前王不忘是汝辟公所當深念者蓋後二節總照首節錫兹祉福惠我以及子孫看便見戒勉錫答之意是所謂善頌善禱也是之謂頌說詩者知可作四假解又知可作二假解又知可作一氣解斯可與言詩矣無封靡于爾邦語極佳富貴不期驕奢而驕奢自至任意封殖而侈靡為害不小故有國家者當先去此一大病書曰無教逸欲有邦此曰無封靡于爾邦真千古之炯戒繼序其皇是光大而恢廓意汝助祭錫福於我之子孫我念功篤厚於汝之繼序此正是相報答意訓之者尊以為訓也刑之者刑以為式也曰無競維人四方其訓之要渠以先王之自強為訓也曰不顯惟德百辟其刑之要渠以先王之入德為刑也故總嘆咏之曰於乎前王不忘是作二假解者其訓其刑不忘前王方無封靡于爾邦而承維王之崇繼序其皇要見今日報之以福亦即前王之所欲報者也是作一氣解者天作高山大王荒之彼作矣文王康之彼徂矣岐有夷之行子孫保之詩序祀先王先公也而注謂祭太玉之詩然詩有文王康之句序較為是大王荒之之荒即書荒度土功之荒即豳居允荒之荒蓋言始開其荒也皇矣篇作之屏之修之平之啓之辟之攘之剔之正是荒之之事遷岐夲非得已而周用以興似非人之所能為也故稱天作謂天工之造作也及太王開荒而民歸如市築室于兹則稱彼作謂人工之創作也彼徂又夲彼作來而總出于天意故以天作名篇彼徂矣岐有夷之行蓋言大王居豳樂業久矣而曷徂於岐狄人侵之不得已而有此行耳不得已遷岐而作屏修平啓辟攘剔費無限之精神方造此無疆之基業子孫其可䡖棄之乎故結以子孫保之望其必如文王之康然後可無負大王之荒也昊天有成命二后受之成王不敢康夙夜基命宥密於緝熙單厥心肆其靖之詩序郊祀天地也而細讀其詞是祭成王之詩成王保成命而致盛治全在不敢康一念上成命基命何以别成命者已定之命也基命者仰承此成命上思以安藉之也成字死基字活夙夜基命宥密言成王早夜所圖惟維欲承藉此成命到安宥靜密處不使少有傾覆動搖也凡物置之安靜處則無虞置之傾動處則易壞下文於緝熙單厥心肆其靖之正夙夜基命宥密之實事注謂夙夜積德以承藉天命者又宏深而靜密是能繼續光明文武之業而盡其心故今能安靜天下云云似未得詩人之㫖易曰苟錯諸地而可矣藉之用茅何咎之有正夙夜基命宥密之謂也於緝熙單厥心一串下言繼續其光明盡所以圖惟天下之道也人君治平天下全在明明德不繼續其明而謂盡心於天下吾未之信也到肆其靖之處然後謂之基命宥密靖字正與宥密字相照我將我享維羊維牛維天其右之儀式刑文王之典日靖四方伊嘏文王既右享之我其夙夜畏天之威于時保之詩序祀文王於明堂也是將享而以羊牛所以親之也上帝所歆以誠不以物故維羊維牛遂可致上帝之來歆也右即下篇右序之右古人尚右若曰帝已尚此將享云耳如注謂天庶其降而在此羊牛之右則下篇右序有周將序有周於何物之右耶且維天其右之與下節伊嘏文王既右享之語同非不敢必之辭也敢問髙明雍之篇曰既右文考亦右文母右尊也我盡誠敬以尊神曰右神鑒我之誠敬而歆其所尊亦曰右儀式刑文王之典句儀式二字宜稍讀文王之典何典也維清緝熙之所垂示也儀式刑文王之典日靖四方是平日事祭胡不叙品物而叙此也蓋明堂宗祀文王以配上帝分明以天為父以文王為子父子同食於一堂共此牛羊耳不更設也故不更叙乃文王所望於後之人在繼志述事不在乎品物之陳故但以平日儀式之事告而伊嘏文王即既右享焉耳我其夙夜節注甚明小心翼翼昭事上帝文王之心也畏天之威于時保之則存文王之心矣存文王之心斯可常保上帝降鑒之心此是頌者之夲㫖時邁其邦昊天其子之實右序有周薄言震之莫不震疊懷柔百神及河喬嶽允王維后明昭有周式序在位載戢干戈載櫜弓矢我求懿德肆于時夏允王保之詩序巡守告祭柴望也武王既定天下有巡行方嶽事故周公追述以作歌焉王者夲天之子也禮樂刑政稍有乖謬天之子謂何此篇首節云時邁其邦昊天其子之下節云實右序有周明昭有周允王維后允王保之此天子允王四字須細體書曰元后作民父母以為天下王蓋唯真實作民父母乃可稱天下王稱元后乃可稱允王稱天子此以見詩書之言之互相證也右序者尊尚而序列之也薄震而莫不懼懷柔而莫不格允王維后其尊尚序列也何如明昭有周與上右序有周一樣看巡行朝㑹諸侯全是序列其次第示以平定安集之要務故上節但言承右序之命為人神之主此節方言承明昭之命偃武修文求懿德以共保天命於無窮語法極有次第干戈弓矢所以戡定天下者王者其誰廢之第業已平定則求懿德以肆時夏固永保太平之第一義也故曰允王保之按此篇與書武成相表裏黃氏曰時邁見武王所以得天下與所以保天下也武王巡守之事詩有時邁書有武成時邁告祭之樂章也武成識其政事以示天下萬世也庚戍柴望大告武成此祭告懷柔之實也昭我周王天休震動此莫不震疊之實也庶邦冢君暨百工受命于周此式序在位之實也偃武修文歸馬放牛此非戢櫜之意乎建位任事重民五教惇信明義崇德報功此非懿德以保之乎此一假極有理執競武王無競維烈不顯成康上帝是皇自彼成康奄有四方斤斤其明鐘鼓喤喤磬管將將降福穰穰降福簡簡威儀反反既醉既飽福祿來反詩序祀武王也然中有成康字不應後代之諡若是其凑合也從朱子為長君德只是箇剛與明武王持自強之心便成極大功烈天下莫與為競成康繼世而亦持此心便不為物欲所蔽而可以照臨四方故既稱不顯成康而又稱斤斤其明成康之奄有四方承上世也佳處全在斤斤其明上曰鐘鼓喤喤磬管將將降福穰穰又曰降福簡簡威儀反反云者何凡頌之體不獨稱美前人之功德實以興起後世之儀刑但述功德而不及主祭者稱頌之謂何此云降福既已簡簡而威儀尚爾反反焉前王將醉飽以饗之而福祿之來反未艾矣此方是箇頌體威儀反反者反之於始而如一也楚茨篇所謂我孔熯矣式禮莫愆是也思文后稷克配彼天立我蒸民莫匪爾極貽我來牟帝命率育無此疆爾界陳常于時夏詩序后稷配天也后稷上世農官周家推夲以配上帝疑於追崇之過故周公作此為頌后稷之功不過稼穡耳曷以文歸之文德所以開太平也民不知稼孰厚其生而况乎利用正德之可望哉自后稷開稼穯之利民始得以立命而萬世有太平焉文德孰大於是故周公思此文德以作頌曰思文后稷克配彼天立我蒸民莫非爾極一字無虗美也天能生人不能使人之自生有后稷始有人有人始有天其功德真是克配立我蒸民立字不作粒字解語曰為天地立心為生民立命民匪后稷誰與立其命哉是其有相之道真立我民命于無窮者故詩人特下箇立字貽我來牟立其生也而其功直至陳常于時夏以立民之德故云立我蒸民莫匪爾極何謂爾極有相之道左右生民莫有能及之者是也屋脊曰屋極北辰曰北極正是此箇極字帝命來牟四句一串下莫分養教平對率育者盡民而育之也盡民而育更何彼此疆界而何君臣父子之相奪倫哉此謂陳常于時夏也至此乃見其開萬世太平處乃謂思文后稷克配彼天嗟嗟臣工敬爾在公王釐爾成來咨來茹嗟嗟保介維莫之春亦又何求如何新畬於皇來牟將受厥明明昭上帝迄用康年命我衆人庤乃錢鏄奄觀銍艾詩序諸侯助祭遣于廟也蓋王者首重農事諸侯來朝助祭畢即遣歸而首以農事勑且形之頌使後世皆知所重也朱子直以為戒農官之詩耳諸侯來朝有臣工有保介天子欲告諸侯以公事不忍直斥故斥臣工又欲令首重農事不忍直斥故斥保介蓋諸侯循行阡陌保介其所必御也嗟嗟臣工與嗟嗟保介起語同而意重在下蓋王將勑戒保介先呼臣工而勑戒之其所謂王釐爾成者則莫有重于農之事也王釐爾成不妨咨詢而聽受爾歸其國可勤來訪問焉故曰來咨來茹茹納也受也王釐爾成成字即下篇噫嘻成王成字王業之成莫先於務夲也維莫之春三句語極警切若曰汝農夫何所望哉望此新畬之有秋耳今已莫春其時矣汝亦何所求哉此新此畬正所當用力之候也汝如何而速為計可也曰亦又何求曉以他無所望曰如何新畬示以此當盡力真勑辭之極佳者二嵗田曰新三嵗田曰畬皆新墾之田用力尤難故首問之於皇來牟云云者若曰美哉此二麥夏初即熟今已莫春將受天之明賜矣夏麥者秋稼之占也天意昭明終必有年可不盡人事以承天意乎爾歸其國命我衆農夫各具銚鉏之器以治田奄忽之間即觀其用銍以艾禾可也此通是重農之意故王者巡守其地亦視土地田野之闢治與否以行賞罰也噫嘻成王既昭假爾率時農夫播厥百穀駿發爾私終三十里亦服爾耕十千維耦詩序春夏祈榖于上帝也上之人宜先導利而布之下駿發爾私終三十里亦服爾耕十千維耦是王者之心王者之事王業之所由成也蘇氏民曰雨我公田一假語極佳成王者成是王業也王業莫先于務夲故嗟嘆而言曰我周以農事開國致成王業既昭假于上帝矣今不敢廢墜前功率是農夫播厥百穀若是其駿發以終竟若是其服耕以齊力天尚鑒念錫我豐年是所謂祈穀于上帝也振鷺于飛于彼西雍我客戾止亦有斯容在彼無惡在此無斁庶幾夙夜以永終譽詩序二王之後來助祭也此恐不兼夏之後言殷尚白而其後仍殷之舊故有客篇云亦白其馬此亦以振鷺于飛頌而曰亦有斯容味下文在彼無惡在此無斁云云益可見矣或曰二王之後並入助祭其意在殷而其辭則並舉也亦有斯容槩舉其動容言也在彼無惡在此無斁又夲其心事言之見前王之後心服我之德政而安然於祼將之時所以能夙夜永終其譽也在彼無惡二句通就前王之後言在彼者封而統承先王也在此者人而祼將于京也王者公天下以為心原無我取人之意前王之後亦知王者公天下之意初無人取我之嫌所以在彼在此通無惡斁庶幾夙夜以永終其譽也若注將在彼貼前王之後在此貼今之王者則下二句便說不去矣敢問髙明無惡無斁平而無斁又夲無惡來未有不心服其德而矯強敬恭于外者崇德象賢統承先王便是其有譽處乃其心能安天命以助祭而略無惡斁之念其譽自克終而加永矣故曰庶幾夙夜以永終譽庶幾似深幸之之辭豐年多黍多稌亦有高廪萬億及秭為酒為醴蒸畀祖妣以洽百禮降福孔皆詩序秋冬報也黍宜髙燥而寒一假注極明白亦有髙廪萬億及秭云云不指公家說槩萬姓之家言也言年歲大豐皆有廪積不可以數計而家為酒醴家祀祖妣家有百禮無不周洽而降福孔皆無異同焉故首下箇亦有二字末下箇孔皆二字百姓足君孰與不足公家之豐積禮洽而福聚又有不必言者看良耜篇其崇如墉其比如櫛云云便見此亦有髙廪萬億及秭實是民間之所積生民萬億及秭而不可計其廪亦萬億及秭而不可計此方是大有之年記曰天下之肥正謂此百禮即就祭祀言或曰民間之禮與上之人不同祭祀時安有百禮維是飲食祭祀外有冠有婚有喪有弔有問皆一一不可缺者而一一能周辦是謂以洽百禮亦通降福孔皆言大家受福而無異同也若是而可忘報乎報不必行于王者故朱子謂秋冬報賽田事之樂歌有瞽有瞽在周之庭設業設虡崇牙樹羽應田縣鼓鞉磬柷圉既備乃奏簫管備舉喤喤厥聲肅雍和鳴先祖是聽我客戾止永觀厥成詩序始作樂而合乎祖也樂先審音故先舉其人設業設虡節則總舉其樂之備也故即承喤喤厥聲云云應田二鼓即縣於虡業之上曰應田縣鼓鞉磬柷圉既備乃奏矣又曰簫管備舉者别人之聲不混于器也和鳴上曷著肅雍二字在庭者皆肅雍以趨事即聲奏中亦此肅雍之宣越也此方是大雅之樂我客戾止二句不是藉此以為盛客前王之後也我革其命而封之而未必其心之服也戾止而其心與王者無二焉斯謂極和斯謂大順而樂觀其成振鷺云在彼無惡在此無斁庶幾夙夜以永終譽此云有客戾止永觀厥成二永字可玩味劉安成曰虞賔在位舜之作樂以此為盛我有嘉客商之作樂以此為盛我客戾止周之作樂以此為盛猗與漆沮濳有多魚有鱣有鮪鰷鱨鰋鯉以享以祀以介景福詩序季冬薦魚春獻鮪也魚喜濳而漆沮二水多濳處故畜有多魚可取以享祀焉綿之篇云民之初生自土沮漆古公以上居之吉日云漆沮之從天子之所此云猗與漆沮潜有多魚豈國家根夲之地氣王而多産耶抑天子以此地為湯沐故虗之為漁獵所耶以享以祀皆以薦有來雍雍至止肅肅相維辟公天子穆穆於薦廣牡相豫肆祀假哉皇考綏豫孝子宣哲維人文武維后燕及皇天克昌厥後綏我眉壽介以繁祉既右烈考亦右文母詩序禘太祖也然讀此詩似武王祭文王之詩或禘亦歌此章耳清廟云肅雍顯相不分此云有來雍雍至止肅肅蓋因來至異文而分言之耳其實常雍肅也凡祭時陪祭者先就位主祭者始就位故先從相者說起次節不重諸侯之助祭言薦廣牡亦有助祭之人耳假是昭假綏是寵綏宣哲以下正申其所謂假綏之實也宣是知周乎萬物故訓通哲是明炳於幾先故訓知宣與哲原是人心之夲體二者兼到方盡其所以為人故曰宣哲維人所稱后者謂其文足以開太平武足以戡禍亂也文王克全斯二者故稱文武維后易曰天地之大德曰生生養斯人是上帝之夲心文王若是其宣哲若是其文武其計安天下也真足上逮于皇天矣此天錫豫以賢子孫而克昌厥後也綏我二句不是徼福於文王凡祭其神歆之則受福不歆則不受福綏我眉壽介以繁祉則祭受其福矣所以既右烈考亦右文母而可永承其昌後之祚也綏豫綏我二綏字正相應載見辟王曰求厥章龍旗陽陽和鈴央央鞗革有鶬休有烈光率見昭考以孝以享以介眉壽永言保之思皇多祜烈文辟公綏以多福俾緝熙于純嘏詩序諸侯始見乎武王廟也此諸侯助祭而天子歸其德之詩故首叙其稟法度以來朝次叙其助廟祭以綏福曰求厥章訓禀受法度極確龍旗和鈴鞗革皆王者用以彰有德者故曰陽陽曰央央曰有鶬而總之曰休有烈光以孝以享以介眉壽云云語與潜之篇以享以祀以介景福語同宜聮不宜斷眉壽多祜夲是昭考之所錫而歸之烈文辟公者言非得諸侯之助祭不能受此純嘏之多福也俾緝熙于純嘏語極佳純嘏者即上文之眉壽多祜也而福不幸綏維德是與此必學有緝熙于光明常明此明德然後常保此純嘏耳卷阿云俾爾彌爾性純嘏爾常矣亦是此意有客有客亦白其馬有萋有且敦琢其旅有客宿宿有客信信言受之縶以縶其馬薄言追之左右綏之既有淫威降福孔夷詩序微子來見祖廟也微子未嘗臣周其來見以賔禮天子亦遇以賔禮故云客重言有客者丁寧殊異以尊大之也周之於微子也崇德象賢統承先王其遇之既已厚矣而及其來見又維恐其去也受之縶以縶其馬焉又追之而左右無方以綏之焉此方是王者大公之心此方是王者厚故之道此方是王者尚賢之禮馬亦從白則其他禮物之仍舊又可知矣萋且二字不敢強解若敦琢二字恐非可以選擇解也亦非可以追琢解也殷尚質其旅皆質有其文故云敦琢耳宿宿信信云者其宿一宿耳其信一信耳言去之速也故言受縶縶其馬以止之薄言追之而左右無方以綏之且曰既有淫威降福孔夷言今之福方未艾而不必其去之速也統承先王用天子禮樂此福也曷以為淫威哉愚謂此淫威者當即是奉天誅討之師也若曰殷先王之功德被於人者深且厚矣維紂淫虐異常天命我周討平之亦既已致其淫威矣淫威既加于淫虐天之心已既釋矣而追維爾先哲王之功德將降福孔夷於爾殷未艾也正月篇云有皇上帝伊誰云憎正是此意夷平也正與淫威對於皇武王無競維烈允文文王克開厥後嗣武受之勝殷遏劉耆定爾功詩序奏大武也爰集大統肇造區夏論功烈之盛孰有如武王者然武王之烈實自文王開之故以允文克開歸文王而謂武王之能嗣受也勝殷遏劉耆定爾功正其烈之無競處勝殷是矣曷為遏劉蓋紂為殘賊之主如奄與飛亷諸臣不勝其殘虐之甚下民無以為生苟非武王之弔伐其將何所底止哉一戎衣而天下定自此民免於水火之虐故知武王之用殺乃所以止殺而世稱其烈與文王等有由也天地之大德曰生勝殷遏劉此方是天地生生之心此武功之所以稱烈閔豫小子遭家不造嬛嬛在疚於乎皇考永世克孝念兹皇祖陟降庭止維豫小子夙夜敬止於乎皇王繼序思不忘詩序嗣王朝于廟也大扺古帝王之稱烈只是一箇孝而孝之克永世者只是一箇不忘其親若武王念兹文王陟降庭止則凡一注想一動履自然不敢踰越矣此善繼善述稱逹孝於天下也夙夜敬止是成王之心學蓋武王陟降庭止凛凛然維此心之敬也成王知之夙夜不敢怠忽荒寧則其心亦陟降庭止之心亦可以永世克孝矣故既又致嘆曰於乎皇王繼序思不忘蓋謂繼皇王之次序則當存皇王之心思即欲頃刻忘焉有不可得者此成王自得之心學古今稱守成者莫有加焉者也緝熙敬止原是文王之家傳武王受丹書曰敬勝怠者吉周公演易曰君子敬以直內成王曰夙夜敬止其淵源亦深矣哉帝王之統之相傳如四時之代禪者然故稱繼序於乎皇王繼序思不忘言當如此其致思乃可為永世之孝子乃可紹皇王之統序也訪豫落止率時昭考於乎悠哉朕未有艾將豫就之繼猶判渙維豫小子未堪家多難紹庭上下陟降厥家休矣皇考以保明其身詩序嗣王謀於廟也落何以訓始凡人初歷事必先討求箇下落故訓訪落為謀之於始朕未有艾工夫未竟而不能到也凡人到得彼處然後可率而由之不能到如何可率由得將豫就之者豫將親就而與為一也繼猶判渙者工夫尚未純一有間斷也有間斷則從此便判渙不相合矣易曰繼之者善也繼則安有判渙哉但工夫稍不相貫而有間是亦繼之功未至耳人君治天下要在保明其身保其身然後可以安天下明其身然後可以照天下繼猶判渙則其身尚猶有踈漏處尚猶有障蔽處維是紹庭上下而庭與之俱陟降在家而家與之俱斯其繼之者無一毫之間斷無一毫之踈漏障蔽處斯可以克家而承皇王之統緒耳成王自知其未艾自知其判渙必紹庭陟降以保明其身此何等學問何等工夫何等造詣文王陟降在帝左右此文之所以為文念兹皇祖陟降庭止此武之所以為武紹庭上下陟降厥家此成之所以為成敬之敬之天維顯思命不易哉無曰高高在上陟降厥士日監在兹維豫小子不聰敬止日就月將學有緝熙于光明佛時仔肩示我顯德行詩序羣臣進戒嗣王也此篇以敬字為主首節云敬之敬之次節云不聰敬止正其相照應處天維顯思二句一串下無曰高高在上三句正言顯思之可畏而保命之必以敬也士不必作事字解士者丈夫之通稱也曰陟降厥士日監在兹真令人凛然無敢少肆矣不聰即不明意此詩與前二篇一曰念兹皇祖陟降庭止一曰紹庭上下陟降在家此曰陟降厥士日監在兹一陟一降皆天命祖考之監臨奈何其敢弗敬就就而親之也將將而進之也參上篇將豫就之繼猶判渙看便見其日就月將處聖愚皆具此明德也而或昏或明之大别者無他維此心之存否何如耳成王日就月將學有此緝熙之實功則此心常存而日造于光明之域矣此成王之實落自得處故言之真切如此闕人君於家為宗子天為天子佛闕人從子曰佛時仔者謂吾人一闕天之子宗之子所任之艱巨自闕字解德行上著一顯字者何凡德行皆從光明中發出最昭著最顯明不可抑遏者舉此顯德行示我將與我心之光明相觸發而肩任之艱巨其可以克堪矣此全賴其身之承任者故曰佛時仔肩示我顯德行成王既有此緝熙之心學又佛時仔肩顯德行之昭示分明出王游衍之與天俱也而何畏命之難保哉所以稱成周守成之令主豫其懲而毖後患莫豫荓蜂自求辛螫肇允彼桃蟲拚飛維鳥未堪家多難豫又集于蓼詩序嗣王求助也成王經管蔡之變此心益加懲創而謹毖焉故求助之詞若此語云蜂蠆有毒蜂必取其辛螫矣莫豫自求云者懲創之意也桃蟲小鳥而終大可信以為小而忽之乎肇允拚飛云者亦懲創之意也懲皆在小而毖後患故稱小毖管蔡至戚也而毒螫王家成王不可以顯言者故以蜂桃蟲喻至曰未堪家多難豫又集于蓼則其情見乎辭矣書曰必有備有備無患易曰君子以思患而豫防之皆言後患之當毖也而其機在懲之一字懲則知所戒而後患弭矣孟子曰人恆過然後能改語曰遭一蹶者得一便經一過者長一識正是此意載芟載柞其耕澤澤千耦其耘徂隰徂畛侯主侯伯侯亞侯旅侯疆侯以有嗿其饁思媚其婦有依其士有略其耜俶載南畝播厥百榖實函斯活驛驛其逹有厭其傑厭厭其苖綿綿其麃載穫濟濟有實其積萬億及秭為酒為醴蒸畀祖妣以洽百禮有飶其香邦家之光有椒其馨胡考之寧匪且有且匪今斯今振古如兹詩序春藉田而祈社稷也田間去草與木則其耕順利而無阻塞矣澤澤者順利之謂也此出一耕字千耦其耘是周法之通力合作處此出一耘字侯衆也看千耦其耘則凡耕耘之家有主有伯有亞有旅有疆有以無不勤于其事矣故下一侯字載芟載柞至俶載南畝是泛言其農之耕耘餉饁事播厥百榖至萬億及秭是序言其稼之始播以及於收積事為酒為醴至胡考之休是極言其用之祭祀賔客共養事匪且一節則稱述自古有年以見先農田祖方社之功之不可誣也有嗿其饁四句是備叙其中之有此景象耳所謂詩中有畫有依其士士字即甫田篇蒸我髦士士字蓋髦士雖在農夫中而彼所事事必有可以導人者故下有依其士句言其間有依此士以力作者播是播榖實於其地也故繼云實函斯活榖實含地之生氣有活意則漸逹矣故繼云驛驛其逹逹之中有受氣足而先長者故繼云有厭其傑及其時則皆厭足而苖勃然興矣故繼云厭厭其苖苖盛則漸吐華而麃之發不可禦矣故繼云綿綿其麃麃秀而且實則載穫濟濟矣有實其積而萬億及秭可為酒醴之用矣故其詞云云函是含地之氣榖與地之氣原相合而無二也此函字即函三為一之函字驛遞之傳命最有序故榖之始逹也取此字義云先時受氣之足者曰有厭時至而皆足曰厭厭總是此一字苖初放華曰麃今吳楚人皆稱放麃蓋上文曰活曰逹曰傑曰苖皆就物生之序言此時序當是吐華不應復說到耘上且千耦其耘前已用力矣此復待耘耶有飶其香四句通就民家言乃見豐盈景象匪且節注極明振古云者如開天闢地之謂畟畟良耜俶載南畝播厥百榖實函斯活或來瞻女載筐及筥其餉伊黍其笠伊紏其鏄斯趙以薅荼蓼荼蓼朽止黍稷茂止穫之挃挃積之栗栗其崇如墉其比如櫛以開百室百室盈止婦子寧止殺時犉牡有救其角以似以續續古之人詩序秋報社稷也古人享其成則必思其自故當秋成時追述春耕及言冬穫之事極有次第或來瞻女者其婦來省視而致餉也乃載筐及筥而其餉伊黍是農夫亦貴者之食矣非豐年安能有此以薅之薅即深耕易耨之耨其崇如墉狀所積之髙大其比如櫛狀所積之聮密豐年篇云亦有髙廩上篇云有實其積而皆云萬億及秭者正謂此也以開百室有納意在開之固所以納之也今起徴糧稅皆云開倉即此意其崇如墉其比如櫛是積其穫以開百室百室盈止是積其榖百室盈止婦子寧止含哺而嬉鼓腹而游乃為真太平景象禮文具而倉廪虛民將無以為生也太平云乎哉傳曰社稷之牛角尺非尺則不中於牲矣有救云者其角中牲之用而有取焉者也斯干云似續妣祖此似續就是奉祭以承先然其為此莫知也古之人自來如此我亦如此續行之究其自則先農先嗇之功不可誣也故此為秋報之詩絲衣其紑載辨俅俅自堂徂基自羊徂牛鼐鼎及鼒兕觥其觩㫖酒思柔不吳不敖胡考之休詩序繹賔尸也凡祭宗廟之明日又設祭以尋昨日之祭以賔事所祭之尸曰繹繹禮輕使士絲衣爵辨皆士服也由衣辨省視以著卑者之恭順則尊者可知及祭畢旅酬毫無譁慢固宜獲壽考之福也此詩語極有欵序自堂徂基是省器自羊徂牛是省牲鼐鼎及鼒是省蠲皆將祭時事兕觥其觩設而不用㫖酒思柔欵而中禮且無歡譁無傲慢何福之不承於鑠王師遵養時晦時純熙矣是用大介我龍受之蹻蹻王之造載用有嗣實維爾公允師詩序告成大武也初則遵養繼則蹻蹻何等斟酌故名酌此詩要看二時字一龍字一公字易曰時乘六龍以御天也雲行雨施天下平也武王有於鑠之師遵養時晦而不用何嘗有心以取天下哉維紂無悛心而天命在周時已純熙斯用大介以燮伐之耳即是觀之其遵養也一龍之未受命而躍在淵也而其用大介也一龍之既受命而飛在天也飛龍在天則其所規為所創立蹻蹻然皆王者之制作此易之所謂大人造也然則武王豈有一毫自私之心哉應天順人弔民伐罪此心之公真有可對於天日者載用有嗣不必他法實維爾此心之公允師之庶可仰承乎先志耳愚謂此詩宜如此看上天明命昭然在周曰純熙熙字正與晦字對總之一時耳我龍二字極妙易乾之九四曰或躍在淵旡咎九五曰飛龍在天利見大人聖人原是一箇龍其躍無心也時可以躍而躍耳其飛無心也時可以飛而飛耳是所謂公天下而無私者也易曰飛龍在天大人造也蹻蹻王之造正此大人之造蹻古腳字而從足從喬有超越特起意蹻蹻云者言所創造步步從實起而超越於今古也載用有嗣不必說到復用征伐去禮樂刑政總是王者之公事但有嗣而用之者一維秉此大公之心允師武王之所為耳或曰載用有嗣緊頂上說此箇王之造真可垂之于後嗣實維爾一㸃公心允得用師之道也前後二師字相照應亦有理綏萬邦屢豐年天命匪解桓桓武王保有厥士于以四方克定厥家於昭于天皇以間之詩序講武類禡也言武王當日行武類于上帝禡于所征之地後人追述其事而為此歌大軍之後必有凶年殺氣之所于也武王之師全是撫綏萬邦而和氣昭升于其上故屢賜之豐年之慶此便是天命之匪解處亂臣十人既用之戡禍亂而復命之綏太平此保有厥士于以四方克定厥家處皇以間之間字照書多方有邦間之間字似作代字解但當是時武王業已代商為天子矣而更何代哉愚謂此間字即間氣間值間字蓋武王戡定禍亂天命既已攸屬而任賢使能制禮作樂開萬世之太平又有此非常之功德皇皇上帝亦以非常之寵綏之有特異於他受命者是所謂皇以間之也敢問髙明文王既勤止我應受之敷時繹思我徂維求定時周之命於繹思詩序大封于廟也武王體文王之意大封功臣故有此詩酌之篇曰我龍受之子孫我武王也此云我應受之武王自我也讀詩要知一詩之所主讀此篇注不能解愚逆詩意是武王之詞武王若曰文王既勤勞天下則其志其事皆我之所應承受者舉時所繹思之功臣與往平定天下非文王之意乎錫之封賞以敷布之我與共往維求天下之安定是在周今日之命有不容己者而要非以行私也亦體文王之意就時所繹思者而敷布之耳故前云敷時繹思我徂維求定後云時周之命於繹思以收繳我應受之之意未知是否敢正髙明勤止上著一既字見得前人既如此我應得如此承受之敷時繹思而我徂維求定才完繳得一既字敷時繹思時字最重文王平日任人以圖治全是與時偕行而求天下之安定故當時繹思文王而併繹思其功臣也今武王敷其繹思而徂維求定則封賞之命雖出武王而實是當時人心之所共欲者故曰時周之命於繹思前後二時字正相應於皇時周陟其髙山嶞山喬嶽允猶翕河敷天之下裒時之對時周之命詩序巡守而祀四嶽河海也武王新受命當時天下皆想望其新政故巡狩方嶽覲諸侯以對答之通詩重在裒時之對一句上於皇二句是起語嶞山二句是巡狩之行敷天二句是巡狩之意時周一句應首語凡巡狩必登山以柴望故首云陟其髙山時所瞻望於我后者衆矣至一嶽即朝一方之諸侯聚一方之民人而考其制度正其風俗若虞典之所載焉四方之人心有不快然於瞻仰之下乎此之謂裒時之對上篇敷時繹思此篇裒時之對皆當時人心之所共欲者故不獨曰周之命皆曰時周之命要細玩上篇二時字此篇三時字重訂詩經疑問卷十一
